body:
  text: 住博山法孫弘瀚彚編首座法孫弘裕同集文二奠壽昌和尚二某年月日得法弟子某謹以瓣香素饈致奠于壽昌先師大和尚法座前而言曰於戲先師身獨立于宇宙神周遊于寰海遊戲大火聚裏鮫珠帶水欲生寒出沒生死浪頭古岸漁竿垂渡晚住山五十餘白大似指花破夢應緣三處道場渾如插草成功推倒大好山入興善門不動寸步出應西竺讖住壽昌院放出金牛植多福竹而勾引清風碎黃龍關而疏通萬里然後布漫天網提金剛劒殺佛活祖捋虎搏龍四海衲子聞風而至及乎見師如一田夫耳往往望崖而退竟莫窺其端倪蓋師見道甚密行道甚力自髫稚之年貌骨瘁立荷一雨具而肩幾腫突入山躬自作務力田飯僧凡鼎建梵剎大小十餘所皆吾師一钁之功嗚呼先師薄聲位不干豪權不營利養撐持佛祖之道于頽波末流之頃作本色道人使洞上宗風復振于今日斯功也不歸重于吾師復何歸哉不肖某三十年前叩籌室遭險觸鋒至二十六年冬方命首衆大綱一舉衆目齊張持舊戒尺于空諸有處號令人天拈爛拄杖向沒蹤跡邊開展門戶橫拈竪卓倒廩傾倉伏藏家珍和盤托出嗚呼拈花微笑破面門者幾人覩影知形揑轉鼻頭者孰是顧不肖謬當其印是就無用中而求有用及師遊少林登五臺不肖始離叢席三經寒燠逮師居寶方復命首座寮秉拂其知遇之隆出乎常格之外舊春二月覲師于壽昌為師壽甫閲朞歲而忽訃至嗚呼吾師生耶死耶法幢雖折法燈愈朗其以生滅去來視吾師者不啻門外漢詎足與語嗚呼尚饗慈容粹美十年若隔宿之期古寺輝煌群木動遐思之色法音宛爾杖履蕭然銷俗諦餘塵豈斷懸河之辨入常光三昧毋辭織錦之勞深悲腳下兒孫誰為克肖刮去眼中膜翳灼有師承點鐵成金煅凡育聖雪盛銀碗露濕禪裾銘先師格外宏慈棒下吐驚人之句愧不肖冶中鈍器當陽泄正位之機方開一線之長遂醒千秋之夢縱肝膽塗地而莫報洪恩藉山海煙雲而敬伸薄奠奠鵝湖和尚某年月日弟子某謹以素饈香燭之儀致奠于鵝湖堂上示寂先大師養菴和尚之靈龕而言曰於戲先師靈心湛寂道性貞醇幻化八十春秋渾無起滅成熟千生善聚示有去來梅花枝上笑拈不夜之春茶銚爐邊賸得活人之句見野燹而知起處境量消融封鎖鑰以驗方來真機獨露不起日旋三昧大施無礙鉗鎚悲花法雨灑人寰慈意戒雷轟碧漢不謂化儀告畢緣應已周金棺掩耀俄驚白樹以興哀鵝水藏珠不覩玉毫之散彩白雲慘乎無色瀑布凄以斷流頽法門之華棟四衆何依竭覺海之靈波群生失潤某等夙承洪鑄仰戴玄猷瞻模範以步趨風高莫及藉聲光而提命恩大難酬叨餐法乳之深徒戀雙趺之跡溪毛㵎水聊為最後之純陀海月山雲永作吾師之供養至痛無文真照靡隔祭文嗚呼哀哉言念父兮廓落坦夷儼行仙之高躅質直朴實追懷葛之醇風慕善道而嗜從如漿脯之適口猒世網而思脫比澤雉之樊籠視塵勞而為夢幻兮轉成智度借恩愛而作道緣兮實生兒躬早遊方外志慕空宗奉戒律而為孝順兮酬劬勞之罔極弘道法以資恩有兮冀樂利以無窮顧不肖雖悖德於一時菽水違養乎雲水賴老父終歸心於三寶蓮胎高步乎花宮山川秀邈兮疑復覩於再世桑梓旋歸兮俄捐館於西風指忽囓而心慟音雖隔而夢通登丘隴以瞻顧兮㵎藻陳其怵惕攀楸檟以雪涕兮風木感其哀衷願來歆於法喜兮山雲海月聊申兒之供養期早證於樂兮水鳥林樹皆演佛之圓通惟靈不昧鑒此哀悰祭萬融上座仁者發心尋師浙水吳山往返年餘遍參哲匠無有可其意者己亥與余邂逅鵝湖峯頂一言相契若針鋒投于芥子如飴如蜜似蓮花開于夜分愈湛愈鮮相別二載仁者腰包抵閩復會豫于武夷虎嘯崖同出嶺住西巖祖印及博山三寒暑始分居衢之招慶應檀越廉憲詹公請嗚呼隙駒易流倐忽間一十七載余召仁者歸仁者無時不願歸甲子二月十八日聞仁者棄我而先仆寧不痛哉嗚呼仁者心何心耶行可行耶惜悲智有餘而世緣未了而今而後不復與仁者論玄言談世諦略以數語記其歲月為再世緣偈曰浮生虗幻縱壽百年電光石火孰為後先汝達斯理棄余長往一非云隻二不成兩人見汝死我知汝心慧光渾全不向外尋十有七年宛如夢幻行美機緣可謂通貫今日實際山濤海雲松聲鳥韻觸目皆真建窣堵波藏諸所有天覆地載傳之不朽我以法供密示汝前汝其領會密在汝邊祭趙湛虗居士靈木潛輝樹變兢河之色真光掩曜僧含閩嶺之悲設素供攄竭己躬雖輸誠辭難盡意勘破人間大夢帶來劫外靈明伏枕多金粟不二之談理圓辭妙披緇效馮公再生之願事實果彰諄諄戒酒囑嗣君念念修行䇿道友示病才于七日快活何止千言開含笑而無墮容暖頂聖生且有明驗心莫守而頓超諸有言不盡而畢理衆心幻化七十三年齊戒三十九載拂衣善逝拍掌歸家別衆若赴請之期肅容如再生之日片言隻字難盡鄙懷㵎水山花聊伸薄薦疏廣福菴化藏經疏箇中不立元字腳一大藏教向甚麼處得來隨方建立總持門七百函經從自心中流出覩明星而悟道瞿曇之鼻孔頓開拈莖草以投機帝釋之面門𠢐破一片白雲瀰漫幾多歸鳥迷蹤山河大地作琴聲到處花飛蝶舞水鳥樹林談實相何須鳥跡蟲文得魚兔方捨於筌盈倉儲始忘乎田地剜千燈而供養信知大法難逢捨四大以酬心祇為恩歸有在周廉溪發弘誓以相資衆居士乞片言而為引續佛慧命而壽命無疆勞己色身而法身始顯佛緣克就世道遐昌覺慧寺化藏經疏法幢高竪人天之白業熏成寶藏遙頒緇素之玄風始著捨金輪而談真諦拴回帶雨泥牛剜赤肉以博真詮倒跨嘶風木馬普眼雲興二百問人人衣縫綻開普賢瓶瀉二千酬箇箇鉢囊盛滿抉驪龍之至寶須探覺慧奇蹤踵伏龍之芳塵要入普聞玄徑天垂寶蓋千餘年之靈運重來地界金繩四大海之真源復湧打開瞿曇寶藏大家乞我一文竪起慈氏層樓普願同拈片瓦緣生之實相有據誰申較量之功性地之靈苗再生好下有情之種峯頂和尚壽塔疏淨白無依平地湧七層之塔妙嚴非相靈光通一線之天破大夢於紅芍藥邊一文二文三文憑渠料揀顯圓機於碧梧桐裏千座萬座億座散滿閻浮本無一切之身法輪轉於塵界竟分一切之塔眷屬等於河沙是以隨緣即應應本無生非思量分別之所能及也我大和尚托質斯時全該大法順機動善慶無不宜誰云有去來拍破木人之掌渠本非國土展開石女之眉釋迦文揭露於當時倒跨泥牛迎曉霧阿育王覆藏於此際賸搖鐵鐸振春雲紅光爍破地皮白浪點開巨眼雖則規模畫一料理在我兒孫笑看窣堵千層蓋載還他宇宙稽首昆季同樹厥功護生社募緣疏真心彌亘寧有六道之殊形妄念隨緣遂感多生之異質如來大光明藏是衆生淨覺之本源有情最癡暗根含諸佛妙明之因地雖報緣聰聰蠢蠢然覺性完完全全蛛結網機械可知鵲營巢靈心愈巧鱔解鑽泥而隱虱惟趨暗而奔觀蠕動咸自貪生雖傷殘而猶戀質甜兒之塵涕泣而腸斷幻囊護子之蟲命壞而身環舊穴瘳乳捨將烹之鱉投珠醫未死之蛇何忍剝皮剔骨活潑潑以入鑊湯劈腹剜心魂飄飄而驚爐炭淚未乾而皮毛脫落肉尚動而厨竈喧譁可憐頃刻下咽喉誰識神號鬼泣肯信無端被燒炙須知果缺因酬三途之業報無休萬劫之羈縻不息豈可恣情悖理烹鮮擇肥惻隱忘大聖之真慈食噉導凡愚之惡習無纖毫好生之念藉口曰萬物養人興殘慘造業之心又豈知三途在我不爽絲髮如影隨形普告達觀長者大發慈心效解網之仁啓放生之會杖頭之青蚨不惜囊中之故鈔何慳脫籠檻如出囹圄好看理羽毛而愈快免砧几如離屠肆灼然全幻體之靈知鼓翅空中現黃衣而拜主昂頭水面旋印紐以酬恩果報無差循環不息莫呵饒舌願賜登名阿育王寺募修舍利殿疏靈光飛彩閻浮分無量之身空谷傳聲海岸湧五層之塔毫相瞻於七衆隨定業以現殊形功德布於多生遂塵緣而興異報允矣法門之驗自金棺掩曜之時奇哉覺樹之春亘青帝熙和之景真身雨八斛四斗翻塵勞業網可知悲願造八萬四千盡天上人間俱有光彌覺海秀結慈林窣堵波終古不遷世莊嚴緣生有壞雲門老欲衆生之機感就眉毛睫上樹大法幢諸善人發自性之靈知向香水海邊爭先佛種喜聞地理淨破慳囊願賜抽毫同圓聖智天心寺募飯僧田疏蘭若發真乘闤闠宛嚴佛國涅槃無異路市賸有僧園豁心境于一如融古今于當念淫房酒肆彌勒之布袋橫拖獵隊樵羣能祖之風幡直指破格非關乎淺識絲毫爽猶過蠱毒之鄉超拔要在乎智人道諦成似飲醍醐之味從凡心而入聖先嚴潔淨之壇場擯魔衆以清修必假資財而助發乞檀那之雨露涓滴幸灌于天心種自性之菩提根株必榮于佛地僧田有賴報果無差慨賜真慈弘聖域壽言上壽昌和尚七十壽昌一片閒田地荊棘鋤翻行樹植玉葉金莖遍世間祥雲五色如綺織靄靄毫光亘十方白乳香糜意味長沾著唇吻生白醭鐵額銅頭頗廝當五十年前親蘊造翠靄山中窮大好自言逴著赤珊瑚元是峨峯地上草我曾忙向箇中親撮摩如錦復如雲崖柴不是閒相識始信寒巖別有春龍象蹴踏環麟鳳俊天駒非釋種後園獨羡老驢鳴嚙草攢蹄不受控一聲犍椎法門開衲子如雲輻輳來玉鎖金匙挑不出大海須彌祇一埃今年七十懸弧度通衢獨踞白牛輅招手揚聲換不回伏藏家珍胡足數觸處開山非聚糧峻嶺平原盡寶方叢林賸有金銀氣法界惟聞優鉢香上峯頂和尚七十鵝湖山高雲赩奕如蓋如幢金蕊色照世明燈坐道場一道靈光燭天北獨步寰中意自殊南方知識逈良模推開辨老門前臼奪得蘭公肘後符梅花枝上露消息倒跨燕都神駿逸金鈎海底釣鯨飛天目峯頭銀浪激歸來占斷白雲春飯糗羮藜絶四鄰德比黃梅躬餉母詩同慈覺勸尊親天生純孝既如此等視衆生猶一子開堂法乳潤枯松說戒金鱗躍芳渚英標衲子競瞻光三尺黑蚖鞭四方未過黃龍關可否先知伯樂馬驪黃今年七十從心度半倍趙州花甲數使得時辰珠走盤吞乾日月壺縣樹眉毛似雪畫難傳萬仞須彌聳巨川擬同嵩少追芳躅笑與支那較大千壽懷白禪人襟懷清白佛家風器界情深境象同一帶晴嵐無限樂彩雲斜妙高峯劈破妙高峯頂色靈源倒吸黃河竭明暗交參互換機分明兩口一無舌春來都放一般花遍界渾敷智慧芽莫道出關行路險嶺頭足破有玄沙佛緣自古閩中有明月光含獅子吼要識靈山老比丘也須格外翻筋斗禪者欣逢不惑年鼻頭懶拭俗人前生平祇解居山好佛法應知在钁邊鋤頭竪起知輕重鋤聲驚破居山夢醒來不似舊時人才方舉起眉毛痛我將此語祝長生東土西天路坦平佛祖場中戈不展傳燈永載丈夫名壽清溪居士瓶盂幾入樵陽城入境早聞居士名居士慧風拂人面邂逅始舒眉上衡我曾說與修行要玄源不向別人討根境門頭著眼看衣中奪出傳家寶慣放溈山大白牛溪南溪北恣優遊家常田地都耕遍賸有煙雲一帶秋去年七十懸弧度海上仙來誇步武愧我不曾預法筵為君重說雲門普鑿開混沌露空青兩手殷勤握曜靈真珠收向皮囊裏誰道山河礙眼睛他人賀十我賀一我賀八十人賀七待君百歲作長篇再把真詮通祕密壽東湖居士水兮流聚閻浮東湖光蕩漾吞蒼穹終朝雲氣騰霄漢瑞日祥風啓太蒙居士曩餐仙掌露愛向禪門聽法語皓然鬚𩬆尚乾乾夢幻身心方栩栩一聲佛號震如雷識境根塵當下隳不問娑婆及淨土何妨城市與山隈今年八十復有一拄杖橫挑消白日逢人多說聚沙緣貝葉曇花俱備悉我為居士祝長生雪嶺雲山路坦平頂門突出金剛眼萬仞巖頭撒手行腳跟不踏無明草旋身始覺虗空小無邊剎海一毫端水底珊瑚和月皎壽舒城芝泉孔君芝翁是我鄰家伯三十餘年彈指隔鄉國天涯自古愁清歡那記身為客偶得鄉人音信通逢人先問老年翁曲指才方一二過忽然如對芝翁容翁年八十懸弧度德澤如春滋雨露我本隈山旁水僧勞書千里來相顧讀翁書罷瑞雲開雲裏仙人度索來合掌殷勤乞我語不辭鄙句為翁裁願翁愈壽愈矍鑠如岡如陵復如嶽挑雲拄杖一身閒鶴髮童顏誰可學我卜歸期限十年壽翁九十我居先倘逢他事相違約定是還翁百歲篇壽廬山印心法師江浙從來稱法窟象龍生具黃金骨爛翻貝葉亂天花閃爍毫光無自忽凌霄巖畔古今傳養就金毛勢力全倒跨匡廬成底事千尋瀑布注靈源緣生耳順逢初度一周甲子從頭數微塵量盡不思議豁爾山河無寸土幻影漚花視此身圓明根境不沾塵越山吳水呈清供永慶長生不老人壽余文台居士三台之上紫雲旋瑞氣祥光徹大千露滴化城肥忍草風生火宅綻青蓮牛車倒跨通衢坐塵緣眼底浮雲過信步經行適野情隨時粥飯稱功課今年六十懸弧度日用堂堂大覺路徹骨清風透膽寒如意明珠全體露世念寥寥冷若灰森羅萬象競趨陪擡頭喜看三峯月陰樹幽禽接翅回美髯朱顏多笑語煙雲斂向眉端許不拘真俗話無生二諦何妨顛倒舉謾將年臘記長庚數盡塵沙道愈明今日與君親說破來時古路坦然平壽方時生居士我昔親遊桐子國靄靄祥光多碩德簪纓綿亘萬千秋陰隲文章相紹克蹤跡曾登月上菴傳聞仍得君為檀勇力深緣三昧樂何妨廢寢與忘餐今年不惑懸弧度撥塵喜見龍眠路龍眠路上草芊芊寂住峯頭不記年眼底青山多峭壁腳跟流水盡潺湲潺湲流水君常奏長齡應會體中玄壽余夫人洪疇五福先稱壽真人無位須親究根塵界裏見分明彌滿乾坤非滲漏一道靈光萬境閒夢回端不是人間霜清月冷罏煙馥賸有芙蓉帶露寒今年五十逢初度嚴淨毗尼乘戒住不須仙母慶長齡家庭變作明珠庫明珠寶藏用無窮機感臨時觸處通壽量誰能分甲子扶桑原在海門東壽熊母洪疇五福先稱壽遐齡萬善皆成就不須瑤島祝長生一句彌陀清白晝彌陀一句樂成水鳥風柯吐妙聲彈指笑看花上品方知大道坦然平初度優曇符耳順更誇土淨惟心淨百務紛紜事似麻須知永處那伽定自是兒孫增上緣不求天道不求仙玻璃地面黃金色賸有丹沙注大年贈天居士造塔壽母諸供養中法供養最撮土聚沙成羣作隊我大居士欲展孝思竪剎竿幢為壽尊慈令母怡然惟彩衣子世出世異不可方比實非莊嚴而成莊嚴飾此片地億萬斯年聞古尊宿禮塔報母朱冠緋衣空中與語從地湧出自當證知快說法華今正是時壽芝泉翁記昔鄰居音容宛然棋聲入夢衣帶香煙時聞庭訓顏歡心服塵世譏呵了無一物我來學道三十餘載翁之德業光明愈大翁今八十懸弧大誕芳躅雲仍金丹燦爛令我遐想莫侍壽筵曾入之門未兆之先翁鑒我語我為翁壽龍性久馴鮐齒益厚㭊塵點墨喻如恆沙較翁之壽何啻天涯翁壽如嶽非峙可比翁壽如海非波可擬徑挺澄湛世莫能知往今來古今正是時此偈誰作誰為賀者吾由昔人非昔人也壽李元谷居士竭世樞機世罕知娘生六十未移時逢場竿木彌三際落草曇花吐一枝不問真空談至理喜將俗諦話離微山僧欲賀無他物罄幅惟書景福詩壽知非元座六袠三首從余三十載瀟灑不隨流䇿杖防苔滑經行喜樹稠堂中三下板雲外一聲鳩今日逢初度俄驚半白頭從余三十載寒暑不憚行忍草和雲秀曇花匝地生戒光恆皎潔清課倍修明道及塵緣事鴻毛一樣輕從余三十載清範可規僧懶弄閒家具寧牽爛葛藤法幢摧意淨華藏等身恆秉拂言親薦輪機似不曾壽閴然法弟多年瓶錫侍吾師今日春秋正是時謾道姓寒酬節序笑看嘉運綻瓊枝壽玄鏡成宗二首自古禪門無歲月浪言五十是誰傳要知劫外真消息日照澄江錦一團日月星辰談實相山河大地演圓音紅爐𦦨裏重添火炟赫烹蒸古佛心壽萬融上座相逢爾我方新臘轉眼韶光已二毛夢裏不知霜月老乘杯好弄浙江潮壽黃心鏡居士百歲光陰已半過晦明遷變奈渠何維摩昔日曾聞欵塵劫都來一剎那壽智諳禪人幻化人間五十年放憨山谷種山田白雲明月都耕遍頭角依稀猶未全鋤頭柄上是生涯秋煞冬枯春放花歲月盡來渠變易休教雲霧濕袈裟趙州八十尚勤勞勘驗諸方氣象驕要識古人真實處莫隨溫飽便逍遙法華壽量㭊微塵㭊盡微塵礙眼睛只教須彌翻白浪佛生塵界不關情
