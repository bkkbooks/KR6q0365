body:
  text: 住博山法孫弘瀚彚編首座法孫弘裕同集宗教答響五六雪關主問參話頭真切不落楞嚴五蘊魔外云云師云細觀楞嚴五十種魔事不出一箇著字如色陰明白銷落諸念乃至是人則能超越劫濁觀其所由堅固妄想以為其本即此堅固妄想便不能融化於妄想中精研見希奇之事便作聖解豈非著耶如不作聖解名善境界不作即不著耳又五蘊中總以妄想二字結之最初一著便不能破即此妄想便是魔之根蒂其根本不除挫其枝葉令其不生可乎甚乃利其虗明食彼精氣悉妄想牽合非魔從外來苟涉于慎護正所謂雪上加霜火上益油耳如受陰中虗明妄想虗明亦妄想蓋最初未到求心不有之地非妄而何如想陰中融通妄想最初章云心愛圓明即前妄根與境融通便生愛著十種悉云心愛等蓋天魔從圓境中來與愛心偶合作無邊魔業安可救也良以行人最先坐斷此一念無心即無愛無愛則著之一字何有耶只如第九章云心愛入滅貪求深空等悉是魔業亦最初妄心不破正所謂蒸沙作飯沙非飯本也如行陰中幽隱妄想蓋行陰乃遷流不止為性故云生滅根元從此披露為想陰盡徹見行陰中根元悉是生滅念念不停行人不隨生滅遷流故得凝明正心爾時天魔不得其便但於圓元中起計度故窮其始末有因無因等既有計度亡正遍知計之一字從幽隱中來文云觀彼幽清不能徹見源底也如識陰中顛倒妄想謂同分生機倐然隳裂六根虗靜無復馳逸虗靜為不馳逸不馳逸為行陰盡耳行陰既盡見聞通鄰互用清淨故云窮諸行空尚依識元乃至精妙未圓便生勝解此十種悉以識心而生勝解既作勝解違遠圓通生諸種類矣禪門中善用心者俱不相涉思大云十方諸佛被我一口吞盡何處更有衆生可度此是佛祖位中留渠不住邪魔外種其奈爾何欲得不受其蝕但全身入理不待遣不待護妄想念盡則魔業自盡矣古德云便好和根下一斧免教節外又生枝問不執修證不廢修證云云師云吾宗門下毋論利鈍賢愚但以信而入既發起猛利心如坐在鐵壁銀山祇求迸出諸妄想心悉不能入觀照功行安將寄乎果得一念迸開如披雲見天如獲故物觀照功行亦何所施祇貴參究之念甚切其參究亦涉于功行但不以功行立名如看破世緣切究至道亦涉于觀照但不以觀照立名如圓覺云惟除頓覺人并法不隨順若以觀照為事則有能觀能照之心必有所觀所照之境能所對立非妄而何所以禪宗云獨蹈大方心外無境將十方世界洎父母身心融成一箇坐斷兩頭始得箇入門向上一路更須自看不然盡是鬼家活計安可以修證同日而語耶果顢頇不到此地即名自欺此輩名為可憐愍者寧堪齒録南嶽云修證即不無汙染即不得即此不汙染之修可謂圓修還著得箇修字麼即此不汙染之證可謂圓證還著得箇證字麼如此則終日修而無修掃地焚香悉無量之佛事又安可廢但不著修證耳九地尚無功用行況十地乎乃至等覺説法如雨如雲猶被南泉呵斥與道全乖況十地觀照與宗門而較其優劣可乎智祖禪人問諸方尊宿每教人以一則公案頓置面前念念繫緣名為參究此於台宗止觀專注一境同耶異耶若言其同仍是教下工夫非教外別傳若言其異彼則專注一境此則繫緣一處名雖異而實同似是而非乞求一決師云宗門一則非與諸法門為比公案者如公府之案牘一句子不明處只欲發明貴在深追力究非繫緣也天台止觀似不可以宗門較其優劣止觀意在與法相應如人行路漸入佳境參究意在力破重圍如披雲見天推門入臼天台以觀破惑智德頓圓窮之則有惑可破也宗門以參從緣心境俱寂釋之則無緣可棄也若以境緣同異較其非是實霄壤也問達磨西來頓翻窠臼惟一心地法門直指人心見性成佛嗣後五宗迭出門庭種種不同曰五位三玄四賓主乃至四料揀為復法應如是耶為復羣機差別耶若謂法應如是則教中云惟此一事實餘皆方便直指門中不應有方便若謂機有千差逗機之法應爾則楞嚴二十五圓通逗機之法已悉何必另為贅枝駢拇之法初祖東來多此一番跋涉師云達磨西來頓翻窠臼授受之際實無二法何以曰五主法者有五不得不曰五宗也豈以五宗者塞礙一心地之法門乎乃至三玄五位賓主等語盡屬名言悉單傳之注腳耳果得千聖不傳之道三玄五位賓主君臣如指諸掌法如是故非差別逗機也若在三玄五位上印證心地法門者大似就枝幹而索其本非即非離即枝幹非得其本也離枝幹亦非得其本也若本者枝幹之本枝幹者本之枝幹果是智人思之可見教中謂惟此一事實餘二則非真非真者權之謂也非權無以導其實非實無以開其權雖是謂權歸實又何妨權實並彰也教中之權各趨岐徑宗中之相惟據本參本參破如月印千江岐徑通若風號萬竅似不可以圓通差別之法與玄位同日而語也初祖之來法門尚矣豈曰贅乎問從聞思修入三摩提大小乘法爾如然似不可廢即古德亦有云三藏十二分教某甲粗知又云先以聞解證入後以無思契同是知聞教然後參禪千聖不易之規奈何近時尊宿不觀學人曾否聽教一例示以無滋味話令彼早晚穿鑿不落妄想便墮無記又溈山云此之一學最妙最玄又云若有中流之士未能頓超且於教法留心當溈山之時正像法隆盛之秋猶然若是分別而當今之世正值末法衰殘豈得人皆利根一槩以上乘法投之況觀機逗教應病與藥似不可廢師云余答劉居士問謂宗乃教之綱教乃宗之目如依教修行當以證入契同為克家也聞解似易無思誠難惟吾祖師門下以思無思之妙又云心如墻壁乃可入道亦不以聞教不聞教為不易之規也如教中誦一句伽陀忽然大悟又云一言之下心地開通豈待遍涉名言方稱悟入參究者非涉於穿鑿穿鑿二字法門大害教中或有之而宗門實無也此之一學最妙最玄當人人期於頓超豈可甘心中下法不論像末人不論智愚惟辦肯心是為上智反末法為正法翻中下為上根似亦不難耳問三無漏學因戒生定因定發慧我佛誠言而妙喜則云他人先定而後慧老漢先慧而後定大與佛經相違若以時事驗之如人酒迷慧性顛狂錯亂酒醒則狂性自息則慧先定後妙喜之言愈為有理大師於佛經祖訓若為會通師云先定而後慧佛之誠言先慧而後定祖師慈訓二俱略之非定論也如人修定若無慧為先導則不能修慧不妨在先也有慧而戒立戒立而定生定生而慧朗如環上尋輪求其始末了不可得以此觀之大慧亦為賸語也實佛祖符合又何待會通問永嘉云了則業障本來空見道語也而西土師子尊者此方可大師俱了了人也何業障不空必待酬償而後已若謂償處正業障空義則造十惡人念佛帶業往生亦必回娑婆償宿業始得若往生者宿障不酬則大了之人反不及念佛者多矣若謂大了之人業障實空能超念佛十倍則師子可師仍居未了之科師何以會通之師云業障空是不易知也若謂遭王難是償夙債實不達業障空非正論也豈不識水月道場空花萬行鏡裏魔軍夢中佛事汝以夢中為實事是不空也若達斯空義償不償皆夢語耳十惡念佛帶業往生諸惡頓釋趨果忘因非回償也下品下生見佛尚遠歷胎既久始得花開非不償也與宗乘中較其優劣不亦愚乎問雲門請益睦州悟道因緣傳燈會元載之甚悉其見雪峯居然知識矣並無請益語盡皆問答語續後出世何故不嗣睦州反嗣雪峯為復以人盛衰易其心耶則非祖師所為何能取法後世且嗣法昧心韋馱明加其杵若謂録語有略則授受之際千古慧命來源所繫豈可妄自筆削諒必有説乞師補之庶免後世嗣法之溷師云雲門見睦州夾斷一足即有悟入非大徹也初見雪峯即命衆迎五百人知識是雪峯以法眼印之次日上雪峯峯才見便曰因甚麼得到與麼地門乃低頭從茲契合且從茲二字非借辭也況後溫研積稔以印心宗乎非敢以盛衰易其心也今時人以玉彼之師為冤家以印彼之師為恩故殊不知印彼者未必是玉彼者未必非以非為非者不失法會之正因以非為是者終陷泥犁之惡報寧可千生不悟不可一日著邪滴血之語豈欺我哉當悉審詳毋容輕忽剡水禪人問教外別傳者禪也淨因禪師以一喝而收五教然則五教皆禪教外者何謂乎師云淨因以一喝圓收五教以解講華嚴者之惑豈不聞一喝不作一喝用縱古佛與大菩薩到此亦斂袵矣況其聰敏及機智者乎所以云一喝能收五教五教所不能收者禪也問禪不外教教不外禪唯字與聲實無二相別傳者又何謂乎師云禪稱教外者非教中所列之禪實乃世尊拈花非字與聲所載者彼時百萬人天悉皆罔措若論聲教所詮者又何待迦葉微笑世尊印定有教外別傳之旨故知四十九年未曾吐露者箇消息實是教所不能言者故曰教外實是教中綱領故云離文字相及言説相貴在悟徹故稱教外果教外而別有傳乎問清涼大師以禪為頓似依六祖壇經判若錯俱錯苟非頓是圓也亦教苟非圓亦頓禪自禪非但一不能收五即五亦不能入一也展轉合明增長迷悶惟冀慈音宣流開示師云清涼以禪為頓者是抑禪而揚教也六祖謂開示頓教大乘是借路經過正為宗門稱頓悟者言之若云非頓是圓其圓之一字吾宗門中亦不立也苟立其圓則不圓矣如云大方廣亦是顯果德之相其法身之理理絶對待何大之可立也諸法緣起應變無窮至體無外卷舒自在其方廣二字亦是借言大方廣對世間言説故爾標宗頓入不思議者亦賸語也況五教云乎哉吾佛以禪稱教外愈明也如人生在王家不説貴相又如九品至一品者品品可收惟生在儲宮者豈品級可收也禪在教外不言可喻也
