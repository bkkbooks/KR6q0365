body:
  text: 住博山法孫弘瀚彚編首座法孫弘裕同集開示偈五示李虗雲居士頓悟心源開寶藏萬花叢裏樂優游春風也解禪那意吹盡殘紅伴水流示劉自度居士頓悟心源開寶藏鐘鳴鼓響驗聲塵自從識得緣心法一箇無心閒道人示齊寶明居士頓悟心源開寶藏從他煩惱與菩提三餐茶飯隨時過無事深山聽鳥啼示鄧九如居士頓悟心源開寶藏灼然笑點馬師圈頂門果具摩醯眼黑白終歸句下圓示李何事居士頓悟心源開寶藏摩挲睡眼見青天現成公案重拈出三箇猢猻夜簸錢示傅遠度居士頓悟心源開寶藏衲衣底事有來由囫圇吞箇青州棗直至而今飽不休示方士雄居士頓悟心源開寶藏雞鳴犬吠演真乘雖然逐日忉忉底喫飯穿衣似不曾示劉今度居士頓悟心源開寶藏庭前栢子話偏長道人不諳西來旨一陣清風一陣凉示楊仲宜居士頓悟心源開寶藏黃金沙石不須論展開兩手無依摸萬象森羅一口吞示姚鄰卿居士頓悟心源開寶藏龐家兒女是知音超方不許留些子拋却家園自陸沉示鄧直卿居士頓悟心源開寶藏家風不與世人同百千萬種諸三昧祇在尋常語默中示劉文長居士頓悟心源開寶藏全身領荷亦遲遲更思吸盡滔天浪笑倒江西馬大師示王元淳居士頓悟心源開寶藏祖翁田地不曾移若將計較從他覓大似傾盃灌漏巵示茹無簡居士頓悟心源開寶藏箇中原不立纖塵誰云珍玩過沙石還笑從前徹骨貧示陳非白居士頓悟心源開寶藏珊瑚枝上月溶溶清虗不是人間境吹去浮雲晚樹風示熊飛卿居士頓悟心源開寶藏黃花翠竹總真如若將花竹生知解笑殺當年碧眼胡示葉對育居士頓悟心源開寶藏肘後靈符衣裏珠幾多玄妙都拋却認取楊岐三脚驢示余得之居士頓悟心源開寶藏通衢倒跨白牛車角頭無限莊嚴具都在深慈長者家示余未也居士頓悟心源開寶藏大千經卷不他尋分明一箇真獃子肚量從來海樣深示鞠巖長居士頓悟心源開寶藏逢人懶論口頭禪珍珠收向皮囊裏棒喝交馳總不然示鄧魯生居士頓悟心源開寶藏好山好水一時收從來不出門庭外古佛家風得自由示張訥所居士頓悟心源開寶藏髑髏無識眼初明更知心境如如處花鳥逢人亦不驚示王夢蘭居士頓悟心源開寶藏多年古路滑如苔淨瓶撲破重拈起歸去閻浮又再來示姚亶卿居士頓悟心源開寶藏西江吸盡不為奇當陽打箇翻斤斗鐵笛橫吹劫外詩示吳叔達居士頓悟心源開寶藏隨聲逐色過朝昏一條拄杖穿雲走得失親疎總不論示王君翰居士頓悟心源開寶藏落花流水盡家珍臺山婆子空勞力到岸毋容更問津示王閎卿居士頓悟心源開寶藏何勞特地問風幡獵人驚破三更夢始覺從前事事煩示徐貞可居士頓悟心源開寶藏大唐國裏沒禪師虗空打箇翻身轉拍手徉徜我是誰示鄭譕臣居士頓悟心源開寶藏拈香擇火當尋常而今識得閒些子却笑從前手脚忙示蔡玉源居士頓悟心源開寶藏揚眉瞬目顯全機幾多鹽醋都傾却收拾深山住草扉示白生居士頓悟心源開寶藏白雲深處有家傳灼然伸出拏雲手好向虗空駕鐵船示羅元清居士頓悟心源開寶藏著衣喫飯見如來不須更問南山路笑指庭前石上苔示任徵生居士頓悟心源開寶藏珊瑚枝上海風清現前何事為遮障纔涉思惟萬八程示碧輝禪人頓悟心源開寶藏驪龍頷下抉珠來而今懶論光明聚包裹皮囊且學獃示瑞崖禪人頓悟心源開寶藏扶桑元在海門東衲衣時藉雲霞補剪尺無煩問誌公示葉𠒎生居士頓悟心源開寶藏更須笑展佛家風娘生面目從緣識水鳥山花處處同示魁吾居士頓悟心源開寶藏金陵原是石頭城萬年不更長江水一任諸人自濯纓示華宇居士頓悟心源開寶藏脚頭蹋著盡黃金更知錦帳春消息石女穿花不用針示洪宇居士頓悟心源開寶藏錢塘江上弄潮來回途不顧衣衫濕驀地逢人笑滿腮示振宇居士頓悟心源開寶藏相逢眉動便知音現前休問無生境深㵎流泉太古琴示蓮溪居士頓悟心源開寶藏腰纏十萬下楊州從來嬾慣無他意風自清兮水自流示冲玄禪人頓悟心源開寶藏魔王眷屬盡家親當軒明鏡難逃影畢竟無容一點塵示陳濠濮居士頓悟心源開寶藏真光原與世光同華嚴無限香雲葢旋復都歸指顧中示方季康居士頓悟心源開寶藏毗耶城裏是吾家大千掌內輕拈出毫相輝煌墖影斜示卓無量居士頓悟心源開寶藏金針透穴不為難夜深懶聽漁家樂帶月乘雲下碧灘示熊居士頓悟心源開寶藏無榮無辱道人家一條白練隨他去動著些兒亂似麻示徐居士頓悟心源開寶藏脚頭何地不青山肯將佛法生知解迸破塵勞且學閒示郭玄朗居士頓悟心源開寶藏飯餘策杖喜經行溪邊折盡垂楊柳展似眉毛作麼生示余慎爾居士頓悟心源開寶藏緣生識得本來身蓮花根發淤泥裏却笑居塵不染塵示端宇上座頓悟心源開寶藏江南江北不須分溪聲山色西來意萬里青天萬里雲示應時上座頓悟心源開寶藏清風凜凜自江來從緣薦得相應句蹋破須彌頂上苔示三藏殿以監院頓悟心源開寶藏拈來瓦礫勝黃金閻浮遊遍尋知己得意終歸祇樹林示棲霞一監院頓悟心源開寶藏木樨香後菊花香天明對鏡窮顏色原是東村趙大郎為六雪禪人入關翻思昔日雲門老關字相詶最上機分付博山誾道者莫教辜負翠巖眉為六雪禪人出關始行大事六年雪頓入圓明一片氷今日幸親無縫墖掣開關鎻萬千層四公案拈示六雪座元沒蹤跡莫藏身藏身處沒蹤跡吞乾海水躍金鱗澄江始見花狼籍什麼物恁麼來曹溪路浪如雷說似一物即不中大庾嶺上網張迴有佛處不得住無佛處急走過三千里外摘楊花逢人莫論蒲團破麻三斤乾屎橛纔拈著心路竭簉破闍黎鐵面皮禪牀皎皎三更月示方士雄居士三首千賢萬聖說惟心識得應歌樂道吟就裏了然無一物山河大地盡黃金非佛非心非是物謾勞皮袋喫酸辛現前境色清如洗一一為君細指陳一滴靈源無變色非今非古亦非新十方坐斷重移步不是瀟湘不是秦示謝在之居士識得雲門一字禪眾生諸佛本同當機更問西來旨陸地蓮花朵朵鮮示汪心鏡居士來機即赴未為難背觸俱非肯綮間大火聚中看變態真文不欲露全斑示吳鼎甫居士脚頭無地不青山祖意還期顧盼間識得未拈花去處是非不到飲光顏示玄京沙彌刲股愈母二首父精母血得生身須信從前徹骨貧者箇皮囊都割盡孰為我也孰為人世間大孝無如佛童子心腸亦效之幻化門頭開隻眼也須記取下刀時示何芝嶽宗伯二首道得溪深杓柄長空花陽𦦨罷思量東拋西擲衣中寶舌遍三千謾舉揚世諦寧羈出世緣追風逐日箭離弦當機覿面如親薦訂約輸盟不記年示阮澹宇郡伯秋時落盡閻浮葉何故黃花九月開惟識肯隨渠變異冷看漩澓去還來示雪航禪人行盡千山與萬山逢人特地放癡憨一朝看破枝頭月始覺澄潭徹底寒示常菴禪人識得真常便住菴袈裟從教破㲯𣯶橘皮湯作三更點翫月歌盃下碧潭示智鐫禪人一片閒雲歸嶺去三間茆屋旁山隈乾坤裹向袈裟裏今日分明付大梅示彬頴禪人三間茆屋隨緣住兩朵眉毛要自伸好把偷心都死盡始知布袋活如神示超塵禪人二首滔滔濵水送行舟剩有江南結勝遊蹋遍故鄉田地日歸來應笑亂峯頭脚跟一段真奇事抖擻塵緣作麼超禪者果知燈是火鳥窠何必用吹毛示照浮禪人行脚二首問君曾讀五車書管成文似有餘我已搖鞭君信否歸家應笑倒騎驢倒騎驢子上楊州却勝當年跨鶴遊邵泊河邊何境界煙雲深處水悠悠示成涵禪人幾回夢入故家鄉麥飯葱湯謾忖量蹋遍山川圖甚事只須親見本爺娘示志西禪人三首宗門底事皎如雪軟似金剛硬似泥無事夜行剛把火須知脚下有高低分明兩口一無舌簸土揚塵無間歇突出海門大日輪元來却是新羅月倒跨泥牛自在時橫吹鐵笛咏新詩雖然拶出通身汗下載清風付與誰示恒一禪人省親恒年一片切心腸不問程途到上方今日還從原路去歸來親見本爺娘示九如監院荷擔監院不尋常鐵額銅頭頗廝當喫盡幾多酸苦味而今始覺菜根香示知止禪人送師回浙殷勤特地送師回此去還期此日來莫謂江頭風景別年年九月菊花開示剖密禪人錫杖橫挑入徑山風霜肯信髑髏寒千峯頂上牢收拾若謂崎嶇步轉難示觀一禪人入嶺還如出嶺時袈裟緊裹肚皮饑今朝不辦山頭供雲樹依依任所之示寶巖禪人奔馳何獨豫章西錫杖無辭脚下泥別子江邊高著眼紅輪盤湧一聲雞示自繇禪人聽到天花撩亂時宗門底事貴親知翻身抹過毗盧頂箇是金毛獅子兒示印文禪人三首覿面當機識印文肯將世念自紛紜只教霜雪消融後自有靈枝一帶春至寶從來六不收根塵界裏自優游一朝和架都翻轉迸斷中間與兩頭夢幻漚花人易會漚花夢幻莫生疑世情徹底融通處軟似金剛硬似泥示石隱等琨侍者蒼石重巖挂碧霞妙嚴錦上復添花回頭忽見匡山路五老峯前有活蛇示曉宇禪人譙更連漏頗相當眨眼還成孟八郎一覺天明無別事法身元是臭皮囊示石浪禪人長江石壁浪滔天岸柳巖花亦眩然最喜澄潭潭底月開眸不費草鞋錢示穆禪人逢緣不盡謾云休細看溈山五字牛肯信虗空成粉末劫外無身何處遊示玄詮禪人玄猷端不涉言詮過渡還乘沒底船彼岸豈容些子法逢人祇只敘寒暄示道開禪人三首行脚年來路轉多白雲冉冉莫蹉跎大庾衣鉢今猶在盡力荷擔動得麼行盡千山與萬山脚皮多笑口皮頑渾身不見些兒煖火把分明覿面看侍者三年尚未勞脚跟多被惡風搖此間佛法無人識肯向而今動布毛示筵禪人落髮當機削去娘生髮露出摩尼頂上珠分付時人高著眼此回親見赤鬚胡示甫中禪人甫中知見盡芟除烈漢從來不蓄書隻字片言都吐出翻身却笑趙州無示印宗禪人印破宗乘壯鐵牛溪南溪北恣優游忽朝驀鼻穿歸也逈地遮天者一頭示捷初禪人雲從谷聚谷生雲靉靆祇園別有春寶篆香消僧定起階前花雨幾繽紛示陳之望居士自家田地要耕耘勤牧牛羊莫亂羣就裏靈苗須早種及時花雨幾繽紛示去非禪人自是不貪香餌味三餐茶飯淡如飴舌根血盡經光現好向深山種紫芝示僧當軒寶鏡若為容影象全消顧盼中妙挾渾然無滲漏謾將珍御雜頑空示印空禪人空知四大元非我印破孃生鐵面皮講到天花撩亂處巖前石女夜生兒示沈東華使君一餐齋罷一杯茶掃地焚香誦法華幸得箇中無別事莫教黑豆又生芽示智璠居士饑時喫飯冷添衣正是維摩杜默時莫謂朔風吹不入天寒也貴大家知示古居士剔起眉毛休懶惰法門底事勤擔荷一朝撞破指頭時始覺從前都是錯示樵陽居士少室宗風無別法從來㵎水碧如藍五臺山頂金毛現看破前三與後三
