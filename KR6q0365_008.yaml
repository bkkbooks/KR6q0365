body:
  text: 住博山法孫弘瀚彚編首座法孫弘裕同集茶話天界三方丈請茶話若論參學分中事當下教諸人領略去當下無事去早是埋沒諸人了也其中有三種岐路有一種學人擔佛傍家走乃至求佛求法求禪求道求玄求妙等隨處擔一擔子通身都是佛法如龜負圖自取喪身之兆鳳縈金網趨霄漢以何期又有一種學人自作主宰謂有甚佛可求甚禪可參甚道可學只剝得淨潔無依謂是自己受用其實未到淨潔處皆是業識心生出此等邪見只饒到淨潔處未許有參學分在諸昆仲若起世間貪嗔癡罪雖重猶輕若將淨潔處謂之參學極則此業最重世間無有與等者諸昆仲直須掀翻此二種邪見且道向甚麼處討箇安樂古德云如何是頭直須知有果是知有不愁不盡却今時也從上諸祖推此一事最妙最玄如荎草味如金剛杵若向者裏開眼方許有説話分今晚為三方丈茶筵中吐露箇消息大衆作麼生理會若就此言句中透脫也不難其或未然各自喫茶歸堂去好宗伯何芝嶽居士請茶話何居士問古德云肯即永脫根塵不肯永沉生死肯與不肯一齊抹殺敢問如何得入師舉杯云且請喫茶士良久師云會麼士云略會師云切不可向者裏住腳乃云宗門底事少人知大事因緣各有時今日與君通一線清風明月滿前溪潘次魯居士請就大羅菴茶話投子嶺頭雲古今多變幻跨過趙州橋始得絶思算絶思算止一半更有一半向下文長留待明旦珍重雪後携諸禪人南來閣茶話大雪封山日層樓邂逅歡寒凝鴉不語白結霧成團皎潔禪心寂清涼色界寬明知都是水切莫被他瞞無方諸禪人請茶話諸人要知得博山行履處麼五鼓燒香天明早粥日中午齋行則與諸人同行坐則與諸人同坐喫茶與諸人喫茶講話與諸人講話祇有些子不同處不免説向大衆去也諸人有思量博山沒思量諸人求佛法博山無佛法可求諸人見博山并見諸境博山不見諸人亦不見心外之境而今祇有幾根肋巴骨鼓兩片皮與諸人相似偈曰迎賓待客平常事説妙談玄自不能祇者阿師何用處敢留名字上傳燈卓無量居士請茶話參禪要了生死念佛亦要了生死今時遏捺淨土播揚禪理在古人分上令人一門深入則可分優分劣自是諸人底識心依他作解豈但不識禪理即淨土一門亦未曾夢見我雲棲師翁將禪淨二途縛作一束教人單提一句念佛是誰即此誰字不明吹毛劍塗毒鼓於斯可見此誰字不明不必瞻前顧後只須努力頓發疑情管甚禪管甚淨土如一人與萬人敵不破疑團誓不休要是大有力量丈夫始可話會不然落泥落水帶有帶無於生死門頭了無交涉有力學人將一箇誰字不明處眉毛與大地交結在一團站在千人萬人中不見有一人天地旋山河走波翻浪湧不知不覺全身在理窟裏又如坐在銀山鐵壁之中祇要迸開一線者一線便是向上一路千聖不傳底事若知得此事便好向毗盧頂𩕳上打筋斗亦未為分外離四句絶百非皆為賸語若不如是認定箇念佛人承當箇事豈但誵訛即是認驢鞍橋作阿爺下頷可發一笑果是性燥漢才聞著箇誰字如持金剛王寶劒力破重圍直教大地百雜碎將誰字拋向他方世界不須提起做一箇孤逈逈峭巍巍底漢子説禪亦得説淨土亦得説底與如來摩肩擦掌亦得不留箇佛字亦得何以故若將佛字重詮佛辜負當年古佛心珍重茶話百千法門同居方寸河沙妙德總在心源一切戒門定門慧門悉自具足神通妙用悉自具足四果四向悉自具足十二因緣流轉還滅悉自具足五根五力乃至三十七品助道因緣悉自具足六度萬行悉自具足十力十八不共法悉自具足三賢十聖悉自具足乃至成佛極果悉自具足降皇宮出母胎至雪山行苦行覩明星開道眼乃至説法利生悉自具足諸昆仲既悉自具足佛殿東南因甚麼缺了一角聻參黎太沖居士請茶話染緣易就道業難成不了目前萬緣差別一切境緣作麼生了山河大地作麼生了草木叢林作麼生了森羅萬象作麼生了人蹤鳥迹作麼生了四大五陰作麼生了根塵識等作麼生了根本無明作麼生了結使流注作麼生了諸昆仲了得也在目前包裹了不得也在目前包裹者包裹親迸破親迸破誰是我墻外榴花不是火普説世尊拈花迦葉微笑博山嘗有頌云瑞瓣靈枝劫外春拈來攪動海山雲婆心況是如天遠那肯拖泥帶水行此頌世尊蘊藉將來有此一段真風信手拈來當此之際落草求人惟迦葉尊者一釣便上代相傳至二十八祖航海而來不立文字直指人心見性成佛得二祖安心斷臂血流而見髓三祖懺罪風顛病瘥作良模盧行者于杵臼之間頓明大法磨磚作鏡南嶽廄裏跳出馬駒來秉命尋思青原山中笑看麟角露巍巍堂堂從百丈印子上脫去三遭痛棒在黃檗拄杖下活來踢倒淨瓶住大溈之山而直往覩影大悟著寶鏡三昧以無疑夾斷腳脛直入祖師堂奧現成片石頓開法眼全機自唐宋元至我國朝二百餘年繩繩至我壽昌先和尚向大好山中入興善之門徑博山在藏身沒蹤迹處踵船子之芳塵此事誠難豈是容易因憶博山初發心時順流而下直抵京都于瓦棺寺中三大師座下得聞法華經云假使有人登須彌頂為人宣説十二部經典未足為難于我滅後暫讀此經是則為難彼時博山咨詢諸講者云此法華經在十二部經之外耶講者曰縱是圓頓教門亦是大方廣所攝蓋為佛滅度後弘揚此法者是為難矣博山潛思云求之在我豈可循文逐句哉遂爾參五臺山靜菴通和尚蒙示三觀之旨先修空觀一空一切空彼時于蒲團上當下不知血肉身心前境不知有山河大地如此五年于光澤白雲峰頂住靜遇印宗師兄舉藏身處沒蹤迹沒蹤迹處莫藏身問博山彼時應答如流彼亦歡喜及彼下山復將藏身處沒蹤迹沒蹤迹處莫藏身吾在藥山二十餘年方明此事公案連舉數遍不覺如在銀山鐵壁相似疑情頓發晝夜提撕行不知行坐不知坐衣不知寒食不知味擇菜而不知有菜摘茶而不知有茶挑擔一站站定兩箇時辰擔墜方復行如此年半未有省發一日因閲傳燈見趙州囑僧云有佛處不得住無佛處急走過便打失布袋走見寶方先師問答之際如方木逗圓孔在彼兩月面黃如紙皮僅包骨蒙先師痛之惜之一日先師受玉山菴請命侍者邀余同行余云天熱不去先師云路上有人為汝説佛法余云活佛放光也是間先師再三呼喚不得已而同行路論君臣五位之旨其中多然余説將至菴下問余佛印大師云蟻子解尋腥處走青蠅偏向臭邊飛是君位事臣位事余云臣邊事先師呵云大有人笑汝去在余云先所論者皆是到者裏因甚麼不是先師云此一不是彼一切都不是上菴先師與客坐次余至後園磐石上跏趺經一食頃聞護法神倒地心下洞然即呈偈于先師有玉山誘一言心灰語路絶之句先師云子一到多門又到門余云也不消得到此雖則解心頓寂其奈疑團不破何復至宗乘堂又住靜年半一日登廁見人上樹不覺身心踊躍如放下千斤擔子提衣便行下寶方五十餘里亦不知有路亦不知有腳步動移也才進門便禮拜先師問云子近日如何余云有條活路只是不許人知先師云因甚不許人知余云不知不知先師云婆子具甚麼手眼便燒菴趂出僧去余云黃金增色耳先師復舉僧問玄則禪師龍吟霧起虎嘯風生公案命余頌之余引筆疾書殺活爭雄各有奇模糊肉眼曷能知吐光不遂時流意依舊春風逐馬蹄先師笑云子今日方信吾不汝欺也余即問云向後還有事也無先師云老僧祇知二時粥飯亦不知有向後事余云和尚豈無方便先師云汝後得坐披衣幸無籌䇿足矣余即禮拜是冬命首衆贈余偈有五宗極則機齊貫三藏精微理共圓之句復囑云當以無心相續正用盡法行持報無報之慈恩利有緣之正信諸昆仲所以云此事誠難豈是容易今日因高麗國晦曇上座請普説此上座履凶蹈險不憚萬里之程博山鼓舌搖唇漏逗一生之事釋迦大師迦葉尊者拈置之勿論且道壽昌先師遷化即今向甚麼處去也舉拂子云白毫光照紫微宮無限天人淚如雨珍重問答僧問斷簡殘篇即不問斬新條令一句請和尚道師云裂破幾重清世界倒騎玉象趂麒麟進云此猶是斷簡殘篇師便打進云恁麼則天下大平萬民樂業師云吸盡南山霧長存北嶺松僧禮拜僧問夾山大師云截斷天下人舌頭即不無爭教無舌人解語敢問和尚如何是無舌人語師舉拂子云會麼進云此猶是有舌人語畢竟如何是無舌人語師云白雲彌世界虗空無去留進云如是則語帶玄而無路舌頭談而不談也師云汝向甚麼處見老僧進云中興曹洞之宗除是和尚始得師云也是間言語僧禮拜僧問古人有言有物先天地未審是甚麼物師云空中書梵字進云無形本寂寥髑髏邊還有氣息也無師云撲破不成文進云能為萬象主未審是同是別師拈拄杖云者箇不可喚作拄杖子進云不逐四時凋究竟將來相去幾許師云者箇喚作拄杖子始得進云正當恁麼時普天之下蘭膏繼佳景呈祥如何是博山境師云階下苔錢砌就進云如何是境中人師云鼻梁向下垂僧問釋迦老子四十九年説法正眼看來猶是無風起浪敢問和尚説法還有為人處也無師云此去江西半月程進云倘遇箇六根不具底漢和尚又作麼生師云氷溪水底清如鏡進云向上還有事也無師云楊子江頭浪潑天進云恁麼則和尚恩大難酬師云禮拜了退卓居士問諸佛國土亦復皆空畢竟向甚麼處莊嚴淨土師云青龍山上鹿兒肥士無語師云會麼士云不會師云流鶯雖有語天籟聽無人張興公居士問和尚言學人須全身入理乃可問向上事即今請問如何是理師云橫身當宇宙大地沒遮攔進云如何即得全身入師云盡力推爺向裏頭進云未全身入者過在甚處師云珍藏燕石不辨金光進云全身入時以何為驗師云十方消殞左右逢源進云全身入理後如何師云跳出千層浪方誇稱意魚六雪首座問學憑入室知乃通方入室且置通方一句作麼生道師云斷貫索却用得問入室事作麼生師云稚子敲針問如何是坐斷毗盧底人受用境界師云敗葉成堆問倒跨師子底人向甚麼處行履師云羊腸鳥道問橫行四海底人未審具甚麼手段師云小伎倆問懸崖撒手底人命根還斷也未師云待闍黎命根斷即道問八卦正位如何排得師云不得錯下點畫問路逢猛虎時如何回避師云叉手當胸問鐵樹珊瑚因甚麼被泥牛衝破師云阿誰證據問無蒂曇花阿誰拈得師云無手者問金剛際水如何汲得師云何勞太攘問和尚籌室中有多少弟子師云心字不加點問祖祖相傳衣鉢未審和尚傳箇甚麼師云案山石上共汝商量問千問萬問不消咳嗽一聲都已答竟未審和尚如何答話師云知時節即退僧問昨夜見一鹵莽漢殺却毗盧遮那如來未審識法者如何判斷師云盡情斷却問如何是白椎下事師云瀑布有聲雲不掩問如何是白椎前事師云深澗無魚水自清問如何是白椎事師云無事度朝日黃昏暗點頭問古人教人及盡今時只如及盡後又作麼生師云懶梳蓬亂髮喜遇當來賓問樓閣門中還容打瞌睡漢也無師云待汝醒後即向你道問善財五十三參未審如今還行腳也未師云洗腳上牀眠一夜三千里問楞伽山既不可往為甚麼被夜叉王所據師云手親眼便腳頭腳底問鱉鼻蛇撞著赤眼人作何躲閃師云恰好恰好問五家宗旨俱明因甚麼輪回不息師云火燒山有光無𦦨問維摩經云除去諸有併諸侍者為甚麼連侍者不存師云久住令人賤新來語自親問世尊赤手空拳開已又屈屈已又開未審明那邊事師云祇明者箇事問一切事究竟堅固不知大佛頂還在裏許否師云暗裏抽橫骨明中坐舌頭問棒喝如雷還供養得閻鬍子也無師云閻鬍子若來也須喫棒問從前老和尚髑髏即今還有眼也無師云布袋裏老鴉雖活如死問釋迦彌勒還酬引滿二業也未師云二業是他果用説甚麼酬與不酬問金剛經云應生無所住心既無所住又作麼生心師云巖花鋪地高秋興松月銜山報曉晴問佛之一字吾不喜聞某甲不求佛日用事作麼生師云下咽勒把筯燒火擇乾柴問古德云渠無生死世人因何又被生死使師云青山元不動白日鬼迷人米旦生孝廉問是何面目師云天不蓋地不載進云作何究竟師云地不載天不蓋進云用何修證師云穿衣喫飯待客迎賓問如何是君師云澄潭水似氷如何是臣師云楊柳拂飛塵如何是君視臣師云古鏡幔白綾如何是臣視君師云纖手按烏雲如何是君臣道合師云一以貫之進云向上還有事也無師云有進云如何是向上事師云舌頭無骨野馬無韁問如何是君師云水有筋山有骨如何是臣師云鶺鴒鳥鳴似哭如何是君視臣師云千年老樹挂枯藤如何是臣視君師云樓頭畫鼓正三更如何是君臣道合師云金闕鳳銜丹詔去邊陲人唱凱歌歸僧禮拜師復問僧君位中事作麼生僧云虗突兀師便打問如何是博山境師云捿鳳崖前雲靉靉浴龍池內浪滔滔如何是境中人師云光剃頭淨洗鉢僧云學人不會師云者箇阿師還未曾剃頭問如何是道師云紅綃進云紅綃莫是道否師云不是道進云既不是道因甚答紅綃師云因你問道我答你紅綃問達磨未來此土還有佛法也無師云有進云如何是未來底佛法師云天不能蓋地不能載進云是何物得恁麼大師云喚作物即不得進云不喚一物時如何師云亦無你開口處進云恁麼則不奈何師云我亦不奈何進云和尚因甚不奈何師云為汝不奈何僧禮拜師云出去救得千箇萬箇有甚用處問如何是某甲安身立命處師云天無蓋地無底進云壽昌老人遷化去即今在甚麼處師云清談對面祇是不知僧復問師云問語且置天無蓋地無底老僧意旨在甚麼處僧擬議師便打勉云拶出虗空髓有味掀翻宇宙㲉無依箇中不見壽昌老獨有狸奴笑展眉問如何是北斗裏藏身師云掉轉身來僧擬議師便打仍示偈云掉轉身來酬北斗藏身一句絶來由要知大象嘉州路雪覆深山盡白頭問寒暑相催時如何師云鑊湯爐炭進云未與料作時如何師云淨地上一場懡㦬進云成後如何師云莊嚴妙麗一場懡㦬進云家裏事如何師云坐底坐臥底臥進云門外事如何師云鄉村險阻車馬為難進云和尚為人事如何師云從來不曾費鹽醬進云一歸何處時如何師云却值老僧坐臥師問六雪首座堂中首座人天眼目如何是人天眼目座云頂門上師云還假鑒照也無座云君不見師云不虗參見作家來座掩耳而出師問無擇上座賢弟到羅浮要與博山相見時如何擇云遍界不曾藏師云恁麼則不見我也擇云兩彩一賽師云更要親見一回始得擇云無兩箇舌頭師云待汝到羅浮黑夜動不得步時即有深入師遂示一偈遍界不曾藏青松遮翠壁黑夜步難移深山神鬼泣擇得偈次日入見問云若是鳳凰兒不向那邊討師云若是鳳凰兒即此堪為妙擇云此是鋸義師云平出也罷擇禮拜師垂四問殿角風搖樹行人盡解衣時如何自云瞥爾沾嘗清涼徹膽問清風翻白羽野老笑相親時如何自云春來花塢樵牧含情問佛殿東南因甚缺了一角自云一人傳虗萬人傳實問僧堂中有幾人坐臥自云翻身峯頂六不同謀陳雲怡文宗問渴鹿趂𦦨如何得歇師云知不是水則了頌云從來大地黑漫漫畢竟將何作指南識得波澄原是水現成公案不須參問摩尼珠久埋沒塵土中如何急切覓得師云用覓作麼頌云剎剎塵塵無價珠何須特地妄分疏著衣喫飯恆常用欠得其中一點無問一斬一切斷如何得此利劍師云咄誰敢當鋒頌云求覓多因自擬難未曾出匣斗牛寒寶光炯炯輝天地佩服何須覿面看問等是水味有品為第一泉有品為第二泉作何剖分師云嘗過始得頌云果到金山絶頂時石頭城外自參差腳跟拌斷紅絲索香水靈源爾合知問黑夜中認賊為子認子為賊作何判斷師云呼名即應頌云不須分楚復分秦直下誰為第二人好把一刀都截斷金鍮玉石總家珍問家親作祟如何處置師云殺盡安居頌云灰頭土面沒人情殺盡方才見太平就裏順情通一線天明依舊可憐生問的的主人翁如何得覿面一見師云求見者不的的頌云獰似熊羆活似龍何曾暫昧主人翁更於覿面求相見知隔青山路幾重問堪輿家羅經縱橫移動針必南指是誰作主師云真箇鐵心腸頌云分明一副鐵心腸撥亂乾坤總不妨忠義藹然勤聖主肯將名姓播諸方問家宅是諸人生身活計見得甚麼便肯破家蕩産師云解作家方者頌云破家蕩産逈無依賸得眉間毫相輝不向人前求活計縱橫頭角顯全威問電光中良驥瞬息千里如何得一往追上攬轡入手師云轡在居士手裏用追作麼頌云良驥追風顧影鞭忘緣人絆未行前不須攬轡誇精進腳下驪珠顆顆圓問大慧云將八識一刀憑甚麼安身立命師云妥妥貼貼頌云一刀果爾中渠魁顛倒閻浮經幾回識得徑山親切處木人無舌語如雷問未開口以前為甚麼便棒便喝師云做賊人心虗頌云大人用處不尋常捉賊應須驗正贓不似而今盲瞎漢亂拈拄杖作商量問胡來胡現漢來漢現是鏡體是鏡光師云毋容湊泊用在臨時頌云誰論胡來與漢來輝天鑑地實優哉更知光體雙忘處妙用縱橫帶活埋問日升月沉雷轟電掣山靜雲間水流花開農歌牧唱婦誶兒嘻莫非是者箇迸現如何得拈向腳跟下要用便用師云居士終日還飲也無頌云識得頭頭是道場高超返擲也尋常氷山雪洞都遊遍始信男兒當自強問今修行人多怕去後黑漫漫地不知現前黑漫漫地更苦多口説無常生死事大不知現前剎那死死生生更切此際重關一擊如何下手師云眼上眉毛重七斤頌云眼上眉毛腳底鞋黑漫漫地喜重開鏌鋣寶劍無情謂擊碎虗空笑滿腮問高峯云大徹之人本脫生死為甚命根不斷命根既未斷呌做大徹底何事師云左搓芒繩縛鬼子頌云生死忙忙不少留命根不斷肯干休一朝血脈通融處暗對青山笑點頭問一句當天八萬門永絶生死者一句如何得恁麼有力師云世界賴斯成頌云一句當天作麼生從來世界賴斯成博山不費些兒力覆雨翻雲好弟兄
