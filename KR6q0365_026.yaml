body:
  text: 住博山法孫弘瀚彚編首座法孫弘裕同集宗説等錫上示金庭蔡坦如居士居士欲成辦箇事於祖師門下當發深信速了生死再有一法過於此法者無有是處此一句話頭是換骨靈丹是返魂妙藥是伐生死稠林底利斧也所謂無量法門百千見刺一切計執五陰魔怨才沾著此一句子則瓦解氷消更不起第二念何以故謂離諸念故如看一口氣不來畢竟向甚麼處去即此去處不明如坐在烈火𦦨中祇欲奔出以此則知妄不用止心不用觀定不用習慧不用生見不用斷魔不用伏則自然帖帖地謂心猛利如烈火故能燎一切如迅流故能漂一切如猛風故能掃一切如神箭故能穿一切如射石虎才生擬議豈但沒羽則箭頭斷矣故云道人行處如火消氷箭既離弦無返回勢玄沙可謂得法門之徑路入法門之標的也若如此參去忽朝打翻筋斗絶後再蘇便乃斬新條發新令高低一顧萬象齊彰截斷衆流不通凡聖如佛印大師云一到多門又到門分明普眼照乾坤以須彌聚筆滄海為墨不能書其少分故云大藏小藏從者裏流出非強言也若未到此田地下語如雲興偈頌如瓶瀉盡成顛倒知見如近時假稱知識者將古人公案逐句下語悉以義路符之識者一見則知宗風掃地謂痛哭流涕者不亦宜乎豫到敝鄉見吳太史頌古其辭章藻麗近時作頌者罕能倫匹一日太史問曰大師曾見弟子頌古否豫曰見太史曰何如豫曰居士是解非悟門也太史曰何以見之豫曰居士頌婆子燒菴謂寒巖枯木太僧生豈不是不肯者僧麼太史曰然豫曰豈不是解聻太史言下如脫桶篐相似渠是箇久用心底人於一言之下便爾知非近時假知識論此公案萬一未曾夢見在嗚呼祖庭秋晚魔風熾盛紛紛曰參禪盡入在魔邪網中曾有一人能跳得出否若有緇素得分明不沾著此等魔氣豫則以衲衣覆之可謂報佛之深恩也祖庭秋晚賴有智人遍界魔風孰喜孰嗔紛馳棒喝加諸盲者斷手折足謂應機也遍體流血不知痛癢大笑猖狂是何模樣謂不領會目爾裁抑苦哉痛哉神號鬼泣三千七百大有樣子奪食驅耕決無此理下語偈頌學語之流是生死本肯自干休我書此語居士勉之置心一處今正是時示壁如禪人夫為學者父母生成一具靈骨如黃金鑄就只須深生正信浚發大機知佛所説一代時教不求妙悟盡逐虗聲雖是多聞與不聞等如象陷於泥雖有全力不能跳出良可愍也如仁者生於大族幼為貴介公子復從科第中來及出仕做官時供養法師殷勤請益於教乘中無不通達及問著己分上事則無可奈何故知名言數句非究竟法惟吾祖師門下不起知解直探本源故云心如墻壁乃可入道良以衆生皆以識心分別計度瑜伽論云阿賴耶識於一切時無有間斷器世間相譬如燈𦦨生時內執膏炷外發光明緣內執受而生堅七轉識為最有力緣外器相而生取五塵境助發不停逐境生心從緣成熟與現行互為因果與明了為所依展轉生燒起滅無間窮之而無始成種子之名言望之而無涯生現行之果法俱時現有豈待新熏如唯識論云一切種子皆本性有不從熏生楞伽經云大慧不思議熏不思議變是現識因取種種塵及無始妄想熏是分別事識因以此則知本有新熏合生現行增長本識此以無明熏真如故淨法亦爾準此例知若取其正義真如亦不受熏真如無為非心之因亦非種子能有果法如虗空等故非有漏心性是無漏名本性淨何以故若常住法不成種子一切時無差別故就淨邊説亦具種子之名涅槃四德是四大種子從本覺起而熏無明論四德本來是有不從種子生從因作名故稱種子能侵損本識故繇是行人信樂大乘以大智慧人虗空器三昧運大悲行以毗盧果德用成因位熏無明故又當知本識極劣無記非能熏也唯七轉識及相應一分能緣慮心力最強勝故有力自熏此無明無體本覺斯起純成四德爍盡無明故云四德圓時本識覩盡況無明耶如千年暗室一燈能破則彌滿清淨中不容他即十界緣起悉成淨用故云大小鱗毛普現色身三昧也果入得此一步則塵塵剎剎悉皆普入便好蹈祖師門求向上事只待腳跟線斷捩轉鼻頭別為通氣始是到家時節不然只饒及盡玄微總是他門活計非當家種草也一具黃金骨深生於正信浚發大機用通佛所説教當求妙悟門若滯名數句聞與不聞等惟吾祖師禪端不存知解直探於本源心如墻壁入阿賴耶執受而堅於現行展轉生燒相數數無間然淨法亦如是以佛果德相成行人因位本覺熏無明如沸湯澆雪四德純圓時識想從何起清淨不容他十界用無輟待了本因緣再為仁者説示證之禪人夫為學者熟爛聖經凡一言一字須消歸自己所謂佛已具知見何用更開謂開衆生佛之知見耳如貧家伏藏若獲其藏更不復貧圓覺云如來大光明藏是衆生清淨覺地既稱清淨何有衆生下文云永斷無明方成佛道復云此無明者非實有體果知無體大光明藏覿體全彰故云如來因地修圓覺者知是空花即無輪轉斷云非作故無本性無故至普賢章云知幻即離不作方便離幻即覺亦無漸次中峯大師云此二章宛有衲僧氣象至於以幻修幻皆吾佛不得已而言之非佛之本意也若云理徹圓融何妨行布殊不知一念具三千一心融萬行絶去來之迹延促同時泯遠近之殊遐邇一致當下無我法界理成八相成道於殊方理無分劑萬行圓修於當念事不他求觀彼久遠猶若今日獲大寶車行步平正其疾如風所謂圓融而不礙行布事事斯成行布而不礙圓融心心靡間以此則知才聞名字觀行斯起無明斯斷六根斯淨究竟斯成説箇佛字猶為賸語也若乃求三乘之行迹楷六即之是非便乃斷三惑成三智證三德乃至莊嚴國土教化衆生則吾不得預其數亦當緘口以待三僧祇劫再與諸昆仲別峯相見也佛以佛知見化一切衆生衆生受佛化佛生不可得知無明無體猶如空中花如來因地中即了於生死知幻即云離離幻即云覺覺了斯實際知亦不可立於不可立中而興大悲心一念具萬行一時圓多劫恆沙界微塵理無分劑故即此稱圓證證此曰真知果證便知非證對因人説了因證不立斯稱大圓覺最勝修多羅悉宗乘注腳欲覓祖師禪而生大勇猛譬如獅子兒懸空翻筋斗哮吼不思議羣獸皆腦裂待了本因緣再為仁者説示象先禪人夫為學者聞慧彌彰生諸實智故云不離文字不執文字而為道用華嚴謂成就無邊之慧先賴多聞佛藏説速入涅槃之門皆因聽法果究心之者鳥鳴花笑尚乃發機況佛金口親宣而不潤心田靈苗智種耶當知衆生心內佛為佛心中衆生説法佛心中衆生聽衆生心內佛説法又當知佛心中衆生無聽者衆生心中佛無説者兩俱雙辨二相頓空經云如來不説法亦不度衆生楞伽經中表離言説名不思議良以學人不達自心執諸名相覓果佛妙嚴之位昧因心實智之緣故達磨大師遣其執滯直指人心攝三祇之修行圓於當念開生盲之慧眼妙在剎那揭露衣珠頓呈家寶息竛竮之苦不假營求入利濟之門廣延行度菩提無樹明鏡非臺作衆生之真依為菩薩之智母意消能所情斷是非如大集云不待莊嚴了知諸法以得一總得餘故所以云一葉落天下秋一塵起大地收乘此寶乘遊於四方嬉戲快樂不亦宜乎或云行布位次教有明文何乃執心頓廢斯旨曰是何言歟當知位次無盡心無盡故若能了此真如一心無盡之理則一切六度四攝萬行皆無有盡轉示他心亦同無盡如一燈燃百千燈冥者皆明悉無盡故初祖達磨以無盡之旨傳無盡之燈爍萬劫昏暗之迷途成一時光明之佛事須從悟入不假言詮果發明大理如烈火沸湯不容片雪無明不待斷而自斷果位不待成而自成如祖師門下單提一句話頭看一口氣不來畢竟向甚麼處去如在萬丈坑中祇欲跳出縱八境交加於前亦不暇顧若一刻中不尋出路則喪身失命了也故云如一人與萬人敵覿面那容眨眼看如此用心真切則㘞地一聲桶子底脫矣依然舊時人不是舊時行履處佛法尚不留些子朕迹況人我世緣曰修與不修者乎總持無文字文字顯總持不離文字緣而為道者用成就無邊慧速入涅槃門水鳥與樹林尚乃談實相何況佛所説而不滋智種心佛及衆生互説無間歇亦無能説者亦無所聽衆遠離於言説是名不思議若不識自心云何覓佛果國土妙莊嚴豈離自心有長遠三大劫一念悉圓成珠寶本具足更不向他求廣開利濟門綿綿用無竭了此一心法遊行於四方慧燈破幽暗冥者悉皆明如香象渡河截流直到底倐然登彼岸更不論先後一斷一切斷一成一切成教理通無礙當樂祖師禪一口氣不來畢竟甚處去如在萬丈坑祇要親跳出八境交於前亦不生暇顧如人破大敵那容眨眼看如此切用心倐然桶子脫不是舊時人世緣何處有不於世生心便是好時節待了本因緣再為仁者説示超乘禪人夫為學者最先要具擇法眼將如來一大藏教疏通理本徹究行緣心絶狐疑成辦箇事永明大師云備一乘之基地堅萬行之垣墻始能架高造實不妨向吾祖師門下求箇徹頭不然盡掠虗聲非關究竟須知宗之一字是教網綱維如起信論云止者止一切相乃至心不可得為止而觀因緣生滅為觀永明云或以理觀對於事止謂契理妄息也或以事觀對于理寂謂無念知境也當知參禪之者才提起一句話頭妄想心不待息而自息豈非止耶何止之可言大理不待明而自明豈非觀耶何觀之可説才方念起便落意思分別始萌即犯藥忌二祖搜心不可得當下心安故知無心之旨衆妙之門若了無心觸途無滯絶一塵而作對何勞遣蕩之功無一念而生情不假忘緣之力以此則知無心於事則萬機頓赴而不撓其神無事於心則千難殊對而不干其慮豈待永明叮嚀告誡學者就路還家則得便宜多矣若乃窮宗乘之極致究祖道之玄微只須懸崖撒手自肯承當絶後再蘇欺君不得故云命根斷後方得言詮不然盡落今時永沉苦海無量億之邪見根於斷常百千種之傍門生乎情想惟吾祖道最極深玄契一道以圓收會千途而共轍不涉三乘之漸次因果同時豈干五教之參差佛生頓泯剎那徹於多劫法界入於毫端猶是第二之籌未遂拈花之旨臨濟大師云沿流不止問如何真照無邊説似他離相離名人不稟吹毛用了急須磨理徹寰中見超物表了吹毛之利慎勿遲疑廓照用之機毋容住足豈淺根劣解者之所能知非守株抱愚者之所能到果深信於教外別傳之者觸目逢緣當以斯意自勉也若了生死源先具擇法眼行理俱通徹亦不涉狐疑具此淨白心始求無上道譬如架樓閣先當築基址又如琉璃瓶能盛獅子乳教理通無礙作宗乘助緣欲究向上事單提一句話不起分別想是名真止觀五百安心門無心頓超越不涉於三乘何關於五教果絶後再蘇當體離心念心念遠離故邪見無繇生剎那入多劫法界斂毫端猶是第二籌未遂拈花旨吹毛用了時慎勿懷遲疑頓入不思議始名甘露滅待了本因緣再為仁者説示寓中禪人夫為學者徹究根原無煩枝葉何謂根者三界惟心何謂原者萬法惟識故云未達境惟心起種種分別達境惟心已分別即不生祖師云若人識得心大地無寸土良以聽學之人誦得名相齊文作解心眼不開全無理觀習禪之者惟尚理觀觸處心融暗于名相二俱互闕或忘緣趣解脫之門或執妄取究竟之果撥波求水即泥是瓶不了唯心妄生執著不了唯識妄意有無永明大師云阿賴耶識廣容周遍為萬法之根原此體不可説微細最難思周遍法界而無住心任持一切而不現相入唯識之正受破計執之邪心楞嚴圓通章彌勒云我從燈王如來修習唯心識定入三摩地乃得成無上妙圓識心三昧盡空如來國土淨穢有無皆是我心變化所現世尊我了如是唯心識故識性流出無量如來結云識心圓明入圓成實遠離依他及遍計執得無生忍頓入圓明之際恆沙如來從我流出無自無他恆沙染淨之緣從此發生絶思絶慮如磁石無覺而轉移周回六趣似摩尼無思而雨寶廣濟羣生號衆生之源即如來之藏從凡而入聖位位殊分以聖而照凡重重洞徹聖凡雙泯一道齊彰心識互融千途共濟是以文殊以理印行差別之道無虧普賢以行會理根本之門不廢果因互用非計因中有果也因果同時非計果中有因也無容計度不屬思惟體用相含心境交徹空具德而徹萬有之表事無礙而全一理之中方可入祖師之門求向上之路藏身處沒蹤迹抖碎虗空沒蹤迹莫藏身掀翻大地果然生鐵流金汁便好將身帶活埋究竟根原人無煩於枝葉唯識與唯心不生分別想誦文尚理觀習禪了名相二者交互通是名佛出世解脫非忘緣究竟無妄取識體最微細深密不思議遍界無住心任持不現像成無上妙圓淨穢唯心變了此唯識性流出諸如來入圓成實故離依他遍計似磁石引針如摩尼雨寶理與行交徹行與理俱濟心境雙融處入此無礙門藏身沒蹤迹抖出虗空髓沒迹莫藏身掀翻大地藪藉寓法界垣中道不須論生鐵流金汁禪道從斯瞥待了本因緣再為仁者説示道揆禪人夫為學者圓頓之教了義之詮廣博精研窮源極數一一得其實用慎勿執名相階級并遮表文字障諸佛之光明翳衆生之慧目執持行位違遠圓通不識方便之詮盡落止啼之説當知吾佛的指生心是心作因是心成果是心立位是心標名於無名位中而安名位不離跬步法爾如然于無因果中而建果因豈待報緣而隨念具足華嚴經頌云若以威德色種族而見人中調御師是為病根顛倒見彼不能知最勝法良以衆生自生劣想昧本勝緣不識果顯之法身是因隱之本覺非他佛智遍自是自佛智遍他非自因趣他果本是他果極承我因以此則知因果同時聖凡一道了無二相即過羣魔直剖純圓豈存漸次不得一法安住佛乘果然一道齊平則萬差俱泯古頌云千尋滄海底萬仞碧峯頭日出當中夜花開值九秋若不如是盡是背覺合塵捨己循物華嚴論云滯名即名立廢説即言生指鹿作馬期悟遭迷執影是真以病為法錯解佛意謬滯生緣如來説名可憐憫者不亦宜乎惟吾祖師門中一句話頭挫鋒破敵譬如窮海到底方休看一口氣不來畢竟向甚麼處去非思議之可知豈情識之能解四相離而命根頓斷四病了而慧性純清如日照秋霜似箭穿石鼓其話頭功力百千萬種修證之門不能較其少分也故三千七百祖師非此門無繇出路如六祖問南嶽大師汝在甚麼處來曰嵩山來祖曰甚麼物與麼來嶽無對遂經八載忽爾開悟曰説似一物即不中祖曰還假修證否曰修證即不無汙染即不得汝看他悟底人開言吐語不犯纖毫忌諱可謂透網金鱗也如看一口氣不來當與斯案為表裏果知去處則知來處如去處不明當疑情頓發針劄不入水灑不濕盡大地黑漆漆地撞不入頭要得箇入頭既得箇入頭要得箇出頭須信有千聖不傳底道理如德山吹滅油燈條孚座主聞鼓角聲便省得從前過咎豈但將娘生底鼻孔扭揑便云窮諸玄辨如毫末撮于太虗竭世樞機似一滴投于巨壑乃至上堂云聖名凡號盡是虗聲殊相劣形皆為幻色汝欲求之得無纍乎及其猒之返成大患以此則知功門行位上著腳大似隔靴抓癢也圓頓了義教廣博窮其源一一得實用慎勿執名相雖説功行位心具悉無遺勝劣若生心病眼顛倒見果顯之法身是因隱本覺因果同時故不生遠近想了無二相者即過魔境界不知此一法未乃稱佛乘滯名即名生廢説更言説期悟復遭迷不解於佛意惟吾祖師禪單提一句話譬如窮海者到底始方休工夫非作意止滅任俱離我人衆生相命根斷何起百千修證門不能喻少分果知甚處去即會與麼來道心絶遮攔聖揆無羈滯動念屬染污生情即藥忌一口氣不來疑情須頓發大地黑漆漆信有向上路是諸祖行徑不得此路時情想終不瞥有志丈夫兒豈肯暫休歇待了本因緣再為仁者説示同水禪人夫為學者凡經律論三藏文字大小偏圓靡不遍涉清涼大師云以聖教為明鏡照明自心以自心為智燈燭經幽旨如鵝王擇乳如日照高山大心圓信繇此深入切不可高推聖境自生下劣經云若聞是經不驚不怖者當知此人非於一佛二佛三四五佛而種善根已於百千萬億佛所種諸善根矣華嚴經云如來初成正覺嘆云奇哉奇哉一切衆生皆具如來智慧德相此即凡聖同源正類法華開示衆生佛之知見耳聞斯而發圓信者稱諸佛之本懷了羣經之妙義下文云只因妄想執著而不能證得謂凡夫妄想二乘執著不達斯源如妄想本空則圓融無礙執著何有當知一心之旨隨機設教殊途同歸海慧禪師云森羅萬象至空而極百川衆派至海而極一切聖賢至佛而極一切教法至圓而極如大華嚴事事無礙頓絶凡情法法全收無存聖解清涼亦云含衆妙而有餘超言思而逈出經云若人欲得如來智應離一切妄分別有無通達皆平等疾作天人大導師如來智慧含靈本具無明本淨妄想本空淨則智故空則如故無有智外之如為智所入亦無如外之智能證於如約偏計而妄空即凡心而圓聖智如偏計而真有即聖智以化凡心觸物皆中無他無自舉體覿具非聖非凡理無修證行絶參差若云無作無修定受落空之禍若云有求有證終遭蹈有之譏約理故説無漏智性不假他營約事則無所求中吾故求之耳萬行並起一性圓明一多互融小大遍入一剎入一切剎一佛入一切佛一切身入一身一切劫入一劫是以初心便成正覺不壞本相因果同時如十信攝於諸位諸位十信歷然如十住攝於諸位諸位十住不亂不亂即行布互具即圓融故有相即相入非自非他如乳投水廢己同水彼成己成故得一多無礙大小相融恆沙斂於微塵多劫彰於頃刻假使有人縱經多劫修六波羅蜜菩提分法未聞此如來不思議大威德法門或復聞已不信不解不順不入不得名為真實菩薩以不能生如來家故若聞即便信受隨順悟入當知此人即如來真子矣清涼大師云剖微塵之經卷則念念果成盡衆生之願門則塵塵行滿如於一塵中修一切行一切塵亦然一剎那際度一切生一切劫亦然以此無行之行無生之生終日無化其行度大焉若不了此圓妙之旨未免有亡羊喪真之嘆經之過歟人之過歟佛以一音聲對機種種説衆生妄分別不能測佛智聞經不驚怖斯人多善本凡聖本同源莫生優劣想聞斯發圓信了諸經妙義亦不執聖解亦不生凡情凡聖了然故是名大導師一身入多身多劫入一際因該於果海果徹於因源因果同時故勿生分別想萬法歸自己己亦不可得萬法本如如如亦不可立譬如乳投水廢己即同水彼成己亦成大小互無礙最妙最深玄是禪門注腳若覓祖師禪心如墻壁入更問西來意庭前柏樹子才生分別想灼然沒交涉待了本因緣再為仁者説示雪憨禪人夫為學者以一大藏教開自己清淨眼目自眼本淨何用更開為不了者説圓覺經云皆以圓照清淨永斷無明方成佛道知無明本無識性虗妄猶若交蘆則山河不礙於眼光根塵何傷於覺體照破恆沙四天下似不難矣今時學人孰不知妄心無體及乎徵妄妄念紛然則以妄印心縱修阿僧祗終無了底日子何以故以沙作飯故錯亂修習知妄空而認有斷妄何期知即佛而背真求心安在以直道而迂之以無體而斷之以即真而棄之以現因而遠之所謂泉眼不通則被沙礙道眼不通則被眼礙也楞嚴經云有三摩提名大佛頂首楞嚴王具足萬行十方如來一門超出妙莊嚴路當知此路即衆生本源流出如來故云超出既云路者的指因心因徹行緣始稱具足若於此題中了辦全身擔荷不待別求矣勞如來重重逐破乃至七處徵心俱不可得始知真心無住淨體無依圓明了知不因心念塵非亭主客義斯成妄意修求悉名顛倒認漚為海迷中倍人真性無還便能了月得指見性周遍何妨即物明心物體本虗心非我見故云見與見緣并所想相如空中花復云此見及緣元是菩提妙淨明體云何是中有是非是則因緣和合及非和合等皆成戲論陰根塵識緣生無性則鏡中之影像俄消七大十虗無性緣生則水面之漚花倐起究竟無體妄徹真源如來之寶藏全開飢虗普濟窮子之衣珠頓獲永絶攀求寶王剎現於毫端大法輪轉於塵界便好安水月之道場修空花之萬行報無報之慈恩豈待歷僧祗之劫也不然至等覺猶乃被呵南泉之惡口可據成佛果尚云擔糞德山之痛棒堪加汝既發心當生深信只此一門決了生死看一口氣不來畢竟向甚麼處去忽朝疑團迸破眉毛祇在眼上一口氣演出一大藏教一一毛孔中悉得究竟堅固無位真人在汝面門出入六根門頭則放光動地也如疑情不破誓不休心直須切上加切疑上加疑慎勿向人涎唾下別求開示也若知到不到者大慧黃楊木高峯不夢不惺時識得自己主人翁便好長伸兩腳臥性本自清淨非佛亦非生十方諸如來一門頓超出的指因地心具足果中行知具得圓修了修即圓證不起修證想是名真解脫如幻三摩地彈指超無學亭主無來去旅客義斯成計果求菩提是名顛倒見見性元周遍物體本虗無斯見與見緣悉妙淨明體云何於是中有是及非是因緣和合非皆成戲論想識藏如來藏真性了然故毫端寶王剎微塵轉法輪是名報佛恩豈待僧祇劫欲究祖師禪當提一句話一口氣不來畢竟甚處去切上更加切疑上更加疑如坐鐵壁間祇欲親迸出一朝疑團破捉賊驗真贓雨打石人頭剝剝論實事世間出世間如紅爐片雪便好放癡憨更不多饒舌待了本因緣再為仁者説宗説等錫上
