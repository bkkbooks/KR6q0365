body:
  text: 住博山法孫弘瀚彚編首座法孫弘裕同集宗教答響一參悟品第一劉胤平弘昞太史問宗教二門是一是二今云參悟是第一義一切教乘可盡廢耶大疑大悟不疑不悟有不疑者作何開發終不悟者作何究竟又復一種熟讀公案謬認當機此云證否更復教中多明了者此於悟門為有差別為無差別師云釋迦大師坐道場四十九載末後拈花示衆故有教外別傳之旨果教外別有傳乎宗乃教之綱教乃宗之目舉一綱則衆目張祗知理目而不識其綱者是不知宗教之道合一之旨所謂岐路中又有岐路也肯就岐路徑循其綱者諸教中皆有宗旨得其旨則一言一字皆最上之機如不識其旨泥於文字則宗亦教矣華嚴經云如日當空照童稚閉其目自言何不覩多聞亦如是又云如貧數他寶自無半錢分法華經云棄捨所習誦廢忘不通利貪著於名利多遊族姓家楞嚴經云縱能宣説十二部經不如一日修無漏業圓覺經云以思惟心測度如來圓覺境界如將螢火燒須彌山終不能著以此教自料揀而不知宗者在人非在教也良以教有千差宗歸一致教在博通文義宗貴直下真參博通非一日之功真參無頃刻之間非一日之功尋其流也無頃刻之間得其源也尋流而得其源者有之得源而棄其流者亦有之此又在人不在教也楞伽經云佛語心為宗無門為法門又頌云如世有良醫以妙藥救病諸佛亦如是為物説惟心既是以心為宗當勘破文字楞嚴經云圓明了知不因心念大凡地前衆生日用中無非心念如不真參實究其心念何能了之動止思惟莫非心念究竟堅固終不得矣是故當知宗衍於教一而二也教歸於宗二而一也其真參實究捷經名第一義教中具載非廢教也高峯大師云無量妙法門參禪第一義若真獅子兒不入他羣隊法華未開口時入無量義定無量義者非第一而何至舍利弗三請説法佛云吾今為汝分別説法文中云一大事因緣開示悟入佛之知見本文翻案云是法非思量分別之所能解即此非思量九箇字作麼生領會若不真參實究是謂入海算沙非究竟也繇此觀之教不可廢要在得其綱領果得其綱領教則為指為筏為導引為開闢為助緣又安可廢乎又謂大疑大悟不疑不悟有不疑者作何開發若果為生死心切者安得不疑如不疑是生死心不切耳如云一口氣不來畢竟向甚麼處去不究心時被善惡業牽引去既不隨善惡業牽引畢竟向甚麼處去既不知去處安得不疑如不疑者是不堪共語人又何必別求開發耶若果發真疑者縱不悟站定腳跟不起第二念此即成佛作祖底基本如別求究竟即非究竟也熟讀公案謬認當機者千聖出頭救渠不得安敢曰證譬如平人妄號帝王自取誅滅非細事也近時妄稱知識者行棒行喝入門便打入門便罵不論初心晚進妄立箇門庭皆是竊號之徒鼓動學者一片識心妄興問答竪指擎拳翻筋斗踢飛腳大似弄傀儡相似使旁觀者相襲成風殊不知古之所是今之所非將來鑊湯爐炭決定少他不得是謂之善因惡果良可痛歟若於教中多明了者與悟門中較其優劣實霄壞也雖不能與悟門較其優劣而代佛揚化非世間功德之可比書寫讀誦尚不可思議況説法乎此皆詣實之語學者可善而擇之淨土品第二問念佛參禪近分二幟能兼修否既云念佛恐以觀門為第一義臨終往生作何指引念時修觀作何攝受師云禪淨無二也而機自二初進者似不可會通當求一門深入如上帝都也維揚至東兖亦到也荊楚至中州亦到也豈以維揚會荊楚為一道乎若尋維揚而會通荊楚尋荊楚而會通維揚豈但不能會通余恐頭白齒黃終滯於維揚荊楚而不能到帝都也是故求一門深入不可滯祖師權語又不可滯抑揚之説也如永明料揀云有禪無淨土十人九錯路無禪有淨土十人九得度此多於淨土非多於淨土是揚教也是適機也永明意總不在此若以此見永明是謂之癡人面前不得説夢是謂之邏贓人喫棒也祖師亦云佛之一字吾不喜聞又云念佛一聲三日潄口祖師意總不在此若以此見祖師是謂之癡人面前不得説夢是謂之邏贓人喫棒也然禪淨二門非別立標幟求一門深入者似不得不二也如會通之説亦權語耳果發明大理不妨念佛世緣尚不礙道況念佛乎濁界尚不礙生況樂乎如專意淨土當發大心其大心者即菩提心菩提心者不為自求故不為一人得生淨土故不為一人得成佛道故如上品上生章云一者至誠心起信論云直心直心者無委曲故欲生淨土萬牛而不可挽也北宗云直心真實菩提道場又云至誠為入道基本六祖亦云行直不用參禪亦此意也二者深心謂心與境冥境與神會惟心惟境而互攝互融故云無邊剎海自他不隔於毫端故知十萬億剎之外不出一心果心外別有淨土耶然行人念佛正當發願往生不可執目前淨土大方之家安可滯一隅謂之心淨土淨正所謂棄大海認浮漚為全潮者不亦迷乎雲棲師翁云執事而背理類蒙童讀古聖之書執理而背事比貧士獲豪家之券據此則多於事土而略於理土蒙童讀書雖不解義而終有開曉之時貧士獲券縱堆積如山終無管業之理果將一句彌陀念教不念自念究竟到一心不亂則惟心之理不言可喻又何妨發願往生乎淨土訣云生則決定生去則實不去斯達惟心之境終日生而不妨無生終日無生而不妨往生也又何況念空真念生徹無生乎夫觀門者亦淨土一義耳據彌陀一經祇教一心不亂專持名號雖言西方種種妙境未明示其觀相也無量壽經出十六種觀門首曰日輪懸鼓乃至佛菩薩寶池樓閣及花開九品總雜等觀則隨修一觀即得往生也惟楞嚴經大勢菩薩云憶佛念佛現前當來必定見佛憶者觀也此觀念相繼自得心開不待往生又不妨往生亦攝念佛者往生斯菩薩化儀為彌陀輔弼自利利他不妨兼舉也此淨土一門仗果位中佛發大弘誓廣攝念佛行人比於諸法門中似省力也如單提一句彌陀當以信行願為資糧信者信自心有成佛底種子信有彌陀可見信有淨土可生信我念佛將來畢竟見佛畢竟成佛更無疑慮也行者念念無間如人行路直至到家乃可願者願生淨土將我念佛功德發願回向大地衆生同生淨土同成佛道斯亦菩提之心比為已生者日劫相倍也祇念佛決得往生況有果位中佛接引攝受耶止觀品第三問止觀二義諸書備具惟種種法繁漫難修有一二門當總持否即如觀持準提呪者觀鏡觀像觀諸梵字法更繁衍以何為的其不知者誤認假相不宜攝觀是耶非耶師云惡世有情生無慧目從無始已來根本煩惱俱生無明從劫至劫不能暫捨其不思議熏不思議變業轉現識發六粗境招因帶果吸引衆生輪回世間生死相續無有窮已所以諸佛世尊以大慈故緣於衆生以大悲故救於衆生險惡道中為衛護為導師苦海岸邊為援引為舟筏於黑暗長夜為炬為明於怠隋深坑為警為䇿説濁邊之過患示淨界之莊嚴演無量之法門開三觀之妙旨單復圓修隨機利鈍但從一門深入如登彌勒樓閣諸門頓開此止觀一法是不可思議之要徑也智者大師云止者乃伏結之初門觀者是斷惑之至要止者則愛養心識之善資觀者䇿發神解之妙術止則禪定之勝因觀是智慧之繇藉成就定慧二法斯乃自利利人以此則知不修止觀法無以成自尚不利云何利他又當知止觀攝一大藏教一大藏教不出止觀二法若人精修止觀可謂尋流而得其源也若修止觀者第一要三歸五戒如增受菩薩戒者其法最易成就名上品行人也第二要持戒清淨無諸毀犯第三要明信因果熟爛教乘第四要懺悔已作衆惡不更覆藏第五要發菩提心永無退轉志求大乘欲度人故更當訶欲澄心止緣入觀又如智者大師云方便行中當具五法一者欲欲離世間一切妄想顛倒故欲得一切諸禪智慧法門故亦名為志亦名為願亦名為好亦名為樂是人志願好樂一切諸深法門故故名為欲如佛言曰一切善法欲為其本故二者精進堅持戒禁棄於五蓋五蓋者一貪欲蓋即貪毒二嗔蓋即嗔毒三睡眠四疑此二法即癡毒五掉悔即是等分攝合為四分煩惱具八萬四千惡法故初夜後夜專精不廢譬如鑽火未熱終不休息是名精進善道法三者念念世間為欺誑可賤念禪定為尊重可貴若得禪定即能具足發諸無漏智一切神通道力成等正覺廣度衆生是為可貴故名為念四者巧慧籌量世間樂禪定智慧樂得失輕重所以者何世間之樂樂少苦多虗誑不實是失是輕禪定智慧之樂無漏無為寂然間曠永離生死與苦長別是得是重如是分別故名巧慧五者一心分明明見世間可患可惡善識定慧功德可尊可貴爾時應當一心決定修行止觀心如金剛天魔外道不能沮壞設使空無所獲終不回易是名一心據此則止觀定慧無不開發也又當觀諸法念念不住此名體真止如上體真止妄念不息當返觀所起之心過去已滅現在不住未來未至三際窮之了不可得不可得法則無有心若無有心則一切法皆無行者雖觀心不住皆無所有而非無剎那任運覺知念起又觀此心念內有六根外有六塵根塵相對故有識生識本無生觀生如是觀滅亦然生滅名生但是假立生滅心滅寂滅現前了無所得是所謂涅槃空寂之理其心自止如更馳散當以對治法治之如不淨觀對治貪欲慈心觀對治嗔恚界分別觀對治著我數息觀對治多尋思等此不分別也二者正觀觀諸法無相並是因緣所生因緣無性即是實相先了所觀之境一切皆空能觀之心自然不起能所雙泯斯即還源此據智者小止觀略引之倘遍修者當看全文更有摩訶止觀具載藏乘此不繁引如三觀中隨修一觀即攝諸觀既攝諸觀隨修一觀即名總持法門也如持準提呪者當觀諸法無性蘊界無我法界理成渾成一大圓鏡智又名一心然後觀鏡觀像觀諸梵字如寶鏡當臺隨念隨現似無繁衍像現呪聲如空谷響應此為的也其不知者誤認假相當以前義導之如不攝觀雖持曰事不名入理當深思之倘欲深入法性如顯密圓通法界觀法又不可不以彼為的據華嚴經云若有欲識佛境界標也當淨其意如虗空示也遠離妄想及諸取止也令心所向皆無礙觀也此四句亦標示止觀之大綱也清涼大師疏云聽許説中分二一誡識勸修淨意如空總以喻顯下二句別顯一離妄取如彼淨空無雲翳故斯即真止二觸境無滯如彼淨空無障礙故斯即真觀此觀不作意以照境則所照無涯此止體性離而息妄故諸取皆寂斯則不拂不瑩而自淨矣無淨之淨則暗蹈佛境矣此為心要請後學思行據清涼深入止觀法要修行者如體會斯意大得便宜也戒律品第四問念佛參禪俱精戒律諸如沙彌比丘等戒斷不宜犯律有明條至有在家諸優婆塞及優婆夷發心持戒當受何品恐於世緣不無干礙作何通融為廣示義師云識心熾盛猶如奔馬無暫停息造諸惡業遍法界故凡欲修行翻前惡境並起善心其斷惡修善以戒為基本若無戒律一切善法悉無以成南山大師云戒德難思冠超衆象為五乘之軌道實三寶之舟航禪定智慧以戒為基菩提涅槃以戒為本發趣萬行戒為宗主戒為却惡之前陳戒為入道之初章譬如世間造樓閣相似必先造其基址若無基址徒架虗空必不能成就也遺教經云當尊重珍敬波羅提木叉如暗遇明如貧人得寶戒是正順解脫之本若人能持淨戒則諸善功德皆悉能生是故修道者當持淨戒東坡云禪律並行不相留礙如念佛無戒有慧無福縱得為人福慧淺薄輪回諸有亦未可知參禪不持戒者斯謂之狂人將持戒束身藉以口實以祖師門下破執之談都作箇實法會去殊不知洗鉢水傾地亦施主物猶為過犯況其他乎清涼大師九歲出家十一歲背通三歲十四歲發明南宗大理猶以十戒嚴身六祖親傳衣鉢亦登壇受戒是故當深信戒法疾得出世華嚴經云信為道源功德母若不信戒而得禪定而明佛理無有是處是知必發信心乃能得戒如得戒者世出世法悉皆成就故云莊嚴法身戒為瓔珞破除熱惱戒作清涼戒經云戒如明日月亦如瓔珞珠微塵菩薩衆繇是成正覺尼乾子經云如來功德身以受戒為本若不受戒尚不能得疥癩野干之身況功德法身耶然戒有多種五戒八戒名近住解脫又名近事戒為在家優婆塞優婆夷受此二戒以親近出家二衆故沙彌受十戒為䇿進心行故二百五十戒名別相解脫謂條相多故若受此戒但超小乘阿羅漢果不得常住佛性廣化衆生如菩薩三聚淨戒若受之者報圓佛果相好無邊三達五眼十力無畏一切功德無不具足斯戒具權實二門以五戒八戒謂之權三聚淨戒謂之實權無實而不名權實無權而不名實如在家居士初入門者當以五戒導之此五戒者在儒名五常在釋名五戒乃名別體同故曰仁者不殺義者不盜禮者不邪淫信者不妄語智者不飲酒佛言五戒不持人天路絶宋儒云天堂有君子登地獄有小人入其君子小人貴有常理不在衣冠也如位執權衡秦檜李林甫之類皆曰小人販夫竈婦果具常理名曰君子又不可執有常理而不受五戒如不受五戒者雖念佛參禪止名白衣不名法子若堅持五種淨戒念佛一聲則滅無量罪參禪一日則開無量慧門也又有一等塵緣紛雜婚嫁之間未能圓備於此五戒似未能全持者先以戒殺一戒為之初因次以八關齋為之增長八關者謂立春春分立夏夏至立秋秋分立冬冬至此八日精持八戒五戒外加不著香花鬘不香塗身不歌舞倡伎故往觀聽不坐高廣大牀此名八關更加過午不食謂之齋也以此植因待世緣稍脫必欲常持五戒或增上菩薩戒者為之極善念佛必超常寂光土上品上生或頓悟自心報圓佛果也良以塵緣間隔有在家出家要知了生死入佛乘僧俗一致何分別之有也是故當發大心以期出世幸勿以世緣汩沒甘心下賤宿門外草菴也大心者必欲成就三聚淨戒故三聚者一者誓斷一切惡所謂淫殺盜妄身口非為一切過失皆悉止斷因斷成功名為斷德將來果上證法身佛二者誓修一切善所謂世出世間一切善法習行方便無善不修善繇智修因善成功名為智德將來果上證報身佛三者誓度一切衆生前之二願是自利行今者普度含識皆悉令得無上佛果菩提是利他行以恩及物名為恩德將來果上證應身佛又當緣境發心同虗空量故心緣於境境從心現境即戒體體即戒因以體起用方發無作到此則無持戒之名又安有犯故云戒性如虗空持者為迷到此不持不犯非初學者所及如云諸惡莫作衆善奉行以便初心開發慧命更為穩便也布施品第五問布施一門為六度首金剛經云不住於相此最勝義又復破除慳貪種子或復不能隨心如願廣作功德量力而行非慳惜耶師云觀心如幻觀法亦然四大假緣無實主宰身心尚不我有況身外乎良以世人認定箇色身堅著我相貪圖利樂資養無明長慳貪業從劫至劫不能暫捨縱其貪染吸引衆生墮於地獄即此貪心本無休止故地獄有不息之機因果歷然深為可懼若是智者肯以有限之身造無窮之業耶是故諸菩薩藉此而行妙行破衆生慳業無有窮已般若云若菩薩住於法而行布施如人入暗即無所見若菩薩不住法而行布施如人有目日光明照見種種色是故諸菩薩內施外施內外施一切施無盡施無猒施從劫至劫廣行妙行圓滿菩提內施者捨頭目髓腦如棄涕唾外施者國城妻子象馬七珍內外施者施上二種無所吝惜無盡施者施心不竭無滿足故無猒施者心無疲倦常精進故此菩薩達諸法性本來空寂非內非外內外搜求本無所有內不見有能施之人外不見有所施之物無施者無受者三輪體空以此妙慧而行布施然後為一切有情説諸妙法利益衆生諸供養中法供養最諸布施中法布施最華嚴十行品中功德林菩薩説十種布施文云佛子何等為菩薩摩訶薩施藏此菩薩行十種施所謂分減施竭盡施內施外施內外施一切施過去施未來施現在施究竟施分減施者謂菩薩稟性仁慈好行惠施若得美味先與衆生然後方食若受食時預作念言施自身中八萬四千戶蟲等又以此食惠施衆生願我於身永斷貪著是名分減施竭盡施者飲食香華資生之具一切皆捨乃至盡命亦無所吝是名竭盡施內施者謂菩薩年方少盛端正美好乃至頭目髓腦以濟衆生念已施之心無所悔是名內施外施者名華上服乃至王位我今宜應隨彼所求充滿其意即便與之是名外施內外施者如上所説悉皆施之是名內外施一切施者假使十方人來求上所欲悉皆施與是名一切施過去施者聞過去諸佛菩薩所有功德聞已不著了達非有不起分別不貪不味亦不求取無所依倚見法如夢無有堅固但為教化所著衆生成熟佛法而為演説又復觀察過去諸佛十方推求都不可得作是念已於過去法畢竟皆捨是名過去施未來施謂此菩薩聞未來諸佛之所修行了達有非不取於相乃至作念若法非有不可不捨是名未來施現在施者謂此菩薩聞諸天乃至聲聞緣覺具足功德其心不迷無有貪著又觀諸行如夢不實為令衆生捨離惡趣心無分別修菩薩道成就佛法而為開演是名現在施究竟施者謂諸菩薩捨一切所有滿足衆生已然後開導一切衆生令於衆生不生貪愛悉得成就清淨智身是名究竟施此名施藏是得忍菩薩所行妙行非初心者能行凡在有情分中不可不知不可不學不可不行但功力不及當隨分行之如一色一香一摶之食悉名布施增而廣之有所餘畜悉行布施成解脫心破慳貪業不可以小善小施而不行也如不行者則失無量利益又施者心有優劣教中載一長者施一檳榔與病僧得九十一劫如意報貧婦施一衣現感王興供養此謂之施心勝故田亦勝故田有二種一者敬田二者悲田敬田者供養三寶國主天地及父母師僧人所易發凡諸所有不生吝惜於有情分中則生分別矣二者悲田見病者老者貧窮者殘疾者乃至負命之者當起同體大悲資其所欲而行布施謂之悲田其福勝故用此幻化之財作真實無相功德以世間利樂千分萬分百千萬億分不足為比也其或有無猒之求者不與者不得罪何以故縱彼貪心陷彼慧命故又或自身本無所有而區區乞醯於鄰里者似不可以布施解脫之心而較其優劣也大凡施者當隨分而無吝心體上三輪空意及菩薩無盡藏施成就檀波羅密門又不可不學也
