body:
  text: 住博山法孫弘瀚彚編首座法孫弘裕同集住建州董巖禪寺語録上堂不來相而來不見相而見城東母指皆佛面來已更不來見已更不見萬別千差成一片欲知萬法皆空大似浮雲閃電智者了無分別愚徒強析名言欲求正智當於六十二見中求幾片白雲橫谷口欲求解脫當於衆生心行中求一輪明月印波心野狐向金毛隊裏翻身金毛向野狐窟中踞地如斯會去則一切衆魔及諸外道皆吾侍也衆魔者樂生死生死亦不惡菩薩於生死而不捨把將生死來外道者樂諸見還見諸見起處麼菩薩於諸見而不動太跛挈生雖是拈空塞空正好以楔出楔及盡去也三界何安倒跨泥牛縱之無所縱之無所則攀緣何生攀緣不生拔其病本到此則純剛打就生鐵鑄成有時在泰山頂上安身有時在大洋海底立命若夫菩薩以愛見心貪著禪味等諸法是名無慧方便縛如時作麼生待風清月白時共汝商量若菩薩無愛見心不貪著禪味等諸法是名有慧方便解順時作麼生待雷轟電掣時共汝商量解縛雖殊至體不二一根既返六用互施諸昆仲此是涅槃心作麼生是菩薩行如博山晝起暗眠五鼓燒香清晨禮佛天明早粥日中午齋乃至迎賓待客胡言漢語瞬目揚眉且道還與佛法相應也無喚作菩薩行即不可珍重文殊品上堂諸昆仲盡大地是黑漆漆地汝向甚麼處開眼盡大地如箇猛火聚汝向甚麼處藏身盡大地如一釜煬銅汁汝向甚麼處開口盡大地是箇鐵刺林汝向甚麼處下足古所謂三界無法何處求心四大本空佛依何住經云夫求法者不著佛求不著法求不著衆求乃至若求法者於一切法應無所求然則盡大地光皎皎地無你開眼處無你藏身處無你開口處無你下足處四大五陰向甚麼處安著山河大地從甚麼處得來然此則孤逈逈峭巍巍淨裸裸沒可把盡大地無針鋒許空缺處釋迦老人亦無開口處神通妙用總用不著又何勞斷取妙喜世界借座燈王如來斂沙界於毫端擲大千於方外納須彌於芥子藏劫火於腹中延七日為永年促長年為頃刻大似聚沙作塔等同兒戲衲僧分上總用不著且道衲僧有甚麼長處自從劫外花敷後直至如今笑未休不思議品上堂諸佛是幻衆生是幻菩薩亦幻幻出無根幻復成幻幻佛既知幻我我幻何如佛幻一切幻菩薩於此幻世界以斯幻法覺悟幻生於此幻化中行真實慈也於真實慈中成就無邊幻善向無緣體上度脫無量幻生拶碎玉琉璃虗己實他是務揭開真實藏賑貧濟乏為佳善不善若浮雲碧海珊瑚孕秀身受身如旅泊瑤池蓮蕚披芳欲貪從虗妄而生鐵牛舐犢三春雨分明從顛倒而有木馬嘶風一夜雲諸昆仲當知幻法無依真心無住無住無依是大火聚石火電光急著眼取之是迷捨之非悟關穽險危鴉飛不度如虎之缺如馬之𮩴指花夢花見柱非柱輔之順之五五草五於是文殊師利菩薩以無住本立一切法大似無風起浪平地生波檢點將來好與痛棒何以故為渠祇會遮惡不知護善復笑云也是為他間事長無明觀衆生品上堂虗而靈寂而妙才思惟行不到堪笑缺齒老趙州將丈六金身拈來當莖草一莖草是箇維摩丈室天女從甚麼處得來一莖草是箇天女身形維摩丈室安在甚麼處只饒天花不著也被渠當面熱瞞此花不如法是以去之眼裏著沙不得耳裏著水不得勿謂此花不如法所以者何是花無分別仁者自生分別想耳淨白人前不得説夢天止此室其已久如燈籠同年露柱同壽吾止此室如耆年解脫淨白人前不得説夢汝於三乘當何志求前不遘村後不迭店如入薝蔔林惟嗅薝蔔不嗅餘香淨白人前不得説夢汝何以不轉女身舍利弗莫是男子麼我十二年來求女人相了不可得當何所轉淨白人前不得説夢汝於此沒當生何所鑊湯爐炭劍樹刀山佛化所生吾於彼生淨白人前不得説夢汝其久如得阿耨多羅三藐三菩提七佛以前安名立字汝舍利弗還為凡夫時我乃得阿耨多羅三藐三菩提淨白人前不得説夢我為凡夫時無有是處舍利弗即今豈是聖人耶我得阿耨多羅三藐三菩提亦無是處淨白人前不得説夢諸昆仲寒則普天寒熱則普天熱甜瓜徹蒂甜苦瓠連根苦雲從龍風從虎聖人作萬物覩維摩會上一箇箇聖智睿聰何似博山座前聾者聾兮瞽者瞽天女身品上堂如何是佛七凹八凸如何是道氷霜雪雹要知佛道幽玄者裏看來恰好通達佛道行於非道擊水驚魚穿林驚鳥行於非道通達佛道以緇混素呼白為皂謾將惡水驀頭澆昨日嬰兒今已老行五無間罪而徹底氷清入三惡道而澄潭落影徹底氷清骨格繇來故舊澄潭落影風流不出當家示行三毒而成就慧心九轉金丹堪點鐵示行六度而豁開智眼幾番落葉不知秋徹妙義於諸經架橋梁於六趣破魔外之計執成權小之智悲可謂寶守功德取之不竭用之不盡者也乃至投明珠於濁水擲至寶於淤泥興正路於邪途現涅槃於生死譬夫一水成湯鹹之淡之酸之辣之甜之苦之且道喚甚麼作水也喚甚麼作湯也經云如是行於非道是為通達佛道有人於者裏簡點得出博山將袈裟覆之珍重佛道品上堂蜂房有蜜粳米有粥無明是慧煩惱即佛日月月從東海升日日日向西山沒大丈夫兒誰不知有虗空坐斷成窠臼無為大浸任彌天植種於空終不就經云有身是如來種真箇是蝦跳不出斗無明有愛是如來種好兒終不揚家醜貪恚癡是如來種一切佛法從斯有四倒五蓋六入七識處是如來種人人鼻孔向下垂那箇眉毛不解皺乃至十不善道六十二見一切煩惱皆是佛種榼𣜂堆頭無價珠一顆圓明非淨垢諸昆仲若向者裏會去正是借路還家就身打劫無量寶聚當下知歸若者裏不會直饒坐斷虗空清光照眼不通凡聖正是迷家於衲僧分上了無交涉是以曼殊大士善用返魂之藥仍續斷途之橋捩轉鼻頭掀翻唇齒布菡萏於淤泥植菩提於糞壤指生死海內有無價寶珠諸昆仲我等即今在生死海內頭出頭沒且道無價寶珠在甚麼處膿血團中赤骨歷精光直射斗牛虗如來種品上堂大道之源混沌之先騰今耀古徹地通天斫却中心樹子看來祇得一玄諸昆仲若論此事要識得親生父母若識得親生父母莫道參學事畢更要知毗盧有師法身有主經云智度菩薩母方便以為父此是化儀父母非親生父母也又云一切衆導師無不從彼生此是化儀導師非毗盧師也法喜以為妻慈悲心為女善心誠實男維摩眷屬一棚傀儡不假線索各人衲衣下檢點看還有許多般麼又當知空寂含覆是房舍也塵勞旋坌是弟子也親益成己是知識也四攝誘引是妓女也歌誦法言是樂音也總持廣納是園苑也密固扶疏是樹林也開合適時是妙花也智解造實是慧果也去熱除垢是浴池也三昧澄清是定水也其間更有一事聱訛不可不辨經云布以七淨華浴此無垢人若識得無垢人便識得親生父母若知親生父母便知毗盧有師法身有主諸上座要知法身主麼無手童兒能指出分明貌醜不堪傳眷屬品上堂南泉大師云我十八上便解作活計趙州大師云我十八上便解破家蕩産南泉父子至親骨肉因甚麼造詣不同若向者裏會去豈但徹見南泉父子亦乃入得維摩不二法門博山當時於趙州破家蕩産處便會得南泉作活計於南泉作活計處便會得趙州破家蕩産此二語雖如氷炭惟親履實踐者乃能知之諸昆仲此事不從學問得不從思維得不從修證得不從辨慧得只如維摩大士牙如劍樹口似血盆問若雲興辨如瓶瀉到者裏亦開口不得只得無言可對無理可伸可謂理屈辭窮非但要默然不得不默也古德頌云維摩不默不良久據坐商量成過咎總是瞌睡漢説他作麼文殊大士略較些子向者裏按下雲頭睜開碧眼雖然如是祇知掃葉不覺瑕生獨三十二菩薩一箇箇攢花織錦向無煙火處鬬弄春鶯於沒蹤迹中開展門戶非但有益於當時正為有益於現今亦有益於將來也假如有一僧向博山道和尚莫錯從古洎今未嘗有人如是披判博山祇向他道博山錯何似上座錯豈不見不因夜來鴈爭見海門秋不二門品上堂飢來喫飯困來打眠咬著牙齒震動大千俊鷹不打籬下好兒終不用爺錢舍利弗才欲得食早已被呵我等一日三餐如何理會廬陵米價要且不知閻羅老子打算飯錢作麼生折合到者裏智慧辨才神通妙用總用不著直饒維摩大士遣化人至四十二憶恆河沙世界上衆香世界乞香積世尊所食之餘復至娑婆世界施作佛事衲僧分上簡點將來正是鬼神活計當得甚麼事諸昆仲若知十方國土猶如虗空衆香世界不離跬步一念清淨釋迦佛即是香積佛娑婆世界即是香積世界若一念非清淨香積佛即是釋迦佛衆香世界即是娑婆世界諸昆仲若向者裏信便信去若不信從教立在古屏畔待使丹青入畫圖香積品上堂寂然不動感而遂通釋迦老人有耳如聾胡地冬抽香筍楚天鴈入回峯擊碎晴空一色揭開雲霧千重此是衲僧分上具足底神通妙用又何勞化寶座將丈室置右掌然後為神異哉亦是維摩大士佛事門頭瞥爾如是非實事也衆香世界以香飯入律行娑婆世界以文字語言而入律行此悉是菩薩導機動善應權化物亦非實事也或有國土以佛光明而作佛事有以佛所化人而作佛事有以菩提樹而作佛事乃至有以佛威儀進止諸所施為而作佛事然古今非一世變時遷在博山分上總用不著博山但將現成底現前底指示大衆有時以森羅萬象而作佛事有時以日月星辰而作佛事有時以園林浴池而作佛事有時以水流風動而作佛事有時以揚眉瞬目而作佛事有時以搬柴運水而作佛事乃至與諸上座耍笑謳歌而作佛事諸昆仲且道與釋迦老人維摩大士是同耶別耶復笑云日月有明晦聖凡無二心菩薩行品上堂道遠乎哉觸事而真聖遠乎哉體之則靈見聞覺知是載道之器道不即見聞覺知亦不離見聞覺知動靜起止是聖所行處聖不即動靜起止亦不離動靜起止若得大轉變方有語話分諸昆仲若以見為見有見有不見以無見為無見此即成斷見若欲具正見無見無不見若以動為動妄心彌更動以無動為無動此人非佛種若欲知不動動上有不動會得此意縱萬境紛紜之際而恬然寂然所以肇公云江河兢注而不流野馬飄鼓而不動日月麗天而不周教中謂東方妙喜世界有佛世尊名曰不動東方乃羣動之本佛名不動亦此意也而以妙喜世界入娑婆世界事有往還之迹理無往還之功如有一人從東方來東方虗空無有空缺處復至西方去而西方虗空無有逼塞處如斷妙喜世界至娑婆世界妙喜世界無空缺處娑婆世界亦無逼塞處非神通力也法如是故若會得此意是名真法供養如來諸供養中法供養最何以故一切諸佛阿耨多羅三藐三菩提皆從此經出故法華經云假使有人登須彌頂為人宣説十二部經未足為難暫讀此經是則為難諸昆仲黑的是字白的是紙縱是圓頓教乘不出大方廣十二部經典等且道喚甚麼作此經者葛藤話不了喝一喝云專為流通見阿閦佛供養品上堂佛法付與國王大臣長者居士世諦語言皆合道誰家絃管不傳心佛法付與沙門釋子菩薩大士袈裟一段風流事不是飽參人不知昔者雲陽老師初住此山荷擔大法豫齋趙公扶助此道師資相契如水乳合陽師化後仍得湛虗趙公二子及孫四世弘善所以閩地信向佛法悉從此巖中流出余所謂董巖者非巖乃功德海也今日解制之期勉吾李公洎尸居士設齋供衆博山不免舉一兩則陳爛葛藤因齋慶讚去也昔百丈大師云靈光獨耀逈脫根塵體露真常不拘文字心性無染本自圓成但離妄緣即如如佛諸昆仲向第一句會去甚是快便其或未然博山重為下箇注腳靈光獨耀分身兩處看逈脫根塵眼裏耳裏體露真常通身紅爛不拘文字流出一大藏教心性無染貪嗔癡愛本自圓成猶欠粒米但離妄緣喚甚麼作真實即如如佛佛之一字吾不喜聞者裏不會更將張拙秀才悟道頌重為注解光明寂照遍河沙天上天下惟吾獨尊凡聖含靈共我家一人傳虗萬人傳實一念不生全體現山河大地逼塞殺人六根才動被雲遮好向聲色裏薦取斷除煩惱重增病喚甚麼作煩惱趣向真如亦是邪刮却眼中翳隨順世緣無礙飲水須防噎涅槃生死等空花何處得此名字還會麼更或遲疑博山將維摩經從頭復解一遍良久云雕沙無鏤玉之談結草乖道人之意便下座囑纍品書坊仙亭上堂糙石秦王鏡涓流古澗泉微塵山海量螢火樹頭煙諸昆仲此四句偈有一句殺有一句活有一句縱有一句奪若人檢點得出博山與他結箇同參其或未然不免駕雲霧吸山川弄神通顯妙用又怎怪得博山博山十年前曾到此山見雲霞眇眇古木含煙有泗泉余公道愛殷殷尚壯壯然也博山十年後到此山復見眇眇雲霞含煙古木泗泉余公今已矣也若以人比古木人實同幻化古木乃恆常也若以古木比山川古木有摧折山川乃恆常也若以山川比雲霞山川有崩缺雲霞乃恆常也若以雲霞比虗空雲霞有去來虗空乃恆常也若以虗空比吾大圓覺體虗空有成壞而吾大圓覺體乃恆常也更有一恆常不與諸昆仲道諸昆仲各人向衲衣下抖擻看若抖擻得出便好與博山相見有麼有麼袈裟不是恆常事臭爛骨頭仔細看戊辰重至董巖上堂天不蓋地不載是甚麼物諸禪者也須審細千人萬人中不向一人不背一人是甚麼物諸禪者也須審細虗空包不住大地載不起是甚麼物諸禪者也須審細蚊蟲眉睫上安身蟭螟腹中敷坐是甚麼物諸禪者也須審細於此四種上會去許諸人升博山堂未曾入博山室更須知博山室中受用始得諸昆仲頓明佛心毫無差互世間心念不見纖毫始名出世間人逢世間逆順境緣賢愚好反如以手觸空了無交涉所以達磨大師云亦不覩惡而生嫌亦不觀善而勤措亦不捨愚而近賢亦不拋迷而就悟達大道兮過量通佛心兮出度不與凡聖同超然名之曰祖卓拄杖云達磨大士來也為汝等敷宣第一義諦且道是何章句層巖磊落從教日炙風吹行樹清涼好看花飛蝶舞上堂佛不求佛心不覓心設有求覓者皆昧心取境耳若達境惟心不生分別想山河無影迹大地絶形蹤青松與緑竹同科白鷺共黃鸝一色理無異狀緣幻千途果然徹究根源頓絶凡情聖解古德云若人識得心大地無寸土當知此一字法門豈但奪盡世間法假饒千佛出興於世行苦行坐道場説法利生般大涅槃祇是緣生法以智眼觀之如夢如幻攝大乘論云即諸三摩地大師説惟心由心彩畫故如所作事業若達本忘情自然無惑諸昆仲此是教家極則更須知祖師門下長處始得且道作麼生是祖師門下長處拈拄杖云昨日是重陽今朝又過一日也卓拄杖下座上堂如何是道平常心是道是聖是凡都一掃才生擬議隔天涯大似尋空向壁討諸昆仲能由境有境逐能成境由能境能由境能拄杖子喚作能三十棒趂出院喚作境三十棒趂出院喚作非能非境三十棒趂出院喚作亦能亦境三十棒趂出院三祖大師無風起浪平地生波簡點將來不無滲漏雖然如是下文幸有救言豈不見六塵不惡還同正覺智者無為愚人自縛據此亦有過犯何以故説箇同字好與三十棒趂出院卓拄杖云不是與人難共住大都緇素要分明上堂釋迦大師從本無生緣起而有生者鏡中之影像昭然從本無滅緣盡而有滅者水上之漚華寂爾四十九年夢語百千萬種真慈掉盡老婆舌頭償盡衆生口業無端被迦葉尊者覷破只得無地藏身博山雖是他腳下兒孫要且不沾著些兒痕迹何以故彼既緣生我亦緣生當知拄杖子不在其類彼既緣滅我亦緣滅當知拄杖子不在其類諸昆仲還識拄杖子麼橫拈直撞無情識生滅場中不涉伊識得箇中何所似牡丹花下睡貓兒卓拄杖下座
