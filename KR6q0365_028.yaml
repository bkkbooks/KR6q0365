body:
  text: 住博山法孫弘瀚彚編首座法孫弘裕同集書一與鄭方水大宗伯頃在樵陽聞德星光臨棲鳳及拜領佳什珠璣滿案鏗鏘作聲至講經座本以無舌證一章貧衲甚喜大居士不易到此田地必有大發明處非彼常情潤飾詞華供詩料者也昔夾山大師囑洛浦云且莫草草匇匇截斷天下人舌頭即不無怎教無舌人解語彼時赤尾金鱗早向虀甕裏醃殺矣仰山偈云一二二三子平目復仰視兩口一無舌此是吾宗旨伶俐衲僧二三十年做工夫到此未免結舌芙蓉云無舌兒童能繼和正所謂向上一路滑如苔大居士何以得之便利若此貧衲恨未親接台顏徒于言下操勺蠡以測無涯倘再借清光照臨薜蘿共談海印三昧使靈源幾片石咸為點頭乃佛法之靈驗耳與詹定齋廉憲自去歲奉謁奇遇欣躍謂禪與淨土居士兼有之矣翰教遠頒若猶有意于愚師弟者何謙抑亦至於此竊謂毗盧性海人人具有從上諸聖語言及諸家公案無非發明茲義總在學者見解何如居士書中超脫之見即是此境現前一了百了更無二語若曰明于此或昧于彼恐尚是意識中得來非性地上徹悟耳雖然大善知識種福田植慧根何難于此道也即以居士勛業較量之闈中品士尺幅證心塞外閲兵一鼓作氣文經武緯用無不宜第令持此向最上乘中直是玄鑑洞觀單刀直入氣象貧衲將翹首居士了一大事因緣也與鄭雲梅司理別傳之道自世尊拈花迦葉微笑二十七祖傳之菩提達磨觀其宗旨深奧非大聖無由開化趣用整密非圓機無以領略大士航海而來直接上根每遭耻斥故面壁九年俟時揚化至二祖安心斷臂流血而見骨髓三祖懺罪瘋顛病差作良模信大師徵詰明佛性于少年盧行者風幡烹真金於大冶自後金雞䘖粟南嶽廄裏跳出馬駒而秉命尋思青原山中笑看麟角江西一踏四十八員斷命根于彼時揑轉鼻頭盡大地人領全機于此際及乎五家派出或揚眉瞬目竪指擎拳打鼓吹簫揮戈舞劒無非助揚一大事而已豈有他哉五宗則首出溈山父子唱和暗機圓合撼茶則體用雙彰耕田則事理俱顯臨濟則直下妙用活中要箇死人一語中具三玄一玄中具三要有照有用立主立賓非上根利智孰能究其涯量哉有時一喝如金剛王寶劍栗棘蓬從此渾吞有時一喝如踞地獅子金剛圈憑斯返擲仍觀法眼一派則何止惟心全提正令耳色眼聲六用互施矣雲門則高低一顧萬象齊彰擬議之間則橫尸萬里故云顧盼猶倍句揚眉落二三獨洞下宗旨不附物不立玄以寶鏡三昧照學者之肺肝君臣五位以辨金鍮雲水交參而分玉石不犯當頭不居正位若機紐銜于樞口轉處幽微以絲紗吐于梭腸用時綿密大理本無二致門庭施設萬端豈非雲月是同溪山各異耶如上所言者居士本自具足又何待貧衲葛藤如此知居士是箇中人必證箇中話敢惜乎口業也居士欲要大安樂處須向者葛藤裏一一透過始得還肯麼此時若不究根源且待當來問彌勒與趙司理貧衲草野疏陋承獎借過分且詔以靈光獨露之旨使振百丈家聲自愧何堪誠知大居士得此光明幢相三昧久矣故能以此光回照一切每惟末法中士大夫不罵佛謗法幸矣如臺下深心力護如己眼目非徹照佛乘廣行慈願孰肯擔荷如此耶然知大居士雖作如是廣大佛事亦不作佛事之想雖發露此光而光非存照故盤山祖師云心月孤圓光吞萬象光非照境境亦非存此正與大居士機理相契處然下文云光境俱忘復是何物者裏到得便知云似地擎山不知山之孤峻如石含玉不知玉之無瑕學道入得此箇境界自然生死心破智不能知識不能識如來禪祖師禪一併打徹矣教中所謂絶心生死伐心稠林浣心垢濁解心執著塵勞佛事皆為遊戲出世入世云乎哉大抵貴在一念生死心破自肯承當而一切處自然法身獨露如青天白日一毫遮障不得若有絲毫疑情未盡即障道眼古人云一翳在眼空花亂墜昔長慶稜禪師坐破七箇蒲團因捲簾廓然大悟乃作偈云萬象之中獨露身惟人自肯乃方親多年誤向途中覓今日看來火裏氷此即生死心破承當自肯樣子也古人深山二三十年草衣木食真參力究蓋為此耳貧衲自幼出家參尋頗力情關理路百揭千翻直得伎倆自窮所謂獨露者雖欲隱而彌彰不知其然而然至今喫粥飯始知甜耳以臺下家裏人説家常話非敢馳騁機解自揚家醜蓋承以靈光下照故爾借光放光然亦自知不揣其量溈山云此宗最妙難得其人末法宗風掃地久矣僧中寥寥不意縉紳先生猶見居士所謂清獻公再來非耶承大教辨明實際無物不有無物不空真俗二諦於中影現無法也而假名為法無身也而假名為身此真性一段光明開發顯露清淨無翳如朗月處空無不現者至云潛思于髫年根力純熟如此則十二時中固不待提撕話頭如香象渡河截流而過一超直入已是漸言耳第禪宗向上不説法身邊事要在機用回互深舍獨占古人云懷州牛喫禾益州馬腹脹天下覓翳人灸豬左膊上此語亦不可作道理會亦不可作機鋒契要知十二時中潛行密用築著磕著不差毫髮徹見佛祖骨髓命脈則如居士所云縱橫自在御風而行者也若然者不把繩頭而繩頭自把即此繩頭復是何物上堂洵口而道為好事者録而成集忽被居士覷破又添一重公案也第捧讀佳製霍然忘暑所謂薰風自南來殿角生微涼倘因合刻永戴法雲上憨山大師乞壽昌塔銘恭惟大師最大圓慈無上善聚覩慈容而入道聆謦咳以銷煩末世法幢昏衢慧炬某於髫稚便耳鴻名幾欲向往未遂瞻光雖私淑慧燈而衷心菀結丙申年參見先師壽昌和尚把茅之下量兔角之短長頓拳之間捋虎鬚之返復稍知去就便爾樵牧之間于茲二十餘年矣去歲為先師入塔得覩師贊章悲喜交集哀哉切心自欣謂先師大光明藏于斯透露不泯即欲趨領教益借慧潤以展遐思多歷障緣行行中止今春縉紳先生輩乞銘靈塔某謂非大師筆力不能傳先師之神衆咸默然悉從末議敬遣小徒輩登山丐請伏惟慈允以慰渴思豈但不肖等得沾濡法恩即先師于大寂光中致謝無已耳與沈東華廉憲三春日得聞報知福星照氷溪也此非小緣皆湖東子民善因所致惟林下人躑躅不敢前蓋公門中非僧家行處祇焚香遙祝而已承翰教豐儀仍問及宗乘中事豈但為僧者得沾惠澤即三千七百祖師公案亦復重宣也臨濟大師云一語中具三玄一玄中具三要此善知識臨機慧辨三玄三要未兆之先已通身突露非臨時湊泊如旃檀本香借火爇則分外香若以火論香則辜負旃檀若以言句中討玄要大可笑也諸家録中皆下語大似以鶴粉喻雪雖色相似去雪實霄壤惟汾陽頌云三玄三要事難分得意忘言道易親一句明明該萬象重陽九月菊花新灼有真旨大居士切欲發明斯道在臨濟喫棒因緣上會去則待客迎賓拈匙把筯三玄三要不問可知其或未然父母未生前那箇是我本來面目烏紗蓋頂黃金束腰傀儡一棚不加線索則生死暗然無寄本來面目是甚麼碗脫丘三玄三要留待台駕入山時再作箇話會也讀翰教不能釋手知居士靈機浚發皆夙生般若慧之所成就非常情可及也惟祖師門下言句如煮木札羮如炊鐵釘飯不可以智知不可以識識惟悟與悟乃能明了若謂某為三玄句某為三要句某為先照而後用句某為照用不同時句正所謂以管窺天以蠡測海多見其不知量也大居士決欲發明此一件大事赤肉團上無位真人在六根門頭放光動地不得當面錯過若錯過時百劫千生未有了底日子將前解路如斬一握絲一斷一切斷更不相續無位真人是甚麼乾屎橛但恁麼究去一朝知痛癢時向大愚肋下築三拳是大丈夫作略非分外也若依草附木東引西證説心説性者可請一義學沙門將三經五論細説一遍禪之一字拋向萬丈深坑過不可説不可説劫後再可談不了之緣未為晚也不識大居士於此寧甘心乎昨承諭入道貴在真實真實二字誠入道基本也不識居士於真實處曾入道乎少林大師云外息諸緣內心無喘心如墻壁乃可入道果得心如墻壁則真實二字不言可喻若心中揣摩生諸解路早是不真實欲得心如墻壁安可得乎果得心如墻壁正堪入道若以心如墻壁便欲住足祇是箇心如墻壁漢不堪與語道也然心如墻壁不容易到有一等人將妄心遏捺令心不起謂之心如墻壁大似水上按葫蘆從少至壯從壯至老欲得心如墻壁無有是處真是箇究心人將一句話頭才方提起如吹毛利劍觸其鋒者即喪身失命欲其別生一念了不可得連真實二字安亦不住斯二字誠為入道之基本也大居士日用以此可坐進斯道不然則彈指一生可謂錯過了也真實云乎哉與林季翀大宗伯二隙駒易流與大居士兩易寒暑以慧照觀之靡隔朝夕矣適捧翰教忭躍無量經世出世一大因緣撞破從前關棙自是有力大人也居士當一肩擔荷又何慮誤墮落哉夫性命者宜直下會去如會去則眼見耳聞與法界體同無纖毫滲漏圓覺疏云德用無邊皆同一性性起為相境智歷然相得性融身心廓爾居士於斯見徹憂慮不能縈生死不能繫遊戲世間京都鄴都浩浩皆菩提道場也更徹見淨土宗旨白太傅須要讓居士一籌耳其或未然但看念佛者是誰行裏坐裏一切事物裏只要看破此誰字忽朝摸著鼻孔阿彌陀佛不向別求也舊冬承翰教謂人生五十不知性命所在此為誠言非套子語也當知此事萬劫難逢千生罕遇既知有此關棙若不發明肯甘心耶祖師答見性偈云在眼曰見在耳曰聞在鼻嗅香在舌談論又云遍現該周沙界收攝在一微塵大居士可將此偈細看一遍眼所見耳所聞不逐聲色畢竟是何物也世人都被聲色所轉輪回六道無有了期一失人身萬劫不復可驚可怖可懼可畏如有智者當于此著忙世間功名富貴決定羇絆不得何也身非我有況身外乎看破此境界十二時中深追力究念念不移決欲發明而後已若能返照直下無第二人動轉施為無虧實相視生死如夢幻觀世界等空花永嘉云大千沙界海中漚一切聖賢如電拂如此做一箇凡聖不拘底大快活人世間之樂事百千萬倍胡足為比他日向棲鳳嶺頭拍掌一笑何也笑此老婆心葛藤語耳與余育蟾郡丞逢人即問知居士貴恙未瘥甚是挂意良以生此極惡世界有身即有苦不待病時是苦從少至壯乃至出仕做官種種運為莫不悉是苦境公曾在苦中穿下過來何云今日方才是苦要知法身苦不能及劫火洞然我土安隱居士當確實正念不以此苦退菩提心不以此苦生退墮心當看此身如弊垢衣如夢中像生歡喜心管他今日去明日去如船子和尚水喪降魔和尚火化是謂之捨苦趨樂如此拌得壽亦可延病亦可愈古云外其身而身存斯之謂也縱是便行當撫掌莞笑做箇倔強底漢子使後人發心不可畏首縮項退他人信心公之福也我忝知識不得不盡情向公道破與沈孝子接來書知居士操履不羣三十年前酒色場中耽閣半世三十年後始發清淨心看即腫即臭即爛頓起疑情即陳眉公啓迪也余每看眉公書似挫抑禪門此開示學者又似傍禪家門戶孔子顏曾思孟決無此等語此語似初心禪者口氣但使人在色身上作活計不能深入性地何但死了便臭爛即今色身水火稍不通流即臭爛又何足疑閩僧又云髮毛爪齒不知痛癢此是簡眉公腳迹走底漢子即今幻妄色身還知痛癢麼爛壞底是甚麼臨濟大師云赤肉團上有一無位真人汝等諸人好看又云無位真人是甚麼乾屎橛此是出生死底要津斷知解底利器此無位真人還爛壞得麼一朝病來手忙腳亂便是認定箇色身不肯放下生平行履總不究竟正所謂擔佛傍家走認驢鞍橋作阿爺下頷居士將平生所知所解底盡情放下但看箇無位真人是甚麼乾屎橛深追力究頓發疑情行裏坐裏著衣喫飯裏只討箇下落忽朝打失鼻孔始知爛壞臭爛底是場笑具耳余普説板在蘇州是余生平行履居士請一本可以坐進斯道他日漆桶脫時還幾雙草鞋錢未晚也與余文台居士生死事大無常迅速來諭最為肯綮但要發明生死二字將此二字做箇貼肉汗衫行住坐臥看生從何來死從何去或單提一句亦可若一句上徹去千句萬句一時徹去無邊佛法自然通曉毗盧遮那佛華藏世界悉自心受用大小二藏從自心流出非外來境也心外既無境可得生死二字安放甚處居士決明此事但恁麼看去決不可圖箇小歇場亦不可撥棄世緣守著靜謐亦不可從人語句上生出解路亦不可作儱侗解會自生滿足想只教生從何來一句子撲得粉碎始是大安樂田地也不然盡是落草落水認著能講能談底喚作一靈真性正所謂認賊作子即今貴境稱善知識指示於人如是師如是徒以燕石而寶之以瓦礫而珍之他時生死到來自然七顛八倒胡思洞裏間神野鬼搬弄將去鑊湯爐炭劍樹刀山饒他不得為伊平日稱口頭快便破佛毀法謗善知識坑陷人家男女也居士但如貧衲所示或看禪關䇿進博山警語及徑山回書悉能助發機緣也與吳觀我太史二往返生生社與居士清談將半月如坐毗耶城正所謂彼上人者難以酬對然不二門向上更有事在故云不可以智知不可以識識譬如入都城四會之衢非行到不能親歷諸境嗟夫此道閉之久矣投子遠録公將五百餘載其間提唱者罕得其人生死分中似不可以解心敵如南嶽見六祖德山見龍潭大有樣子居士於此但當盡心單提一句話頭孜孜不捨以期大悟若徹見根源即無明結使不斷而自消根識境緣不澄而自殞可謂靈丹一粒點鐵成金自不與諸法門較優劣縱不悟站定腳跟終有到家日子如不信斯道三阿僧祇劫始能成就古德云拌此一生乃至三生必能打徹豈欺我哉如看一口氣不來畢竟向甚麼處去此處字上要切要緊切不可將經書引證如教中謂無去無來等斯是毒藥不可沾著一點但貴深追力究決定要討箇下落如前教乘中有相應法急須吐却或澄心瞑目寂照相治虗靈不昧觀法無我乃至究竟不即不離及事事無礙等語在佛法中謂之入理深談在參禪人分上謂之野狐涎所以云鳳縈金網趨霄漢以何期居士不可不慎貧衲不得不盡情吐露也貧衲生少智慧唯參究一念子蓋切今與居士論及宗乘中事譬如居海者不問江河淮泗惟以海印印之耳所謂看話頭六代相傳未之有問答之際一語中放不過便頓發疑情如能大師問南嶽大有樣子自後諸家激勵皆曹溪一箇印子上來居士于此須發起大信心要徹生死決從斯門而入捨此別求是岐路非禪門捷徑于此事上決不可生疑決不可以教乘中印證所云散位獨頭倐起倐滅者祇須切之一字是破意識利斧也禪警語大慧回書禪關䇿進悉能助發如參究一日得一日實用縱一生不明亦不妨具成佛作祖底基本古所謂但辦肯心必不相賺承諭浮山聖道場處自有天龍擁護貧衲似不能應命山居人事叢雜年臘漸長兼以病魔日至每欲捨衆入深山邃谷以度餘年説法境緣付囑於大地有情待時節發生耳齊羣玉居士才發信心須臾即沒無奈死魔壞菩提心印大可嘆息唯居士體認自己本命元辰莫管他世界成壞永嘉云大千沙界海中漚況漚中一鄰虗起滅耶
