body:
  text: 住博山法孫弘瀚彚編首座法孫弘裕同集住信州博山能仁禪寺語録壽日上堂諸佛時常説法博山特地重宣是何言丫角女子𩬆皓然是何法明察秋毫雙眼瞎此情惟有木人知六月炎天生凍殺若向者裏揭山頭之宿霧破水面之印文古佛向汝諸人面前説壽量品報恩品已竟所以云博山生大地衆生與博山同生博山壽大地衆生與博山同壽然雖如是更須知有出世事始是報恩者博山嘗有偈云欲報深恩出世奇報恩深處少人知而今洞徹無違理始信從前步不移古德云盡大地如粟米大拋向汝諸人面前諸人要且不會打鼓普請看若會得恁麼説話始知不移步底道理國恩佛恩親恩檀越恩一時報足若乃暖衾涼枕菽水承歡欲報深恩無有是處所以釋迦大師棄皇宮如脫敝屣乃至忉利天為母説法此釋迦之孝也目犍連尊者去鬚髮如除垢膩乃至餓鬼道中救脫母難此目連之孝也現前大衆思地獄苦發菩提心長連牀上瞪眉努目究衲衣下一件大事此諸昆仲之孝也作麼生是博山底孝拈拄杖云一條拄杖活如龍縱橫全得渠儂力連卓拄杖下座上堂凡心聖心本無差別即凡即聖猶是強言自是衆生瞥起情念妄分我人生天堂下地獄趨餓鬼報旁生無始以來至於今日乃至盡未來際無有了底日子若是箇伶俐漢踢翻筋斗掉轉乾坤透徹自己關棙若透徹自己關棙便透徹三千七百祖師關棙若透徹祖師關棙便透徹釋迦老子關棙若透徹釋迦老子關棙便透徹博山關棙若透徹博山關棙八萬四千關棙一時洞開然雖如是卓拄杖云點鐵成金易除却是非難下座除日上堂殘冬已去春風到來木雞報曉石女懷胎庭前翠柏堪剪溪邊嫩柳重栽達磨不來東土寒山元在天台惟有臨濟大師赤肉團上無位真人分身無量散在汝諸人面門出入未證據者看看飢同餐渴同飲寒同火睡同衾若向者裏儱侗瞌睡未免受無位真人當面熱瞞竪起拂子云諸昆仲會麼圓明了知不因心念珍重元旦上堂元正嘉運何先兆遲日晴空光皎皎悟迷邪正謾商量是聖是凡誰分曉現前境界亦何賒説向西方途路杳一微塵裏顯全機大地山河一莖草幻化場中著眼看萬法無過隨緣好然雖如是應時納祐又作麼生卓拄杖云莫謂袈裟元是舊春風先到杖頭來都昌佛殿山長慶寺古愚設齋薦父請上堂博山説法二十餘年即今何故不肯上堂蓋為法門混濫妄庸者多以上堂為戲具故博山跛跛挈挈且恁麼過時今古愚上座為彼亡父敦請不已却又躲避不過諸昆仲輪回三界中恩愛不能捨棄恩入無為真是報恩者釋迦大師不合教壞人家男女博山今日路見不平不免拔劍相助輪回三界中隨羣逐隊不同同恩愛不能捨要笑謳歌宣般若棄恩入無為菽水承歡我是誰真是報恩者五逆七遮可知禮博山非但逆俗亦乃毀僧然雖過犯彌天要且恩歸有地昔者靈山會上五百比丘得四禪定具五神通未得法忍以宿命智通各各自見過去弒父害母及諸重罪於自心內各各懷疑於甚深法不能證入於是文殊承佛神力遂手握利劍持逼如來世尊乃謂文殊曰住住不應作逆勿得害吾吾必彼害為善被害文殊師利爾從本已來無有我人但以內心見有我人內心起時我必被害即名為害於是五百比丘悉皆悟道諸昆仲若向文殊握劍處會去佛恩親恩一時報足於此不會雖粉骨碎身父母深恩未足為報也直饒目連于地獄中救親神通之力太晚玄沙向寶塔邊認父天人之禮何甘興化令他人助哀孝道之名反是睦州打草鞋供母福田之報多慳此諸尊宿雖曰至孝尚屬緣生緇素將來不無滲漏何似古愚上座化父及弟俱出家為僧導以淨業其父有自責自悔之歌不塔不真之偈臨終預知時至正念分明其父大安樂可知古愚報恩酬德亦可知也諸昆仲各各具有生身父母當人分上又作麼生卓拄杖云粉骨碎身未足酬一句了然超百億珍重新建法堂本府蕭太尊請升座浴龍池畔瑞雲開丈室懸知貴客來頓省祖師門下事舌頭口裏滑如苔雲門大師云高低一顧萬象齊彰擬議之間橫尸萬里博山則不然高低一顧眼見鼻梁畐塞虗空向者裏出氣諸昆仲若商量得出蕭使君大居士為汝等證明其或未然拄杖子為大衆注破卓拄杖一下首座問云適聞和尚高低一顧眼見鼻梁祇如畐塞虗空作麼生轉得身吐得氣師卓拄杖云蹤迹不施功千山添翠色進云恁麼則撲破虗空通身活眼師云門前一水收三水屋後千松蓋萬松進云祇如蕭使君道山河大地渾成夢且道是真夢是浮夢師云直下看取進云與麼則龜毛拂子春風動拄杖縱橫法界收師云且放過一籌座率衆禮拜古德法師請上堂諸昆仲古人云此事不與教乘合亦是方便語又豈知一大藏教無一言一字不與此事發機耶楞伽經云佛語心為宗無門為法門既云以心為宗三乘十二分皆心之切腳耳華嚴經云奇哉奇哉一切衆生皆具如來智慧德相可謂開發性源矣又云若有見如來體性無所有修習得明了此人即作佛若知得體性無有佛之一字猶是賸言圓覺經云如來大光明藏是諸衆生清淨覺地衆生清淨覺地即如來大光明藏可謂凡聖同源毋勞指注又云如來因地修圓覺者知是空花即無輪轉亦無身心受彼生死果知妄身妄心如空花相修行分中甚是省力楞嚴經云一人發真歸元十方虗空悉皆消殞果知得虗空消殞華藏世界畐塞塞地無纖毫滲漏法華經云是法住法位世間相常住果知得是法住法位可謂無量寶聚當下知源諸昆仲此是教家極則若以思惟心測度如將螢火燒須彌山終不能著然雖如是更須知有宗門中長處始得卓拄杖云此拄杖子在馬祖分上牛行虎步草偃風行一口吸盡西江水一腳踏殺天下人在石頭分上喚作竺土大仙心東西密相付在龐居土分上竿木隨身逢場作戲在臨濟分上驅耕夫牛奪飢人食敲骨取髓痛下針錐在溈仰分上暗機圓合啐同時在雲門分上函蓋乾坤隨波逐浪顧盼猶倍句揚眉落二三在法眼分上六根互用六用齊施在曹洞分上正不立玄偏不附物今日在博山手裏喚作拄杖子則觸不喚作拄杖子則背畢竟作麼生良久云有時破霧穿雲去撥轉乾坤振祖基卓拄杖下座上堂佛法非非法非非非亦非非非俱絶迹始可話離微諸昆仲若欲決擇是非除是向教乘中辨得清濁然後始透得祖師關棙何謂清濁如教中説貪嗔癡愛煩惱無明是障道法此是聲聞藏説是濁流邊説無佛可成無生可度情與無情性相平等此是菩薩藏説是清流邊説至體無名聖功獨照此是藥言無病人前不得説藥有修有證建立因果此是聲聞藏説是濁流邊説無修無證不昧因果此是菩薩藏説是清流邊説修與無修二俱賸語此是藥言無病人前不得説藥若説有句無句是外道説若説亦有亦無句非有非無句亦是外道説離四句絶百非此是藥言無病人前不得説藥若貪著塵勞侵損正法此是波旬説失于正受樂著諸受此亦是波旬説山崩海竭不動其心此是藥言無病人前不得説藥諸昆仲百非俱遣宛然赤子之心一道齊平突出摩醯之眼珍重上堂壽昌先師云踏上雲頭第一峯眼中廣博小虗空當初欲見無繇見今日相逢處處同諸昆仲此是曹洞宗旨分明向汝諸人道無纖毫蓋覆若向者裏會去洞山大師在汝諸人腳跟下放光動地入寶鏡三昧也其或未然博山不免注解一遍踏上雲頭第一峯坑坎嶮巇也須仔細眼中廣博小虗空眼在虗空裏虗空在眼裏試定當看當初欲見無繇見對面不相識千里却同風今日相逢處處同是何面目指東為西喚南作北得麼若向博山注解處會去壽昌先師在汝諸人腳跟下放光動地入寶鏡三昧也然雖如是博山不合將壽昌老人受用底家私撒向諸人腳跟下豈不見父為子隱子為父隱直在其中矣珍重壽日上堂僧問今日壽誕上堂敢問和尚年多少師云頻添花甲子數到劫雲初進云只如和尚未出世時一句又作麼生師云手中拂三十錢買來底進云謝師答話師云且道劫雲之前是何景象進云今朝不用重追究曾向湖南佛國來師云三十棒自領出去乃云從本無生誰曰有生無生緣生緣生無生達此生理不妨生生所以云生生謂之道萬古碧潭光皎皎四方八面絶遮攔曰聖曰凡俱不了慈明和尚云手鑠黃河乾腳踏須彌倒天堂并地獄皆繇心所造卓拄杖云若真獅子兒不向那邊討知非首座請上堂博山久不上堂諸人生出幾多妄想如渴鹿趂陽𦦨有甚了期何不向自己腳跟下薦取諸昆仲若欲向自己腳跟下薦取最先要看破依正二報四生六道悉從因緣生還從因緣滅釋迦老子四十九年橫説竪説總是緣生法豈不見報化非真佛亦無説法者汝等莫見博山恁麼道便向法身邊住著殊不知法身邊沾黏一絲毫不得若黏著纖毫便如猢猻著鎖不得自繇伶俐漢如香象渡河截流而過豈不俊哉茲因知非首座六十大誕設齋供衆仍請博山為大衆説法且道今日博山是因齋慶讚耶慰諸人妄想耶良久云靈芝和雨秀菡萏帶風香卓拄杖下座張二水相國請上堂首座問壁上高僧呼著即應今日相國臨筵當機如何指的師云鳥啼菴後竹進云恁麼則撩天索價非思議衣裏明珠覿面呈師云雲起面前山進云經綸妙手元非借推轉吾宗大法輪師云如天普蓋似地普擎僧問承聞和尚有言虗而靈寂而妙才思惟行不到請和尚行到一句布施大衆師云山濶猿長嘯進云謝和尚指示師云林踈鳥不驚僧禮拜師乃云若人欲知佛境界當淨其意如虗空遠離妄想及諸取令心所向皆無礙諸昆仲汝等即今本具底四大五蘊六根六塵六識及阿賴耶識念念生念念住念念異念念滅是礙耶非礙耶所以道會得如大火聚會不得亦如大火聚會得如大火聚高山無宿鳥會不得如大火聚深水有嘉魚博山恁麼道也是杓卜聽虗聲汝等諸人大須審細茲因相國張居士入山飯僧此居士位極人臣謙光導物靈苗智種天性帶來不忘靈山付囑殷勤懇請博山上堂當知居士一片婆心祇要諸人得箇入處諸人還知入處麼卓拄杖云山中光耀輝天地佇看堂堂宰相行桐城宰官居士請上堂諸昆仲參學須具參學眼若具參學眼腳踏實地步步登玄若不具參學眼與參學沒交涉譬如善射者立定腳跟然後拈弓架箭始能中的也黃蘗運禪師云老僧行腳時見草裏有人攔頭一錐彼人若知痛癢便布袋盛米供養他雪峯大師三登投子九上洞山炊飯挪巾成辦箇事此宗門中參學樣子也不似而今口稱行腳觀山玩水較量是非三三五五聚頭雜話有一等向册子上研窮枯骨上討汁有一等長連牀上睜眉努目胡思亂想想久成勞不是昏沉便是散亂如斯等類皆非法器諸昆仲洞房春暖須知錦帳香銷庭際光生且喜寒灰發焰事驚極致理喜從虗所以道只須揮劍若不揮劍漁父棲巢間時喜唱步虗詞泥雨須防苔蘚滑路憑高處險獅巖絶狐狸之蹤影向暗中消靈運結燈花之彩諸昆仲博山捨父逃走竛竮辛苦三十餘年今日到舒州城唱箇還鄉曲子徹見故鄉田地徹見故鄉人物徹見故鄉春色世間之樂百千萬億倍不足為喻茲因桐城衆宰官居士及諸山僧友請博山升座説法博山果有何法可説不免將生平所行底所見底所到底細詳一遍然雖如是道曠無涯逢人不盡更須知有長處始得卓拄杖云莫謂故鄉田地穩門前更有萬重山僧問此土聖凡同聚會向上宗乘為舉揚師答云此去南舒一百餘又問不問有言不問無言請和尚如何道師云巖前生石虎僧喝一聲師笑云聲響吼如雷僧無語師便打生生社上堂博山今日不説有法不説無法不説亦有亦無法不説非有非無法離四句絶百非石人點頭青山皺眉深寒博得三春暖破霧披雲入翠微下座皖城宰官居士請上堂天地與我同根萬物與我一體肇公祇知全身拶入要且不會轉位旋機殊不知説箇一體已成兩橛不見道喚作如如早是變易了也諸昆仲須知古佛堂前曾無異説夜明簾外別有家傳分明月照金沙喜見庭生瑞草家風笑展從他野渡無人寶樹風清須信白雲有主向者裏別有生涯可與古人把手其或未然博山有箇方便卓拄杖云急著眼薦展墓歸山上堂離山九十日誰是能離者本無心外境愚者妄分別諸昆仲會得此意雖經歷恆河沙世界無彼此之分無自他之想良以世人祇知有一生身及一生底父母一生身底處所殊不知曠大劫來能生所生底父母及一一生身底處所盡其智力不得其數量諸昆仲若以恩報恩大恩莫能報不見報恩者始乃得常住是故諸菩薩借此世間孝運無緣之慈興無礙之悲耳諸昆仲金棺扶襯認父骨於亂尸之中義井薦親見天人於寶塔之頂此等俱見超物表理出常情若以世間情想擬報深恩雖肝膽塗地不能報也昔興化令他人助哀山河揮淚迦葉藉琴聲起舞草木含悲博山今日以現前血肉身心供養現前無面目底父母汝等諸人向者裏還見得徹麼卓拄杖云他家自有通人愛不以親疏較短長便下座宮諭吳觀我居士請上堂真不掩偽曲不藏直大千沙界黑如漆揭開雲霧見青天男兒肯向他尋覓一語中具三玄新婦騎驢阿家牽一玄中具三要跛腳猢猻多擲跳有照有用沙盆打著連底凍立主立賓相將擕手過西秦惟有東村王太乙一番拈弄一番新上堂諸昆仲參禪要親到古人田地始得不然盡是掠虗漢果能與此道相應如人食蜜滿口皆甜如伽陀藥能療一切重病故如水晶珠能清一切濁水故如摩尼珠能隨方映色故如九轉丹能點鐵成金故諸昆仲明明秋色山頭敗葉成堆淡淡輕雲籬下黃花鬬景向者裏領會喫博山痛棒始有分在上堂日日五更雞朝朝三陳版不用別求玄分明正法眼諸昆仲因甚麼東勝神洲人行路西牛賀洲人著跌若向此會得好對座前吐露不然空遊山水虗延歲月大事暗然如何是了博山今日饒舌為汝旁通箇消息將祖師陳爛偈言注解一遍五臺山頂雲蒸飯佛殿街前狗尿天剎竿頭上煎䭔子三箇猢猻夜簸錢還會麼其或未然莫道為僧堪受供只恐粒米也難消上堂不是風動是甚麼動不是幡動是甚麼動仁者心動大小祖師龍頭蛇尾諸昆仲且道那箇是汝等動底心是緣慮心耶是本來心耶若是緣慮心緣慮無體動亦成虗若是本來心本來從古及今未常變易無諸動相若識得無動而動者迢嶺南相去甚遠若看不破此動底心相且喜六祖大師在汝等腳跟下共汝商量卓拄杖下座上堂有物先天地無形本寂寥能為萬象主不逐四時凋諸昆仲要知有物先天地向無形處會取要知無形本寂寥向有物處會取要知能為萬象主向眉毛上會取要知不逐四時凋向陰陽裏會取於此四句中會去一生參學事畢其或未然扇子𨁝跳上三十三天觸著帝釋鼻孔東海鯉魚打一棒雨似盆傾此時雲門大師在博山寺裏經行博山老人向雲門寺裏敷座若不互換藏身險些喪身失命卓拄杖下座寶方上堂第一義作麼生觀佛法二字不可黏著黏著則埋沒慧命入荒田不揀草猶較些子博山當日在佛法中頭出頭沒蒙先師親垂隻手提挈在淨白地上仍被淨白為礙不免將腳跟下一片地拋向他方不可説不可説世界之外然後向太虗空翻筋斗孤標獨立始得些子實用今日與諸昆仲相見譬如白日攫金諸人歷歷見博山博山總不見諸人還信得及麼諸昆仲若見明此事須在高高山頂立深深海底行撞破虗空始能捕空捉影也博山記得親先師猶驪龍頷下探珠猛虎喉中奪今日不免貴買賤賣去也諸昆仲還有估價者無良久云也不可當面錯過上元結制上堂諸方解制博山結制大似劃地為牢強生節目諸昆仲盡大地是箇蒲團喚甚麼作界外盡大地是箇禪堂喚甚麼作界內內外既泯一道齊平廓爾與雲水相依機動則纖塵不立雖然轉位不施功也與諸人應箇時節且道是甚麼時節年年十五夜燈光何處無首座問云請問和尚把住時如何師云放開一線座云放開時如何師云把住不容行座云如何是放行中把住師云闍黎看腳下座云如何是把住中放行師云拂子在我手裏座云大善知識也須讓人出得羅籠入得羅籠師云爭奈老僧何座云沖霄須彩鳳透網是金鱗師休去二月朔旦上堂才方結制又是半月了也諸昆仲分上曾有箇入處也無若無箇入處須要尋箇入處若得箇入處須要尋箇出處直須自看諸昆仲當知古路無塵只須知有門庭絶待盡却今時偏方與正位攸同枝派共靈源皎潔到此則髑髏識盡烈火流金始名出世更須知野老家風始得且道野老家風是何景象卓拄杖云遲日穿芳徑春鋤帶雨歸下座上堂僧問古人道從緣薦得相應疾就體消停得力遲請問和尚如何是從緣薦得師云古鏡不重磨進云如何是就體消停師云清光仍似舊進云從緣就體蒙師指格外玄談有也無師云三歲孩兒頭似雪進云恁麼則碧桃綻蕊緣柳萌芽也師云遠觀山有色近聽水無聲僧禮拜師乃云切忌從他覓迢迢與我踈洞山老人草鞋斷矣腳跟露矣諸人若知痛癢阿誰皮下無血博山與諸人同途不同轍諸人向正位中來博山不在正位諸人在博山拂子裏許諸人向偏位中來博山不在偏位拂子在諸人袈裟裏許所以道對面不相識千里却同風若向者裏徹去當下知歸不留朕兆其或未然千百世修行未為晚也故我釋迦大師為勇猛衆生成佛在一念頃為懈怠衆生得果滿僧祇劫諸昆仲當知明中有暗毫端現華藏之奇妙挾叶通寶鏡瀉山河之影博山恁麼道猶是葛藤諸人也須拌斷始得且道拌斷後作麼生行履卓拄杖云不因樵子徑爭到葛洪家結制上堂僧問古人道塵中能作主化外自來賓請問和尚如何是塵中主師云江西原是豫章城進云如何是化外賓師云青山自青山進云賓主相見時如何師云緑水欣緑水進云恁麼則金繩界畔飄黃葉般若堂前解垢衣一句作麼生道師云順數一籌進云博山今日結制人人鼻孔撩天請問更與諸人説箇甚麼師云空中施彩繪論劫不成顏僧禮拜師乃云便恁麼進堂去猶較些子更欲遲疑劍去久矣博山從來無佛法繫綴於人豈但博山乃至諸佛諸祖亦復如是但有言説都無實義所以道釋迦不達南方禪達磨不會西來意博山與諸人祇知二時逐隊但恁麼過時臨濟三玄三要誑嚇小兒曹洞兼帶叶通顢頇無識溈仰暗機圓合鬼面神頭雲門函蓋乾坤心粗膽大法眼雖云平易機險殺人博山總不恁麼今日與諸昆仲結制將九十日為一時以一時為九十日若向者裏會去萬年一念一念萬年生死情枯真如體寂二途俱泯觸處皆通茲有嘉興沈居士不辭數千里來此供養大衆且道作麼生説箇通底道理卓拄杖云根塵蘊界原無性誰道虗空礙眼睛上堂法華經云若人散亂心入於塔廟中一稱南無佛皆已成佛道諸昆仲當知散亂心者從緣有故緣生無性當體圓明當體寂滅縱有曠劫無明猶輕風捲於薄霧廓爾冰清所以道心月孤明光吞萬象非能所中道可安立也博山今日苦口告報也祇要諸人得現前真實受用且道作麼生是真受用處卓拄杖云一日三餐隨分足虗空無縫著間身珍重上堂心如工伎兒意如和伎者山河鏡中像色質虗幻有覺體本圓明非存諸過咎修與不修行愚者妄分別不恁麼會則易恁麼會則難蓮花未出水師子出窟時汝等諸人向甚麼處安身立命諸昆仲水底涵靈苗之秀空中具騰躍之威吸盡涔蹄掀翻大地且道是何景象咄上堂秋分夜長一刻冬至日增一線明暗相形寒暑相侵陰陽消而仍長天地虧而復盈惟有無位真人在汝等諸人面門出入曠大劫來未常變易會得不妨飲同時其或未然山挺挺而榮水泠泠而清眼明明而見耳歷歷而聞乃至日應萬緣無非者箇因甚當面諱却聻祇為分明極翻令所得遲上堂摶聚四大緣生九竅識蘊奔馳何日了虗空無眼水雲分石女從緣步荒草荒草披離四部洲煙雲旋合鎖重樓彈指豁開彌勒閣香水幡幢盡徹頭諸昆仲當此時洞庭無蓋凍殺法身廬阜悲酸清淚如雨欲償廬陵米價踏翻東兖橋梁從教雪潔氷清管取兒孫滿地到恁麼田地以何為驗卓拄杖云深山乘瑞運處處紫雲飛
