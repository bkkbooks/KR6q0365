body:
  text: 住博山法孫弘瀚彚編首座法孫弘裕同集住建州大仰寶林禪寺語錄結制上堂諸佛出世為一大事因緣幾幅素縑描不出博山出世亦為一大事因緣一條白練驀頭穿破顏老漢曾相委多少人天受熱瞞諸昆仲此事不從功行得不從修證得不從思維得不從禪定得饒你將自己身心煉得如枯木寒灰百年在定終如一箇死人於本分事中全無交涉所以道直饒到澄潭月影靜夜鐘聲隨扣擊以無虧觸波瀾而不散此猶是生死岸頭事諸昆仲直須向花柳街前逴得九衢春色芙蓉岸上帶來八面秋風始能應用無虧隨緣自在底日子諸昆仲還知博山今日底行履處麼良久云祇有一雙窮相手未曾輕揖等閒人上堂心不是佛智不是道知盡無知無知知要博山晝起暗眠算來恰恰却好對談無論是和非三寸舌頭胡亂掃有問禪夜深明月照窗前有問道無角泥牛臥荒草有問法南嶽石頭苔路滑有問僧眼中瞳子面前人更有當陽向上句分明說與君須記從來孝子諱爺名等閒拈出同兒戲諸昆仲博山今日拈出可謂不惜家珍也祇要諸人領略不然則辜負大眾去也復笑云不辜負賸栽無影樹留與後人看上堂佛法有因緣因緣非佛法彼此不相涉蓮華從口發昔釋迦大師托質閻浮降神兜率未受羯藍之孕便展無礙之鋒現世界而無邊化眾生而無量檢點將來要且不曾度著一箇既出母胎捨皇宮之快樂受雪嶺之饑寒覩明星而悟真常即塵勞而成佛事要且不曾悟著一法及乎開場四十九載談經三百餘會龍宮塞滿而法界全彰要且不曾談著一字逮末後拈花示眾便云有教外別傳說印心之玅偈付上行之金襴要且不曾傳著一絲及乎三千七百承虗接響人人拖泥帶水而棒喝交馳各各帶水拖泥而眉毛倒竪要且不曾沾著一滴今日博山遠承慈蔭雖是他家兒孫要且不行他故轍是佛亦剗域內不留朕兆是魔亦剗緣中豈涉塵勞是僧亦剗拂羅漢之我人是法亦剗出智眼之金屑當此法筵之際向蒼煙紫霧之中細觀豹變於流沙絕域之外捷見飛黃直下舉向上機徹頭示末後句諸昆仲既是直下喚甚麼作向上機既是徹頭因甚是末後句復笑云金背黃牛眠綠草銀蹄黑犬吠青天上堂心本是佛智本是道認奴作郎終成不肖東寺要索鎮海珠仰山傾出一栲栳釋迦彌勒為渠忙帶累博山渾落草不落草萬里山河明杲杲西湖水浸碧琉璃南海波斯無處討諸昆仲當此時也秋日微微秋菊離離秋雁南飛秋猿夜啼古所謂欲知佛法當觀時節因緣今時節至矣作麼生是本成佛底心以手約云看看傍觀者哂當局者迷參上堂諸昆仲須善巧彌勒布袋頭祇要今時了耍笑與謳歌愈聽聲愈好且如博山上堂大眾聽法畢竟承誰恩力稽首慈氏大師神通不同小小上堂昨日是重陽今朝不見九惟有破落僧面南看北斗懶烹石女茶酷愛曹山酒棒打石人頭不落瞿曇後諸昆仲通玄一脈智者知疎不動金鞭白牛逈野擬向溪東牧不免食他國王水草渾家不著孝撲碎玉琉璃擬向溪西牧不免食他國王水草罷拈金彈子大地沒閒人不如隨分納些些秋風多帶殺秋露逼人寒諸昆仲更須知人牛不見海湛空澄涓滴非聲千山不露恁麼時節轉位就機一句作麼生道堪笑陶彭澤無錢對菊花上堂雲居祐禪師云月色和雲白松聲帶露寒好箇真消息憑君仔細看諸昆仲此四句偈如啞子作通事分明舉似於人祇要披襟領荷博山今年到寶林寺恰恰應者箇時節不免註解一遍與大眾結箇出世大因緣也月色和雲白人居翠葢東更求親切句欵乃月明中松聲帶露寒冷落絕躋攀渾身赤骨歷坐破蘚苔斑好箇真消息全歸顧盼中夜深人盡曉清碧許誰同憑君仔細看當下骨毛寒携笻深嶂裏趺坐聽緡蠻諸昆仲且道博山註解還徹古人意否一聲鐵笛歸來晚笑展家風爛熳看上堂說一箇禪字好與三十棒杖頭有眼明如日說一箇法字好與三十棒優鉢無根滿樹花說一箇佛字好與三十棒分付老盧高著眼說一箇僧字好與三十棒莫教流落在天涯過得瀟湘渡口便知清白人家管甚煙雲埋沒從教黑豆生芽翻思昔日雲門老卸却鐵枷真箇好一棒打殺貴太平免使兒孫落荒草諸昆仲開眼說夢醒亦是迷白酒青鹽我乃是誰寒氷烈火痛下針錐今古幾多伶俐漢分明辜負一雙眉復笑云博山罪過上堂我有一句子當下絕羅籠遇險收雙足登山跨遠峯雲凝天欲曉雷震鳥潛蹤瑞草和根拔曇華徹蒂紅三玄稱絕唱九帶應奇逢淡淡澄江漢啾啾較蠛蠓不吐南山霧何妨八面風兔角情方瞥龜毛意轉濃拈香添社火擇菜挫來鋒石女頻加額木人幸斂容頗猒堆山富還期徹骨窮倒騎折足馬蹋碎玉屏風諸昆仲此句乃宗門以肯綮之談博山今日盡情吐露若要會此偈意從水晶宮裏穿下過來打破琉璃缾子然後向十字街頭與博山相見更有話在上堂諸法不自生高樓石女夜吹笙亦不從他生展似眉毛作麼生不共不無因青山隱隱碧稜層是故說無生漫江水浸石頭城幾多獵犬尋羊跡誰知一馬生三寅髫齔喜從城下看暮年不見白頭人黃菊落英秋又過不知誰會凭欄情識盡髑髏聽犬吠銷乾枯木喜龍吟諸昆仲更有三玄與三要鐵膽銅心無處討吸乾滄海露出珊瑚枝衝開碧落不顧無根草諸昆仲不許夜行投明須到上堂世尊拈花久晴雨也迦葉微笑久雨晴也航海西來衣線綻也斷臂詶心骨髓露也瘋顛求懺罪性空也倩人書偈本無物也南嶽磨磚牛非駕也馬祖一喝雄峯震也三日耳聾聰無敵也踢倒淨瓶世界傾也三遭痛棒杖開眼也卸却鐵枷脚脛斷也過水拶著渠是我也覩影大悟我非渠也迤邐行脚知親切也博山大似不肖兒孫簡點祖宗過失今日不免翻案做箇克家子將七珍八寶收拾在一處然後跨白牛而坐斷十虗乘清風而遊乎八極斫盡青松驚起千年白鶴高登碧嶂蹋翻幾片閒雲然雖如是更須知博山野牧樵情始到大安樂處不然直饒聖處受生未免竿頭險墮上堂栴檀叢林栴檀圍繞既披龍樹影不問鄧林材荊棘叢林荊棘圍繞鴻鵠雖有志安識海雲低荊棘叢林栴檀圍繞客來雖不待應物善知時栴檀叢林荊棘圍繞高樓聲漸細移月過滄洲古人指出此四種叢林敢問諸上座畢竟在那一種叢林安身立命博山曾一一穿過今與大眾開幾重關鎻要入之者不可儱侗善而擇之若說栴檀叢林穿過荊棘叢林幾點翠封堦下石數行鴈過楚天秋若說荊棘叢林穿過栴檀叢林不因樵子徑怎到葛洪家若說栴檀叢林不是荊棘叢林荊棘叢林不是栴檀叢林竹風與蕙蘭分香松影適雲煙異色若說栴檀叢林即是荊棘叢林荊棘叢林即是栴檀叢林水中擇乳須是鵞王敢問諸昆仲博山今日在那一種叢林良久云野老不知菴外事慇懃只向佛前燈便下座上堂達磨不虗傳二祖不虗受碧眼胡僧皺兩眉看來不著隨人後密究深裁全火祇候龍隱長空鷄鳴白晝諸昆仲當知魚遊陸地笑殺陝府鐵牛虎踞衝衢驚倒嘉州大象法界撮來一粒泰山只重三斤到此則罷扳雲樹懶聽風柯飲隨緣無循軌度有時在太陽門下而玄唱玄提有時在明月堂前而分斤分兩有時在芳草波心澡浴而手折青蓮有時在紫羅帳裏謳歌而鍼環玉線諸昆仲縱有歡客嘉賓向甚麼處與博山相見良久云前村煙浪裏犬吠有人家上堂博山門庭寬曠應接周流寶鏡高懸珠簾倒捲閒花野草翻性地之靈苗篆縷香雲示緣生之實相進得博山門則百千萬億門一時透徹玅叶該通重重無盡諸昆仲且道博山門如何進以手彈指云是處是彌勒無門無善財上堂春雨淋不去瓊花生碓嘴夏日曬不乾深陰淨如洗秋月頗相宜澄潭不見底冬雪凍法身飄颻千萬里四季共一年循環差可擬寒暑不同時彼此非相似恁麼也不得黃河水倒流不恁麼也不得虗空生兩耳恁麼不恁麼總不得燒火拾枯柴遊山觀止水恁麼也得買石得雲饒不恁麼也得移花兼蝶至恁麼不恁麼總得碧沼間紅蕖清風翻白羽諸昆仲以字不成八字不是是甚麼字以手畫一圓相云白牛放去無蹤跡空把山童贈鐵鞭上堂古鏡𤄃一丈世界濶一丈世界濶一丈火爐濶一丈火爐濶一丈法座濶一丈法座濶一丈髑髏濶一丈髑髏濶一丈眼睛濶一丈如何是古鏡隱顯幾微無欠賸如何是世界拈來擲去椰子大如何是火爐深撥寒灰有點無如何是法座坐談誰管天花墮如何是髑髏趙州東壁挂葫蘆如何是眼睛團圞光瑩若銅鈴諸昆仲今朝初一明日十五雪峯拋毬禾山打鼓大家齊賀太平年聾者聾兮瞽者瞽惟有窗前白兔兒帶角鑽歸三尺土咄下座上堂天不葢地不載逢貴買遇賤賣進前纔索商量漆桶依然不快諸昆仲須是全身拶入徹底翻開大唐國裏沒禪師沸鐵烊銅難下口今有一事問汝諸人水底石頭顛倒走雲中泥鴈往來飛者箇若是即頭上安頭如汝文殊更有文殊是文殊者者箇不是即斬頭求活如一月真其中更無是月非月目前無法意在目前見見之時見非是見見猶離見見不能及不是目前法非耳目之所到斫却月中桂清光影更多諸昆仲諸方將宗註教博山將教註宗還有優劣也無註則註矣破則破矣且道夾山意在甚麼處好鳥盡從林下過鳳凰不戀舊時巢上堂一法若有毗盧墮在凡夫富嫌千口少萬法若無普賢失其境界貧恨一身多泰山與華嶽爭衡少室共雄峯側耳腹藏四大海脚蹋須彌盧於金輪際下探不二之真源向香積界中摶無殊之法食此猶是門庭施設小不思議衲僧分中了無交涉諸昆仲須知法外無身心外無境智外無土空外無塵纖芥方投千門洞達一塵纔起大地全收結菴摩羅菓於不思議之鄉植栴檀陀林於無陰陽之地且道古今阿誰得恁麼受用惟有傅大士較些子君不見山海坦然平敲氷來煑茶惜乎此老早矣未曾得見博山若見博山好與痛棒還是賞伊罰伊要渠識痛癢始得諸昆仲此事不要與列位公子得知若知時將謂佛法容易也然雖如是且道那箇皮下無血珍重上堂居一切時不起妄念月中丹桂和根拔海底泥牛驀鼻穿於諸妄心亦不息滅紅塵堆裏排班立白浪灘頭撒手行住妄想境不加了知臘月火燒無影樹三春人唱採樵歌於無了知不辯真實須彌頂上花冠子非是人工蘊造來諸昆仲博山有不思議底爐鞴將佛祖言教煉成一箇鐵橛子鍼劄不入水灑不濕若喚作教却又是禪若喚作禪却又是教直饒於禪教中分別不生更須知禪教向上有事在且道作麼生是向上事玄都觀裏桃千樹盡是劉郎去後栽住福州鼓山湧泉禪寺語錄開堂拈香白椎竟師曰昔日世尊在靈山會上拈花示眾尚餘一枝在博山手裏今日于湧泉堂上供養大眾去也古德云昨日作嬰孩今朝年已老未明三八九難蹋古皇道恁麼說話披心瀝膽徹底婆心且道作麼生說箇三八九底道理卓拄杖云黃河水溢黃河水雲霧山連雲霧山珍重結制上堂三百年前諸尊宿在此一片地上東語西話三百年後博山在此一片地上東語西話雖則依模畵樣大似捕空捉影劈水尋蹤簡點將來不無滲漏雖然如是彼一時也此一時也諸昆仲若知得彼時即此時不見有三百年前此時即彼時不見有三百年後所以道一念普觀無量劫無去無來亦無住此猶是教家事更須知有宗門下長處始得且道如何是宗門下長處卓拄杖云朔雲凜烈吹開寒谷之花石火輝煌拍破木人之掌珍重上堂春日乍寒乍暖春風倐有倐無若從者裏會去佛法天地懸殊不從者裏會去向甚麼處會纔涉思惟成羣作隊不思惟處意如何行人更在青山外今日博山親歷其境有一首偈分明舉似大眾偈曰三脚驢子弄蹄行蹋破蒼苔知幾層正恁麼時誰會意白雲深處坐禪僧卓拄杖云咦誰是其人珍重上堂舉拂子云有物先天地無形本寂寥能為萬象主不逐四時凋古人恁麼道獨步全提至微至著超規越矩方圓可成先賢朱晦翁甞以此偈示門人曰吾儒無此等語晦翁可謂知言也諸人還知麼月渚風林流出現成公案鶯聲鳥語宣揚不二法門雲中之木馬長嘶山外之泥牛倒走毋居正位不犯當頭坐斷十方不通凡聖然雖如是更須知有向上一縫子始得且道如何是向上一縫子良久云口是禍門上堂天地旋山河走面南辰看北斗家鄉田地謾商量肉髻明珠誰不有諸昆仲論肉髻之明珠貴在親知論家鄉之田地貴在親到親知則取之不竭用之無窮親到則春耕秋穫布種以時果得如是受用譬如擲劒揮空毋論及與不及此等說話大似嚼飯餧嬰兒諸人分上因甚麼不薦卓拄杖云只為分明極翻令所得遲上堂黑狗爛銀蹄白日通霄吠石女倒拈針木人相對語諸昆仲於此四句上透得過四方八面來虗空連架打所以道一雙孤雁貼地高飛兩箇鴛鴦池邊獨立可謂明珠在握寶鏡當臺胡漢俱來隱諱不得諸昆仲團大千於掌上擲化土於他方探香水於金輪果能如是也儘奇特但切不得動著動著則打折汝等驢腰卓拄杖下座上堂卓拄杖云轉山河歸自己月明當戶炤轉自己歸山河風冷猒山居撞鐘撞著老僧心祥雲從地起鐘聲為甚麼披七條衣寶葢自天垂總不恁麼道又作麼生不是家鄉客徒勞話歲寒此五種見地雖則賞罰分明也要諸人委悉有一人在蘊界屏處說非法語犯十三僧伽婆尸沙有一人在淨白地上涕唾犯一百應當學有一人撥草瞻風攙行奪市有一人露盤卓犖解作家方有一人針劄不見血火燒不知痛病在膏肓不堪療治若有人於此簡點得出博山分付拄杖子一任天下橫行其或未然卓拄杖云楖𣗖橫擔不顧人直入千峯萬峯去
