body:
  text: 住博山法孫弘瀚彚編首座法孫弘裕同集書三復邢梅陽孝廉貧衲方息慈時即聞令先師居京邸說法服膺豪傑摧折慢幢如雷如霆可喜可懼因侍受業師南詢不遑親聆教益迄今渴慕之懷歷歷猶在庚申冬接翰教始知居士入令先師籌室味無上法乳棄夢幻功名自非深有所得安得如此行履今獲居士長篇高論歡喜無量實以慰未見令先師之夙心也復承來諭謂時當叔季大法平沉魔外說法不啻河沙讀之至此則撫几長嘆足見居士一片大慈悲心腸雖未面晤可曰神交況古稀之年乾乾若是使懶惰比丘不無慚愧矣貧衲久廢簡編承居士殷勤致問不敢不竭思以詶來意一問狗子佛性之語似不可以識量卜度又不可在有無上作活計貴在真參實究果然當下絕親疎如風捲塵不留朕跡若在有無上捉摸何啻捫空論太陽遠近耶有角無鬚二種語翻趙州兩重公案思之可見非泛論也二問謂妙明體盡正墮頑空此是居士錯會綱宗之旨不但見錯兼義亦謬解文中云妙明體盡謂理極情忘力在逢緣有轉身活句況知傷觸不借中自非知有不知有者如寐語相似安能識其來源也此正是曹洞血脉如靈珠在握又如瘂子喫蜜心口俱甜不能向人吐露若以頑空釋正所謂黑白相反也與劉胤平太史二吾宗乘寥寥不易得人幸昆玉趨向斯道如饑如渴余實愛之但不卜別後於參究分中有進益否世諦境緣得解脫否財色名實不動心否果不動心則有解脫果解脫則近道矣頃在建寧閱殿試錄始知居士臚傳第一此從三寶中乘願力來藉世間之高名廣法門之善行諒居士先已勘破浮塵境象必不以此介意惟己分上一著子不可須臾放下一時不在則錯過了一時大理不明肯隨境緣中搬弄做箇癡呆底漢子耶然參究一念子須要福緣助發譬如苗稼發生若無水土雨露則不能成就居士已深知貴在力行凡作福田惟三寶中最勝故不可以諸善門為比近時有一等人祇云行善不必耑於佛門當知此人無菩提種子教中不發菩提心行諸善事是謂魔業居士不可不料揀當以三寶為正世間善助之可矣居士魁天下不必以賀他日心空及第余則合掌賀之耳途次脩阻會晤難期用此切囑佛祖之道貴在得人如彌勒菴與諸昆仲初會時祇欲居士深生信解世諦有為之法非山野所望今科名巍赫係因緣和合偶爾成褫亦乃夙世靈苗之所發生當思之未兆之先所謂寤寐勤劬思報佛恩切不可自生怯弱孰為有力孰為無力孰為大根弘願孰為淺根劣器居塵出塵全身擔荷者捨居士其誰歟又當念生死事大無常老病不與人期失之剎那悔之永劫參究一念不可須臾忘却禪警語作箇䇿身符子遠離諸過以期大悟凡在佛門一切善事盡其力量皆可為助道因緣若半遮半掩即同流俗非佛門弟子博山有一頌不免舉似居士若向此頌子上徹去不須動步與山野大咲一場可謂老胡今日有望也頌曰博山事香燈居士援毫管千里審跬步兩人缺一半惟有過量漢不被時辰轉果知分寸長却笑丈尺短楚水吳山霧一團森然雲樹謾勞攢梅花無意枝頭放爛熳枝頭的傳後二句是山野昔所和偈語居士高發時不知曾記之否敬以點破可發千載一笑與阮澹宇郡伯三缾錫任緣本非處所萍蹤鳥跡致使見者易而定者難耳居士權衡在手漩澓自由現宰官身行菩薩行當以公堂為丘壑城市作山林起同體大悲不見有心外之境可矣倘於簿案下錯過日用事祗恐拄杖子笑人忙耳辱錫報章明晨當跏趺清几以竢晤言拙偈奉復希郢政之杖頭凜凜沐清風漩澓都歸掌握中千里不離跬步下謾將傾瀉較缾空昨於緣幻場中與居士論及佛乘俱無詮次即同體大悲亦是未了底公案吾人果於日用知同體大悲則步步蹋著實地非心外之境耳古德云樵子負薪歸機婦連宵織管他家事忙且道承誰力知恩報恩只此一偈不知居士折旋俯仰曾薦之否果薦得則山頭之白雪清冷凍殺法身脚跟之流水潺湲侵損漁父駢闐車馬鱗躍子民不須格外詶機最喜塵中見佛狂歌醉舞誇本具之神通淨几明窻樂現前之三昧不礙恒居火宅何妨倒誇白牛弄窮子珠奪饑人食剖微塵卷閱大千經世間之樂事百千萬倍不足為比也貧衲以此詶居士枉駕之勞惟同體大悲訂今晚向華嚴寺中以償斯債希示的音其或未然明早則遠征之念已動接浙之行也滄海一滴也世界一塵也貧衲近在石頭城大作一場佛事究竟如幻大居士還見聞也無若見聞者作座生是親切一句試拈出似貧衲使參禪作見聞種子也頃接翰教謂投芥未合良以宗門中事自非親到古人田地所有議論悉夢寐中語閱九帶敘煥然出奇所謂三止三觀乃至無上無向無一無著而一非無者斯即向上著此論至精至極無人能到但以貧衲觀之祇是教中底蘊亦是教中向上似非宗門中向上語吾祖師門下貴在轉位旋機底一條活路居士肯向著衣喫飯處輕輕覰破大笑一場始瞥地耳然大章不妨流通與天下人作點眼藥非文字也慧命中實受用也貧衲意謂宗門中長處只欲居士親到耳詩酒二事故乃陶情然詩能勞思酒乃傷脾台下高年幸清損之慰所懷也與徐六岳元勛貧衲髫年遊金陵屈指四十載登岸恍如夢中閣下格外深慈作法門檀護使見者聞者生希有想域中第一長者發此樂善之心感人人種下成佛作祖根本悉大居士導引慈力風行草偃之德化也常不輕菩薩見捶打罵詈皆曰我不敢輕於汝等汝等皆當作佛況至誠禮拜讚歎者乎以此則知凡動善之地皆為助道緣譬主人有良田佃與人者田之莠即我之莠田之熟即我之熟其導引功德思之可見也江山曠如肅此裁謝與王維新郡伯貧衲不憚番易八百長江千里為法求人雖則托鉢空回惟與大居士夙緣深重而殷勤護念過於骨肉葢以法為親非世諦比也向蒙問及楞嚴深旨若窮其始終雖釋迦老人雲興瓶瀉亦吐露不出況其他乎若云清淨本然云何復生諸念此就眾生界中未達清等四字而言果知得清淨本然山河大地向甚麼處得來緣生諸念從識熏起識如夢幻但是一心斯即從凡入聖又不當以覺復生迷為難惟吾祖師門下一句話頭全身入理徹處如紅爐烈𦦨乾柴濕草無不燒盡還源如人到家決不被諸岐為障貧衲以此期大居士斯為出世正緣似不可別生疑慮耳與俞容自勛卿蒙問及曹洞宗旨此之一學最妙最玄拈穴細金針穿芒長玉線彩空中色相織劫外花紋若非家裏人竟不識家裏事非功力能到非智識能知惟沒巴鼻道人始全身擔荷辯荎草之味似不難耳想居士天資近道當深留意莫錯過此一段大事因緣此生不打徹他時後日定悔恨在莫言貧衲不為居士說破決欲發明此事不妨以眾善助之譬如雨露滋嘉苗也與余未也昆季昆玉深入法趣生此善家此非小緣皆多生願力得以法為親也貴在心如境如心如者無心外之境境如者無境外之心處世界如虗空似蓮花不著水始可云居塵出塵即事離事不然與世諦中人則無二也不識昆玉曾與此相應否此事要在境緣上驗若安閒無事謂不見有世法營心者即名自欺不可不審察真偽稍遇境緣則有念起不得將心遏心只提起本參話頭自然氷消瓦解不費纖毫力耳假如大有省發不可便謂之悟門吾法中以悟為不悟無過惟不悟而稱悟者大妄語成昆玉已深知之似不待貧衲贅語也悟不稱悟決不再迷不悟稱悟決然退墮昆玉可將高峯語錄大慧回書細讀之可見耳復方士雄太學道學淵䆳而祕參究者吾于居士見之也客歲同舟入皖得遂揮麈清談知見無不與聖賢脗合但向上一路非功力到安能有絕後再甦底日子趙州三十年不雜用心果得不雜用心於閙市叢中打成一片一切世間貪嗔情愛針劄不入始是大丈夫行徑也來諭云深自警䇿不敢自誑亦不敢自屈此三句甚愜鄙懷果如此用心切切提起本參話頭決到古人田地縱未得大悟門即此便是成佛作祖底基本譬如種穀耕之耘之安得不成熟收獲居士深自諦信不加疑惑忽日磕著撞著始知飯是米做更不向外馳求耳世緣濃淡夢幻漚花居士已知諒不蹈此籠檻也海門先生證學錄說道理不沾著纖毫第不曾與真善知識話會然于生死分中亦得其受用力量淺深又不可槩與悟門論也錄序一章極力贊揚居士細研之倘可存存之不然希燼之耳復居士博山近日漸覺衰殘疲于津梁凡諸方寄書問道者任浮沉之意不以一字詶復也接居士書讀之其中真實操履于境緣中較量曾不欺心不答有負來意所諭向朱晦翁教中體認天埋只饒到正心誠意處凡所作為一一合乎中道祇做得世間君子非出世間法也何以故皆六識之心故復看父母未生前第不曾見徹本來面目在影響中生安隱想今時假善知識例皆如是如居士在病中覺察猶是善根深重者有一等人熱病退後又當作尋常活佛出世亦不能救果真實參究提一句話頭孜孜不捨縱不能悟管取現業貼貼地倘然打破疑團親到古人田地亦不必向境緣中較量如夢中作得主與白日不差纖毫更向不醒不做夢時主人公在甚麼處者裏打徹可與高峯大師把手同行更不向人問如何若何也復沈得一居士前於稠人中與居士一面知留神於法門而未及深談不能盡其來意為耿貧衲甞謂舉業不礙於參究然居塵出塵即事離事要有大力量者始能擔荷貴在切上加箇切字如失重寶必欲獲之豈但讀書乃至一切事緣中放亦不下趂亦不去何以故此一念子重故趙清獻公青衿時即參究至于做官聞雷聲豁然大悟豈非平日切意於斯道者得有此時節因緣耶來諭謂遐思現養不能輟其念愚謂以世緣報恩者雖肝膽塗地不能報其萬一惟釋迦大師看破恩愛出世後為父母說法使父母頓超三界故稱大孝聖人居士發一念真實信向決欲明衣線下一件大事豈但一生父母即百劫千生能生所生底父母悉受其法利以世間之孝較之何啻天壤更當勸令尊堂一心念佛消多生罪累作現世津梁則居士之孝世出世法兩得之矣冗中草草肅此裁復餘容緣晤不既與頑石禪人余出家來初歷講肆便知有此事因求出世心愈切于經教中非不留意知在識見中用事如經云以知解心入佛境界如將螢火燒須彌山終不能著又云如日當空照童稚閉其目自言何不覩多聞亦如是故知知解愈多非但不悟道且為障道緣也因拂袖別參初脩空觀五年雖則塵緣淨盡于入理實未得力後于船子公案上又六年始瞥然也總不似賢弟寂而常照照而常寂謂之工夫欲將此心用心非但一生窮劫至劫似不能了何以故以能寂能照之心為根本故又以此心念慮不起為本體獨露豈待少時只饒從生至老總不起念此念之根曾瞥然否若果無根性于境緣上自不別生心觸目遇緣如木石相似于本體上亦沒交涉也況在念佛作觀之間邪不知賢弟將何為本體又將何為獨露若以念慮不起時為本體自是念慮不起非本體也若以常寂為本體即是常寂非本體也若日用行事為獨露正所謂業識茫茫非獨露也若將常照為獨露自是常照非獨露也如賢弟本意恐在教上揣摩即在八識田中認作本體故曰朧朧如在燈影裏行此是實供非妄語也去歲予與賢弟坐松陰聞鳥聲堂上論現量取境如一一明了祇是教家事與宗門中悟入大似隔靴抓癢也三喚侍者非容易會去若作容易會國師彼時只消呌一聲便好云將謂吾辜負汝却是汝辜負吾何必三呼三應然後乃耳須知別有深深意豈是檀郎認得聲便作悟門也舊時行履姑置之勿論果到不疑之地當時便得實用又何待病後為然睡夢不得自由此又據欵結案大可笑耳復云岑大蟲示人太孤渠往往見人陷此塗轍非是遏捺學者故爾為之乎當知岑師如吹毛利劒擬其鋒者即喪身失命可謂婆心太切也佛云真非真恐迷豈但掀翻識情窠臼即真之一字亦不知寘之何地況以外書平旦之氣似之乎大似夢中說夢又可發千載一笑耳大珠和尚問馬祖祖曰即此便是大珠故為有力者負之而趨恐亦未知日用行履若向者裏認其太賖不但未會大珠恐亦未見馬祖也又云識者知是佛性不識認作精魂折中且寘賢弟還識也未只須日用中是佛也須吐却興化云老僧未曾向紫羅帳裏撒真珠與汝諸人胡喝亂喝作麼如不向紫羅帳裏穿下過來未免有紅紫之誚非宗門得力之句也又用心曰無事時不怕不明白惟防念慮起時若知一念緣起無生即化了此是將緣起無生化念慮宗門中還容得此等說話麼三十棒教誰喫又云應物時不怕念慮起只怕不明白明白時即有念慮有現照此又以明白治念慮宗門中還容得此等說話麼三十棒教誰喫又云本體本具照而寂也宗門中還容得此等說話麼三十棒教誰喫此即是教家老婆舌頭非悟門也又云不必工夫又云如是保任又云勿忘勿助種種皆顛倒度量之心非參究也即前為賢弟說只是似不是真即此似字亦權巧也安慰也如果似不待此體會動著便脫捺著便轉不必引經引教轉引轉遠不相應何也葢為從來不曾參究悉以知解心印定正所謂認奴作郎認賊為子也古德云三世諸佛不知有狸奴白牯却知有僧問九峯云如何是頭曰只須知有進云如何是尾曰盡却今時其知有二字豈是揣摩識情以日用為知有耶予曾拈云三世諸佛不知有掬明月於無影樹頭狸奴白牯却知有剪白雲於不應山谷誰能知此意除是長嘯者與賢弟知有是同是別又云宗門中一切奇恠言句無非要人知此事只此見賢弟悟處若作恁麼知解宗門掃地而盡知有二字何曾夢見者乎只此知有賢弟便可用心直要徹見古人幽隱深奧所以云若要知此事直須高高山頂立深深海底行向威音那畔翻身十字街頭打睡更須白汗交流喫痛棒始得不然則照而寂寂而照終日保任終日不起念無事於心無心於事體悉此意未為良證也與善來禪人迢三千里因循十二時支那都走遍可惜脚跟皮汝纔入門時便識汝了也東走西撞圖箇甚麼若是皮下有血底漢子自當擇一本分宗師三二十年搬柴運水墾土掘地未為分外今時有一等假知識魔魅人家男女開口便云有甚麼禪可參有甚麼工夫可做直下承當蚤是遲了八刻由此謂之俊捷謂之英靈謂之天然謂之超於本分上既不用心將者些業識銷磨不去噇了施主飯學詩學字學頌古學開示只饒學得口頭便利詩過李杜字壓鍾王頌古如雲興開示如瓶瀉祇喚作業識茫茫縱謊得人信向禮拜供養祇裝束得一箇皮袋子一朝敗壞時手忙脚亂閻王老子放他不過鑊湯罏炭劍樹刀山百劫千生未有了底日子出得頭來知是幾多劫數以清淨眼觀此等假知識如廁中蟲如淨地上荊棘如清風裏臭鵶又喚作無慚媿人無廉耻人汝還知麼汝還辯得麼若具參學眼向者裏辯得真偽便好于衲衣下抖擻幾根肋巴骨四大子假合便鼓兩片皮能講能言一口氣不來向甚麼處去莫承當箇事便休去莫將經書上印證去莫隨善惡業牽將去莫將盡十方世界都盧是箇自己本無來去若如此見解將來飲烊銅吞熱鐵管取有分在既不如此又作麼生得的當一口氣不來畢竟向甚麼處去如坐在銀山鐵壁之中祇求迸開還容得第二念起麼還容得思惟分別麼到恁麼田地只須㘞地一聲向威音那畔又那畔翻箇筋斗來始可向博山者裏喫痛棒不然且就千巖萬壑之中打野榸消日子總不干老僧事偈曰學道如牛毛發明如兔角人人喜平易那肯窺山嶽積翠與重巖終是難描邈名言并奇句情想亂穿鑿撞著黑面老未免遭貶剝有志丈夫兒趂時須早覺打破生死關始可稱絕學
