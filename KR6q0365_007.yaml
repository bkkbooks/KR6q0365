body:
  text: 住博山法孫弘瀚彚編首座法孫弘裕同集住金陵天界禪寺語録金剛殿拈香三門高聳臨霄漢廓爾方知祖道玄今日腳跟親踏著優曇花影遍三千天王殿拈香從來願力展慈威爍破虗空毫相輝依正報中誰辨得山頭多見紫雲飛大雄殿拈香黃金殿上三尊佛白玉光中一箇僧正恁麼時何所據香雲旋結萬千層振宗堂據坐寶鏡當臺驗正邪阿誰獨蹈大方家博山手段從來辣客到蒿湯便當茶開堂此一瓣香彌天亘地耀古輝今太極鍾祥乾元衍慶爇向爐中端為供養我明太祖高皇帝成祖文皇帝建立三寶弘通大乘廣化衆生同圓聖智山僧某今日在此法莚一言一句皆從聖恩中流出以海水為墨書其贊辭不能盡其萬一也伏願皇極御天遍大千而廣被聖靈奕世昭萬古以常明此一瓣香靈苗含潤寶樹敷榮景星聚以沐清庥祥雲凝而乘嘉運爇向爐中端為祝延當今皇帝聖壽萬安皇后偕聖壽以無疆太子懋元良而永泰伏願金輪永鎮日新鷲嶺之風寶位增輝時邁唐虞之治此一瓣香萬物育以生成陰陽協而秀發為霖現瑞裕國祐民爇向爐中用酬檀護滿朝合郡宰官護法大居士福基祿位咸增性種靈根並茂此一瓣香龍宮湧出鷲嶺拈來輝寶鏡而利益羣生徹重玄而全該正命爇向爐中專申供養先本師壽昌大和尚用酬法乳之恩斂衣就座白椎竟師乃卓拄杖云諸昆仲達磨大師航海而來直指人心見性成佛雖則門庭萬仞壁立千層祇演一心之法更無餘事乃至六祖傳衣五宗競出運無礙輪化無緣衆祇演一心之法更無餘事溈山大師敲唱同時暗機圓合傾瓶以辨超方撼茶而彰妙用祇演一心之法更無餘事雲門大師箭鋒相拄函蓋乾坤揚眉落臼顧盼猶遲如流雲翔鶴湛水晴空祇演一心之法更無餘事法眼大師拈現前石塞虗空口一切處現成六根互用六用齊施祇演一心之法更無餘事臨濟大師一語中具三玄一玄中具三要驅耕夫牛奪飢人食電光石火開眼猶迷祇演一心之法更無餘事洞山大師混不得類不齊立寶鏡三昧照學者肺肝分五湖玉石雪盛銀碗月照金沙祇演一心之法更無餘事乃至博山今日遠承諸祖慈蔭循規蹈矩借路還家駕輕就熟祇演一心之法更無餘事諸昆仲含靈具此一心之法學人欲明此一心之法三世諸佛歷代祖師示此一心之法故楞伽經云佛語心為宗無門為法門諸昆仲大地沒遮攔要行行不去要住住不得且道向甚麼處出氣還知麼鳥鳴雲樹聲聲喚遊子歸家魚躍煙波色色翻志公陳案漩澓空中梵字刮開眼底重且道向甚麼處認取自家心地卓拄杖云鼻根浮面上更不用躊蹰珍重當晚小參南嶽大師云一切萬法皆從心生心無所生法無能住若達心地所作無礙諸昆仲心無所生山河大地從甚麼處得來法無能住終日著衣喫飯因甚麼只認定著箇自己去此二途作麼生折合諸人分上也須自看有人通得消息博山將袈裟以覆之魏國徐六翁居士誕日請上堂因緣所生法莊嚴世間相了彼性空者斯人具正眼諸昆仲心本無生從緣有生生緣勝故佛種亦勝法華經云佛種從緣起是故説一乘作麼生是説一乘底道理諸昆仲毫端斂法界之方滴水含滄海之濶無明全諸佛之智藏識潛增上之緣理應箭鋒事存函蓋不可以思議而得之者也諸昆仲茲因魏國六翁老居士華筵大誕之辰合郡衆居士於濟生菴中設此無遮大會為六翁居士祝壽且道將何為祝耶須彌耶滄海耶大地耶草木叢林耶若以須彌為壽須彌高而有頂若以滄海為壽滄海深而有源若以大地為壽大地厚而有輪若以草木叢林為壽草木叢林多而有盡惟以吾大圓覺中華藏界內香雲花雲幢幡雲音樂雲寶蓋雲若舉一若舉二若舉百若舉千乃至百千萬億數中隨拈一微塵許皆與有情無情等與毗盧遮那等皆可為居士祝壽也雖然如是不免為居士傍通箇消息作麼是傍通底消息華藏界中才一念閻浮早已萬千年珍重僧問如何是無量壽師云烏龍潭上浪滔天進云恁麼則有量也師云天池一滴水怎與衆同流茹居士問向上一著如何道師云石頭城外垂楊柳進云者是衆生眼如何是和尚眼師云吹盡殘花色愈鮮進云某甲參學二十年今日學得一拜師云三十棒且待別時皖上吳盛二居士就濟生菴請上堂博山三年前回桑梓為桑梓諸親友演箇還鄉曲子衆中有聞名者聽音聲者見形影者摩皮膚者契心髓者復有進其門升其堂入其室者倐忽三載若剎那際今衆居士復以幣帛見召博山雖在他方千萬里外其實寸步未曾離故鄉田地諸昆仲龍眠靄靄紫金足下雲生浮渡滔滔鍾阜山中水溢析毫端而含剎土懸慧鏡以辨方來志公剪尺尚存投子油瓶現在然雖如是也要衆居士見其面孔聽其法句始得且道是何法句卓拄杖云諦聽諦聽余集生任文升二居士請上堂道不屬知不屬不知知是妄覺不知是無記只饒坐斷兩頭更須知有向上事始得諸昆仲若論向上事諸人分上一一天真一一靈明一一具足上至諸佛下至含靈各各不欠缺纖毫是以余集生任文升二居士同合郡大居士向者裏設無上妙供運同體大悲救砧几衆生解籠檻囚縶飛者適霄漢走者縱山林潛者躍深淵以無功之功無行之行於無衆生界中解脫鏡像有情諸昆仲青山挺秀流鶯囀樹裏之聲緑水瀰漫躍鯉現波中之色昧真常於山水迷現量於飛潛大似陽𦦨翻波渾成戲論諸昆仲還識得麼若能返照直下逢渠舉措施為無虧實相卓拄杖下座上堂洞山大師悟道偈云切忌從他覓迢迢與我疏我今獨自往處處得逢渠渠今正是我我今不是渠若能如是會方得契如如此是洞山宗旨綿密回互皆從此偈中流出不可不理會諸昆仲此偈中有二句最嚴渠今正是我我今不是渠渠者何物也而正是我我者復何物也而不是渠且道是一箇是兩箇若向者裏會去始可有參學分須知此偈豈但曹洞宗旨即五家應機接物皆當向此句中印過始得不然在一機一境上得些子解路盡是掠虗頭漢有甚麼話會處所以曹洞有三種滲漏一者見滲漏機不離位墮在毒海此不離即毒海也二者情滲漏情存向背見處偏枯此向背即偏枯也三者語滲漏體妙失宗機昧終始此體妙即機昧也若據此三種滲漏學者明晦如見肺肝所以博山舉眼無人非敢以生滅勘驗諸方若見徹此偈洞山大師未曾入滅博山雖在今時亦不諳今時事祇與諸人二時逐隊諸昆仲古木叢中躑躅漏逗法身大洋海底翻騰侵損漁父徹見本來面目野雲散而天青掀開煩熱胸襟衣線綻而體露還有與洞山大師共出一隻手者麼卓拄杖云舉頭天外看誰似我般人僧問如何是和尚底具眼處師云善世橋邊逢聖主進云未是和尚具眼處師云三十棒趂出僧一喝師云者一喝落在甚處僧無語師直打出法堂上堂如何是佛十方世界最靈物如何是法古路迢迢苔蘚滑仍將佛法問根源雲散長空鶴唳天纖塵不立清如洗三箇猢猻夜簸錢諸昆仲宗門中事豈同容易一言一句一大藏教注不破歷代祖師機深智廣潛興密運須彌倒卓拄杖橫趨繪彩色於空中擲大千於方外且道向甚麼處捫摸所以云羅籠不肯住呼喚不回頭古聖不安排至今無處所玄沙大師恁麼老婆心切也只要諸人知箇落處始得諸昆仲青黯黯處樵子不借路以還家綿密密時機婦罷金針而夜織香銷錦帳露浥芙蓉發清嘯於深閨吐微言於連枕情濃意洽試問諸昆仲還知得也無良久云分明一段風流事不與諸人較短長上堂南陽忠國師云青蘿夤緣直上寒松之頂白雲淡濘出沒太虗之中萬法本間而人自閙諸昆仲作麼生説箇本間底法若會得本間法則大千世界有情無情等無纖毫閙相若有纖毫閙相者則不得本間法也何以故閙即法故所以道靜則埋根千尺動則當處生苗只饒不動不靜未免飄飄搖搖博山則不然動則寒氷凝結靜則白浪滔天直下了無動靜紅爐片雪如綿若於此二偈中會去始明得本間法也諸昆仲動非動相雖動極以恆安靜復靜元總靜機而常運秉常運之樞機履恆安之玄軌寶鏡懸而無隱慝珠簾捲以納方來不涉呼吸之離微寧有去來之蹤迹諸昆仲順則吉也逆則忤也肯則自許也若於靜閙親疏而較其優劣者盡其恆沙思量分別莫能得其量也卓拄杖下座上堂僧問古德撥塵見佛時如何直須揮劒若不揮劍漁父棲巢又僧問古德撥塵見佛時如何渠無國土何處逢渠二大老各道得一邊一箇則門庭施設輝煌掌上之珠一箇則入理深談擊碎秦時之鏡若是博山則不然有問撥塵見佛時如何紺髮旋螺髻兜綿印手文學人不會意旨如何青蓮捧雙足赤肉挂金襴且道與古人是同是別若説是同作麼生説箇同底道理若説是別作麼生説箇別底道理若向者裏融會得去博山與汝結箇同參諸昆仲居正而不立正位泥牛吼海岸之風垂偏而不住偏方石女弄珊瑚之影乞食於三家村裏謳歌於萬仞峯頭借松鏡以瀉清光拾苔錢而嚴富態有人向三種問答上徹去洞上宗風於斯有賴矣僧問學人一口氣不來向何處安身立命師云毗盧閣後鳳凰山真州海吉禪人率衆道侶請上堂不與萬法為侶者是甚麼人紅塵堆裏露全身了知萬象空無物那見山河礙眼睛三歲孩兒頭似雪神光萬里一條鐵底事分明説與知當戶連山也太奇兼帶位中親迸出巖前石虎夜生兒生兒則且置且道是甚麼時子丑寅卯辰巳午未申酉戌亥乾三連坤六斷離中虗坎中滿屈指顛倒數來依舊寸長尺短珍重余集生居士誕日請上堂佛於無量劫廣行無量行度脫無量衆是名無量壽諸昆仲我等同世尊因地以來至於今日而世尊成道已經無量恆沙劫數我等輪回生死六道往還亦經無量恆沙劫數世界成住壞空亦經無量恆沙劫數毗嵐風起金藏雲成而虗空之性湛然不動亦經無量恆沙劫數以此則知諸佛壽命亦無量衆生壽命亦無量世界壽命亦無量虗空壽命亦無量今日集生余居士華筵大誕而一切人皆以世禮年月為居士壽博山則不然但願居士壽同善財菩提心解脫海亦無量願居士壽同彌勒成佛度生海亦無量願居士壽同普賢行願莊嚴海亦無量願居士壽同觀音大悲示現海亦無量願居士壽同文殊般舟智慧海亦無量願居士祿位亦無量眷屬亦無量親受用亦無量三三昧亦無量豈但居士如是即現前大衆親受用三三昧等壽命亦無量博山是真語者實語者不異語者且更將何物為居士壽耶良久云珍重解制上堂佛真法身猶若虗空應物現形如水中月博山從廣信登舟過鄱陽出湖口跨長江登石頭城江岸從濟生菴至天界寺安置水月道場修習空花萬行降伏鏡裏魔軍成就夢中佛事豈但博山遡自釋迦大師開場四十九年末後拈花示衆正法眼藏涅槃妙心付囑摩訶迦葉亦是夢中佛事達磨大師航海而來少林面壁九載雪庭深夜斷臂酬心亦是夢中佛事乃至執役負舂傳衣半夜亦是夢中佛事至使五家競出千燈列焰吹簫打鼓舞劒揮叉棒喝交馳語言遊戲亦是夢中佛事即今博山同諸昆仲結制解制升堂入室問答機緣勞彼列衆監院及天界方丈十位首領道人并諸執事不以身為身不以命為命喫盡艱辛護揚大法亦是夢中佛事諸昆仲博山恁麼舉似正是好肉剜瘡夢中説夢假如有一漢子大喝一聲諸人睡夢醒時却又作麼生道良久云毫光直遍三千界永祝皇圖億萬年僧問上根人來如何接師云此去祖堂三十里進云中根人來如何接師云獻花巖畔古今聞進云下根人來如何接師云門外好與三十棒進云不落階級人來如何接師云闍黎只今在第幾位僧禮拜小參小參臘盡逢春事事奇海風吹動碧玻璃昨宵偶得家鄉信破院荒村絶所依諸昆仲博山家鄉是破院耶是荒村耶有人簡點得出博山與彼携手同歸其或未然法華且謾添塵點數盡閻浮又一年小參僧問竟師乃云時名五濁世曰娑婆地面丘墟人心荊棘青林掌中毒氣破驢脊上來蠅蹈水火以修行逐腥膻而喘息胸中無半點禪氣強作機鋒肚裏懷一塊骯𩪝伸為問答鬼見拍手而笑人逢側目而嗔埋沒己靈辜負先聖洗心改過莫逐妄緣不悛前𠎝果從因墜豈不見靈山會上知音少長者園中木耳多卓拄杖下座生生社小參宗門中事難以措詞盡力道不得底句作麼生開口三乘十二分教有人説去了也即心即佛有人説去了也非心非佛有人説去了也不是心不是佛不是物亦有人説去了也且道與諸昆仲分析箇甚麼即得良久云黃金自有黃金價肯為和沙賣與人珍重月上庵小參忠國師云青蘿夤緣直上寒松之頂白雲淡濘出沒太虗之中萬法本間而人自閙諸昆仲即今山河大地萬象森羅水鳥樹林人叢馬踏喚作萬法作麼生説箇本間底道理捨萬法而求本間未之有也即萬法而求本間須要衣線下迸開始得所以博山教人將一句話頭置在八識田中眉毛與大地廝結只教自悟自肯其或未然聽取一偈諸佛依何住靈山問意新心宗為社主金粟作檀人一雨滋春國千燈薄暮雲須知塵界裏真俗未容分珍重浮山華嚴寺立新住持請小參一大圓覺為我伽藍又當知以我伽藍為一大圓覺互攝互融無二無別然後應事接物始無障礙夫善住持者先得根本不動智然後得差別智根本不動智中容不得絲毫動念處差別智者應事接物頭頭合轍若有絲毫念慮可動未免有生滅去來之相不名智也得此智者以理應事事事全理如其不然不名住持不見僧問雲門不起一念時如何門云須彌山天童頌云不起一念須彌山雲門法施亦非慳肯來兩手相分付擬去千尋不可攀山海濶白雲間莫將毫髮著其間假雞聲韻難瞞我未肯模糊放過關天童大師重門擊柝以待暴客匙鑰在手防禦甚嚴昔茲山住持遠録公棋無敵手固是奪角衝關祇是博山今日要問伊黑白未分以前者一著子畢竟如何下手從來十九路迷悟幾多人且道迷箇甚麼悟箇甚麼良久云珍重大龍山中方寺小參若欲説法無法可説無可説者始名説法有法可説恐辱大法昔世尊升座文殊白槌云諦觀法王法法王法如是世尊便下座諸昆仲且道世尊有法可説耶無法可説耶諸人也須向者裏開眼始得文殊恁麼道在甚麼處見世尊説法世尊便下座是許文殊是不許文殊諸昆仲還簡點得出麼其或未然聽取一偈白雲山頂中方寺清梵無停僧自間只恐溪深流水急賸分花雨落人間宮諭吳觀我居士請小參若欲究宗門中事須正信因果熟爛教乘思地獄苦發菩提心古德云禪律並行不相留礙若論淨白心地人人具足只因妄興一念起貪嗔癡有貪嗔癡之因便感三惡道之果教中謂縱而為貪地獄有不息之機抑而為嗔餓鬼有肢節火然之苦合而為癡畜生道中但念水草餘無所知若無貪嗔癡則三惡道何有博山所以教列位向淨白地上發起一念肯心單提一口氣不來畢竟向甚麼處去切不得起思惟度量思惟度量謂之藥忌雲棲大師云獅子之乳非琉璃瓶貯之則裂無上妙道非淨法之器莫能載也壽昌和尚云醍醐上味出乎乳滴水攙中總不成謂滴水者正思惟度量也若無思惟度量便能單刀直入力破重圍如吳太史發大乘心受大乘戒正所謂淨法之器但未知有向上事今日緣會勉起信向偈曰江北有居士天人興仰止傳聞金粟來緣境頗相似論心秋月皎談教春雲起機感得相符令豫特來此勉究向上事向上何深旨踢破指頭時舒州吳太史洪濤山毗尼菴小參諸昆仲生不知何來不得不疑來處死不知何去不得不疑去處大丈夫兒豈肯甘心隨業受報若欲究竟此事貴在純真一念不得草草如香林四十年始打成一片靈雲三十載見桃花始悟所以博山教人看一句話頭一口氣不來畢竟向甚麼處去行裏坐裏著衣喫飯裏畢竟一口氣不來向甚麼處去慎勿思量分別思量分別與究竟此事大不相應若果能真參實究一朝洗面摸著鼻孔却也太近小參百千法門無量妙義盡在諸人心意識中悉皆具足汝若認著心意識便昧却百千法門汝若體會得百千法門何處有心意識來者些子關竅亦能殺人亦能活人諸禪者各各在衣線下開眼拌此一生討箇著落小參長慶道萬象之中獨露身惟人自肯乃相親即今山河大地樓臺池館滿目青黃是萬象喚甚麼作獨露底身拈拄杖云莫祇圖他山色好須知別有故園春卓拄杖一下為劉和鶴居士對靈小參公生耶死耶誰道虗空有變遷公死耶生耶誰道滄溟有傾覆公生死洞然也雖劫風而莫能吹公慧光渾圓也縱劫火而莫能移公之趣向也肉眼罔窺公之行業也孰不化奇公之見地也住向莫齊公之受用也惟聖乃知霞坊山色空今古靜聽玄猿徹夜啼因事晚參今晚好月大衆見麼可謂玉鑑光輝觸處周幾多盲瞽黑漫頭可憐不受金錍者頭白終歸暗裏休此月古今評論者不少自世尊以來逮於今日千賢萬聖莫不盡力提擕老婆心切簡點將來祇説得月影邊事要見真月麼須是自己開眼始得所謂靈山話曹溪指南泉玩寒山比説得倣倣佛佛依依稀稀縱然道得十成博山未敢相許何以故肘後不具靈符盡在是非窩裏大衆直須努力跳出是非關若不跳出是非關三途黑暗將何抵珍重
