front:
  text: 無異禪師語錄序大光明中無物不有無物不空真俗二諦於中影現一點靈明溷入知見一念瞥起認為安身立命之處或遷轉不停或堅凝不化其升其沉一任造物播弄大丈夫宇宙在手造化生心奈何聽氣命機甘心作役夫導我者而豈徒哉不肖於童稚之年潛思出要耿耿在心數上公車艱於一第謬徼恩命司理信州聞博山自天台韶國師開闢以來傳燈不絕今者無異大師嗣祖而橫出一枝建立宗風隨機唱導閱四載始造而請焉覩其神情超朗如獨鶴摩空而又熏然慈和不自標異叩其中淵乎其不可測也夫既目擊而道存已傾葢無他語蒲團對坐咨決心疑弟子出函見示乃師上堂語是日大暑揮汗如雨披閱間忽似微風庭樹山嵐俱生凉氣透體爽然炎蒸如失師於此際起而問曰還會也未余時無言悵悵而別嗚乎拈花相授誰知微笑之風鼻孔撩天熟是拏雲之手是為序弟子趙士禎和南題錫類法檀序夫世間人不能行出世間孝而出世間人乃能盡世間孝以余觀于錫類法檀之篇則博山大師無如矣生致其養沒致其思世間孝也師則行之情致其刳性致其徧出世間孝也師則盡之幼痛悲母及長宦學而過聞慈父之喪有懷二人代衰以染古人大事未明如喪考妣師當此際是實非如記所稱充充如有窮皇皇如有求而弗得將此深心向船子藏身那畔穿却阿爺法身鼻孔六年夢破曠劫冰消邈得雲巖高縣寶鏡靈衣不挂孝滿曹山驀地相逢久遠如昨敬田悲水藐矣三公淨土禪波勗哉九品洎乎西往遂矣東征日照高山雨滋小草數株宰樹垂玅蔭于桐卿一瓣心香罥祥煙于浮渡脫也長羈子舍無過列鼎重茵孤滯空門詎覩新豐舊里還觀震旦玉殿簾前水田衣底惡有心空及第就養無方釀悲海之醍醐茂慈山之肥膩世出世孝一念圓修如我大師之為錫類主乎葢聞空谷傳聲唱詶雙舉覺華散彩因果同時以心印心有種似種是錫類之義而已矣我儕欲為大師之類而未拜大師之錫如盲龜之待浮木精心瞪目終託慈航既拜大師之錫而不為大師之類如盲龜之失浮木一瞬三祇永沉劫海得不人人痛心疾首暱就法檀所付本參寤寐思服懸巖撒手瞥遇親娘絕後再甦全身歸父國中按劒殺盡安居鵠卵宵啼鶴毛曉墮正恁麼時還有博山禮敬回向處也無還有博山應緣垂化處也無還有博山著投子布衫撾浮山法鼓處也無直得石火光中忙追鞭影空花枝上閒掇衣珠一回鸞鳳冲霄當處羚羊挂角但了白雲常倚莫問青山不知生死情刳心心不觸涅槃性徧步步還鄉無始劬勞剎那報足大孝不匱猶曰海之一滴何況其餘如或未然且從錫類篇中作箇蠧魚隨分咬著一字半字他生後世返擲有日在弟子廣瀹吳應賓和南謹序賸錄序先壽昌於法門寂寥之際言中有響脚下無私使洞上一宗復振厥功偉哉玉山垂示推倒博山水到渠成通身是口譬如空中樓閣面面玲瓏法音光明徧照恒河沙世界天下翕然宗之余再謁博山於壽昌特蒙印契遂以事先壽昌者事之客冬道過懷玉晤六雪誾公於瀛山出示賸錄一編重覩生面如析栴檀樹片片皆香固佛法中標準也向上玄機離文字相且道博山先師還有賸語也無自從胡亂後三十年未曾少鹽醬弟子黃端伯稽首和南撰禪警語序警乃醒覺之義或云驚也譬有賊瞰巨室主人張燈夜坐堂皇之上謦欬作聲賊愳不能便稍爾昏睡則乘間而入橐為之傾故嚴城擊柝刁斗鳴轅卒有變而無虞以其警備於機先也人有生死大患乃萬劫不醒之長夢況亦為賊媒日劫家寶不有大覺之雄痛語警醒則終身醉夢了無悟日非但睡時做不得主即白晝開眼魘語尤甚故博山大師乘悲願力來作大醫王用一味伽陀遍療狂狷業病故有示禪病警語直捷簡當把參禪骨髓中病都說透過其開示做工夫語最為喫緊真是禪門切要新書亦捄世之金丹九轉也夫禪也假名無體何有病乎葢參禪人多起執情謬解被心意識謊殺不向機境上求便向學解中討或被古人言句礙膺或向死水裏浸殺或坐在無事甲裏不是靈利心死不得便是癡著心轉不得故命根難斷生滅宛然通身都是我病者是禪有病也甚則成狂著魔佛亦不可捄此名業病非禪病也假饒死得種種心下肯做工夫與法身理相應不曾蹋著向上關棙坐在飯籮裏輕安自在只箇輕安正是禪病故僧問古德如何是清淨法身德云無量大病源此語如栗棘蓬吞吐誠難古人從真參實悟中病過一番來其垂手處自不亂下鍼錐要箇絕氣息識痛癢底漢方肯診視是以識病乃能去病調己然後調人可謂三折肱為良醫歟博山大師自來參究此道極是融通凡有言句皆中肯綮非故為高玅玄箸之談使人不知乃平日親證實履境界見到說到行到用到其義理精明辯才無礙所以快說禪病如握秦宮玉鏡照見羣僚肝膽一毫隱諱不得古今踞曲牀稱善知識說禪者如師之玅罕儷然禪病最難說說亦不能盡何哉病即法身之病法身無數病寧有極善救法身病者以病為玅劑以病為家常茶飯以病為貼肉汗衫在善葆之而已古人於病假中游戲而為佛事葢看破法身無主病自霍然故洞山道老僧看時不見有病特繇妄想執著故禪病競生昔佛說楞嚴五蘊魔事及外道偏計即是今人禪病中事然著即成魔計則名外不著不計亦云為病所以云不作聖心名善境界若作聖解即受羣邪法華云有一導師善知通塞險難道路故能導彼眾人前至寶所然則大師此書正末世舟航初心徑路豈但有益於今日亦有補於將來決欲參禪做工夫求大悟門肯細觀此書大有相為作略能使疑情發不起處發起病根點不破處點破如披沙露寶要渠自取如開霧見天使人不迷截路中有出身之路死句裏有活人之句如圓珠走盤不滯一語其玅用如此人人知此用心可以坐睡見道不費許多草鞋錢直到大安樂田地與佛祖同一鼻孔通風有能以此自警者而警眾復以此自愈者而愈人亦名現在醫王使祖師命脈流通國脈與慧脈竝固庶不負大師垂示之方便願力云爾是為序萬曆辛亥歲孟秋月弟子劉崇慶和南題宗教答響序善問者如攻堅木先其易者後其節目及其久也相說以解善待問者如撞鐘扣之以小則小鳴扣之以大則大鳴待其從容然後盡其聲不善答問者反是學問之道無不皆然而況佛祖法門生死大事而可矒𥋾鶻突若捉影捕風揣摩測度若鑽龜卜瓦者哉夫所謂不善答問者豈必誠不善也葢有自號為知識而轉墮於不善者何也有意為善斯不善已吾讀宗教答響擘分肌理兼總條貫遂使箭括鋒尖的有正鵠劍刃上事化為坦途問者本分答者當機善之善者也過此以往或居士應更有相說之解大師應更有從容之聲思惟路絕言語道斷者余雖不敏尚願與聞之戊辰秋月弟子張瑞圖書於博山叢林無異禪師廣錄總目卷首語錄序趙士禎撰錫類法檀序吳應賓撰賸錄序黃端伯撰禪警語序劉崇慶撰宗教答響序張瑞圖撰卷一之三住信州博山禪寺語錄卷四之五住建州董巖禪寺語錄卷之六住建州仰山禪寺語錄住福州鼓山禪寺語錄卷之七住金陵天界禪寺語錄小參晚參卷之八茶話普說問答卷九之十拈古卷十一頌古卷十二佛事佛祖讚自讚卷十三之十五禪警語開示偈卷十六之十九開示偈卷之二十淨土偈卷二十一之二十五宗教答響卷二十六之二十七宗說等錫卷二十八之三十書卷之三十一啟序卷之三十二序引䟦記文卷之三十三文疏壽言卷之三十四輓辭詩五言古五言律七言律七言絕六言絕五言絕歌卷之三十五博山和尚傳劉日杲撰墖銘吳應賓撰緣序弘瀚撰總目終
