body:
  text: 住博山法孫弘瀚彚編首座法孫弘裕同集參禪警語上中下卍云與第二編第十七套第五冊所收禪警語同故今省之開示偈一示無踰禪人參念佛是誰有序無踰禪者領雲棲師翁念佛公案於雙徑峰頭目視雲漢有年矣而誰字尚未及破謁余乞偈助其發機余不辭蕪陋以偈記之雲棲師翁淨土宗旨雙解重圍夢幻生死念佛者誰痛劄深追高懸祖印順機適時誰字不明疑情忿勇力竭氣絶始破漆桶漆桶既破毋容怠惰腳步擬緩非福即禍萬仞懸崖只須親到石幔雲幢風清月皎清皎眼開當面活埋轟天裂地其聲如雷示水齊道遵參沒蹤跡船子草餘年藏身無蹤跡一棹入華亭兩岸花狼藉今人但逐句熟讀竟何益水齊志於禪苦行非所適專提句話頭堅硬逾金石疑情成片去只教一縫坼遠不在天涯近非是咫尺吸乾滄海浪長空淨如碧擊碎瑚枝梵語從唐譯不親釋迦文勘破維摩詰街坊等箇人相將飲瓊液示觀恆禪人看普字雲從龍風從虎千里遠行跨步武不辭涉水與登山矢心迸破雲門普雲門普字古今傳剔起眉毛反覆看本命元辰著落處衣袋皮囊見不難皮囊包裹真消息現成不費些兒力才生擬議隔天涯肯向禪門空白日只須竪起鐵脊梁直下明明達本鄉故園田地都拋却始信男兒當自強示如是禪人參無字趙州無古今有伶俐衲僧顛倒走若於二處見根源大似面南看北斗破無字兩重關重步高登萬仞山縱饒絶頂橫身過吸霧披雲未可閒筆直路行將去誰管途中住不住只教倒跨紫金毛反側始能張露布海底塵山頭浪奧語玄機都不向月皎風清夜靜時沾著纖毫成漭蕩反覆看不較多泥牛解吼木人歌油瓶丟向籃筐裏笑殺當年凌行婆示懷照禪人參沒蹤跡一句話頭如鐵橛雄心莫教根基劣太阿橫按絶周遮眉睫交橫流汗血密究深栽絶動搖臥薪嘗膽莫辭勞針錐劄入偷心死奪得如來向上標藏身之處沒蹤跡醉舞狂歌人不識斷臂安心誑小兒雪庭那得真消息沒蹤跡處莫藏身吸盡澄江躍浪鱗紅爛身遊荊棘裏不尋歸去可憐生一喝耳聾稱大悟何如返擲解回互舍利八萬四千顆何曾夢見娘生褲香象截流彼岸登迦陵破卵即飛騰衲僧果具通天眼抹過峯頭第幾層入理慎防休太早狸奴不厭叢林飽若于動處便旋機依舊全身入荒草直下縱橫六不收江水無心競夜流更問祖師端的旨淡雲輕日正清秋示麓屏禪人省親并參無字一箇無字倚天長劒瞥爾情生搖空閃電三千里外直如弦只教覿見親爺面見後如何切忌道著示參父母未生前父母未生前面目已生之後又如何一朝踏著來時路雨具雲衣事更多示清隱禪人九帶語浮山九帶償衆生債爛翻舌頭衆生頗奈入佛法藏揭露家私事貫理貫和贓捉敗佛正法眼真不掩僞妙叶兼通順風逆載事理縱橫明暗互融屈曲垂慈機感自在金針雙鎖當面活埋平懷常實貴買賤賣更有一帶同條死同條生勘破此帶有利有害清隱禪人請說破輸我當行好買賣偈曰一句話頭如鐵橛浮山九帶沒來由須知塞却通天竅突出娘生箇指頭示林野禪人參沒蹤跡沒蹤跡莫藏身釣盡華亭躍浪鱗藏身處沒蹤跡三歲獅兒解返擲緊把繩頭勇力參太虗紾出黃金汁男兒漢須性燥捩轉鼻頭何處討好於痛處下針錐只待冷灰看豆𪹼不破疑團誓不休放出溈山水牯牛五字到今諱不得戴角披毛者一頭親磕著得便宜敢問皮囊知不知倒吹鐵笛音聲別正是塵勞解脫時示可上禪座一句話頭如鐵橛從前活計湯澆雪譬如抒海討明珠勇心直教滄溟竭不得明珠誓不休到手方才得自繇通身汗下清風起白浪滔天迸出頭險道先須辨通塞要以前人為軌則長慶蒲團船子橈用處謾將心意測管他烈火與寒氷斷臂焚身似不曾若箇皮囊真寶聚好將清操續傳燈示慈門禪人一句話頭如鐵橛眉毛不與眼相參究心自古無多事劈破疑團是指南疑團破處無涯岸突出衣珠光燦爛從他八萬四千門門門撞著是者漢臨濟當年赤肉團至今鮮血尚漫漫真人裹向袈裟裏鼓掌難教覿面看只須揣出虗空骨徹底無依休恍忽順流筆直到江西匡廬深處蛟鼉窟五老峯前翠作堆劫風幾變尚崔嵬江濤響入遊人耳莫錯呼為腳底雷示恆見禪人一句話頭如鐵橛千年故紙不須鑽德山不入魔軍隊大地衆生被眼瞞莫道宗門路徑挺大丈夫兒須自省二祖雪庭斷臂時震旦何人不引領只須坐斷葛藤窠佛法塵勞奈爾何點心不向言前薦笑殺當年賣餅婆休向山林恣懶惰石火電光容易過縱然入定不聞雷簡點將來都是錯生成不怕紫金毛鐵壁銀山走一遭果是老胡親的子隔溪何用手相招
