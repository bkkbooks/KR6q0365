body:
  text: 住博山法孫弘瀚彚編首座法孫弘裕同集佛事為鵞湖和尚封龕我大和尚示有去來體非離即悲願弘深化儀權息暗兮如日之光明兮如漆之黑今朝封固見端倪九九元來八十一諸昆仲助揚法化無礙興哀奠鵞湖和尚茶住錫鵞湖四十年清光法雨滿人間而今南邁分身去拄杖縱橫列祖先諸昆仲還聞得無聲三昧麼好將龍口噴來水煑茗和雲奠座前為壽昌和尚入墖靈運遍山川莖草化金光之聚音容存梵宇微塵彰法界之身從來白浪滔天今日清風滿地分身南邁他方境界殊常携履西來此處慈祥更顯掀翻西竺窠臼澄潭不許龍蟠重脩古佛安居寶砌還須龍護雖然且道先師就位一句又作麼生舉揚良久云石鼓元無縫山頭賸有雲為壽昌和尚掩墖如何是佛大好山白毫如練氣如藍慈雲化作乾坤眼留與人天永遠看拱臺上座火古稀之外重添八僧臘叢中最占先何必往生期淨土今朝親見火中蓮光敷禪人火二千里外圖何事拋却家鄉驀直行今日火中看變態蓮花陸地帶雲生遍慈禪人火緣上座一心彌亘三界為家紫芝孕秀皓玉無瑕今日靈苗縱發佇看火裏蓮花心恒禪人火如何是心青山高處白雲深如何是恒堂堂古路坦然平而今撒向孤峯頂烈火燄中恁麼行以火把打一圓相曰恒心何處是遍界放光明禪人祝髮米必成飯僧原是俗釋迦由此而弘經馬祖領斯而相撲三千里外喜汝脚下有筋五百年後笑我舌頭無骨咦芟除無始妄因緣且向梵王宮裏宿佛祖贊阿彌陀佛贊二行大願大悲深智深然莊嚴於化境實淨土於凡心須知念佛終成佛未聞無址忽成岑乘願力來償眾生債曰此娑婆即極樂界都云點鐵成金其中有利有害何以故若於紙上見彌陀輸我當行好買賣釋迦文佛贊者箇慈尊乘悲願力化有緣眾正信調直彼不知我我不彼識穿過髑髏分明是賊若還錯過此時辰直待當來問彌勒觀音大士贊二稽首大悲踞盤陀石覿面斯彰今胡云昔眾生淨心諸佛妙智玉齒琅琅不識普字見性非照聞性非聰旋佛旋生寶鏡芳容厥號大悲亦曰大慈孰云普門妙用在茲華藏世界總蒲團間負不了債藉眾生還興慈而運悲援苦以需安現身五道何多事目擊晴空鎮日閒覆紫竹之林而懷深悲踞盤陀之石以默深慈援眾生之苦惱代諸佛之行儀或曰普門示現而不捨風濤浪湧之中者咦今正是時西方境贊佛在瑠璃地上花開八德池中欄楯樓臺逈逈珠林寶網重重切不可作境諱却既不作境諱即今彌陀在甚麼處咄浮山舍利墖贊有序佛昔闍維十剎繁興八王分請舍利入震旦者葢無幾也耶舍尊者始從西域將舍利安奉于廬山者有二其一在歸宗之金輪峯自晉歷今千有餘載放光輒彌山谷屢現祥異不可殫述果清湛上座紫柏老人子也以因緣力積歲葺治啟視得金銀瑠璃滿三缾其餘眷屬舍利不可稱計分布諸善信人願力堅者輙得之吳太史觀我得二十有二顆久復開視滿三十顆眾人聚觀各隨所見大小色相種種不一其他神變盡智思量所不能測太史爰以敬心合于悲智欲使見聞讚歎禮拜悉植勝因乃謀于浮山之巔建窣堵波以擬于金輪昔有人入地獄見地藏菩薩曰汝罪惡深重應墮地獄急往鄮山禮舍利墖可脫此苦觀夫一禮一拜即脫地獄則太史所植勝因與諸善信速成無上菩提無疑也余游浮渡因得瞻禮合掌讚歎而說偈言諸佛闍維時廣流布舍利散滿閻浮提皆從因緣有放光開幽暗絕滅一切苦普使見聞者悉發菩提心廣修眾妙行圓滿波羅密功德不思議盡回向佛智達磨大師贊四喚汝是箇達磨受人博換喚汝是箇博山覿面迷亂我今識得渠原是秦時鍍鑠鑽咄如幻如幻老臊胡面壁九剜人心截人肘幾遭毒害而地轉天旋一片真機而象騰獅吼依然隻履又西歸真箇鰕跳不出斗擡頭不見有天低頭不見有地一雙大耳連環兩箇鼻孔出氣滔滔白浪蹋長蘆識得渠儂非小事咄紫氣祥雲旋覆江岸折蘆者誰是鐵面漢近傍誠難胡為而贊兩條墨跡逈思惟一顆明珠光燦爛老子贊覿面是條青牛四蹄蹋地覿面是箇老子鬚髮皓然我記得你生于李樹下母腹曾經八十年惱釋迦涅槃太早吐玄津混沌之先而今渾化成團去顛倒人間永遠傳羅漢贊四從來三事衲知是幾千春今日重拈綴當陽見素心碧桃盤累累瑤草影沉沉更有西來旨山高莫浪尋鉢從何處來勞彼鼓雙翅尊者窺碧漢預作捧鉢計大道元磊落三昧貴遊戲不逐見聞緣超然登十地貝葉靈文琅琅玉齒聽誦者誰踞地獅子雲兮竹兮高山仰止經了月明終而復始分身南邁神龜捧足布袋全收指頭獨矗直下明珠遠山靈木至理彌綸阿誰相續十八羅漢圖贊眾禪和跨步武降得龍兮伏得虎塵沙結使未乾枯傀儡一棚誰作主飛錫懸光倚杖藜分明撒出駭雞犀欲知佛法深深處山淨雲收聽鳥啼雲棲大師贊生在杭城蘇州有老在杭城常州有三十年前孔子之徒三十年後釋氏之友八德池中喜種蓮彌陀塞破諸人口覿面不知渠是誰七七還渠四十九又頭顱拄天袈裟著地此是阿誰彌陀再世題優曇華圖誰將紅綠現優曇數遍前三及後三謾道法華親指示而今覿面是司南壽昌和尚贊四峩峯老漢篤行可佳形之非形丹青難畵灰頭土面笑神光拜雪銅心鐵膽罰世尊拈花爛蒲團而為坐具破蓑衣以當袈裟枕石潄泉粘雲帶霞風流客不堪誇大好山中三十載鋤頭柄有活生涯稽首吾師四生慈父語入重玄機貴回互七處道場千指圍繞擲如意珠傾出栲栳者一句子終朝賣弄將是曰非以輕為重我探虎穴親遭毒手絕後再甦如飲醇酒壯齡至老惟一不二泊焉辭眾分明指示天下聞之稱甘露滅眷屬雲仍芳塵凜烈者箇和尚半隱半顯指下為高將深作淺有時慈祥與脩羅輩息嗔有時惡發將佛祖也褒貶今日被人寫上𦘕圖大似美玉遭幾點瑕玷博山不解含容代為諸人聊通一線通一線米中有飯麥中有麵咄此似吾師真箇是丟却把鋤看株樹蒲團覆地絕纖塵蠢動含靈皆得度咄切忌道著圓相贊啊是輪月麼多兩耳朵是腔水麼少幾重波想是世尊遺愛仰山傳訛幾人尋不著千般籌算及至相會處一場懡㦬令予笑不徹只得稽首再拜南無佛陀峯頂和尚贊者和尚相非好緇混素寅作卯汲水擔折已見辯翁烹茶銚側而逢蘭老供母下視長蘆弘戒多言護草惟不可說向上機鋒何以故道理玄談渾不曉洪濤山天安律師贊有序余挂錫博山有年矣每慮梓里開化無人往來衲子傳有天安法主闡揚教乘作羯磨師余心儀之未得緣晤丁卯春余旋故丘則安公遷化已久入山見卵墖巋然因述贊以詶夙心世界無依根塵空寂悲智成身而興慧益戒德難思行非有己慈緣廣攝先余鄉梓說法雲興誨人缾瀉施利不沾遠邇咸化化緣云畢而塔此山法音奇演鳥語喃喃雲陽耆宿贊雲散于長空陽回于大地盡華藏含靈拄杖頭出氣空印法師贊者老凍儂寒威凜烈忽死忽生是何時節酌古該今雷轟電掣滲漏行藏與人各別不各別贏得人傳甘露滅杲禪座贊此是何人是我杲兄蘊之藏之慧日慈風有餘錢而贍叢席無賸法以導羣蒙千年不改青松色湛水流雲徹太空一菴法主贊一亦不可得菴跡何所留寶池澄巨浪橫架採蓮舟古心法主贊古佛傳燈久心師續𦦨長欲知渠去處芳草臥斜陽拙如贊覓巧不得拙自何來如摩尼珠投石火胎頓瞥地時何所據煙雲深處姑蘇臺解深贊解甚深法碎煩惱窟鐵壁虗通銀山突屼萬仞崖頭眨眼看緊著脚跟休恍忽龍峯八十一真贊生緣八十餘誰人寫上紙根塵既本淨何必染青紫戒行若虗空華藏為棲址別號號龍峯啟予親贊此咦忽然覿面頭邊珠滄海直教枯到底趙豫齋真贊豫齋老翁者等形狀髭鬚白而不白和尚相而非相十卷楞嚴任你週流一脈菩提從人譽謗似者等沒用底老頭陀貶在閻浮極惡世中留與人天作榜樣宛陵王玄石影贊扶疎松與竹清適茶兼酒中有得意人面南看北斗今日相逢山水間素縑未展竟何有崆峒石畔芝蘭香風雲筆底龍蛇走道服樵巾岸眉海口雅句新裁奇文立就烹泉倩童採芝借手箇中無限風流不落時人窠臼五湖之內都識得玄石先生千古之下悉稱為博山社友劉龍田居士影贊大圓光中惟公明哲松風鳥語代公之舌演微妙音宣第一義趨世出世往來遊戲何以知之山川草木日月星辰而為眷屬釋迦不會彌勒再來香雲海眾讚嘆奇哉查汝定居士影贊二一二三四五急急連忙數不弄祕魔叉解打禾山鼓更欲覓言詮和聲當面吐是誰安作窩大千無寸土幸有上頭關濶大堪步武斬却雪峯蛇笑殺玄沙虎我今贅此題留作閻浮譜那裏來三一窩似認得較不多從來無有面目今朝戴髮頭陀更將水墨傳真假笑殺當年指路婆自贊余集生居士寫師像與自像相視而坐請贊時居士五十壽且有內召故末句云云博山余居士真箇熟因緣促膝撩衣坐知是幾千年悟性空彰毫楮緣生法上親眉宇活似龍兮獰似虎箇中元不分賓主一輪明月照金沙大千隨處茂靈芽剎剎塵塵轉法華雪巢癯寉噉晴霞翻身須辯婆心切紅爐𦦨裏寒氷冽徹底無依笑點頭眼中慎勿沾金屑五十方知四九非生擒兔象顯全威殷勤國事猶佛事一片丹心捧日暉者箇漢清淨眼昂藏眉最惡毒假慈悲凡說法不思惟罵諸方痛針錐扯人萬丈崖頭立盡力將身祇一推咦必也是誰陳旻昭居士請生平不就他學祇向自心捫摸忽然打破漆桶隨處令人驚愕某禪和毋自錯者廝不異常流討甚超方出格江北生江南長卓有來由全無伎倆口裏終朝漉漉心中全無靜想隨方多結歡喜緣留與諸人作清賞紙上畵我不像真是他難近傍有渾身無五臟佛法抖擻沒纖毫敢受諸人之供養傳實禪人請者老子多揑空貪睡眠常做夢入市廛過麟鳳近著他眉毛痛泛泛端如五兩輕堆堆何啻千斤重者廝兒無得失了一緣萬事畢少矯詐最朴實愛與人宣祕密有時獨坐亂峯巔指點風雲吹觱篥咄者老凍儂自謂英傑無些子長為法門切舌根謙讓如線脊梁剛硬若鐵終日叨叨千萬言添得頭顱幾點雪者漢無長祇肯認非逢剛則柔遇慈則威挾帶挾路知顯知微肚裏了無些子物一生贏得口頭肥咦通身狼狽滿面塵埃喜而不昧怒而不嗔罵盤山無面目笑船子解藏身流雲古木深深處嘉羽奇花耀眼新咦汝是何人生成眉宇是何標格從本無家隨方作客或時被有識者呼為瞎驢或時被無知者尊為禪伯嚴兮如月之清慈兮如日之赫行藏不與眾同流善惡難教分皂白茲因曇晦禪人勒逼將來不免書此權為之塞責者漢子沒來繇擔閻浮重担結眾生深仇破鵞湖戒律滅壽昌宗猷心毒如砒口甜如蜜獰惡若虎暴躁若猴且道是博山耶非博山耶依稀越國彷彿揚州者箇和尚生平無狀花擘佛祖之家私敢受人天之供養更問宗乘事若何是聖是凡祇一棒朱雲鶴居士寫者漢作麼說彼解談禪開口便成墮錯錯溫州橘皮不是火者箇臭乞兒從來沒計較舉步似安詳開口便胡道有時一喝大海水也著乾有時一脚須彌山也著倒今日寫上𦘕圖一任傍人取笑咄素紙條墨山重水重邈無蹤跡點綴虗空一腔秋色八面春風葵誠徹見衷腸事鼓打三更日正紅鐵面老人堪寫上紙本是無形長眉穿耳弄假成真逢嗔作喜無端平地浪滔天都把他鄉當故里獨坐蒲團想箇甚麼瓶瀉雲興說亦不破有時喚作栢樹子有時喚作訝郎當有時喚作破竈墮從緣返復百千名地轉天旋祇者箇此是博山我是阿誰我猶是我用彼何為識得斯人真面目山頭敗葉幾成堆者老禿奴原非本像坐破蒲團是甚模樣默默無言許自知醜惡形骸誰比況從來巾侍渠儂識得昂藏去向雖然忍受不與人傳切莫認作本師和尚兩條墨痕那堪供養真不似真像亦非像若要的見博山眉毛祇在眼上者漢癡獃槁木死灰箕踞若塑怒發若雷彌勒先生釋迦後來趂亦不去喚亦不回三尺絹子活埋活埋蔡闇脩公錯寫了者漢有甚好生平與佛祖似箇生冤家開口何曾談著句禪道假說從廣南帶來鎮海明珠元是江北盛烏盆底栲栳你見他麤眉大眼便被渠瞞要見他臭爛肚腸揑轉鼻頭但向虗空討此是何人博山老朽靜默無言曰獅子吼三心莫得以建法幢十指不干而稱抖擻內外搜尋蹤跡無引得禪人顛倒走面濶腮紅眉麤眼大別想機緣悉皆迸破觀身心等陽𦦨之騰視富貴如空花之墮吳少峯寫渠儂休錯過箇中一線之微問取知非首座
