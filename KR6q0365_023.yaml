body:
  text: 住博山法孫弘瀚彚編首座法孫弘裕同集宗教答響三吳觀我太史問廣瀹於過去世種少善根得聞向上一路無奈障緣深厚念力粗浮雖有疑情不能相續又恨病魔羈𮩸未遑參請諸方親覩過量大人不思議用獨憨山朗目兩唱導師大費婆心曲垂鞭影終是數他珍寶不救饑貧二六時中欲求少分相應了不可得何幸未充耳根遙嚮博山玄化卒業警語不覺神馳再嘆奇哉飲光尊者猶有嫡骨兒孫以文字解脫傳佛心印身無羽翼不能奮飛將無失之剎那恨之永劫敢因現空上首飛錫之便焚盥勒楮敬問巾瓶願大師放額顱眼光照我神髓如所應作而提獎之小刻二種皆心意識卜度依通非實境界而就中滲漏亦不無和尚下鉗錘處矣南望翹心悲仰悲仰師云艤初遊石頭城聞憨達朗三大師心切歸依為侍受業師南詢得入壽昌先和尚室蒙示以船子公案祁寒溽暑廢寢忘餐者幾六年三大師淨其意識殊不能記辭先和尚住博山今二十五載數年禪者憧憧獲居士頌古并諸傳記讀之灑然始知有菩薩現居士身說法歡喜無量恨未得面晤教言為歉耳五月八日於信州橋菴見空持居士翰教至如旱逢甘雨大慰未見之懷三復竭思不能釋手此亦希世之緣也來翰謂向上一路雖有疑情不熊相續又云如所應作而提獎之艤於此疑信相半謂居士通身佛法而復求應作之語大似居海者向人覓水人所難信又如埋兵索戰將謂彼不能勝而自必勝之又謂居士是菩薩示現其謙退虗懷為衆請法應如是乎然向上一路難以措辭才開口時白雲萬里惟疑情一事頗為能入果不能相續是生死心不切耳其切之一字是如所應作此是為居士無夢說夢好肉剜瘡諒不以實法會去不免就身打劫將夢中境界不妨一一剖㭊使未知者知已知者亦何妨助法喜也悟解二種開有多門具在別柬希居士審察之不以煩瀆為咎若論著向上一路只須大喝一聲以火燼之揚向他方世界毋使淨白地上受此塵滓穢壤耳聊此復言餘容緣晤不宣悟之一字祖師門下呼為毒藥迹尚不留況其悟耶今不避犯諱藉言之使智愚有所料揀宗教有所分疏行者不陷於險阻岐徑實途中助耳復次論禪者有二種悟門一者從文字語言中得解悟二者從己分上參究得徹悟夫解悟者力弱徹悟者力強解悟者如聞人說物徹悟者如親眼見物聞見雖一疑與不疑實霄壤之遠也復次從文字中解未得徹悟者有二種障一者文字障二者理障文字障者如人食蜜愈食愈甜於十二分教深求諦理生死分中了無交涉是謂之障理障者於實際理地相似了了如通身是寶不得實用於生死分中亦無交涉是謂之障復次從文字中解未得徹悟者有二種慢一者我慢二者增上慢我慢者謂我今已悟衆生在迷如我見處人所不知由此起慢增上慢者謂我已入聖位上無佛可求下無衆生可度佛之一字吾不喜聞由此起慢復次從文字中解未得徹悟者有二種怯弱心一者我見理已極行不能逮賢聖位中未得親履實踐由此起怯弱心二者我見地已與佛同實不得佛之果用神通光明於我何有由此起怯弱心復次從文字中解未得徹悟者有二種安隱想一者謂實際理地不受一塵山河大地不礙眼光又云圓同大虗無缺無餘大圓體中求其生死去來了不可得由此起安隱想二者見理雖明不能親證諸教乘中多於淨土惟念佛往生甚為妥當由此起安隱想已上俱為禪病復次果徹悟不為文字作解者有二種實受用一者得諸佛化儀二者得諸佛果用化儀者謂諸佛淨穢土中菩薩眷屬聲聞眷屬香雲花雲幢幡寶蓋雲及天龍八部與我同等無二無別如不爾者是未徹悟故是理有分劑故二者得諸佛果用謂三十二相八十種好乃至九十七種及清淨法身并神通光明說法等與我同等無二無別如不爾者是未徹悟故是理有分劑故復次果徹悟不為文字作解者具足諸菩薩無作妙行謂過去諸菩薩未來諸菩薩現在諸菩薩不可說不可說劫數所行妙行謂時同處同身同行同於一剎那頃一微塵許悉皆具足如不爾者是未徹悟故是理有分劑故復次果徹悟不為文字作解者與十二類衆生同一體性自身入他身他身入自身一身入多身多身入一身彼世界入此世界此世界入彼世界世界入自身自身入世界入自身不見有世界入世界不見有自身互攝互融無壞無雜復於衆生分中同一悲仰又於衆生分中起同體大悲謂善與惡悉無自性皆自心現量既無心外之境以無作用興慈運悲不妨於無性體中而解脫無性衆生也如不爾者是未徹悟故是理有分劑故復次果徹悟不為文字作解者與十二類衆生同一幻化故謂緣生無性生本無生無性緣生衆生何有實如幻化吾與之居如不爾者是未徹悟故是理有分劑故已上是悟心者實受用非解者能知也復次從語言中作解未得徹悟者流出無邊狂解有以日用事無別惟吾自偶偕而生狂解有以隨流認得性無喜亦無憂而生狂解有以神通并妙用運水及搬柴而生狂解有以本來無一物何處惹塵埃而生狂解有以對境心數起菩提作麼長而生狂解有以山河及大地全露法王身而生狂解有以無明實性即佛性幻化空身即法身而生狂解有以入門便打而生狂解有以答問機緣口頭快便而生狂解有以不必參究直下承當而生狂解有以入門便罵而生狂解有以習學詩賦詞章工巧技業而生狂解有以放下又放下開口即錯而生狂解嗟呼醍醐上味為世所珍遇斯等人反成毒藥良以正法傾頺邪魔熾盛相續眷屬彌滿世間於生死分中留心者不可不先燭破此虗妄境界也更有三句葛藤不可不為居士說破古德云如何是禪猢猻上樹尾連顛如何是禪猛火著油煎如何是禪碌磚即此是祖師傳的葛藤然雖如是分明向汝道相續也大難余集生冏卿問先輩云五宗自溈山而下取人甚嚴於是溈仰法眼先絶絶乎否耶洞山數傳至太陽法不輕授年且八十矣嘆無可繼遂以衣履別寄浮山遠求法器而僅得投子一人當此之時洞下不絶如線及投子得芙蓉而玄風再振弘衍至今今之師雲門臨濟而未至者皆翻然舍而宗之儻所稱取之嚴者得之必精得之精者傳之必遠非耶夫曹洞一脈愈微而愈不泯有如此豈臨濟一脈轉捷而轉失傳乎邇來修忌三祇覺希一宿翕習成風至有才著袈裟便行棒喝者問之則曰臨濟宗也臨濟宗固如是乎坡公云借君拍板與捫槌我也逢場作戲至目鉗鎚為戲劇學人之過與抑亦其師之過耶請師昌言之師云吾宗遡自達磨大師傳佛心印觀我東震旦有大乘氣象受二十七祖般若多羅尊者讖云震旦雖濶無別路要假兒孫腳下行特特航海而來初見梁武問答時便不順些子人情如用一把鐵掃帚相似乃至九年面壁為法求人神光立雪齊腰猶呵為輕心慢心欲冀真乘徒勞勤苦良以師嚴則道尊因真則果正是以斷臂安心忘身為法以及負舂槽廠不避陸沉方得大法流行龍象競出然六祖雖曰得道者如林其正傳者惟青原南嶽二大士耳馬大師一足踏殺天下一口吸盡西江是何等根性行業而印心後尚侍嶽師一十五載日益玄奧及至開堂猶命僧驗過曰三十年不曾少鹽醬嶽始然之古人如此嚴密載在方冊者歷歷可考豈敢畏絶嗣而授諸非器乎溈仰雲門傳燈列譜雖稱斷絶而流裔受派者至今猶存法眼一宗至永明壽大師高麗嗣法者三十六人其德澤滋盛流溢遐遠又不可以識心測之謂其斷續也洞山五傳至太陽玄玄寄直裰皮履於遠公處而得投子青青得芙蓉楷楷得丹霞淳淳得長蘆了了得天童珏珏得雪竇鑑乃至國初萬松秀雪庭裕展轉相傳至我壽昌先和尚實曹洞正傳其源深流遠如此臨濟至風穴將墜於地而得首山念念得汾陽昭昭得石霜圓中興於世乃至國初天如則楚石琦光明烜赫至於天奇絶以四家頌古悉皆詮釋宗風由此一變識者惜焉蓋宗乘中事貴在心髓相符不獨在門庭相紹故論其絶者五宗皆絶論其存者五宗皆存果得其人則見知聞知先後一揆絶何嘗絶苟非其人則乳添水而味薄烏三寫而成馬存豈真存如居士所問取之嚴者得之必精得之精者傳之必遠余意正然不意居士亦見及此所以寧不得人勿授非器不得人者嗣雖絶而道真自無傷於大法授非器者名雖傳而實僞欺於心欺於佛欺於天下一盲引衆盲相牽入火坑將來鑊湯爐炭劒樹刀山知是幾多劫數有智之士寧可碎身如微塵決不肯造此無間業也今行棒行喝豈但曰初披袈裟即白衣居士例皆如此殊不知古之所是乃今之所非如德山入門便棒傳燈所載曾打幾人又如臨濟大師一語中具三玄一玄中具三要四料揀四賓主皆於言句中勘人未嘗以棒盲加且一語中具三玄三要則一棒一喝悉當具三玄三要之旨既一喝可分五教一棒須具三玄正應用時必有差別其殺活縱奪貴在當機豈沿街遍戶皆以棒喝為應用耶若不審來機一槩用打是妄立門庭便成戲論引動一班狂妄學人墮落意坑見塹硬作主宰錯下承當圖彼冬瓜印子貪人禮拜供養誑惑無識各各自謂成無上道報終決沉生死苦海正所謂邪師過謬非衆生咎然在真為生死之人具眼參方必不被其所賺嗚呼時丁末世貴在辨正邪別真僞須向本分中商量徹底莫向法嗣上較論斷續也劉心城大參問千里餐風連宵逼拶大師大慈石人墮淚無奈迷雲展轉濃重索性全抒狂臆以當發露懺悔惟師慈父容此驕子不惜懡㦬逐欵批答令玄立地轉關頓破葛藤絡索豈愛剝皮析骨酬此法乳深恩師云宗乘冷落舉眼無親今天下稱知識者莫不云秉達磨大師單傳之旨交馳棒喝彌滿世間豈但叢林即街頭傭竪悉妄言悟入皆邪師過謬非衆生咎余禪暇及此髮竪心寒恨不能以智鋒慧刃掃除魔黨以報佛恩非敢以生滅心造地獄業因破夏往還幸金陵諸宰官居士護持正法方解制緣遇居士以法門為問心甚快然然宗教殊途皆歸一致都城趨入遲速不同非敢以宗抑教以教抑宗真有所抑即是魔人且達磨何人耶智者何人耶敢妄加穿鑿為分優劣乎所趨向者就審初機為其指迷不由迂徑當隨問隨答不辜居士來意耳貴在格外相酬希勿以言句取則領略在未問之先則居士無問博山無答大圓覺中不挂一元字腳居士信斯語否問蒙大師垂示一口氣不來向甚麼處去言思路絶難咬難嚼㘞地一聲虗空粉碎此誠最上極則玄雖凡下戊午己未曾亦兩年著腳庚申劇病竟入地獄一句彌陀如湯沃雪何至今日轉打之繞此段機緣亦非孟浪似於夙劫曾作佛隴即天台兒孫每讀妙宗鈔所云取舍之極與無取捨同覺得實實可作生西拄杖實不妨與宗門向上極則溪山各別雲月是同蓋台教全以葛藤掃葛藤以解路絶解路四教六即十乘四弘才提一句動成二十七萬一千餘句而宗旨只一心三觀然非二十七萬一千餘句此一心三觀一句不得分明所以多句不離一句併此一句亦無名字相貌可得不待樹倒藤枯早已句歸何處玄如未死五六年後與乾三先生圓頂方袍手捧三大部向博山堂下繞佛三匝禮師足已叉手而立惟望大師另出手眼俯為接待師云居士於宗乘中既兩年著腳仍以一句彌陀銷除地獄如湯沃雪似非孟浪前後參差果志慕空宗何不以金剛猛𦦨爍之仍待一句彌陀不得實用於斯可見居士既全是知解與佛隴密契不問可知謂妙宗所云取捨之極與無取捨同居士即今有取捨耶無取捨耶若有取捨同之一字即是妄言縱硬作主宰謂其不礙其奈取捨何雖百劫千生不能脫此窠臼自云淨潔亦不作淨潔想譬如著白衣人入墨池中自云我不染墨豈但謾人實自謾耳生西要旨貴在一心不亂居士即今果不亂乎如未究竟生死熾然縱許十念往生此亦初心方便假有毫釐繫念是究竟法耶非究竟法耶如不究竟則拄杖子折矣不可不知若謂台教以葛藤掃葛藤者與不絆葛藤優劣若何果是智人自當料揀多句不離一句以一句入多句可乎若可者譬如尋水先得其源如得其源枝派蔓流不愁不到若向枝蔓上尋去雖心中了了余保終其身而不能到也妄云早已句歸何處是見卵而求時夜不亦太早計乎問蒙大師垂示云一念識心即不思議境非證法華三昧莫望領取又云智者大師妙悟處不在三大部在禮法華時卓哉我師誰謂大宗師非即大教主耶玄輩凡愚則妄據智者大師所云圓頓者初緣實相造境即中無不真實繫緣法界一念法界一色一香無非中道便確信得過不思議境非但凡愚有分即熾然淫殺盜妄其事相不得不攝於一戒而即此淫殺盜妄一念當體即煩惱即菩提即生死即涅槃實信得過實把得牢依此圓教修此圓行而不了生死智者大師欺人賺人恐無是處師云余謂一念識心即不思議境智大師妙悟不在三大部此即實語誠非臆見如一念具三千是思大師親證處非從學問中來如云即空即假即中是因緣所生法并一色一香等語乃從學問中來實非大師悟處居士雖信得過皆是識心領略既非悟入識解障心如油入麵永無出期不可不審謂殺盜淫妄性惡即真殊不知即真體中無殺盜淫妄當體煩惱當體空寂緣生無性等於空花菩提涅槃皆為賸語非作故無本性無故而復云依此圓教修此圓行正所謂無夢說夢不識大師行布而非行布圓融而非圓融過在學人非在教也吾宗門中非不看教祇不滯斯解如單刀直入直斬顏良為快意耳問蒙大師垂示云才開解路便落生死敢不服膺然所云不思議境者即空即解即中也此三諦只在現前一念識心一念最劣三諦一心最頓最圓最尊貴無上雖復證入甚難而性惡法門全性起修全修在性修性不二直斷無明至於見思塵沙譬如冶鐵粗垢先去非本所期自然先落此一念直超三阿僧祇當生便可證圓住位直截頓頓品位彌超似又不獨輕輕便便了一生死而已大師大慈願不有慮師云才開解路便落生死如永明大師云圓宗所示皆是未了文字性離始名解脫看宗鏡録者誰肯謂性離也皆識上生識心上求心愈生愈求轉覓轉遠圓覺云以思惟心測度如來圓覺境界如取螢火燒須彌山終不能著如不思惟者以何法門謂之捷徑少林云心如墻壁乃可入道亦不論性善性惡全性全修祇將一句話頭深追力究如喪考妣識解何生果得迸開光明煥發如紅爐烈𦦨見思塵沙豁爾氷消若斫樹去根枝葉復生無有是處況向上一路及盡玄微去粗存細似多著一翻心力也極細根苗卒難頓盡直超品位非行莫齊言解相應無有是處台教學人似不可以圓教自負不求妙悟蒸沙之語豈欺我哉問藏通別圓四教智師創立四教有五頌位次分明又不墮明白裏後四頌則且置只首一頌云七賢七位藏初機通教位中一二齊別信并圓五品位見思初伏在凡居凡居者凡聖同居土四淨土之一也七賢者五停心別念處總念處四加行共七位也四加行位則且置只總別念處中一觀身不淨五停心中一數息觀便開出八背捨六妙門十六特勝觀練熏修等世出世禪門妙訣一經開會一一無非不思議圓妙法門的的當當穩穩貼貼保得一念識心眼光落地時決無失腳又何況即漸即頓即藏即通即別即圓廉纖葛藤無一可取無一可捨所謂太虗空中之乎者也將錯就錯西方極樂大師大慈願不有慮師云四教五頌位次分明等語乃至一經開會一一無非不思議圓妙法門具在三大部中此不繁引而云的的當當穩穩貼貼此是智者大師見非學人見也居士謂保得一念識心眼光落地決不失腳居士用那箇心保得若用識心識心隔陰則不能知宿命具通恐一生難辦臨終善惡如人負債強者先牽毫𨤲念起豈但說即如寒拾見溈山那事都不記了西方極樂亦是寐語也問蒙大師垂示有大居士問云只提話頭三乘十二部可盡廢耶答何作恁麼見地三乘自為三乘人說豈不見圓覺經云惟除頓覺人併法不隨順玄奉此示豈復疑云只提話頭三大部可盡廢耶然而三大部中併三乘人一總收為圓人頓覺併四教十乘六即四弘雖復的的當當不許一字誵訛而實無一法可容隨順所以荊溪一部金剛錍總托一夢懸符我師昨解制上堂所云一一皆夢中事而金剛錍末後一句云忽然夢覺問者答者所問所答都無所得然則宗耶教耶誰非一夢耶然而三大部及金剛錍畢竟與三乘十二部俱不可廢大師亦復何曾欲廢三乘十二部及三大部金剛錍耶凡愚護玄一口氣未斷時願以三大部金剛錍作廣額屠兒一把殺猪刀臨終放下恃有大師加被在即未放下時亦有凡愚願力在師云一句話頭聰明學人卒難領略謂識解多故猿騰躍無暫停息欲收為圓人稱頓覺者譬如妄號帝王非敢向人說也實無一法可容隨順大似掩耳偷鈴倘放下一言一字如食美味念念不忘況教理耶思之可見不待博山重加注腳古人所謂不得水精珠難澄濁水不得宗門中慧炬實難破千萬劫之重昏況夢中之夢金剛錍三大部恐未易與居士作屠刀也問台宗圓頓尊貴無上則且置縱使廉纖落索實不如禪宗直截透脫而夙業深重之護玄終不妨舍易從難辭甘受苦何以故請先借世緣自忖自卜玄實生性薄劣初叨第力辭館選甫作令亟徙寒氈所至無不骯𩪝重圍笑拌頭顱一生從喫辛喫苦中自歌自舞乃至生死大事法門豈同兒戲而於時所從尚參究極則既有我大師全提正令何須凡下免胄趨風惟念達磨既開少室之宗智師始創佛隴之統而五家宗派烈日中天三觀密藏方沉暗室一炎一冷不可同年而語遂於辭炎趨冷千辛萬苦之護玄不覺痂嗜偏投每慨大蘇妙悟以後荊溪四明一輩孤燈寒𦦨僅不絶於幽溪即中一線師資嬰杵有懷魂銷色黯持此願王泥犁不避無心擇便有分奔波牛順羊逆佇師殺奪師云台宗圓頓最尊無上敢問台宗所宗者何為最尊無上也若謂一心圓極之理當求之在心非求教也我達磨大師傳佛心印航海而來斥諸名相故云直指人心見性成佛其機感契悟如人飲水冷暖自知雖入不思議境而心行處滅向上一路千聖不傳說著箇佛字猶為賸語非同教家自生難易有圓有頓有依傍也有識性者孰不能習教惟宗門下實難得人居士何不念祖師命脈繫如懸絲正要得深入教乘者了明大法傳祖師心印開衆生慧眼實博山之至望也問離心意識參既離心意識將甚麼參參箇甚麼師云心意識作麼生離只將一句話頭真參實究如喪考妣相似心意識要起起不得何用離耶即此心意識豈但要離如紅爐點雪求其蹤跡了不可得且道參箇甚麼居士就將此是箇甚麼便好討箇下落如不會者不妨疑著良久云散盡閒雲清野壑海天大燎亮月明中問何物凡愚蒙師不棄殷勤答問析剝難酬奈凡愚既非格外人安得領在未問先大師答而無答凡愚問而復問惟我大慈幸卒教之一蒙示云即今若有取捨同之一字即是妄言玄復疑妙宗宗旨正謂取舍愈有愈無斯為圓妙若無之始無不落小乘耶師云愈有愈無斯為圓妙殊不知天台借路還家終不墮有無窠臼有無二字實圓妙中影響非始無也若膠柱鼓瑟豈但小乘而凡夫熾然心行欲擬之圓妙大似捫空捶響縱經多劫終無得理有智之士寧不痛思者歟問一蒙示以葛藤掃葛藤與不絆葛藤者優劣若何玄復疑不絆葛藤豈非向上極則若以較台宗二而不二不二而二正爭此葛藤之有無惟我大師實云非敢以宗抑教以教抑宗豈復置一優劣耶若謂劣在人不在教教理則不廢葛藤咎豈獨在人耶師云不絆葛藤者實在人非在教也譬如生在王家天然之貴不假他營若以功能較之優劣實霄壤也楞嚴經云阿難縱能宣說十二部經典不如一日修無漏業華嚴又云如日當空照童稚閉其目自言何不覩多聞亦如是此是教家料揀教與人優劣不待擬議而泮然氷釋矣今時習教理者何不提綱挈領而楷定法則經之過歟人之過歟問一蒙示云多句不離一句須得水源若尋枝蔓妄云句歸何處不太早計耶玄竊聞台宗專用六識謂之去丈就尺去尺就寸又謂伐樹得根尋水得源豈不懸合我師宗旨溯水源而掃枝蔓耶既得其本即蔓是本既尋其源即流是源一句多句多句一句似無復遲早之可判也師云台宗專用六識正類吾宗門中騎賊馬趂賊謂以馬為根也為源也可乎若以馬為根源是謂之昧却主人翁可謂奴即不辨也圭峯云識如幻夢但是一心八識當與一刀況其餘耶若論圓極之理當得其根毋尋枝葉當得其源毋滯漫流也得其根者一枝皆木得其源者一滴皆水若以枝葉漫流為根本源流者何啻據淮泗而曰即阿耨達池不亦太早計乎問一蒙示云一念識心保無失腳用那箇心保得若用識心識心隔陰即不能知宿命具通恐一生難辦大師慈悲警䇿至此可容凡愚未得謂得以地獄為兒戲乎然台宗專用六識既是一家宗旨止觀懸合首楞嚴云憶佛念佛現前當來必定見佛即謂憶念亦用六識確為無過故圓人雖極圓頓而至何位斷何惑證何理往判諸教諸位無不通達學人分中正不必宿命神通即教中明用六識六識明知位次若能依教修行學人縱必不能自保而教理可作保人凡愚人作凡愚朴實語惟望大師哀憐攝受而卒教之師云台宗借用皎如日星自是居士錯會耳豈不聞念空真念生即無生若以六識為主宰譬如蒸沙作飯沙非飯本楞嚴斥能推者為心又令微細揣摩居士認定六識不待別求寂常心性正類乎認賊為子不亦謬乎如止觀圓頓義者初緣實相造境即中無不真實從實相中出止觀二義云法性寂然曰止寂而常照曰觀貴在起行不滯解門如南嶽大師九旬常坐一時圓證非解也又如法性經云滅非真諦因滅會真滅尚非真況意識耶所引憶佛念佛等語念空真念與自得心開還存得意識也無若以解心判教便為究竟天台不必觀心南嶽何勞常坐惑終不斷理豈入圓縱經多劫修行止是說心說性之人道火何曾燒口說食豈能充饑勿自瞞頇思之可見也
