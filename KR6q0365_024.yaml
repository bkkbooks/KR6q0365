body:
  text: 住博山法孫弘瀚彚編首座法孫弘裕同集宗教答響四卓發之文學問華嚴會中二乘如盲如聾然亦兼攝聲聞以包含無量乘故此經雖云二乘種不生乃所宣道品大小互通正與華嚴四聖諦品不異故有生彼經劫方證小果者如大智度論言彌陀亦以三乘度生自應二藏五教總攝何云不攝小乘且既通雜華復不能通雜華所攝無量乘耶師云居士既知華嚴攝無量乘豈上德聲聞如身子目連杜視絶聽悉是如來勝方便力故為導引一類小機發起深信信於一乘如法華云佛以無數方便引導衆生其實皆為一佛乘故此經云二乘種不生者正為化導二乘執空不修淨土者鈔云豈獨凡夫亦度二乘聖人二乘既生況菩薩不生彌陀以三乘度生當無疑惑既以三乘化導亦攝無量乘二經互通不言可喻涅槃云闡提不入非闡提不入涅槃也問餘門學道名竪出三界念佛往生名橫出三界所謂餘門正指教中觀行故參禪稱為別傳淨土亦云徑路皆以超越觀行故今云觀即是念念即是觀直以台觀當之不反鈍置念佛耶師云橫竪等論鈔云如蟲在竹竪則歷節難通橫則一時解脫謂樂與苦域並峙故曰橫也此是一往之說論一心者橫竪皆遍獨淨土不具竪而止曰橫彌陀經云其佛光明無量照十方國無所障礙觀經云是心作佛心即佛故淨土惟心以界曰橫論心豈不圓具耶餘門非單指觀行實乃具一切法門參禪稱為別傳者非五教之所詮淨土亦云徑路豈三觀之所及今說觀即是念念即是觀舉一念即具觀行以一念超越即便往生非觀行成就然後乃生故知念不妨攝觀非觀行能鈍置念佛也問觀經疏以十六觀通三諦今以此經旁通觀經則入台觀門庭以此經分屬圓教則入事事無礙法界然台宗以圓教獨歸法華而第四法界惟華嚴有之未知台宗三觀得攝法界觀否此天台賢首差別處若為會同師云觀經疏以十六觀通三諦今以此經旁通觀經亦不妨以十六觀旁通此經何以故彌陀經云寶網行樹蓮池階道悉以金銀琉璃玻瓈合成其佛光明無量聲聞菩薩無數復以西方攝懸鼓豈不具足一十六觀似不必入台教門庭台教當入我之一念為徑中之徑不亦宜乎謂此經分屬圓教天台以圓教獨歸法華鈔云事事無礙惟華嚴有之既云圓教豈不攝事事無礙以事事無礙標法界觀名豈不攝圓彌陀分屬如掬海之一滴不妨同於全潮天台賢首與此經疏鈔別而不別不別而別非此之謂歟問合論判彌陀淨土是權非實淨名惟心淨土是實淨土然淨名言菩薩成佛時直心等衆生來生其國是明言攝受衆生死此生彼之事與彌陀無二無別正指往生事相論中何以分作兩橛疏言此指事一心者豈事一心便不名惟心耶師云合論云彌陀淨土是權如云一念至一心不亂是權實淨名淨土是實如云隨其心淨即佛土淨菩薩成佛時如云直心等衆生來生其國是實中權如指門必入其室如入室必由其門二經大意不妨互舉非分兩橛也疏指事一心者重在持鈔云若達此心四性不生與空慧相應名理一心此即事而理安得不名惟心也問此經言衆生生者其中多有一生補處大本乃言生彼國者皆當一生遂補佛處皆當之義不止多有然則中不胎生等皆是補處皆為等覺菩薩耶師云此經言衆生生者多有一生補處此多字從近而言大本云皆當一生遂補佛處此當字藉遠而言此經云其國生者皆是阿跋致華言不退轉豈非當來遂補佛位即中下胎生遂補佛處益明非是現稱等覺菩薩良以延促同時所謂徑中之徑於斯益信矣問單念佛人不修助因所謂但得本莫愁末故云不修餘行得波羅密亦云即是多善多福乃諸佛以萬行因華莊嚴法身今念佛所證止可云素法身抑己具足萬行莊嚴耶師云單念佛人不修助因古人淨業中知識殷勤化人念佛同生淨土豈非助因不修餘行惟念佛得到彼岸故信此一門即是多善化彼同類即是多福又夙具種性即是多善夙修餘行即是多福即此已具萬行莊嚴非素法身也問宗門教人參念佛底是誰似與別則公案無二未嘗回向西方鈔云體究念佛與尊宿教人舉話頭下疑情意極相似此只相似還是直參誰字教分四種念佛未列體究一門今以攝持名中却似經文本無此意不應以此入淨業門庭若謂參此話頭悟則心開不悟亦不失往生此為禪宗留一退步正墮偷心耳若謂此疑不破便不得生是反不如一直念去不起疑情者雖不開悟尚得往生也乃智徹禪師直以此作淨土正行慈照天奇毒峯皆教人參究念佛此諸師又何所本耶雲棲若祖諸師疏鈔何不直拈誰字若只相似又更有差別否其相似不全是處何不道破師云宗門教人參究貴在以期大悟更不回向西方何得言留一退步不失往生是居士注腳非宗門意鈔中謂體究念佛參與體者不容無說參謂參破體謂體貼體貼亦有佇思之義宗門必不用少林云心如墻壁乃可入道又不與一直念去較其優劣雲棲祖諸師亦是淨土一門收此一類之機放開一線道又何辨相似不相似也問一切國土惟想所持故以淨想換却妄想如子憶母必善想容儀歷歷可覩今持名一門但令念聲相續不取相貌只與讀誦無二心易馳散故稱名方便或依出入諸息以為藉氣束心乃禪經中攝心調息諸法似屬小乘未為第一義諦將非大心凡夫所當行持耶師云楞嚴云憶佛念佛謂憶念相繼自得心開非比單持名號至一心不亂夫讀誦者惟記惟解持名者只欲往生如負重擔只欲到家馳散何有乃至一心不亂非藉氣束心比也生極樂國如彈指頃與法華其疾如風相類大心凡夫豈捨此捷徑法門而別求乎問大本云若有衆生發一念心念無量壽定生彼國疏中尅期止及十念而不及一念何耶又念性剎那生滅此經七日定力乃生則未得禪定者無分若此一念如一稱成佛釋作歸命一心則大本不應繫十念之後若止如經文作一念喜愛之心則與化經言不動如來佛剎不以愛戀之心遂得往者難易不同此則全無定力亦得往生其勝方便又當超越小本耶師云十念與此本相互通故何分優劣以一念具一切念故一念未必為優以十念即一念故未必為劣是故說一念不妨十念說十念不妨一念又剎那際不妨七日七日不妨剎那際經云一念普觀無量劫無去無來亦無住或說一念或說十念或說七日或說多劫皆如來勝方便故亦不論定不定喜愛不喜愛但一心念佛無事不辦如靈丹一粒點鐵成金更無疑慮又何必以難易較其超越也問此七日若平時姑置待臨終方念已為天如所呵今既屬平時者為是七日之後盡此形壽更不復亂耶為復此後雖亂終得往生耶若永不復亂不應止名七日若更亂者則已經退何能感佛現前師云經中云一日乃至七日是剋期往生不論臨終平時一聞佛名便發猛鋭七日往生者故不論若未生者在無間斷念念相續豈可七日得定再不念佛名其執持二字何以消文疏中云執者聞名受之勇猛果決不搖奪故持者受斯守之常永貞固不遺忘故何云七日復隨散亂行者一心正念更加猛利以終身如初發念頃何愁佛不感孚耶問鈔中明理一心為觀力成就則體究全屬觀門但前言妙觀難成故顯持名殊勝今乃復通觀法仍是定觀勝於持名矣若云參誰字是體究則又全屬宗門且當參話時不應有念如知不二寂照難思等幾許理路可傍未免兩處負墮義云何通師云前言妙觀難成顯持名殊勝良以娑婆之衆心多散亂故持名攝念勝乎觀門今乃復通觀法以觀法是淨土法門故如持一念不妨具足諸觀讀彌陀經者西方勝境孰不冥契但以執持顯勝故以觀境殊勝不妨速於持名以持名徑捷不妨超於觀法兩處義成何得言墮若宗門參究是逗機之法似不必與淨土和會如參念佛者是誰即屬宗門言語道斷又不可以理路為依傍也問一部疏鈔大意全重理持則所明持法最為要害今既是持名復云理觀既是理觀復拈話頭禪淨止觀三法混淆雖復義理圓融而行人念不歸一將何為宗此與一門深入專修無間之旨何復不侔師云疏鈔一部雖則全歸理觀如玄談守約則惟事持名文云舉其名兮兼衆德而俱備專乎持也統百行以無遺以此則知專貴持名不妨發明理觀觀理明徹如膏益火則更增猛熾也若單提參究單論觀理如華嚴大部攝無量乘上根利智條條是路亦不名混淆但以根器相投亦吾師翁之善巧耳問疏言一心即達磨直指之禪又云六祖斥無乃門庭施設不同假使才弘直指復讚西方則直指之意終無由明既言即是直指復云為門不同是少林與曹溪亦復不同耶師云疏言一心者豈但直指之禪一大藏教無不收盡即歸之直指之禪者此是為參究念佛者說非為持名者發機門庭設施不同者正符合直指之道亦非為持名者發機雲棲以參究念佛收之淨土一門此是廣被機宜看疏鈔者不妨求一門深入譬夫入海者而責之淮濟江河深淺廣狹更較其同異不亦愚乎問疏指至心念佛一聲滅八十億劫生死重罪屬理一心若事一心者多念止滅少愆乃又引佛名經言一聞佛名滅無量劫生死之罪釋云一聞則不待憶念無量則不但八十億劫然則何必獨指理一心也覺於此中自相違礙又此經亦言聞經聞名皆得不退則一切等閒發願散亂稱名者咸不退耶師云果得一心則不論理事疏鈔謂多念止滅少愆者此是就散亂而藉一心者說也聞名滅罪衆生在迷亦復不知如地獄聞名即得究竟并獲往生者何止滅罪蓋論衆生心力之勤怠耳大凡教中論事論理論定論散如用兵之法式臨陳決勝貴在當人必不以法式楷定然後為正論者矣問棗柏言華嚴一乘大道非往生菩薩境界何故華嚴長子乃以十願導歸極樂如生公說闡提有佛性則後出涅槃為證今行願全與棗柏不符則一論宗旨竟將安歸乃雲棲但拈出導歸之文亦不能折棗柏之誤當知棗柏未易輕詆今欲和會兩義其說云何師云棗柏謂華嚴非往生菩薩境界為顯一乘不妨抑彼揚此普賢導歸極樂正謂攝無量乘故棗柏為化大心凡夫頓入華藏故普賢是華藏中菩薩以十願導歸極樂者為三根普利故如觀方入一隅則十方普現故良以大心難發極樂易生究竟旨歸彼此符合以此則知棗柏原非錯誤雲棲安得以是為非耶問因戒生定因定生慧則一心者自制心始此中自當發慧所為不假方便自得心開也天台念佛五門次第亦復如是今以事持屬定門攝理持屬慧門攝而云事持未能破妄利根徑就理持將慧不由定一切理路通明便可當覺路耶師云因戒生定乃至天台次第此是教家法則然亦有先慧而後定者如云專持名號即得往生自非慧根深發莫能信也雲棲以事持為定門攝理持為慧門攝者此亦教家法則然事非慧而不持理非定而不發事持既能發慧安得不破妄耶又可將一句彌陀具戒定慧猶深入理不可不知何也為專持萬德洪名不生諸惡豈非戒也至一心不亂豈非定也自得心開豈非慧也念空真念緣起無生豈非理也深入至理淨土惟心生彼不離生此是正覺地何必捨事持而入理解謂之覺路可乎問觀雖十六言佛便周如經所言觀佛身故見佛心觀佛身者從一相好入則眉間白毫可攝念佛三昧何故慈雲但教人作蓮花開合想鈔中亦止通普觀為助因耶師云觀經言佛便周者佛以法界為身故觀佛身故亦見佛心者謂緣勝境入實相理故既從一相好入毋論眉間白毫蓮花開合以十六觀門隨緣一觀悉是助因鈔中以普觀為助因者猶為確當問諸經多言念佛行人現前見佛如遠公三覩聖相等所謂能念佛人佛住其頂古德教人決志求驗正在平時今經止言臨終佛現豈七日功成未能現見僅感臨終耶抑必現前見已然後臨終得見耶師云諸經多言行人現前見佛亦有當來見佛之語楞嚴云憶佛念佛現前當來必定見佛其必定二字深有旨趣如種穀得穀必無虗棄之功也遠公三覩聖像現前見佛也淨土諸師臨終感佛來迎當來見佛也由此觀之只愁不念佛不愁行人不見佛也毋論平時七日但一心不亂專持名號喚醒自性彌陀一切佛菩薩像皆影現其中也問往生菩薩心不顛倒故能預知時至與本願相應然則坐脫立亡庶幾來往自由能識死從何去者何為古宿全不以此勘驗至云死時何若欲先知耶師云淨土菩薩與宗門坐脫立亡識得死從何去者大不相類淨業行人尅期往生預知時至宜矣宗門中人知亦可不知亦可發明大理視死生如夢幻安得於夢幻中著腳以生死為實事耶又當知化儀既畢來去自由此等不思議解脫惟同道者方知又何得與淨業較同異耶問觀經十念論明臨終心力猛利能勝終身行力乃大本十念不言臨終此與觀經為同為別若此七日不必定是臨終則此十念亦屬平時既非最後大心何能化往寶王論反以一念為正是義何居師云大本十念克十念往生而不克往生者乃日日十念雖不言臨終以至臨終明矣論明臨終心力猛利此為一等猶豫行人說恐臨終障重不克往生以猛利勝之能勝終身行力者此加勉之義使行人以遂往生假如平日猛利大事已辦者十念七日俱不出一念故何緣自生疑難問觀音勢至同侍彌陀為西方三聖觀音反聞自性與今持名一心總以音聞為教體正應同屬耳根圓通又文殊亦發願往生何反揀去勢至鈔言耳根不攝念佛念佛能攝耳根是勢至能攝觀音而觀音不攝勢至將持名不屬音聞而觀音不補彌陀為安養教主耶師云耳根以聲塵旋入念佛以舌上稱揚然俱屬音聞出入義別文殊取一根深入安得不揀雲棲判根塵同異豈可言觀音不攝勢至耶如論往生行業亦不取耳根圓通豈勢至復不攝觀音耶正所謂打鼓弄琵琶非以諸法門迹上較衆聖之所行處也問世尊言諸修行人用攀緣心為自性者猶如煮沙欲成嘉饌今此念佛心是攀緣心耶非攀緣心耶若用攀緣心者一切覺觀思惟皆是生死根本若非攀緣心者何言念性生滅因果殊感若云此生滅心即不生滅心者何云煮沙此與波水之旨當自不倫波即是水沙非是饌大覺立喻應不雷同乃法華所云若人散亂心一稱南無佛南能所云不斷百思想對境心數起者又非即用此生滅心耶師云世尊斥世間人認攀緣心為自性非斥用攀緣心入自性豈不聞圓覺云以幻修幻天台專用六識阿難云供養如來亦因此心永退善根亦因此心以此推之此心亦不惡可以為入道之玄徑論乎真性何用念為論乎樂土非念莫生文殊云念性生滅此為選耳根圓通淨業智人安得隨文殊腳跟轉文殊如修般舟三昧又當以我念佛為良導法華一稱塵勞起而佛道成南能不斷妄想興而涅槃現又當留待別時向居士一一道破問經末先言不退後云往生正以現生取辦超乎餘教鈔中反開少壽多障不克往生一路云于來世得生此墮慈照所云其人自不知我當生淨土却要來後世再得生人中也乃引禪門才出頭來現成受用語為證則何以永明揀去有禪無淨一流明淨業之諦當於宗門耶師云經中先言不退後云往生者謂先說淨土已生者後云念佛必定往生非現生取證也鈔中開少壽多障為多障行人不信決定往生如信者則不障矣來世得生者謂不信聞名亦種下來世種子顯聞名殊勝超乎餘教故不墮慈照之語永明抑揚之說單扶淨土一路將宗門推向萬丈深坑亦不為分外禪門有三生打徹故云才出頭來現成受用又何勞逐句與淨土合轍問準提密圓與華嚴顯圓並屬第一疏云持名功德猶勝準提今念佛人盡此報身方得往生所證極果僅至上品何以不如準提所開不轉肉身便得往詣十方淨土只于此生得證佛果耶師云佛所設教為當機者極成如此土釋經者亦復如是天台歸圓法華李長者亦多料揀李長者必看天台三大部天台未見李長者合論若見時又不知當何如華嚴準提及淨土法門各有所主不可逐一比況古德云一兔橫身當古路蒼鷹才見便生擒似不必向迹上追尋夙具靈根者才聞著一言一句便有出身路所謂大藏小藏從自心中流出豈可以部帙較優劣耶
