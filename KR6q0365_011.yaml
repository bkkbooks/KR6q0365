body:
  text: 住博山法孫弘瀚彚編首座法孫弘裕同集頌古拈花微笑瑞瓣靈枝劫外春拈來攪動海山雲婆心況是如天遠誰是拖泥帶水人乾闥婆王獻樂迦葉起舞袈裟角上帶些些撒向閻浮布種芽最喜琴聲清入骨山川隨處綻曇花世尊因五通仙人問六通義應諾聲消那一通山崩海竭絶形蹤仙人有口難分剖雙耳聰聰却似聾普眼欲見普賢三度殷勤遍界觀大千祇在一毫端六牙白象原非遠不見多因被眼瞞女子出定出定謾云彈指間空勞神力不相關而今慣喫和羅飯一日三餐飽便間阿難尊者問金襴外別傳甚麼披得金襴早是遲聲音相應合知時門前倒却剎竿子吹落空花第幾枝二祖乞達磨大士安心覓心不得與心安月印澄潭徹底寒莫逐根塵生下劣金毛獅子大家看三祖懺罪萬里天開一陳風雲推桂轂出煙籠秋深秋浦那清影露滴芙蓉兩岸紅打牛打車人道車行只打牛我圖牛運打車休忽朝車破牛亡處逈地遮天祇一頭南嶽遣僧問馬祖祖云自從胡亂後掃盡狼煙志未休晴空白日使人愁太平不挂將軍印擲刃懸戈始徹頭龐居士問馬祖不昧本來人山為圖畫水為琴誰解其中發妙音箇是馬師彈得出宮商清慘痛難禁馬祖不安次玉回珠轉發真機混不得兮類不齊莫謂老儂無氣力倒騎石虎過遼西百丈再參馬祖竪拂當陽振祖威難將此際話離微灼然突出燎空燧箇是金毛獅子兒百丈野狐燒却百千萬億身誰為我也孰為人若將落昧通消息曠劫無明理不伸南泉問僧夜來好風試問松風逆順酬謾將得失豁雙眸毒龍未肯輕開口鑒在機先始徹頭僧問南泉百年後向甚麼處去拽耙拖犁異類中崢嶸頭角出羅籠溪南溪北無蹤迹莖草銜來孰與同鹽官喚侍者灼然扇破索牛來樹子無根石上栽當時圓相如拋出多少英雄被活埋歸宗剗草次一鋤兩段血淋漓大地山河乞命時識得此翁真面目難將粗細與君知趙州問大慈般若以何為體相逢特地一重關大笑呵呵豈等間置帚謾言今日事清機歷掌逼人寒臨濟訪平田遇嫂使牛路途不識棒加牛使得終須是對頭行過平田長岸也耙犂未動合知休趙州勘婆子臺山路話腳跟之下臺山路今古無人辨是非勘過依前驀直去却來平地捉盲龜婆子送錢趙州轉藏經不受人間不施錢趙州多著一番顛勞渠四大和風轉惹得阿婆道未全僧問趙州如何是道州云墻外底從來大道透長安墻外酬渠話轉難會得若翁真實語現前一日飯三餐僧問趙州如何是祖師西來意州云庭前柏樹子庭前柏子惠西來眼上眉毛腳底鞋嘗記江南三月裏鷓鴣啼處百花開青州布衫重七斤七斤衫子真歸處何必尋渠較異同更問其中端的旨趙州牙齒不關風僧問趙州如何是出家州云不履高名不求苟得三途逈絶出家兒身不寒兮腹不飢竹杖敲殘山頂月倒吹鐵笛詠新詩三次喫茶話南北東西四路通謾將曾未話形容醍醐滴入焦腸裏靜水無波看活龍婆子燒菴逐僧萬花叢裏不沾身陷殺閻浮多少人識得者僧行履處軟綿團內有剛針丹霞參忠國師侍者被打逐出耳提面命貴當機大哭還思大笑時果是南陽門裏漢皮穿骨露不饒伊僧問大隋投子劫火洞然時壞不壞義壞不壞兮較大千骯𩪝言句不勝錢衲僧眉下如開眼笑指虗空缺半邊臨濟兩堂首座齊下喝濟云賓主歷然未喝應須驗主賓衲僧肯向句中親若於喝下通消息木馬嘶風過漢秦德山托鉢家門興盛子強爺密啓臨機路轉賒説法不同昨日語鉢盂柄上較些些三玄三要言中有響句藏鋒血染山花別樣紅聊爾與君通一線眼光如瞎耳如聾五位君臣正偏兼帶驗重玄君義臣忠事事便獨蹈大方消息盡絲綸應兆未生前僧參雪峯低頭歸菴至見巖頭指末後句低頭無語便歸菴今古將何作指南祇者是時猶不會青山如翠水如藍舉上座訪琅琊相逢聊爾敘寒暄何必區區吐妙玄淡飯粗茶隨分足莫教重起竈頭煙雪峯南山鱉鼻蛇鱉鼻當軒好看來喪身失命話全該一棚傀儡都拋出何似玄沙帶活埋僧問雲門樹凋葉落時如何門云體露金風樹凋葉落露金風澗水山花處處同普字法門親瞥地不須擬議話從容僧問雲門殺父殺母佛前懺悔殺佛殺祖向甚麼處懺悔門云露殺佛還如殺父時懺無懺處顯全機負慚懶向人前語笑逐清風倚杖藜玄沙三種病人刳腸吐膽老婆心擬議纖毫自陸沉要得現前真受用六根不具始知音大顛趂首座數珠提起問端由晝夜難將百八酬趂出座元誇好手泰山難掩大顛羞興化打維那宗師一片毒心腸痛棒維那頗廝當鬼哭神號留不住至今千古姓名香夾山答法身句見船子後亦如前答雪前風勢侵空急雪後寒光照眼明黃葉紛紛如剪綴賸餘松柏映山青六祖遷化云來時無口香煙直灌曹溪路石女猶眠錦帳中仍問歸期何日月案山風起落花紅鼓山聖箭九重宮裏路通霄隨處稱尊舌更饒何似鳳銜丹詔出邊郵萬里盡歸朝大通智勝佛十劫坐道場灰頭土面稱知識踏破毗盧額頂紅多劫不能成正覺祇緣身在道場中南院上堂舉啐同時語子母渾融氣未分只須啐乃相親一朝㲉破情忘處倒跨橫趨不辨人僧問雲門如何是諸佛出身處門云東山水上行水上山行能信否誠然諸佛下生時而今不許雲門語電捲風馳祇自知法眼問修山主毫𨤲有差權衡掌握重輕分毫髮無欺説似君用得熟時稱好手公平須是當家人趙州鬬劣不鬬勝義勝緣輸理一如橫張赤幟道情殊趙州不是間相識驢糞逢人換眼珠虔侍者不肯首座香煙斷處辨聱訛肯信峯頭語更多首座當時如出定管教人唱太平歌興化獎在太覺為院主一日覺勘驗化連喝覺連打販賓鬻主頻施喝痛棒如風不順情酸澀肚腸都嘔盡衲衣脫下便惺惺雪峯古澗寒泉話萬丈深潭徹底清隨緣飲啜不關情趙州言句從來辣雨後青山眼倍明世尊升座迦葉白椎清白門庭無賸法從來一道絶周遮飲光不合重敷演擊碎虗空路轉賒迦葉尊者因外道問如何是我我醫盲手段不尋常撥翳金針別有方炟赤太陽重益火真誠一片熱心腸蜀僧為六祖塑像三十二相憑君塑就裏何曾有梵音佛性分明親指示莫教辜負老婆心馬師令人送書上徑山山發緘於圓相中著一點欽師猶被馬師惑殺得人兮活得人虎視諸方格外旨圈圞一點是關津馬大師西堂百丈南泉玩月次窮源的是一家親倜儻丰標壓四鄰拽斷傀儡棚上索驀然鸚鵡過西秦陸亘大夫向南泉道肇法師也甚奇怪指花破夢南泉事天地同根陸大夫當下不知花是夢至今流落滿江湖鵝湖義禪師麟德殿與衆法師論義揑轉鼻頭行古路撇開市往山阿不知幾度清風起無奈禪師一點何僧問興善如何是道師曰大好山滿目青山誰是道居然知道不知山閉門作活何多事樵採歸來鎮日間僧問楊岐叔禪師如何是祖師西來意師提起數珠露濕雲凝曉不收暮霞猶挂樹稍頭西風夜半猿啼後笑看蟾光海面浮僧辭趙州乃竪拂子云有佛處不得住不行鳥道不居醉眼摩娑白晝眠謾道逢人莫錯舉摘楊花是季春天雪峯問靈雲前三三後三三意旨如何雲云水中魚天上鳥前三三與後三三魚鳥何緣作指南因見桃花發一笑而今觸處放癡憨石梯見侍者托鉢赴堂乃喚侍者侍者應諾穿耳胡僧拍掌回尋常問答語如雷莫言此外無多事踏破須彌頂上苔僧問多福如何是多福一叢竹煙雲鋪地起重層斜曲縱橫指似僧古殿不嫌車馬迹清風啓戶雨如繩青原問石頭遷禪師曰有人道嶺南有消息家國無人寄信來客途何事苦徘徊春風吹入名園裏無蒂曇花一夜開丹霞訪龐居士見女子洗菜東鄰翠鈿映娥眉俊俏如今更是誰却被箭鋒施冷地驪龍忍痛虎傷肢丹霞問僧甚麼處宿食有因緣宿有由緇衣端不向人求雲山黯黯清如許一夜霜風盡白頭道吾智禪師指佛桑花問僧禪心隱隱露春規酒未沾唇覆玉更向花源辨真假一雙空手夜歸遲香嚴擊竹悟道一擊有聲聾兩耳動容不墮眼初開未生面目渾如此無限行人被活埋趙州庭前柏樹子庭前柏子西來意流布叢林是與非盡把乾柴當猛火阿誰於此絶思惟雲門餅特地來伸佛祖談咽喉塞斷莫顢頇若將斯語重加注十擔油麻樹上攤南泉斬貓利刃當陽作者知何人救得此貓兒若無起死回生術空向沿途自泣岐德山棒截斷衆流沒氣息隨波逐浪話從容而今作賊偷心漢瞎棒盲枷效此翁洞山麻三斤端嚴妙相難描摸何似當陽指出來一夜西風侵骨冷天明滿地是乾柴洞山五位頌正中偏一輪古鏡照衰顏清風吹起蓬鬆髮回首猶驚兩鬢刪偏中正赤肉團中全慧命倒騎石虎踏層氷根塵永處那伽定正中來淡淡澄江月印苔相逢莫怪無回互誰道當機貴活埋兼中至捧劒書紳恆順利堂堂妙用古今輝互換靈機稱至治兼中到夜明簾外沉清照大千沙界絶纖埃不許時人開口道
