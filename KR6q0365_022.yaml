body:
  text: 住博山法孫弘瀚彚編首座法孫弘裕同集宗教答響二願力品第六問發菩提心最勝功德利他自利為菩薩行如諸比丘對佛菩薩發大誓願為是義故其如宰官當權住世一切易辦至或卑微分力歉薄作何願力而為功德師云法門無量願為先導世出世法無願不成願者好也欲也欲捨離一切惡法故欲破除無明結使故欲入諸菩薩甚深法門故欲廣行善法饒益有情故欲化諸衆生同成佛道故若無有願如畫無膠如馬無轡如陶家器雖成其壞未經火煆終不堪用是故初心學者及諸菩薩以願為基本故更以弘誓堅之弘者廣也誓者制也以弘誓願廣制其心令無退墮釋迦大師因地中發四弘誓願謂衆生無邊誓願度煩惱無盡誓願斷法門無量誓願學佛道無上誓願成然發願度生必能自度入此法門煩惱自斷法門自深佛道自成矣發此誓願須以勇猛智力資以自強如有力人無有怯弱無有退轉徑入佛道斯誓願最為有力也是故金剛藏菩薩於華嚴會上令諸菩薩憶念本所誓願普大饒益一切衆生皆令得入不思議智慧之門又諸菩薩因地有大智力發大誓願謂能摧怨敵故不可屈折故知是處非處無因惡因等儒云終日乾乾此亦剛毅之象以自強不息而入道故初心者勇猛智力降伏魔外入深法門故若無願力者譬如種子無陽悉爛壞故此願力非但比丘能發諸宰官亦當發豈但宰官有權位能發即一切長者居士乃至最卑微無勢者皆悉當發此誓願自度度人將所修功德悉皆回向大地衆生同成佛道此即覺心覺心者即菩提心也此心不可分發當全發又不可間發當時時發數數發對佛發對菩薩發對聖僧發對善知識亦發對一切僧友及有情一切衆生前悉當發以此大心直至成佛皆願力故故知願力乃佛法先導如有一人我欲參禪決不退墮即願力故豈但善願即世間所欲皆以願力成故昔有一推車人不信佛法一日推車至塔邊過見火燒寶塔心不忍壞嚴飾故進前救之已戲發願言佛説有果報法我救此寶塔願我來世為一最長大有力者捨此身已即生阿修羅道其身最長大而有力此戲發願亦滿足不虗況真實心至誠心而發願無有不滿足者如初心發願慎不可生卑劣想當發菩提心凡所修最微善根及最殊功德悉皆發願回向於大地衆生同成佛道縱於其中顛倒退墮亦藉願力相資如無目人有牽引者能前進故修淨土者以信行願為資糧參禪者安得不以願力為導引耶在家欲捨塵勞欲離火宅欲出生死欲免輪回非願力堅強則不能也是故當發大願豈以卑劣而不發大心乎若達平等實相一微細衆生與毗盧遮那佛等無有異華嚴疏謂遮那如來入一微細衆生身中入定全身不散此衆生不覺不知謂佛生同體故理無分齊故維摩經謂供養難勝如來與最下乞者等斯達實相之理無所分別以此觀人有貴賤位有尊卑而心無高下也是故當發大心以願力維持直成佛道似不可須臾有間然也懺悔品第七問懺悔二義槩括過未衆生惡業宜於自心皆悉懺悔今如請僧禮拜求懺或復持般若諸經皆懺悔義又復自心朝夕懺悔此於法中是一是二有淺深否師云業繫之身衆苦逼迫五陰熾盛六賊交侵心識奔馳無暫停息起十惡之業因償無窮之苦果貪嗔癡愛猶如猛火妄言綺語疾於迅流造殺盜淫無底畔之深坑著見慢眠沒涯岸之苦海起六十二種邪見成八萬四千障門障菩提心障菩提道障菩提行障菩提願輪回三有不聞佛法僧之洪名汩沒四生那識過現未之報應殊不知因連於果果徹於因因果相酬絲髮不爽因微果熾慎身分造十習之愆作少償多故地獄有六交之報若不痛申懺悔悛革前非互造互償無有窮已夫懺者梵語懺摩此云悔過懺謂永斷未來非悔謂耻心於往犯故云已作之罪願乞消除未來之非更不敢造洗心懺悔者有二種義一者理懺二者事懺理懺者如云罪從心起將心懺心若滅時罪亦亡罪亡心滅兩俱空是則名為真懺悔又云若欲懺悔者端坐念實相衆罪如霜露慧日能消除如云罪從業起業從心起心既無生罪將安寄良以衆生業纍深厚剎那靜念倐忽萬端若不深達實相之理難以去除不究緣生之法何能滅罪永嘉大師云觀實相無人法剎那滅却阿鼻業若真實究理惟參禪一門最為確當單提一句話頭大理不明如喪考妣果有如喪考妣之心自然識浪不生業不能繫不然則遏捺妄心令妄不起謂之心亡謂之罪滅大似隔抓癢欲滅罪愆欲了生死欲出輪回無有是處又如一心念佛并修止觀法門深達實相皆可滅罪惟參禪一門最為超似滅罪疾又不可以諸法門為比對也二者事懺謂端對聖容廣陳供養散花行道稱佛洪名五體投地如大山崩發露披陳求哀懺悔或禮梁皇法華等懺或禮千佛名經皆懺悔意或七日乃至四十九日百日三年現諸瑞像乃能滅罪此在自己力行或自身德薄行淺請戒德名僧二十四位至四十八位一百八位鋪設齋筵亦當滅罪如目連尊者自不能救母佛今於僧自恣日供養衆僧及禮衆僧足其母當日滅罪脫餓鬼苦此仗修行之力懺主敬衆僧當作佛想即得滅罪不可生怠惰心輕慢心如生此等心者豈但不滅罪只恐反得罪如請無戒行赴應演教之僧斯即捨財功德僧尚得罪非能與懺主滅罪也又此懺悔一門思地獄苦發菩提心生大恐懼生大慚愧念地獄餓鬼畜生道無邊衆生之苦當為彼等同求懺悔脫惡道苦餐佛乘樂使地獄空不為我一人得出離故此即菩提心若發此心刀山劒樹盡作香林爐炭鑊湯皆為淨土則無惡不去無罪不消也又懺悔者思生死無常苦空無我一息不來剎那異世設墮惡道苦不可言懼惡道苦發菩提心深心懺悔如彼怖王懼死則無罪不滅也怖王者佛滅度一百年波吒梨城有王名阿育此云無憂深信佛法有弟名毗多輪此云除憂深著邪見信諸外道無憂王愍弟邪故遂設方便語大臣言我今洗浴入彼浴室脫天冠衣服等汝當以我服飾莊嚴我弟令登王位臣如教已弟方登座王出見弟即命殺之大臣等白王言是王親弟願王息怒捨過王言是我親弟於七日中暫與國事令其作王待七日滿即當殺之即以種種妓樂及諸綵女供給侍衛一切臣民皆往問訊行殺之人執刀門立日日白王一日已過六日當死如是乃至六日已過餘一日在至第七日竟大臣諸人將王弟共往阿育王所問弟言汝七日為王百種妓樂皆恣汝意無數衆人日日問訊呪願於汝汝好見聞否弟答云我為畏死心怖懼故都不見聞復以偈答曰我於七日中不見不聞聲不嗅不嘗味亦不覺諸觸我身莊嚴具及諸綵女等思惟懼死故不知如此事妓女歌舞聲宮殿及臥具大地諸珍寶初無歡喜心以見行殺者執刀門外立又聞搖鈴聲令我懷死畏死橛釘我心不知妙五欲既著畏死病不得安穩眠思惟死將至不覺夜已過我今歸依佛佛面如蓮花天人所歸依無漏法及僧時王見弟回心歸向三寶心大歡喜種種軟語安存其弟若懺悔者有如此怖死之心於世間境緣五欲妙樂心不貪染又觀緣生之法畢竟無我誰為造者誰為受者心本不有罪性自空斯謂真懺矣又當翻前惡境斷相續心自愧尅責將已作之罪發露披陳不復覆藏稱十方諸佛洪名觀罪性空不於幻化場中復造惡業而明信因果守護正法如此則無惡不消無罪不滅自懺他懺一二淺深俱不可得也福報品第八問作福求報此最劣根然不作福復何望報今如罪福皆繇自心種種報定差耶師云福罪報應如影隨身如空答響如人挑擔重者先墜求其絲毫遠離了不可得又安可求報耶然諸佛悉具二嚴謂福足慧足而因地必當先布福田以資慧種福緣深厚自得心開非求報也佛開六度而啓萬行檀波羅密者此云施而施者達三輪體空斯不望報報自隨之尸波羅密此云戒羼提波羅密此云忍辱毗梨耶波羅密此云精進教中謂此四者悉修福後二度云慧謂禪與般若前四度皆含智慧若無智慧安肯行布施及精進耶然諸佛以此而證涅槃菩薩以此而行萬行非求報也實莊嚴法身資養性地祇施之一法直至菩提況餘度乎良以行人廣行六度必以願力相資悉皆回向無上菩提不求餘果如布施一法諸佛因地莫不皆然後得淨佛國土富有法財非求報也昔摩訶迦葉尊者為煆金師善明金性使其柔伏付法傳云嘗於久遠劫中毗婆尸佛涅槃後四衆起塔塔中像面金色有缺壞時有貧女將金珠往金師所請飾佛面既而因共發願願我二人為無姻夫婦以是因緣九十一劫身皆金色後生梵天天壽盡生中天摩竭陀國婆羅門家名曰迦葉波此云飲光勝尊蓋以金色為號也繇是志求出家冀度諸有佛言善來比丘鬚髮自除袈裟著體常於衆中稱歎第一乃至付法傳衣為西天初祖此因果歷然以嚴飾金故而得身有金光以願力相資而證極果此不求報而報自至非求報也余嘗評之菩提心如種子福如雨露良田惡如火𦦨刀斧假如種苗生發之時必得其雨露水土方可成就或遭其火燒刀斫又安可植耶如成棟梁之材刀斧俱非水土亦無用矣七佛偈曰起諸善法本是幻造諸惡業亦是幻身如聚沫心如風幻出無根無實性愚者謂善惡俱幻造諸惡業似不相妨殊不知幻人相織幻輪圍幻業能招幻所治又云一切衆生性清淨從本無生無可滅即此身心是幻生幻化之中無罪福如成棟梁則不用刀斧水土如佛成道時無邊剎土萬德莊嚴皆自心現量悉無始已來善根之所成就故云報圓極果豈非報但因地中無求報之心耳世間人所行善惡毫髮不爽昔西域一樵夫賣柴於市中逢一僧將賣錢悉皆施與遂此施心歡喜無量行草餘里捨此報身後生人道為大富長者其草餘里金銀寶藏自然湧出斯施利甚微而施心勝故感報亦勝以此觀之不求福報不可不作福如不作福生世貧窮為人役使良可悲夫或有引達磨大師初見武帝時帝問曰朕即位已來造寺寫經度僧不可勝紀有何功德祖曰並無功德帝曰何以無功德祖曰此但人天小果有漏之因如影隨形雖有非實帝曰如何是真功德祖曰淨智妙圓體自空寂如是功德不以世求斯皆深達法性入理之談豈可以修行分中而廢其因果耶如未成佛時人天小果而不修者是智耶愚耶國王大臣人小果也梵王帝釋天小果也此無殊因焉有勝報但隨業緣受之非求報也然自心之因自心之果如貪報地獄嗔報餓鬼癡報畜生善惡相雜報以修羅五戒人身十善天道財施者捨慳貪而得富法施者適機感以傳燈此種種報緣而有差別非心外之境也釋疑品第九問信心不具大愚癡暗近復始信終成破毀此何義耶良由業識易發現故以何熏習而種善根即如上所陳諸義能堅行之永不壞否師云不發信心為障緣深故如住世間者自言我得安身法不必天地之蓋載陰陽所運行非癡暗而何佛統華藏世界如日月照臨十二類衆生皆生於此長於此佛以慈光照衆生故佛以悲心及衆生故而不信有佛是報恩乎是背恩乎直饒不生信不信因果不信報應不信有佛墮地獄生餓鬼於畜生道中千萬億劫跳出不可思不可議世界之外又何曾出得世尊化育中耶或始信者藉少善因終毀者惡緣障故欲潔而偏染欲進而偏退非淨白心體有染退義是熏習障緣出種種邪見以邪見故而生退毀退毀有二種義一者因退失信心自慚自愧自羞自恥遇同法門行道者不欲見之二者繇慚愧故遮掩羞恥而生毀謗或云至道渺茫無所見故或云諸佛菩薩過去已久今歸向者是虗設故或云主法者不清淨自不清淨云何教人或云清廉之士應見富饒而貧窮故行善之人應見順適而轗軻故貪婪之徒應見貧窮而富饒故行惡之者應見轗軻而順適故以此四種生疑生謗使惡法流行善門掩閉殊不知道不遠人而人自遠非渺茫故又當知人人具有佛性六根門頭放光動地又云菩薩清涼月常遊畢竟空衆生心水淨菩提影現中傅大士偈云夜夜抱佛眠朝朝還共起起坐鎮相隨語默同居止終日不曾離如身影相似欲識佛去處祇者語聲是以此觀之佛菩薩現在非久滅度故主法者自不清淨皆自不清淨而見他人不清淨故豈不見六祖大師云若真修道人不見世間過又云他非我不非我非却是左若果是道人如同學百人中以最善慧者為師故如同輩中無人以住持法門為師故如住持無人以天下善知識為師故如天下善知識中無人以釋迦老子為師故釋迦佛是主法者是清淨者當無疑惑思之可見又廉者貧而善者轗軻貪者富而惡者順適以三世推之絲髮不爽豈但三世千萬劫之上下亦有報也昔阿難尊者病癰疽大衆驚疑佛命醫者剖開以藥敷治仍説多劫中因緣示之以偈曰假使經百劫所造業不忘因緣會遇時果報還自受又五通仙人受報偈曰非空非海中非入山石間無有地方所脫之不受報以此則知清廉受貧前生多慳吝故善者不如意前生多惡因故貪者受富前生多惠人故惡者得順適前生多和合人故今生善惡貪廉報之以將來知是幾多劫數也自退者雖墮地獄非罪猶輕生毀謗而傷於法門者生十方阿鼻地獄世界壞復寄他方地獄受苦深可憐愍悲夫又云業識易發現以何熏習而種善根者以信向法門是捨惡趣樂最捷最徑而種善根信向三寶有大慈故愛惜衆生有大悲故救護衆生而種善根信善惡因果如影隨形必酬償故而種善根信諸大乘經典必脫苦海必到彼岸而種善根信念佛一門必見佛必成佛如下種喻因真果真必生淨土故而種善根信參禪必悟大理必了生死必脫輪回説法度人無有窮已諸善知識大有樣子故而種善根又果能具行上來所陳諸義永不退輪此現世即名肉身菩薩諸天善神常為之擁護諸佛菩薩常為之加庇為人天眼目為苦海舟師凡有一言一句偈投入有情八識田中如食金剛喻肚腸穿壞金剛不壞況自有壞乎凡有疑者教中喻曰猶豫其猶豫之心疑自疑他能障道故疑自者謂根機劣弱難以入道殊不知衣中之寶肘後之符彼既丈夫我胡不爾疑他者當信諸佛法教皆真實語見聞思者深入法趣以四攝法廣度衆生達法性空無衆生可度者是入金剛三昧也回向品第十問萬法歸一是大總持以上諸門方便究竟淺深大小為不同耶併乞慈旨説回向義師云萬法歸一是大總持謂一法總持一大藏教如佛所説八萬四千法門當求一門深入以一門故攝一切法故云一字法門海墨書而不盡也以上諸門雖方便究竟淺深大小不等只將一句話頭真參實究一切法門無不收盡參禪徹法身真理法身理者無分齊故欲生淨土而淨土居法身之外乎欲究向上一事知毗盧有師法身有主離佛而求師主者是大不然念佛而求見佛亦觀機之説殊不知通身是佛舊佛新成念佛見佛之義顯矣而不名念佛意在向上一路也坐斷十方而不名淨土者意在密移一步也如究理之人念不分散不但不分散而逼拶入理念不生故諸念不生豈非止耶全身入理心境曠然豈非觀耶具足止觀二法而不名止觀意在禪那也又諸念不生惡無繇起惡既不起豈非戒乎全身是戒而不名戒者謂無所犯而曰持是好肉剜瘡也身不我有求其根塵器界了不可得將誰為能施孰為所施既無能所亦無身外衆生而受施者而來乞者又云見色非干色眼布施也聞聲不是聲耳布施也香臭不交鼻布施也噉不知味舌布施也無男女之分無澀滑之相身布施也理無明徹心不外緣意布施也廢寢忘餐不惜身命全正報布施也心外無境法戒理成全依報布施也然不名布施者謂諸法實相無能所施之心也發大勇猛苦樂不受寒暑不遷直究根源以期大悟期者願也勇者力也其願者雖百千障而不能退屈也其勇者雖魔外侵擾而不能折伏也自非願力堅持安能成箇銅頭鐵額底漢子而不名願力者是居正法而不彰導引赤幟也如肯心力究是大福人非世間福可比也不求天樂非梵王福可比也通身福緣過三禪天樂如入大海者通身是水而不別求水參禪者通身是福所資持而不別求福謂其福利廣也大也而不名福報者如宴居者忘情絶念不見有身又豈曰身調適參禪人是大福報又豈別曰福報也信此一句話頭是出生死關鍵破塵勞利器而諸疑盡釋又豈待別釋疑乎將此一字法不為己求總皆回向大地中幻化有情同登覺岸此禪正意也行願品中説回向意經云從初禮拜乃至隨順所有功德皆悉回向盡法界虗空界一切衆生願令衆生常得安樂無諸病苦欲行惡法皆悉不成所修善法皆速成就關閉一切諸惡趣門開示人天涅槃正路此回向願力則橫遍竪窮同志者當勇猛以所修善根回向於大地衆生不可生懈惰想諸菩薩見衆生苦惱以身代受況惜自己善根耶經云若諸衆生因其積集諸惡業故所感一切極重苦果我皆代受令彼衆生悉得解脫究竟成就無上菩提代受者與物為增上緣或留惑潤生受有苦身為物説法令不造惡因亡果喪即名為代是菩薩以善根回向利有情故使彼離苦趨樂非以現身代衆生受苦縱代之又安能普利耶若菩薩為衆生説法了蘊界空寂惡無繇生求其生相亦不可得或頓入圓明遠離地獄餓鬼等菩薩有大願力故即名普代衆生苦也又回向者必須先有所修善根將自己所修善根回向於大地有情同離苦趣同生淨土同成佛道也或但願自利之事似不必回向我自未種善根欲利生亦當以願力相資願與回向合一之道無分別也復以此流布居士所問博山所答悉如夢幻無能所故以無能所善根普皆回向大地中夢幻有情同成佛道同入無餘涅槃十類衆生滅度盡而不見有滅度之者方入斯羅陀尼法門無盡藏三昧也
