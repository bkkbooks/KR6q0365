body:
  text: 住博山法孫弘瀚彚編首座法孫弘裕同集拈古下舉洞山供養雲巖真僧問洞山雲巖祇者是意旨如何山云我當時幾錯會先師意僧云未審雲巖還知有也無山云若不知有爭解恁麼道若知有爭肯恁麼道拈云語步安詳紐機圓活三玄五位盡在其中肯解二字披寶鏡之精光彰兼到之赤幟洞上宗風於斯可究矣舉雪峯住菴二僧來拜峯見兩手托門放身出云是什麼僧云是什麼峯低頭歸菴僧到巖頭頭問什麼處來僧云嶺南來頭云曾到雪峯麼僧云曾到頭云有何言句僧舉前話頭云他道甚麼僧云他無語低頭歸菴頭云噫我當初悔不向他道末後句若向他道天下人不奈雪老何僧至夏末再舉前話請益頭云何不早問僧云未敢容易頭云雪峯與我同條生不與我同死要識末後句祇者是拈云莫道無語其聲如雷佛事門中商量不下巖頭寶𦦨吐華雪峯金針露鼻固是難兄難弟也若論生死同條待別時來抹過一著舉法眼問覺上座船來陸來覺云船來眼云船在甚麼處覺云船在河裏眼後復問傍僧云你道適來者僧具眼不具眼拈云虗空無彩色大海有波瀾舉曹山問德上座佛真法身猶若虗空應物現形如水中月作麼生説箇應底道理德云如驢井山云道則太煞道只道得八成德云和尚又如何山云如井驢拈云豪士之鋒詩人之態貫協精華斯無餘蘊曹山提挈過人如萬仞巖頭打筋斗下來扳仰不得非但三玄五位直是佛祖髑髏悉穿下過咦舉黃蘗示衆云汝等諸人盡是噇酒糟漢與麼行腳何處有今日還知大唐國裏無禪師麼僧云只如諸方匡徒領衆又作麼生蘗云不道無禪只是無師拈云大唐國裏果無禪師麼品暢清奇不留朕兆開眼作夢淨地迷人舉雲巖問道吾大悲菩薩用許多手眼作麼吾云如人夜中背手摸枕子巖云我會也吾云汝作麼生會巖云遍身是手眼吾云道即太煞道只道得八成巖云師兄作麼生吾云通身是手眼拈云遍身是手眼泛寶舟而登彼岸通身是手眼搜要徑而起重玄大丈夫橫身當宇宙要用便用只饒八萬四千沒處安著然雖如是人出是非難舉雪峯在德山作飯頭一日飯遲德山托鉢至法堂峯云者老漢鐘未鳴鼓未響托鉢向甚麼處去山便歸方丈峯舉似巖頭頭云大小德山不會末後句山聞令侍者喚巖頭問汝不肯老僧那巖密啓其意山乃休去至明日升堂果與尋常不同巖撫掌笑云且喜老漢會末後句他後天下人不奈伊何拈云權衡在手藻鑑凌空別錙銖分妍醜絲毫隱諱不得德山呵佛罵祖為快意被巖頭一拶忍氣吞聲密啓底意作麼生道電舌雷聲宣揚不及舉密師伯與洞山行見白兔子面前走過密云俊哉山云作麼生密云如白衣拜相山云老老大大作者箇語話密云你作麼生山云積代簪纓暫時落寞拈云任緣而施隨流得妙雲蘿舒卷峯嶽凝然白衣拜相雖則異地生苗猶是功勳邊事簪纓落寞之談不無補於密師也舉嚴陽尊者問趙州一物不將來如何州云放下著嚴云一物不將來放下箇甚麼州云恁麼則擔取去拈云一言安一機破的乃趙州之通變提得起放得下尊者固是果位中人一往看來灼然靴裏動指頭舉金剛經云若為人輕賤是人先世罪業應墮惡道以今世人輕賤故先世罪業則為消滅拈云者般説話縛殺多少人解脫多少人兼雌帶黃滅胡種族若以因果評入地獄如箭射舉僧問青林虔禪師學人徑往時如何林云死蛇當大路勸子莫當頭僧云當頭時如何林云喪子性命僧云不當頭時如何林云亦無回避僧云正當恁麼時如何林云失却了也僧云未審向甚麼處去林云草深無覓處僧云和尚也須隄防始得林撫掌云一等是箇毒氣拈云青林棒喝不施針錐在舌根上何曾放過者僧爛泥中有刺縱得便宜不知早入行鋪了也當時若問博山但咄云沒去處看他道箇甚麼雖然在今之日討箇師僧也難得舉劉鐵磨到溈山山云老牸牛汝來也磨云來日臺山大會齋和尚還去麼山放身臥磨便出拈云案山起雲主山下雨杓卜聽虗聲熟睡饒譫語只饒弓折箭盡未是作家要得同氣相求同聲相應看者一隊水牯牛復笑云鼻頭總在博山手裏舉僧問乾峯十方婆伽梵一路涅槃門未審路頭在甚麼處峯以杖一畫云在者裏僧問雲門門云扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾會麼拈云問處太親智眼成障傾出雲門七珍八寶天童喚作返魂香諸人還嗅著也未乾峯者一畫大地百雜碎非但路頭者僧腳跟下七華八裂了也舉米胡和尚令僧問仰山今時人還假悟否山云悟即不無爭奈落第二頭何胡深肯之拈云米胡酌其菁華仰山碎彼璘玳自非大方家問答不及此祇如肯諾不得全米胡又且如何舉趙州問投子大死底人却活時如何子云不許夜行投明須到拈云趙州投子果能跨逐日之蹄截奔匯之水但要與博山相見尚須向鐵圍城裏穿下過來舉子方上座問法眼和尚開堂承嗣何人眼云地藏方云太辜負長慶先師眼云某甲不會長慶一轉語方云何不問眼云萬象之中獨露身意作麼生方竪拂子眼云此是長慶學得底上座分上作麼生方無對眼云只如萬象之中獨露身是撥萬象不撥萬象方云不撥眼云兩箇參隨左右皆云撥萬象眼云萬象之中獨露身拈云法眼嗣地藏冤有頭債有主子方為長慶風不動浪不移豈可以人情污佛事耶當時待問獨露身與萬象撥不撥但云是何言歟管取法眼如啞子作通使吐露不出舉僧問首山如何是佛山云新婦騎驢阿家牽拈云首山佛話雖俚語猶堪入俗然老將不談兵較之似乎真金璞玉烹之刻之則喪淳矣舉僧問九峯如何是頭峯云開眼不覺曉僧云如何是尾峯云不坐萬年床僧云有頭無尾時如何峯云終是不貴僧云有尾無頭時如何峯云雖飽無力僧云頭尾相稱時如何峯云兒孫得力室內不知拈云指活路于中舌頭不粘著肉披全提於向上額顱不拄著天九峯口齒若梭腸自有巧婦針線也所貴者兒孫得力室內不知且道不知底是何事舉華嚴經云我今普見一切衆生具有如來智慧德相但以妄想執著而不證得拈云根本無明即是諸佛不動智不動智即是根本無明者裏別具一隻眼老瞿曇氷消瓦解舉僧問夾山撥塵見佛時如何山云直須揮劍若不揮劍漁父棲巢僧問石霜撥塵見佛時如何霜云渠無國土何處逢渠僧後舉似夾山山乃上堂舉了云門庭施設不如老僧入理深談猶較石霜百步拈云門庭施設入理深談孤鴈羣飛缺一不可一句則玄景未移而天機獨運一句則神柯未伐而靈樹絶依二大士氣宇如王識得渠語者便好作罷參齋舉南泉示衆云三世諸佛不知有黧奴白牯却知有拈云手把地尾連天王老師異類中行也三世諸佛不知有掬明月於無影樹頭黧奴白牯却知有剪白雲于不應山谷何人知此意除是長嘯者舉進山主問修山主云明知生是不生性為甚麼為生死流轉修云笋畢竟成竹如今作篾使還得麼進云汝向後自悟去在修云某只如此上座如何進云者箇是監院房那箇是典座房修禮拜拈云拈轉鼻頭披翻唇齒裁長補短自有機宜此語非但為修公截舌亦為後人點眼可謂絆斷葛藤而遊象徑芟除荊棘以露瓊枝其活句如此舉翠巖示衆云一夏已來為兄弟説話看翠巖眉毛在麼保福云作賊人心虗長慶云生也雲門云關拈云吐輕𮈔于春蠶豐毳毛于冬狸諸大師各出隻手且道當得甚麼邊事惜取眉毛好舉仰山問中邑如何是佛性義邑云我與你説箇譬喻如室有六窗中安一獼猴外獼猴從東邊喚猩猩獼猴即應如是六窗俱喚俱應仰云只如內獼猴睡著外獼猴欲與相見又且如何邑下禪床把仰山手作舞云猩猩與汝相見了拈云中邑鋪文演義譬喻得精仰山讓老推尊何曾放過且道還有佛性義也無滿頭霜雪棲岩谷半夜穿靴入市鄽舉僧問曹山靈衣不挂時如何山云曹山今日孝滿僧云孝滿後如何山云曹山好顛酒拈云松回千古之風靈衣脫體露濕中宵之月散步狂歌須是者顛酒翁乃爾若夫混沌乾坤逢人不認曹山腳跟猶沾泥水在舉僧問法眼承教有言從無住本立一切法如何是無住本眼云形興未質名起未名拈云形未興名未起且道森羅萬象從何處得來者裏放過即不可舉瑞巖問巖頭如何是本常理頭云動也巖云動時如何頭云不識本常理巖佇思頭云肯即未脫根塵不肯永沉生死拈云德音震響土裂河分不勞神用變化鯤鯨則不無巖頭但博山要問伊既是本常理因甚有肯不肯依稀越國倣佛楊州舉首山示衆云第一句薦得與佛祖為師第二句薦得與人天為師第三句薦得自救不了僧云和尚是第幾句薦得山云月落三更穿市過拈云吞盡佛祖佛祖為師號令人天人天作則向沒蹤迹處立名題分數目喚作第一第二早是蛇足矣然其鋪舒展演與奪臨時首山舌上有鋒咽喉若海也還知月落三更句麼無為無事人別有間家具舉僧問仰山和尚還識字否山云隨分僧乃右旋一匝云是什麼字山於地上書一十字僧左旋一匝云是什麼字山改十字為卍字僧畫一箇圓相以兩手托如修羅掌日月勢云是什麼字山畫一圓相圍却卍字僧作樓至勢山云如是如是善自護持拈云者僧旋身撥無煙之火仰山畫地挑海底之燈義天燦爛彼此作家六書中收不住且道是甚麼字大地無盲人誰是賞鑑者舉僧問雲門如何是超佛越祖之談門云糊餅拈云運劫外之香糜興現前之供養糊餅之談塞斷人口也其清音如玉只饒辨似懸河話會不下何也如野飢麥飯一飽即休若論超佛越祖之談待別時來與汝注解始得舉長沙令僧問會和尚未見南泉時如何會良久僧云見後如何會云不可別有僧回舉似長沙沙云百尺竿頭坐底人雖然得入未為真百尺竿頭須進步十方沙界是全身僧云百尺竿頭如何進步沙云朗州山澧州水僧云不會沙云四海五湖王化裏拈云會公坐殺法身不通凡聖岑老碧天雲外更鬬精華白牛牯觸牧多方死貓兒解弄也活與盲人點眼聾者開聰會公還識痛癢麼舉龍牙問翠微如何是祖師西來意微云與我過禪板來牙取禪板與微微接得便打牙云打即任打要且無祖師西來意又問臨濟如何是祖師西來意濟云與我過蒲團來牙取蒲團與濟濟接得便打牙云打即任打要且無祖師西來意拈云龍牙者漢一副鐵脊梁直硬到底打破大唐國討箇頭正尾正底難得舉玄沙到蒲田百戲迎之次日問小塘長老昨日許多喧閙向甚麼處去小塘提起袈裟角沙云料掉沒交涉拈云人將語探水將杖探烈火裏辨真金閙市裏識天子袈裟下認取老僧玄沙小塘斯人也縱然蓋覆將來口苦心甜更有事在舉雲門云聞聲悟道見色明心觀音菩薩將錢來買糊餅放下却是饅頭拈云聞聲悟道虗空敲不響又作麼生見色明心清風無形質又作麼生胡言漢語即不無觀音菩薩入普門三昧雲門者漢向甚處摸索舉溈山問道吾甚處來吾云看病來山云有幾人病吾云有病者有不病者山云不病者莫是智頭陀麼吾云病與不病總不干他事山曰不干一句速道速道吾云道得也與他沒交涉拈云溈山懷仁道吾尚義二老雖則不露針鋒也太煞俊俏且道誰是病者誰是不病者誰是不干者試指出看舉俱胝和尚凡有所問只竪一指拈云藏而愈露拙而愈巧放開揑聚虗空逼塞且道是箇甚麼復竪一指云十目所視舉肅宗問忠國師百年後所須何物師云與老僧作箇無縫塔帝曰請師塔樣師良久云會麼帝曰不會師云吾有付法弟子耽源却諳此事請詔問之師化後帝詔耽源問此意如何源云湘之南潭之北中有黃金充一國無影樹下合同船琉璃殿上無知識拈云古殿苔封逢人不到白雲深鎖有路猶迷青山逼近見巍峩萬仞崖頭不露頂古今多少人向塔影邊描寫不出惟天童雪竇較些子舉臨濟問黃蘗如何是佛法的的大意蘗便打如是三度乃辭蘗見大愚愚問什麼處來濟云黃蘗來愚云黃蘗有何言句濟云某三問佛法的的大意三度喫棒不知有過無過愚云黃蘗恁麼老婆為你得徹困在更來問有過無過濟於言下大悟拈云三年不開口毒氣噴人三遭喫痛棒拂蒿枝相似黃蘗處喫交大愚邊本末後逢人胡喝亂喝是何道理不向紫羅帳裏撒真珠畢竟是蝦跳不出斗舉疏山到溈山便問承師有言有句無句如藤倚樹忽然樹倒藤枯句歸何處山呵呵大笑疏云某四千里賣布單來和尚何得相弄溈喚侍者取錢還者上座囑云向後有獨眼龍為子點破去在後到明招舉前話招云溈山可謂頭正尾正只是不遇知音疏復問樹倒藤枯句歸何處招云更使溈山笑轉新疏方有悟云溈山元來笑裏有刀拈云獨眼龍共資玄化矮師叔撞破疑團且道畢竟句歸何處謾使溈山笑轉新舉楞嚴經云吾不見時何不見吾不見之處若見不見自然非彼不見之相若不見吾不見之地自然非物云何非汝拈云盡大地是箇釋迦阿難𡎺著釋迦鼻孔盡大地是箇阿難世尊裂破阿難胸襟且道向甚麼處見甚麼處不見者裏著得一隻眼黃面瞿曇非但瞞人亦乃自瞞舉洞山解夏上堂云初秋夏末兄弟或東或西直須向萬里無寸草處去良久云祇如萬里無寸草處又作麼生顧視左右云欲知此事直須枯木上生花方與他合石霜云出門便是草明安云直得不出門亦是草漫漫拈云洞山一具牙齒敲得鳴打得響胡言漢語撒得開收得聚可謂曖曖玄提也二老漢騎虎頭把虎尾口似蜜甜心如鴆毒還知彼落處麼舉仰山夢往彌勒所居第二座尊者白云今日當第二座説法山起白椎云摩訶衍法離四句絶百非謹白拈云仰山夢裏惺惺驚羣動衆説摩訶衍法離四句絶百非曾透徹也未快須拋却楗椎始得舉陸亘大夫語南泉云肇法師也甚奇怪解道天地與我同根萬物與我一體泉指庭前牡丹花云大夫時人見此一株花如夢相似拈云大夫遡流窮源南泉雲行雨施正眼觀來總是夢中説夢舉雲門垂語云乾坤之內宇宙之間中有一寶祕在形山拈燈籠來佛殿裏將三門來燈籠上拈云歷諸心指諸掌顯諸仁藏諸用開發性源其至矣夫拈燈籠來佛殿裏將三門來燈籠上雲門大師來也放過一著舉師祖問南泉摩尼珠人不識如來藏裏親收得如何是藏泉云王老師與汝往來者是祖云不往來者如何泉云亦是藏祖云如何是珠泉召祖祖應諾泉云去汝不會我語拈云南泉老漢幸遇師祖博山當時若在待伊召聲未絶即應云瓦礫不勞拈出管教南泉結舌有分舉洞山不安僧問和尚病還有不病者麼山云有僧云不病者還看和尚否山云老僧看他有分僧云和尚看他時如何山云則不見病拈云不二門開日面月面總不似洞山癖病混之弗得類之弗齊病中善看病也者僧眼裏有筋皮下有血要見洞山也不難舉臨濟問院主甚處來主云州中糶黃米來濟云糶得盡麼主云糶得盡濟以拄杖一畫云還糶得者箇麼主便喝濟便打次典座至濟舉前話座云院主不會和尚意濟云你又作麼生座便禮拜濟亦打拈云臨濟棒頭有眼善察來機不是不知來處要院主識痛棒始得院主便喝典座禮拜門裏出身剛柔相濟若徹困去可謂一點水墨兩處成龍矣舉石霜遷化衆請堂中首座接續住持九峯不肯乃云待某問過若會先師意如先師侍奉問首座云先師道休去歇去一念萬年去寒灰枯木去古廟香爐去一條白練去且道明什麼邊事座云明一色邊事峯云恁麼則未會先師意在座云你不肯我那裝香來座乃燒香云我若不會先師意香煙起處脫去不得言訖便坐脫峯乃撫背云坐脫立亡則不無先師意未會在拈云善建者不善辨者若訥首座損其花填其實潔其操楷其式住持事業豈其然乎九峯太煞剄挺不近人情還會石霜意也未總好與三十笤帚舉同光帝謂興化云寡人收得中原一寶只是無人酬價化云借陛下寶看帝以兩手捧幞頭化云君王之寶誰敢酬價拈云徑寸之璧照乘之珠望中原光影萬一不得為比文殊寶冠隱諱不得淨名方丈説示不來興化畢竟酬價不可得然雖如是誰道黃金如糞土舉僧問洞山三身中那身不墮諸數山云吾嘗於此切拈云近不得倚遠不得携推之弗前約之弗後洞山於此若鐵橛也若夫辨奇貨採驪珠求華璞追藍琰安可以語於此哉離乎言句親之可矣舉僧問雲門如何是塵塵三昧門云鉢裏飯桶裏水拈云博山尋常受用腐柴為㸑野菜和羮或有問如何是塵塵三昧但向道切忌鉢裏尋飯桶裏覓水且道與雲門相去多少舉僧問琅琊覺和尚清淨本然云何忽生山河大地覺云清淨本然云何忽生山河大地拈云清淨本然山河大地從甚處得來云何忽生又一重也有眚者不可以語其純素碧眼者不可以眩其玄黃天童所謂見有不有也於琅琊答處便恁麼悟去不知誰是其人
