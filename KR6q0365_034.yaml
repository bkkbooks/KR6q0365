body:
  text: 住博山法孫弘瀚彚編首座法孫弘裕同集挽辭禮壽昌先和尚塔四首舊年今日禮師顏今日重來塔已關謾道藏身無覔處淡雲疏雨滿人寰百尺凌霄一夜霜爪瓶猶挂爛藤牀來時古道應無口篆縷曹源一線長分身南邁步西歸五色毫光徹夜輝舍利好藏無縫塔莫教雙鶴戾天飛九拜龕前淚落頻慈容何得再相親白雲流水依然在不見靈山演法人吊憨大師四首象王迹應瑞蓮開五乳峯頭吼若雷今日樹煙何靉靆紫雲旋入白雲堆僧中法寶人中豪玉露金莖價倍高靜夜鐘聲藏不住又隨雲水過新韶南華勝地塔全身腳底猶披五乳雲拄杖攪渾清世界不知得法幾多人多年法雨遍寰區幻化何方是住居今古鄱陽湖上月清光皎皎照匡廬挽劉和鶴孝廉四首澄江風細浪花開曾得金鱗上釣來抹嗒不隨煙雨散暮雲幾度夜招回訃捷榮哀繫世情天道豈無平如今不解藏身也遍界都知船子名芝蘭氣味不尋常幽谷無人他自芳莫謂嚴霜摧國幹清風千載振冠裳歲寒心有幾人知六月梧凋不近時却憶講經臺上約而今已寫挽君詩挽齊羣玉郡伯六首輿滿浮山道徘徊不見君心隨流水駛望隔故鄉雲雪風浸骨冷送我過南舒繾綣臨岐意憑誰入畫圖旋錫生生社翻憐見面稀稍安強櫛沐拖病話離微自後罕相晤猶呈藥病吟愧豫羇問候有負淨名心倐忽秋風徑金梧已早凋響音和訃至撫几痛無聊有意描君像無能輟遠思援毫和淚點寫出挽君詩詩登喝水巖有感五言古雲磴如鱗砌扶笻縱步行水從龍口出松倚石痕生古樹藏嘉羽層山疊翠屏禪那千古寄名利一身輕豁爾非遊境翛然樂道情更窮西祖意天朗遠川明送老父歸七言律四首三十餘年今復逢鄉音仍舊異顏容恩情宛似纏身索榮辱還如過耳風菽水彩衣憑客笑曇花毳衲與誰同謾言世事多顛倒撫掌俱投片夢中寄錫山林意自清塵中雞犬杳無聲春秋門外臨溪月楊柳堤頭挂樹箏舊日浮華皆夢想現前鬚髮博虗名鄉親若問修行事原是當年蹭蹬生日食三餐飽便休飯餘無事喜登樓面前山色隨遷變眼底雲霞任去留以法為親疏世相視身如寄等浮漚塵寰多少黃粱夢輸與深山枕石頭不挂從前汗染衣剃除鬚髮著伽黎精神驚破浮生暗素志還期佛道齊骨肉那堪多劫纍機緣知是幾生迷而今贏得間些子放意扶笻步柳堤偶成七首山居深羡虎溪蹤有客多從笑裏逢拄杖挑殘紅日影芒鞋踏破紫雲封烹茶敲筯酬彌勒顛酒狂歌罵志公稍覺清風來谷口梳翻松檜若飛龍衣穿囊破從他笑不間纖塵作麼疑欲水投崖聲太急愛雲出岫勢還遲明明妙體恆如是湛湛忘言理若斯吞盡十方諸國土看來成佛更由誰死生空色兩重關好把楞嚴辨八還眼底翳清雲漢淨胸中礙脫境緣間松陰百尺疑芳沼筧水三灣過竹山困就緑楊枝下臥幾多花雨落人間是非冷暖無拘及蓬蓽多年縛翠嶒檻外花紅疑野火巖前苔緑鎖寒氷三竿竹影岐山鳳萬里風搏莊海鵬幾度晚雲歸去後一輪明月上梅稜識破磨甎造化機大雄山下日初暉嘶風木馬乘雲去飲海泥牛帶霧歸句裏有鋒穿膽入眼前無物逐塵飛欣然擊碎秦時鏡不挂如來授受衣寶鑑澄明法界清箇中須辨普賢名涅槃有覺還非覺般若無生是利生剖破悟迷毋用力揭開真妄不關情而今偶識中峯老大地山河一掌平誰識山中境象培山居助我樂心齋笋芽初出和雲取豆莢高時帶雨栽枕石忘緣眠古榻杖藜乘便步新苔經行懶折塘邊柳留與黃鶯飛去來畬山二首畬山唱罷紫芝歌幾片煙雲挂緑蘿竹徑有婆偷笋去橫溪無水看猿過松花帶蕊烹新茗荷葉連絲補破蓑自是道人知見別萬年一念任消磨畬山斸斷嶺頭雲歲月都忘總不分忽捲忽舒龍現影相親相近鳥呼羣祇知珠價三千界管甚毫光萬八旬透徹禪關無限量從教滄海自沉淪和程邑令韻二首携手相將引鹿軿森然景物自怡情鈴鳴殿閣招歸鶴錫挂雲根繞囀鶯松徑有聲堪聽法石門無縫若為程清風不減攢眉客今日重添蓮社名高登磐石駐雲軿麈尾輕揮稱野情曾向松風聽宿鳥重來柳影拂啼鶯旋身華藏猶尋迹信步歸家罷問程要識箇中真意趣蕭然那許佛生名與詹定齋廉憲遊白龍洞三城重繭屆西峯既到西峯喜白龍洞裏有泉千澗緑樹頭無染一山紅時分今古心何異報逐升沉境自同寄與往來諸上士莫教水底覔魚蹤答鄭松門太史二首入門寧問路逶迤卉木叢林色色披舊筆肯完梁上字談經已約嶺東枝有緣自合非衣讖無句堪題沒字此事住山人未委德雲相見別峯遲大千無處不禪堂觸目空兮慧劍霜鴉過有聲流碧落客來無力下繩牀三拳臨濟機如洗一掬曹溪水更香果在杖頭開正眼東臯舒嘯又何妨答東李山人年來瓶錫樂幽林禪寂何嘗事苦吟掬水引魚時上下穿雲採藥幾晴陰鍋兒撲破何須洗樹子無根懶去尋才聽溪邊人有語又隨麋鹿入山深和曹能始大參韻聖僧古迹賴君隆梵剎都歸掌握中諸寺倐焉添社色羣生無不仰高風靈源洞吸江濤逈甘露松旋石壁蔥謾作晏師來去想鼓山嘉運興何窮和陳居士韻何緣䇿杖鼓山中喝水眠雲卜歲豐有去有來天上日無形無影杖頭風拈香述贊欣新得揮麈隨聲愧未工欲識祖師端的旨扶桑元在海門東和安居士韻騰空木馬夜嘶風知有高人得句工棹入清波沙岸遠詩聯白雪素心同間雲片片浮天北流水潺潺望海東自是不容分去住輕輕收入藕絲中和林居士韻聖箭凌霄那一通毋分南北與西東石門未跨知迷悟拄杖才拈驗色空海上書來招客去江邊杯起入雲東而今不論神僧迹花雨繽紛兩岸紅和李居士韻清光萬里畫圖中觸目歸雲鳥道通夾岸青榕遮棹影沖霄白鶴唳秋風禪那竟許塵緣入解脫還將奧義窮赤肉團中休放過分明認取自家公和熊無用居士韻公案而今幾萬千不知誰會祖師禪庭前柏子清風遍嶺上松枝皓月懸萬古碧潭澄影瘦一溪活水浪聲玄時人更問西來旨謦咳毋勞肋下拳和居士韻茫茫世念冷如氷電掣晴空紹祖燈歷劫了知心是佛幾回寤覺夢為僧漚花謾道藏蹤迹幻影何緣有愛憎待客迎賓間指注三餐飽後更無能和吳本如司馬韻五言律湘潭煙水濶携手便歸家徑入天王屋寧知長者車有心皆夢境無眚不空花最喜龐居士敲氷來煮茶和謝中隱居士韻瓢笠驚風雨腰包獨往還聽緣嫌作客隨處喜居山水濶雲光逈松深鶴夢間幸分居士韻裂破祖師關釣魚臺度歲臘盡聞親訃孤舟趂夜回平沙無鳥迹深樹有猿哀江岸何時到家庭少客來長思兩行淚先落釣魚臺雪夜哭父親墳在咫尺何事苦羈留夜雪飄無歇寒雞呌不休非思驚坐寢血淚染溪流天問緇衣孝青山盡白頭到舒城迢遙千里外倣佛少年時駐步尋原徑捫心動所思沙堤新樹密城市故人稀嗟此無常境阿誰願出離渡河河下白如練煙雲照淺流近城鳥解語抵舍客生愁骨肉無青眼兒童半白頭荒郊高壘壘盡是故人丘碧潭禪友從余歸梓里深雪不知春帶水收寒涕牽衣動曉雲氷層憐路馬樹倒見樵人誤作多年客家鄉語更親訪東源晦臺上人䇿杖東山上窮源訪故知怪松遮道處細雨濕衣時石磴淨如洗柴門曲轉遲相逢兩不猒啜茗詠新詩別黃惺源居士記得來山日仍思送別時往還千里外倐忽半年期法語無他囑衣珠須自怡尋常親著眼不必問相知別林衡庭居士荷擔弘願力徹見道人心寶劍應須礪衣珠不用尋塵緣渾是夢佛法豈為針記得山中約相彈挂壁琴別林優德居士範圍天地外不見路頭賒彩鷁分流水寒鷗亂聚沙白毫揮客塵清影吸仙槎最喜江邊景枝圓樹上花別盧居士樹德誰為比疏財我羡君交孚知有道擅美詎傳聞拄杖敲空月芒鞋破嶺雲一雙清白眼毫髮自區分次曹能始大參韻示諸同行者登山須及頂縱步莫移時路險惟憑杖岐分必問師雲深行趂蚤暉落悔來遲力盡機忘處堂堂更是誰初入鼓山見梅花偶成崎嶇千里道不惜老來身腳下渾無力眼前惟有雲多逢投宿鳥罕見問津人莫怪梅花笑蹉跎又一春次韻答阮圓海冏卿七言絶有序馬大師一口吸盡獅子蟲何地藏身九帶公案從來不犯纖毫五味粥湯迄今香甜猶在向柏子頭邊突出無縫塔頂經行要知花果同時不問再來消息石老向威音前縱行一步然後入博山社火裏另作商量不妨布袋盛渠須信聲多哮吼狗子即今在甚麼處復云看腳下江月山雲映碧天蘊中底奧不稱玄東君也解知人意特藉梅花驗別傳巖花黃葉從人辨黃葉巖花道眼開幻化肯隨朱紫態須知劫外帶春來次韻答劉胤真居士有序見相非相即見如來此破相入理之談自非行起解絶不能親到居士正在解中若以解為悟豈但見諦不真將恐奴郎不辨所以祖師門下貴在真參實究一口氣不來既不知去處從前見處不實可知又安得不疑果真疑頓發到大安樂地回觀解路何啻隔抓癢次韻三首非以文字説心為不辜來意耳七箇蒲團破見天未掀簾處已深玄梅花無意枝頭放爛熳枝頭驗的傳春花秋葉尋常事春葉秋花亦有開却笑靈山親付囑剎竿頭上應聲來雲天空處謾追尋空處雲天萬古心草色雨聲親瞥地龐家兒女是知音次韻答齊員債居士從來瓶錫喜居山䇿杖先防動步艱今日何緣談雪話清歡流布縉紳班鄱湖鞋山二首魚躍鳶飛白浪間腳頭流水道人間韶陽不逐風帆意雲自南山雨北山踏盡鄱湖一帶春細看鞋樣灼然新少林不合驚塵世隻履歸西可怪人與吳公良居士寒霏撲面話從容道念殷勤孰與同緬想祖庭深雪裏而今觸處振家風與蔣一個居士驅馳百里更何心寶網香雲不外尋識得吾家貧徹骨拈來沙土盡黃金與吳石生居士會晤須與道交泥途百里不辭勞將何人事酬君去獨有歸家路一條與劉雁先居士深泥飛雪竟何依清水寒氷滿面皮倐爾春空舒化日願教先奪嶺南枝寓邵武西塔早粥粥熱牙疼知老至風寒骨冷識支離流光不遂攀緣意説與諸方長者知過紫霞關何緣䇿杖紫霞關石磴跏趺老懼寒不假仙人牀上寐幾回清夢入浮山白牯菴四景洗耳泉山間不管人間事飯後仍添茶竈煙惡聽松風兼鳥語也將兩耳掬清泉聽經石大地山河經一卷無文無字最分明有時説向松邊石箕踞崆洞側耳聽鳥道門逶迤一線透層峯步入層峯樹幾重自是無岐誰辨的謾將不二話真蹤醉墨蕉揮毫曾用斯為紙自後無人復用君分付賸栽三兩樹蟲書鳥篆自成文松下行六言絶旋身石磴參差轉眼樹頭紅緑一箇無依道人自笑非真非俗竹下飲幾盞清茶解困䇿杖毋勞用力幸有千竿萬竿不是蹲踞彌勒放生池金鯽樹頭落影翠翎水底含嚬顛倒輪回路上不知誰是真人野吟六首飄葉霜風剄挺澄沙寒水氷清獨坐公堂隱几惺然喜聽雷聲逈逈長安車馬行行吳越江湄看盡千紅萬紫逢人暫話離微棲鳳淡雲幾片浴龍細浪千層客過不妨携手臨池倒影看僧颯颯涼風西起皎皎明月東升堪笑禪門深旨破驢脊上來蠅疏密萍浮緑水高低桂吐奇葩䇿杖峯頭遠眺前村煙雨人家砌下苔錢疊疊山頭霞幔重重齋後間遊池岸採來九瓣芙蓉過水松方丈五言絶雲勢穿山谷松聲落澗泉憑欄問雨候正值杏花天舟次梅溪水濶覺舟小雲深見樹低掀蓬問渡子説是小梅溪屏石上人舟中水觀慈舟棹水面寂爾意偏長遍界琉璃地毋勞問月光歌如意菴歌贈智公山路崎嶇逶迤間石根紫氣彌林泉青松翠竹含雲煙境色如心意灑然溪流漩澓遍三千中隱高人不記年特來問道向我前智度為門慧亦全英姿秀發眉宇淵激余法偈染新篇隨書數語結斯緣無量法門首曰禪譬如師子翻峯巔又如水發成漣哮吼波瀾事事便君不見唐宋源流今復啓還如杲日照晴川
