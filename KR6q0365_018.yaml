body:
  text: 住博山法孫弘瀚彚編首座法孫弘裕同集開示偈四示劉自度居士沒蹤跡處莫藏身釣盡澄江躍浪鱗藏身之處沒蹤跡華亭兩岸花狼籍迸破虗空別有天綠楊深處草芊芊更須簡點家常事跛脚驢兒在後園示智璘居士眾生心佛無差別大理不明誓不輟一朝識得本來人頓悟無生方欣悅兒女團圞古道塲動步先須達本鄉父母未生前面目著衣喫飯是家常示悟言禪座立志脩行須犖卓還如美玉重雕琢雕到玲瓏八面時功成始得稱無學放下塵緣即便休青山何事使人愁牧鞭收向明珠庫放出溈山水牯牛示吳觀我宮諭麈尾縱橫劫外春一番拈弄一番新油缾勘破投明客茶話輸他返拜人孝滿酒顛欣逆子劍揮巢破驗忠臣不辭竿盡重栽竹喜得華亭躍浪鱗示蔣熈臺居士聖道無依不揀人入門何必斷貪嗔月盛銀盌含秋碧露浸松濤帶曉雲清淨界中纔一念輪迴路上幾生身話頭頓破閻浮夢瑞草靈苗說似君示湛如禪人圓明湛湛妙無垠如涉纖毫即是塵大地都來銀世界更於何處覓金身休云妄莫分真祇知一馬生三寅匝地清風何所有笑看鸚鵡過西秦示江憶州居士摩尼江岸若何求直向驪龍頷下搜喝轉迅流須勇決吸乾滄海任遨遊挐雲浪憑雙手倒嶽傾湫祇一頭眉底頓開無礙眼光明普照四神洲示張興公居士橫身宇宙沒遮攔盡力推爺山外山不辯金光珍燕石十方消殞謾追攀脫筌網躍靈源變化風雲頃刻間此是洞曹兼帶旨為君款款露全斑示蕭若拙郡伯不逐形儀觀實相玄機獨露面門餘忘言寶藏流千古爍夢真光徹太虗石女繡空花有果木人敲火燄生魚本源妙粹離非即待客迎賓體自如待客迎賓體自如何勞緣木復求魚靈心洞燭山河影慧眼旋觀物象虗插草欣投當指地拈花偏向笑顏餘而今𠢐破娘生面眉目依然不是渠示黃玄石居士出塵無染毒龍腥世道鴻毛一樣輕幻化塲中誰是我電光影裏孰為情楞嚴讀罷知空殞寶所登時愛路平自古圓通門大啟想君足下紫雲生贈契玄上座圓契拈花意重研寶鏡玄弘施彰正令妙挾驗真傳峭壁深春翠靈花帶晚煙當軒持萬象印破水中天示孤月禪人講席都遊遍來參沒味禪鋤雲栽紫芋引水種青蓮䆳谷嵐浮樹乾柴火少煙松風與夜月相向不須錢示金燦宇居士日用事無別避喧轉覺難飯餘歌晝永燭盡笑更殘一切但仍舊萬般都是閒纔生分別想知隔幾重山示魁杓居士二信心功德聚凡聖莫岐分放出唯三要收來祇一塵不從他變態毋用自紛紜識得衣中寶何愁徹骨貧信心功德聚真箇火中蓮曠劫元無異今生幸有緣揭開塵界網印破水中天最喜金剛寶光明照大千示龔可濟居士苦海何為檝誠心可濟然慈風清性水慧日麗中天華藏嚴身相靈山在目前須知塵界裏烈火綻青蓮示李虗雲居士話頭一句如弦直岸柳巖花露法身幾向綠楊深處看端然一點不沾塵示劉自度居士話頭一句如弦直多少行人步不前趨入便須著眼看香雲深處徹重玄示李何事居士話頭一句如弦直釣盡長江獲赤鱗步下葛藤都絆斷超然無累逐時新示王元淳居士話頭一句如弦直耀日精金覿面看行過水晶宮殿去門前尚有玉欄干示卓無量居士話頭一句如弦直珠若澄兮水自清徹見本來真面目方知人我不關情示陳旻昭居士話頭一句如弦直香象奔波失却威截斷狂瀾觀自在旃檀林裏鳳凰飛示張興公居士話波一句如弦直滴水高興幾丈波出沒雲煙無限量空花陽𦦨奈渠何示楊仲宜居士話頭一句如弦直行遍閻浮不識人拄杖頭邊親磕著深知痛癢是關津示顧長卿居士話頭一句如弦直甘露還從天上來八角磨盤親撥轉無限樹子倚雲栽示馬文先居士話頭一句如弦直不是牛兮不是驢蹄角皮毛消得盡灼然露出頂門珠示何允量居士話頭一句如弦直跛脚猫兒睡正鼾夜半經行誰共語月光花影恣清談示姚鄰卿居士話頭一句如弦直進步寧知行路難稍得順風催客便蕭然無意過三灘示陳非白居士話頭一句如弦直入處應從侍者邊定動更知將智門庭高峻古今傳示范爾培居士話頭一句如弦直急水灘中下足難行過夜明宮殿裏嚴霜六月透心寒示鄧直卿居士話頭一句如弦直水底游魚樹上鵶眉下頓開清白眼笑看塵境亂如麻示余未也居士話頭一句如弦直鳥道羊腸路可行行到水窮山盡處廓然天地是同庚示齊羣玉太守話頭一句如弦直寶網香雲眼裏花透過氷山并雪洞相逢且喫趙州茶示方時生貢元話頭一句如弦直似吼春雷起蟄龍情解那容些子在善行須信轍無蹤示姚純甫貢元話頭一句如弦直機發靈樞應不窮知是自家真現量四方八面起清風示張述之貢元話頭一句如弦直凡聖量情不礙膺獨蹈大方何境界倒騎鐵馬向空行示齊理侯居士話頭一句如弦直業識消磨六月霜煩惱叢中開眼看皮囊盡放紫金光示齊季籲居士話頭一句如弦直生逼魚蛇化活龍大地山河成粉末眉毛血濺梵天紅示胡康生居士話頭一句如弦直捷疾雄奔木馬嘶萬壑千峯都蹋遍珊瑚枝上摘摩尼示胡凝生居士話頭一句如弦直祖令全提向上玄不向意言生卜度路頭筆直到家園示方奕予居士話頭一句如弦直人在氷山雪洞來時節不同塵世界桃花九月滿園開示戴式其居士話頭一句如弦直栢子庭前語最親略彴橋邊行下過通人那肯問關津示盛集陶居士話頭一句如弦直瓶瀉雲興也是閒佛法若從知解入少林端不把心安示姚申甫居士話頭一句如弦直混入方知不夜天路載碧雲雲載月無身人坐案山前示劉胤平狀元話頭一句如弦直飯後頻斟趙老茶䇿杖喜隨流水去深林無伴看飛鴉示劉君含居士話頭一句如弦直行遍三千及大千掉轉身來何境界夜明簾外月當天示劉六合居士話頭一句如弦直混入靈源不記年識得自心元是佛更於何處覓金仙示劉爾敬居士話頭一句如弦直梵語唐言義不殊搬盡世間閒骨董清風明月滿庭除示劉爾靜居士話頭一句如弦直水底紅塵山上魚布袋都來收拾盡珊瑚枝上喜跏趺示洞如禪人話頭一句如弦直六月炎天火裏霜須信目前無別法溪深杓柄自然長示微密禪人話頭一句如弦直狹路相逢罷問程脚下原無勾絞索橫牽直絆不須驚示慧林禪人話頭一句如弦直度盡眾生佛是魔魔佛兩關都透過陽春白雪和巴歌示慈水禪人話頭一句如弦直夢醒忻看劫外春遍野牛羊足水草莫教蹋破嶺頭雲示宗伯禪人話頭一句如弦直開眼須知合眼時明暗兩頭無著處倒吹鐵笛咏新詩示水澄禪人話頭一句如弦直䇿杖尋溪得自由撞著木人開口問無言笑指水東流示玄燦禪人話頭一句如弦直喝水成氷當等閒拄杖纔行三兩步幾多花雨落人間示云知禪人話頭一句如弦直直入重樓最上層公案萬千成粉碎阿誰敢曰續傳燈示荊山禪人話頭一句如弦直喫飯穿衣最上乘就裏不生分別想道人行處火消氷示中和禪人話頭一句如弦直山自青兮水自藍活計不從人處得清風明月是同參示道菴禪人話頭一句如弦直你既無心我也休華藏莊嚴原具足貫珠寶網不他求示弘覬禪人話頭一句如弦直誰是緣生誰是真坐斷兩頭無點事庭前應笑看花人示禪人話頭一句如弦直世道紛紜作麼生直入萬花叢裏過不沾些子始通身示寂常禪人話頭一句如弦直勿論他家短與長生死岸頭何捷徑疑情粉碎罷商量示智華禪人話頭一句如弦直無位真人倒著行到水窮山盡處通身渾是佛陀耶示慧生禪人話頭一句如弦直討甚閒心鼓是非迸破疑團清夢裏相逢難與話離微示湛之禪人話頭一句如弦直梅熟何勞更索核吐盡口中酸澀味齒牙應有暗香來示小枝禪人話頭一句如弦直幽谷芝蘭分外香浪靜水平人不語鴛鴦鳧鳥自成行示小止禪人話頭一句如弦直直下承當早是遲父母未生前面目不勞開口貴先知示曹印禪人話頭一句如弦直佛是靈山老比丘以手自家頭上摸不須螺髻也風流示玄京禪人話頭一句如弦直博得靈源活水長分派不生高下想成渠何必細參詳示瑞雲禪人話頭一句如弦直勘破塵勞語最親撿得乾柴烹活水自斟自酌不干人示恒如禪人話頭一句如弦直風雨無停竟到家却笑後園驢喫草夕陽西照影偏斜示葛皖伯居士話頭一句如弦直雪夜安心不是心好看當年干木客石頭路上水泥深示純素禪人話頭一句如弦直水面燈毬火裏蓮雪洞氷山穿下過長安盡處更加鞭示江達所居士話頭一句如弦直脚下黃泥知幾深垢膩汗衫都脫盡從他撩亂不關心示許圓脩居士話頭一句如弦直日不勞兮夜不眠自古鼻端無點氣何須特地慕腥羶示程君鑒居士話頭一句如弦直就路還家太鈍生曠劫本無些變易何須特地越規行示芮含實居士話頭一句如弦直十八兒郎笑未休撿得糞頭無價寶幾多歡喜幾多愁示覺海菴主話頭一句如弦直不落思量第二籌推倒須彌穿屐走毗盧頂上滑如油示眾禪人話頭一句如弦直空裏浮雲鏡裏花看罷莫生奇特想從來黑豆不生芽話頭一句如弦直當下無心見本來干木更須牢把定衡山路上滑如苔話頭一句如弦直地覆天翻不動心祇有一條生活計隨緣愈入愈知深話頭一句如弦直無耳人聞說法聲雲水盡時歌舞罷長安大道坦然平話頭一句如弦直底事分明不許知動著些兒遭藥忌離言誰肯辯深慈話頭一句如弦直聞說何如見面親縱是風恬閒不徹還憐活水躍金鱗一句話頭如鐵橛碧雲深處有家傳相逢不必重宣說處處春風楊柳天一句話頭如鐵橛死中要箇活人來六根粉碎成團去優鉢羅花遍界開一句話頭如鐵橛縱橫萬境也教閒脚跟不帶些泥水收拾行囊過故山一句話頭如鐵橛三千里外步如初從來心法無前境大地收來一草廬一句話頭如鐵橛動中消息是如何纖毫不盡隨生滅笑殺當年凌行婆一句話頭如鐵橛驪龍頷下抉珠時只須不顧危亡也入手方知出世奇一句話頭如鐵橛紛紜境界體如如只消識取來時路倒跨楊岐三脚驢一句話頭如鐵橛多年故紙不須鑽一朝家當都拋却始覺從前被眼瞞一句話頭如鐵橛眉毛動處即須知衲僧氣宇天然大莫只因循十二時示五葉侍者一句話頭如鐵橛三玄五位不須論千經萬典都拋却掃地焚香是甚人示融愚禪人一句話頭如鐵橛活中要箇死人來相逢為報鄉關事紫莖金櫻帶露開
