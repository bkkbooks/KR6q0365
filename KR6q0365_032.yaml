body:
  text: 住博山法孫弘瀚彚編首座法孫弘裕同集序二重刻圓覺經序夫緣生無性生佛之迹本虗無性緣生聖凡之形宛爾隨業感而報分優劣逐境浪而識變精粗如來大光明藏是衆生淨覺之本源衆生最清淨心是諸佛本起之因地當知無明無體皆是空花實際非塵妄念輪轉究竟圓滿體常寂以遍十方平等道成心恆通而含剎土不妨以幻修幻肯信居塵出塵開總持之門絶去來之相登涅槃之岸忘得失之心虗空何更生花真金不重為礦貪欲斷而生死斷愛渴除而理障除非植二乘頓超五性無取無證眼不自是眼非智非愚心不自生心植衆德本成就道源悟圓覺以淨覺心取靜行而澄行證客塵永滅妙體方周聞在剎那悟通曠劫二十五種輪觀隨順繇人百千萬種法門樞機在我執四相而生顛倒二妄相依了六情以契圓明一心匪礙作止任滅仗知識以銷融憍慢愛憎觀衆生而同體期限成純淨之樂懺悔斷結習之根悉備上機頓圓種智是為十二分經清淨眼目三千七百祖師密傳之要領也茲因顧居士發心重刊使一切衆生入文殊智海普賢行門履圓覺妙場坐華嚴法界激豫序引豫不敢以宗乘中較其優劣大抵就斯經旁通箇消息耳重刻蓮宗寶鑑序優曇大師徹證禪宗專心淨土自利早圓悲臻未悟將念佛一門集成十卷顯諸佛轉未轉之機輪闢衆生信不信之障礙其引據確其總攝周其設教融其指歸捷可謂大有功于後學者也慨末法我相自高邊見分執貶淨土為小乘指念佛為權行甚者向人涎唾下覔尖新語句蘊在八識田中以為究竟極則及乎到頭一毫無用是之謂棄楚璧而寶燕石反鑑而索照也其亦不辨甚矣夫我釋迦文佛不妄語者不異語者彌陀經云一心不亂專持名號乃至七日即得往生法華經云若人散亂心入於塔廟中一稱南無佛皆共成佛道此其披心瀝膽徹底為人此言不信誰為可信此言可信又何疑于淨土念佛之門乎要而言之七日不亂為何等心入塔廟稱南無佛之時又何等心能者得之禪道如是而已若是真師子兒哮吼一聲百獸腦裂說淨土亦得說禪亦得說淨土即禪禪即淨土亦得雙是亦得雙非亦得終日念未嘗念終日生未嘗生終日無念不妨說念終日無生不妨說生圓陀如摩尼珠求其住足處了不可得何禪何淨土而乃二之然雖如是更有一句彌陀未曾道著欲盡情吐露奈舌根短也噫掣電之機留待哲者建州弘釋録序余作驅烏時嘗遊閩中知建州為理學淵藪後閲傳燈諸書又知建州為禪學淵藪每見建州僧必詢其鄉之先正然往往不能對因為悒悒久之丁巳春吾弟永覺師初棄儒入釋從壽昌先師學枯禪因與道其鄉之先正甚悉皆粹若珙璧逸若鳳鸞多余所未及知者余喜甚指其胸曰此是一部僧史記師曰吾將志而傳之無何先師沒師來博山同居者五載余間索其舊諾師曰俟識鼻孔後為之後歸閩隱山未通消息戊辰春余自鼓山還博山道經建州師迎於開元寺余一見而識之曰今可志建州僧也師笑而不答余乃問曰壽昌塔掃也未師曰掃即不廢祇是不許人知余曰汝偷掃去也師曰和尚又作麼生余曰掃即不廢祇是不曾動著師曰和尚似不曾掃遂相笑而別至己巳冬以書來博山則建州僧志成寄以相示且徵序焉余閲其所集凡分之為四科首曰達本重明宗也次曰顯化彰應也三曰崇德録衆行也四曰輔教備金湯也合之命名曰弘釋崇法化也其識正其論確其採訪博其分界嚴非良史也耶昔者道宣作僧史於唐弗長於文且不知有別傳之事齊達磨一宗於枯寂之輩識何暗也贊寧作僧史於宋學富而才疏且列黃蘗於感通列嵓頭於遺身列永明於興福至於雲門僧中傑也反舍之而弗列則其謬為尤甚覺範繼贊而有述高華秀朗登作者之壇然止傳禪宗諸彥可以稱全史乎今師所志雖僅僅一州而宣寧讓其雅當覺範推其完備逈然獨出前無作者即此可以窺師之一班矣矧千載之上藉師而傳之千載之下藉師而知之是師之功固在千載之上下也建州稱弘釋者非師而誰歟余故樂觀厥成不辭而為之序抑又聞師撰述甚富盡當殺青以傳若然則天下後世有大造焉非獨一建州也余請拭目以俟之送老父還鄉序佛以一音說法衆生隨類得解衆生以隨類說法亦以隨類得解不肖憶出家時順流抵石城聞瓦官寺有法華講席心甚慕之逢一親知逼令歸去時以權語得脫三月後更逢一人遽相謂曰汝父有變拱木將成不肖追念罔極撫躃大慟幾至殞絶復省前法華云八子皆師妙光又見淨藏淨眼化父出家此出世之孝非世孝可比因矢志出家如箭離絃無返回勢矣迄今三十餘載未通鄉信天啓四年五月永豐少尹汪君知不肖同里來訪不肖自出家時諱其姓氏慮恐牽動世情茂才楊淳之汪君同行友也詢叩不已不肖偈示之曰欲知家住處陋巷世情幽過水知吾姓尋城識故丘旋身依社稷開眼見春秋舊日閒遊慣金雞墩上頭初憶叔父或在冀尚一見發彼勝心淳之持偈歸問則先叔已殂於不肖出家之次年而老父反康善無恙前之親友徒以謾語相詒耳老父一聞不肖住博山不遠千里操舟而來時一見面恍如夢中悲喜交集意謂再生也不肖王父以上皆未能望五老父今七十有三尚矍鑠善飯以修短較之豈非再生乎何意垂老得奉慈顏屬有天幸非思所及因思彼親友善說法要即不肖導引師也茲因老父思歸計不能終養暌離之罪擢髮莫數敬述生緣以志始末云爾八關戒序衆生受佛戒即入諸佛位位同大覺已真是諸佛子此菩薩戒非八關戒也然戒有大小體非異同戒有廣略理無分析戒有斷續性絶開遮自非利生大士不無犯于塵勞有力行人何難行于頃刻躋緣生之道岸一日之齊通纍劫之津梁一日之戒謾言瑣細具得全功不論短長頓同全戒譬如飲海一滴味同全海又如一滴投海同海全波須知戒淺功深因微果徹興聖人之方便悲開詣實之權標大士之指歸喜見從權之實清山主撮其簡要吳太史核其攸同收圓行于一時植殊因于永劫不揀貴賤勿論智愚但辦堅實心腸定入華嚴藏海生生社戒殺放生序語云護生須是殺殺盡始安居此勇猛丈夫決定志也良以衆生恣無明窟養爛壞身祇解殺他不知自殺五魔熾盛六賊戕害四蛇毒攻二鼠交嚙從劫至劫殺吾慧命劫吾法財可謂大冤家大怨敵而且親之愛之從而結之殺一切衆生噉其肉血恣養四大一氣不來盡成灰壤因有限身造無窮罪根性狹劣迷極不返三途報至誰當代受若能返照是大不然當披堅固鎧仗金剛劒斬魔賊于五蘊蓋林中逐蛇鼠于無陰陽地上廣法身之慈恕起同體之大悲見一切衆生如一子想無彼我相以無緣慈化無相衆生此雲棲老人深達法相也湛上座興悲運慈悉倣雲棲軌則而桐之諸上善人互相鼓導生社繇此而興殺業繇此而斷豈但戒殺而且放生豈但救衆生命實乃續諸佛慧命廣一切衆生慧命也何以故以同體故其無功之功無德之德所謂以殺為生吾不得以筆舌名之也報恩品序聞夫苦海無邊慈恩匪一情想局于限量識性迷于無知限量則灼有親疏無知則妄分彼我輪回于生死三途之業報何窮旅泊于人天九有之升沉不息改頭換面多生父母結盜賊之冤戴角披毛歷劫宗親償兒女之債大師興慈悲念說四難報之法施長者現衰邁年誨一惡性之逆子胸前而寢膝上而遊真情普矣男為慈父女為悲母親愛彌乎以世界為殿堂以人民為根本國主之深恩莫報以神通為利樂以度行為修因諸佛之慈德無休捨幻化財植人天福身命頓超棄有漏軀絶堅固想傳心為最解法義而流通法義還他三界智人知深恩而報答深恩須是九濤居士不辭饒舌願入斯乘壽趙湛虗居士七袠序曩豫讀淨名經云塵勞之儔為如來種又云高原陸地不生蓮花卑濕污泥乃生此花則知佛法非專談真如獨說無生以醉人於忘情泯識之鄉使跛驢心智自困於灰稿也蓋佛示出家以明真諦非有為破凡夫著家使出三界二十五有之籠也淨明示現居家以明世諦非無為破二乘越俗使不淪於斷空寂滅之坑塹也既曰示現各有儀則豈彼釋迦無能逃位皇宮淨名好事嗜痂毗耶耶觀彼曼殊叩室競談不二之時而維摩僅置一空牀除諸他有則此老雖示有家而風味淡然宛爾一禿居士耳佛則示居華藏法軌森嚴不壞世間而熾談實相正顯真俗非殊淨穢何異誰謂世法分疆裂界徒與虗空畫痕爪也余初至董巖時即與趙湛虗公為法喜交公之翁號豫齊居士高才碩德為建溪第一流人物且深通佛法以楞嚴為室廬以宗乘作茶飯故公篤信斯道於此二法亦具有昌獨之好且世世佩為庭訓冀子若孫輩咸方舟並駕遊於法海覺苑也道貌和衷氣味如春風釀品物善行若飴德聲遐布且能即塵勞為佛事踞欲界作禪牀其視董巖叢席如急已家政然凡院務職事有缺典者莫不悉心調理多方周贍今董巖千指麟萃英髦鳳翔人咸目為薝蔔之藪皆公弘護力也若爾即謂淨名再來示現有家亦可矣以孝友為儀刑以詩禮為章服故其令胤傳芳森森然如璚枝繞砌玉樹欹風公雖未展垂天之翼以薦珍於廟廊吾知公天性合道固以浮雲軒冕然而積厚流光造物亦不能更蘄於來哲公何以此自多為哉吾意公之觀身心世界水中漚花也家緣眷屬一戲劇場也壽相延促塵劫抹點也其襟度曠邈心量高明且欲摶捖大千不啻倒擲舄履令撲地作笑弄聲耳今春秋揆度正欲不踰矩之辰余忝方外道誼不能獻度索之桃斟椒花之醞聊裁短偈以當優曇一枝為公期之祝偈曰有美人兮履道素慧光燦然渾不露饑餐渴飲更奚為語必追隨默同處拄杖撩天那復高滄溟倒跨石為橋丈六金身作莖草大千俯視掌中桃世波盡道蕩人性魚龍返以水為命逆洄順遡得其情業流灣環風送艇芥城劫石許多秋歷覽須臾一瞬周有問只今遐算事眉毛剔起笑夷猶壽黃心鏡居士五袠序夫修行者於相不住壽者相百年等空華如理得常住若執於百年壽命祇得百年悉被明暗二境遷變非得常住法也傅大士云有物先天地無形本寂寥能為萬象主不逐四時凋云萬象主者即常住法金藏雲起而非成毗嵐風吹而非壞劫火洞然我土樂隱才達此理悟不由師稱此理而曰壽非劫運也稱此理而曰命非生滅也稱此理而曰常非斷續也稱此理而曰住非去來也其劫運生滅斷續去來悉鏡中花相於實際理地求其纖毫實迹了不可得於不可得中聖功獨照曰壽曰命曰常曰住皆賸語也余以此壽居士曰無量壽無上壽無等壽無等等壽磨塵點墨不足以較其優劣也偈曰識得金剛不壞身眼中童子面前人謾言桃實三千載賸有靈枝劫外春引題顧醒翁居士園菴齊亭引昔維摩居士居毗耶城播揚大教今醒老居士居石頭城護持大法古之世界今之世界古之天地今之天地古之日月今之日月古之人物今之人物維摩即醒老醒老即維摩闡揚正法光顯末運無二無別故以醒老之菴扁之曰金粟善財童子五十三參百城重繭而醒老不離跬步默究斯道故以閣曰南詢以娑婆窺淨土十萬億剎悉以蓮為標的居士現前寶池沸湧菡萏開敷故以亭曰樂居士世族名家望隆朝野英賢疊出科第蟬綿故以館曰甲秀居士焚香晏坐注意禪那履列祖芳塵啓今人慧鑑故以堂曰鏡心居士襟懷豁達塵境不侵故以齊曰淡然居士百務紛紜心空澄湛故以齊曰純一林泉掩映竹樹交清故以亭曰挹翠斯園也銷塵坌之萬緣融古今之一致入金粟菴談不二語登南詢閣悟菩提心憩樂亭注西方境讀甲秀館生夢筆華坐鏡心堂翻竺乾案範模純一心地淡然挹翠色于深林噉竹香于嘉樹居士幽致之樂禪悅之趣逈出尋常萬萬揮筆及此爽心怡神不啻置身園中想居士時覽斯語貧衲雖隔千里未必不朝夕左右也跋正觀禪人刺血書華嚴諸經跋夫大法難逢真乘罕遇千燈供佛酬半偈以何辭四句潤心捨全身而不吝況破塵至寶法界全經大士因門如來果海塞滿龍宮之藏具在一塵播揚鷲嶺之奇縱橫萬象自非曠劫植菩提之因地安能手捧目觀偶此勝緣哉正觀禪人夙熏種智修假多方出娑竭之湧泉繡貫花之妙品加利刃不見當機之痛流鮮血無慚捐體之施書報恩金剛華嚴共計一百有餘卷以弘寶筏庶渡迷津蔓衍不二之雄文舌根流出騰躍難思之義海筆底翻來反觀法帙得成肌膚無損勝妙廣博幻質何乖得浮世之便宜履法門之徑路妙緣斯在道岸非遙記惟德禪人血書經記教中云施者有四謂財法身命較之則財法尚易而身命為難身尚易而命猶難故我釋迦大師諦觀大地無微塵許不是捨身命處今之人身外之財尚堅守無纖毫解脫況身命乎吾徒道容者刺血寫五大部送博山與藏經同處使展閲者知有不惜身命而重大法人各效之解脫法門不待重宣其意而功德美行可與輪藏并峙而無盡不亦善乎仍發心寫華嚴三品日為課誦作如意寶返魂藥渡海囊余因焚香述偈以記之云爾稽首無上法甚深修多羅受持疾成佛故不惜身命剝皮可為紙析骨當為筆刺血以為墨何況於舌根譬如破斃囊而盛無價寶祇欲貴寶故何惜囊破壞又如淤泥中而生妙蓮花見者皆愛樂終不惜泥土此身等土囊能生無上法昔人捨全身為求四句偈惟損一根故成此若干卷是大得便宜是名真解脫是破此慳囊是成諸佛智願法界衆生同遊華藏海廣行衆善行皆共成佛道文念佛文為棲霞一門禪人說夫淨土者乃一切衆生究竟安身立命處也念佛者乃一切衆生第一背塵合覺門也寂光真淨惟是佛居從此垂作實報淨方便淨及同居淨以接引彼菩薩人二乘人及凡夫人既從實以施權則無權而非實既隨義以立名應顧名而得義惟淨土之致不明故念佛之理亦昧但謂自性即是彌陀而不知彌陀不外自性但謂無念乃為真念而不知淨念即是無念是以究極於一心不亂則諸佛心內衆生時時成道托修於執持名號則衆生心內諸佛念念證真念惟是佛如百川朝宗大海佛全在念如琉璃內含寶月不惟感應道交亦且自他不二但令諦信不疑決定無諸岐曲也余幼慕禪宗得入壽昌之室謬承記莂三十餘年寥寥海內有唱莫和刁刀魚魯轉見參差方知祖師西來事出非常有大利者必有大害功高易進無如淨土一門念佛得度今正是時之語非欺我也一門禪友結蓮社於棲霞禪室攝念佛人同歸淨土可謂末世津梁人天標榜乞余一言以作警䇿余嘗謂一切行者須信自心有成佛種子信如來有接引大願信有淨土可生信有彌陀可見將一句佛號驀直念去念到一念不生則凡心即是佛心更何生死不了真可謂直捷穩當者矣勢至圓通文殊三昧誰有智者而肯捨置弗修習哉放生文為報恩自觀以之二禪人說五濁惡世缺陷衆生舉足動步無不是業招因帶果無不是苦而殺生一事則猶業中之業苦中之苦也止惡行善莫急於戒殺轉毒為慈莫善於放生故五戒十戒具足三聚莫不以此為初基果位聖人因中大士履真上賢出假菩薩莫不以此為首務初果鋤地而蟲離四寸道共戒也聲聞入定而刀杖變花定共戒也菩薩以自在力現三塗為淨土慈成力也如來以佛眼觀大地衆生同成正覺悲無礙也好生之德普涵於九界放生之功直圓於佛果而世人每易視之者良由同體之理不明故也蓋性為生理識為生基生機蘊於意地生緣熾於六情遍觀三界無非受生之場備閲六道咸稟妄生之氣達無性者方了緣生悟無生者乃能護物以無緣慈運同體悲能會萬物為自己故拔苦與樂根於心現於事不期然而自然也若未明斯致形跡為礙物我成敵在彼既有必償之果在我仍造必報之因因果相酬循環無際苦口良藥如水投石則奈之何然奔濤狂瀾勿忘中流之砥移山抒海弗替初心之誠難行能行亦在當人之自奮耳苟能斷殺業除殺法離滅殺因忘殺機於根塵識界盎生理於依正自他則菩提涅槃便可向放生一事中薦取豈世間功德所能倣佛哉自觀以之二禪者率諸善友創此社於報恩大剎豫為申明其義以告同仁俾能放所放咸契無生緣生之理庶地獄可以頓空佛性可以頓了謂放生社即寂滅場可也
