body:
  text: 住博山法孫弘瀚彚編首座法孫弘裕同集住信州博山能仁禪寺語録佛成道日上堂僧問雪覆千山無點白雲空萬里絶纖埃未審甚麼人到此境界師云無縫襖子足風涼進云向上更請和尚道師云秦望嶺頭雲楚人那得見進云還許學人進語也無師云試説看進云恁麼則禮拜去也師不顧乃云法本法無法庭前瑞草和根無法法亦法黃河九曲金沙混流今付無法時釋迦鼻孔長多少法法何曾法瞞博山一點也不得諸昆仲釋迦大士四十九年橫説竪説逆説順説誰人奈得渠何及入涅槃時以虗空為口滄溟為舌日月星辰為莊嚴山河大地為聽衆橫説竪説逆説順説要且無人得聞博山今日在此座上橫説竪説逆説順説誰人奈得博山何博山今日不待涅槃即此座筵以虗空為口滄海為舌日月星辰為莊嚴山河大地為聽衆橫説竪説逆説順説要且無人得聞者裏有些子誵訛諸昆仲過去釋迦大師所説法要無人得聞即且置現在博山所説法要因甚無人得聞者裏若緇素得出許你親見博山既見博山即見釋迦大師若緇素不出縱見釋迦大師要且不見博山何以故有口非干舌無錢卦不靈下座上堂諸昆仲靜則埋根千尺動則當處生苗直饒不動不靜未免飄飄颻颻所以臨濟大師三遭痛棒如拂蒿枝相似洞山不解無情説法百城重胼未足為勞雲門夾斷腳脛方知痛癢溈山見火星始乃瞥然法眼一切處現成千了百當此是古人分上事今人又作麼生若言古人有大根大行此是自生下劣之想性燥漢當陽一擊大地百雜碎毗盧遮那如來忍痛不禁入一微細衆生身中作廣大佛事諸人還聞見麼若聞便好觸瞎汝眼根若見便好𡎺聾汝耳根直饒聞見不生正好喫博山痛棒何以故不是與人難共住大都緇素要分明上堂異地生靈苗面南看北斗無陰陽地上幻出萬狀千形正眼觀來仍成過咎諸昆仲口生白醭未必知有異路玄提東山水上行又作麼生折合卓拄杖云千古有餘力縱橫驗正邪元旦上堂洪鈞初轉篆煙斜拄杖重開劫外花賸有幾多饒益事春風偏向破袈裟諸昆仲即今是元正啓祚且道老僧袈裟下有幾多春色首座云抖擻不下師云闍黎分上又作麼生進云夜深彌勒穿過手擺金襴笑掣顛師拈拂子云拂子頭上顯現闍黎還見麼進云聖人端居大位自然海晏河清未審佛日皇風如何並化師云全憑一句無私語掃盡煙塵報聖堯衆禮退上堂撲落非他物縱橫不是塵山河并大地全露法王身古人恁麼悟去大似喫常住飯作自己事博山則不然行年四十九皮骨若枯柳四大體自如面南看北斗博山恁麼道大似喫自己飯作常住事徐六擔板各見一邊更有一偈為之解嘲不免總説向大衆去也祖父田園自家産業匪守珍御不生下劣才涉思惟平地遭跌醉酒臥街證龜成鱉博山恁麼道早作死馬兒醫汝等諸人也不得鑽龜打瓦珍重首座云某甲不似和尚師云汝作麼生進云行年三十七通身赤骨律不喫常住飯砵盂兩度濕師云却是汝來得要且不會老僧意在上堂僧問蟄戶將開海門雷震敢問和尚一池鱣鮪何時際會風雲師云拄杖時常頭點空進云興波作浪時如何師云闍黎腳跟下水深多少僧咦云透網金鱗雖振𩮻沖霄丹鳳不遺苞師云更須桉下雲頭始得又僧問乍入叢林蒙師命往白下請有字經敢問和尚無字經命向甚麼處請師云磕破髑髏僧禮拜師云便祇如此耶出去又僧問近闡宗猷既非臨濟溈仰不是法眼雲門未審香火因緣從誰結得師云渡河落影子進云大好山頭一針鋒地容盡大地衲僧因甚麼者坐具也容不下師云闍黎曾到峯頭麼進云已拈玉線芒請露金針穴師云急著眼進云更有話問請師垂慈師云不妨舉著進云如何是功師云三人同一春進云如何是共功師云力士舁杖鼓進云如何是功功師云猢猻上露柱進云不得敲唱雙舉請示正中妙挾師云高低雲繞樹進云謝師答話師云遠近鳥銜花師乃云春日山多霧樵人路徑迷縱然得入戶腳下有黃泥諸昆仲氷厚三尺非一日之寒水漲千溪非一日之雨朝聞夕死非一日之功立地成佛非一日之行所以釋迦大師曠大劫來難行能行難忍能忍為我等故修諸苦行成就無上正真之道正為我等今日事且道今日事又作麼生若向今日會去與釋迦大師共一皮袋子豈但釋迦大師與恆沙諸佛共一皮袋子一心一智慧力無畏亦然于彈指頃成就無量無邊妙行具足無量無邊莊嚴圓滿八萬四千諸波羅密門其或未然而言凡聖齊同如持爝火擬比太陽又如初生鳥雛欲沖霄漢多不自諒也首座問和尚道氷厚三尺非一日之寒氷解後如何師云七花八裂進云水漲千溪非一日之雨天晴後如何師云石頭露也進云朝聞夕死非一日之功如何是無功之功師云闍黎向上著進云立地成佛非一日之行如何是無行之行師云著衣喫飯未為分外進云和尚皮袋子與釋迦大師皮袋子重多少師云半斤八兩解制上堂馬祖升堂百丈捲席將謂鬍鬚赤更有赤鬚鬍博山九十日以來與諸昆仲升堂入室還有恁麼衲僧麼若有恁麼衲僧又何勞在此座下眉攢攢地濟得甚麼邊事諸昆仲當此時也千山寒色雨滴巖花為諸昆仲敷宣第一義諦於此會去猶在半途於此不會帶纍博山開眼説夢上堂春日乍寒乍暖春雲忽捲忽舒若向者裏會去佛法天地懸殊諸昆仲口橫不如鼻直眼大何似眉粗倐然放出新羅笑殺楊岐三腳驢還知麼衆無對師卓拄杖云老僧今日失利上堂僧問今在人天衆前作麼生相見師云是水東流進云和尚安住在甚麼處師云門前剎竿二丈五進云花落月明時又作麼生進步師云憑闍黎跳躑進云石泉一線水源從甚處來師云喉嚨下進云流向甚處去師云頂門上進云高低物象一顧齊平遠近音聲衆響斯應是何人境界師云沒來繇漢進云幽間鬼如何殺得師云借闍黎刀看僧擬議師振聲一喝師乃云明暗交參正偏綺互言中有響句下無私揭開雲霧見青天畢竟是誰遭點額龍門萬丈笑看足下風雲金彈一丸播弄手中戲具古人道一人所在亦到拄杖子不會諸人却會得半人所在亦到拄杖子會得諸人不會所以道石人機似汝也解唱巴歌汝若似石人雪曲也應和恁麼商量惟木上座却較些子珍重上堂僧問如何是法身理師云伸手不見掌進云法身向甚麼處安立師云暗地始驚人進云未審法身是何境界師云山河大地進云離了法身又且如何師云爍破四天下僧禮拜師云是法非法是心非心非法即法非心即心打翻漆桶大地平沉雲門大師甚是奇怪盞子落地碟子成七片又云扇子𨁝跳上三十三天築著帝釋鼻孔東海鯉魚打一棒雨似盆傾諸昆仲博山今日亦如雲門大師氣宇如王若渠來相見時又作麼生定奪衆無對師云拄杖不在苕帚柄聊與三十何以故若不挫其來鋒將來必成過患上堂道非明暗法離有無布袋頭邊逴得看來猶是半途直饒坐斷毗盧不通凡聖旋風撲面氣急殺人直下相逢不是渠轉位旋機沉毒海諸昆仲若言即心即佛大似黃葉止啼又云非佛非心還如夢中説夢不是心不是佛不是物是甚麼碗脫丘江西老宿恁麼説法尚喚作口裏阿漉漉底諸人分上又作麼生諸昆仲莫祇論他非是好門前更有鳳凰山上堂甚麼物恁麼來重門關鎖一時開甚麼物恁麼去佛機不隔時流意靈山會上有多端立雪庭前無二致甚麼物幾多般見未分明莫浪傳嘗記寶方言道好天非高大海非寬説似一物即不中多情不用眉毛動修證即不無污染即不得丫角女子髮如銀病中勘破維摩詰即此不污染是諸佛之所護念粉碎虗空撲地來百匝千重成一片諸昆仲既不似一物畢竟似箇甚麼有眼無耳朵六月火邊坐任是同胞生也須更問過更問過是甚麼良久卓拄杖云拄杖子却辨得佛誕日上堂王宮未降佛事已周腳跟下好與三十棒未出母胎度人已畢腳跟下好與三十棒四十九年説夢取笑旁觀腳跟下好與三十棒三百餘會周遮模糊正眼腳跟下好與三十棒忽遇惡水潑來即周行七步目顧四方自云天上天下唯吾獨尊腳跟下好與三十棒獨有雲門大師云我當時若見一棒打死與狗子喫却貴圖天下太平雲門用此惡辣手段始能竪立宗乘若是倚牆靠壁漢又胡足道博山三十棒略與通信座中還有具此惡辣手段者麼良久云黃金自有黃金價切莫和沙賣與人首座問雲門一棒博山三十棒是同是別師云出門是路進云未離兜率已降王宮未出母胎度人已畢因甚麼又喚作四月八日活佛降生師云爭怪得渠進云諸佛出世為一大事因緣和尚出世所為何事師云笑看天花滿裓進云佛祖來償口業債未審是何口業師云惡毒糾纏進云教中道持戒但束身非身無所束因甚麼千佛出世又與人授戒羯磨師云羅浮原在廣之南進云前無重難後無輕遮方堪受戒或遇箇大闡提漢殺佛殺祖底出來未審還與他受戒麼師云堪為來學典型留待別時供養進云恁麼則和尚性命落在此人手裏也師云老僧甚得便宜進云法施殷勤且酬三拜師云止莫礙第二座問上堂三身中那身解説法彈指一聲驚海嶽幾片間雲稱野情舉頭忽見遼天鶚金烏玉兔急如箭倒跨牛兮入佛殿將錢祇為買饅頭放下手兮成塊麵箇是男兒大丈夫一口吸盡西江無古澗寒泉清似鏡分明狀出山海圖諸昆仲臨濟大師以一株大樹覆蔭天下博山以一根拄杖子攪渾世界且道與古人是同是別良久云翻思初祖金雞讖要假兒孫腳下行上堂從夏至今未曾與諸人説話今日因恆一本宗二上人請博山升座不免強説喻言然盡大地撮來如粟米大將何譬喻得出法眼大師云理極忘情謂如何有喻齊到頭霜夜月任運落前溪諸昆仲此事不在哆哆啝啝説得道理通便稱悟門只饒講得三乘十二分教祇益多聞尚喚作傳語人亦名辨慧人與自己總沒交涉若欲匡持大法直須頓棄言詮握太阿鋒眉捷交流汗血拈如意寶寰中賑濟飢虗呈溈仰圓機施臨濟棒喝履法眼清素用雲門顧盻雖然如是若到曹洞門下尚未有話會分何故水急魚難住山深雲更多上堂古德云日月未足以為明是甚麼物得恁麼明乾坤未足以為大是甚麼物得恁麼大博山今日不惜唇吻與你諸人注破卓拄杖云拄杖子眼光爍破恆河沙世界明耶非明耶恆河沙世界在拄杖子裏許大耶非大耶諸昆仲祇是根拄杖子又何得論明論暗論大論小大小明暗悉是對待之法然雖如是也不得草草何以故要知幽徑趣須辦半年糧珍重上堂師方升座二僧問不稱理各賜棒乃云毛吞巨海海性無虧芥納須彌芥空宛爾若道是神通妙用斯人未達其源若道是法爾如然猶是拍盲狂解是以二人各責三十棒趕出三門外去諸昆仲只須析毫端而瀉海水碎芥子以露須彌旋嵐偃嶽而絶纖塵競注江河而無濕性諸昆仲萬花叢裏去住揣空出骨何難清涼地上謳歌白日挑燈有據到此則正偏旋復雲樹絶依古木森然靈禽不住菩提涅槃真如佛性喚作破草鞋且拈放一邊各人衲衣下漿洗錢布施些子還肯麼毗目仙人執手時善財眼底微塵佛珍重上堂三界無法何者是生三界無法何者無生生與無生二俱增語若謂是生前村古路坦然平若謂無生海門波浪萬千尋若道生即無生樓頭戍鼓正三更若道無生即生彩筆將來畫不成諸昆仲幻化門頭高著眼莫將陽𦦨亂紛紜生與無生姑置勿論且道二六時中折旋俯仰畢竟承誰恩力良久云六窗虗淨無倚將來用度恰好珍重上堂大道虗曠無有程途幾動之微自當審細若藕絲而牽大象匪假神通如寶樹之宿蟭螟難窺異色活中死句笑容含氷鐵之姿死處活來寒谷動陽春之𦦨更須知當機劈面毋待指陳互換相資那容湊泊諸昆仲當此時也寒灰發焰雪覆紅爐氷玉相銜誰能料揀若有人料揀得出博山將明窗下安排著珍重在壽昌守無明和尚七衆請上堂一二三四五六天地位萬物育箇中有箇無角泥牛東觸西觸至今無處藏蹤只得和塵混俗更須知平處險直處曲擊破重關謾輕忽太平宇宙斬癡頑此是禪宗親付囑親付囑破驢脊上蒼蠅出達磨未識參禪孫臏不解貨卜惟有壽昌老人一生向鋤頭上七縱八橫至今也填坑塞窟諸昆仲還有為堂頭和尚出氣者麼今日幸有博山不肖兒孫為伊雪屈壽昌和尚完七衆請上堂昨夜西風穿牗過窗櫺紙幕都吹破殿前賸得古香爐裊裊祥煙騰復墮者一箇那一箇又一箇鐵髮銅鬚庚金丙火拋向太冶紅爐煉成一團抖擻看來阿誰是我者一箇那一箇又一箇大家擡薦商量哭殺西來達磨諸昆仲回觀説法四十九載看來何異先師七七安心可笑雪庭人惹得階前神鬼泣泣泣好將斷臂完膚一生參學事畢結制上堂天地與我同根萬物與我一體時人見此一株花如夢相似諸昆仲古人於黑漆桶底鑑貌辨色無影樹下笑月吟風掣開金鎖玄關扯破漫天網子博山則不然有人問天地與我同根萬物與我一體意旨如何祇向他道昨日有人從燕京來寄得廣南信豈不見溪山各異而雲月是同又云時人見此一株花如夢境相似意旨如何祇向他道老僧見此一株花切於肯綮豈不見人無遠慮必有近憂珍重鑄佛上堂天雨四花地搖六震拈拄杖云覿面相呈是何祥瑞釋迦于迦維國土降生纍及諸大菩薩天龍八部趨侍成勞唯十方諸佛各住本國合掌宣揚讚歎不及諸昆仲還見也未若見虗空落地成幾片若不見爍爍紅光搖閃電若見不見長安盡處含元殿若不見而見裂破饅頭成塊麵所以法不孤起緣聚則成智邲禪人于徽州境上苦行三年正是擔佛傍家走智碩禪人斂靈山之象迹發異地之靈苗真淑金居士不忍坐觀劍相助開五十三參之覺路結百千萬種之良緣或亂峯頂上卜吉導迷或引進猶勤針還玉線或輸百金而不倦或伸隻手以相扶仍有水齋聖慈本宗諸上人攢花擲錦蘊造成功淨眼諦觀悉成鈍置今有浦城道美黃居士設齋供衆且道直下相逢不勞心力是何人作證復拈拄杖云釋迦昨夜又重生笑看爐中飛片雪珍重開光上堂佛身無為不墮諸有慈德聲名垂不朽今朝覿面絶周遮眼上眉毛誰不有丹霞撥火而尋舍利善現晏坐而覩法身雲門用棒以酬恩洞山用麻而報德者一隊老漢雖則一期方便怎奈千古顢頇何似博山將大冶紅爐一模傾出使天上天下有情無情覩端嚴之妙相植菩提之正因度普耀之通津趨妙嚴之果海紫磨金聚咸轉根本法輪白玉毫光旋入普明三昧使大地衆生各各相謂有佛出世各各自見己身作佛無有衆生無一衆生相者如是則無施者無化者無造者無受者亦無見者何以故施者乃至見者如夢幻故山河大地草木叢林情與無情世出世間如夢幻故乃至諸佛出世諸佛涅槃影現其中如夢幻故還有不在夢幻者麼卓拄杖云今日為君親指出普天匝地盡光明上堂一二二三子平目復仰視兩口一無舌此是吾宗旨仰山大師生平家活徹底為人若以意識度量正所謂平地上死人無數也然此偈無纖毫縫罅博山今日向虗空裏釘橛子太清中加彩繪使諸人有所趨向有所捫摸也一二二三子抖擻不下平目復仰視北斗向南看兩口一無舌空容傳聲虗堂習聽此是吾宗旨披拂有餘恨諸昆仲當知此偈暗機圓合金鐘同玉磬和鳴正按全提瑞草與瓊枝並茂若向者裏會去平常心與道相宜若向者裏不會正是業識茫茫無本可據更有一事在佛殿東南缺了一角有人補湊得下博山遺隻履以謝之珍重上堂諸佛祕密藏祖師相付既同本來心何迷復何悟言語悉虗妄形色如朝露了形色語言究竟絶依怙譬如洞庭水今古清如故虗空非動搖太清絶點污有物終敗壞無形始清素諸昆仲迷鏡裏之頭徒勞狂怖昧衣中之寶枉受竛竮卓拄杖云若向者裏會去猶較些子更欲遲疑向下文長留待來日擲拄杖下座上堂心同虗空界示等虗空法證得虗空時無是無非法大小祖師雖則是和泥合水要且弄巧成拙將心與虗空分作兩橛説同説等論是論非雖不涉是非亦將是非弄影耳夫虗心獨運妙湛何依至體彌綸空界何立大方莫比其量慧目罔眺其蹤日月未足喻其明氷雪難以方其潔古澗之水湛湛浸殺法身不萌之草茸茸能藏香象諸昆仲且道徹底無依向甚處安身立命良久云衆既知時節吾今不再三卓拄杖下座上堂靈光不昧萬古徽猷入此門來莫存知解諸昆仲終日拈香擇火待客迎賓動轉施為折旋俯仰還有知解也無既無知解得恁麼伶俐得恁麼活潑古德云樵子負薪歸機婦連宵織看他家事忙且道承誰力若向者裏會去飯是米做底湯是水做底師姑是女人做底切莫當面錯過不錯過子過新羅依然辜負我卓拄杖下座解制上堂世界乾城衆生陽𦦨諸佛鏡像六道空花不躋圓覺大伽藍終是癡狂門外走若帶些些泥水未免紙裏麻纏除是鐵膽銅心始解步空捉影百尺竿頭穩坐終落那邊三家村裏安身仍停此岸只須藏身處沒蹤迹金針繡出玉麒麟沒蹤迹處莫藏身鐵掌挪成銀彈子諸昆仲今日解制之辰三年果滿萬行周圓且道百步穿楊一箭作麼生透得過良久卓拄杖云好手手中誇好手紅心心裏射紅心下座上堂心如墻壁乃可入道集雲峯下四藤條是聖足凡都一掃諸昆仲不立聖凡則且置古佛與露柱相交是第幾機雲門大師云南山起雲北山下雨若向者裏會去古佛向露柱頭上轉大法輪露柱在古佛腹中照天鑑地復有微塵數菩薩摩訶薩出現於交未交之處行六度萬行彌布重重所謂檀波羅密布施海尸波羅密戒德清淨海羼提波羅密忍辱海毗黎耶波羅密精進海禪波羅密正思惟三昧海般若波羅密智慧海此諸大士於實際理地雲興霞舉解作家方於衲僧分上了無交涉直須摩著衲僧鼻孔始得諸昆仲近時禪道凋零人心狂悖天下無真正知識導引後來亦無真正學人參詢善友賓主相見各負勝心如傀儡一棚不加線索或大罵一場謂之直捷謂之險峻謂之接機謂之推向萬丈坑中謂之不容開口或盲加幾棒或竪指擎拳或亂伸問答謂之痛快謂之流通或藏睛閉目謂之禪搖唇鼓舌謂大悟指證經典謂之正脈執持課誦謂之行門或祈乩筆之驗以保陽年或禮應赴之流而修冥福更有無知學者認定箇業識茫茫謂之自己指面前頑虗境象謂之清淨法身眼底無人自尊自大如此邪輩是處皆然若當作禪門下客祖師門庭則掃地而盡矣茲因高麗國晦曇上座同寒溪寺清虗及衆居士自楚而來廣修供養復請上堂敷演斯道博山不覺老婆舌頭所謂劍為不平藥因救病雖然還知未升座前消息也無良久云澗底有泉清鳥語眼中無物逐塵飛珍重結制上堂世尊拈花芙蓉秋露冷迦葉微笑蘭蕙曉風清又云我有正法眼藏涅槃妙心付囑於汝可謂囊藏長者券腰沒半文錢至今後代兒孫望影分波竟莫得其涯岸當此時也去聖時遙人心狂悖妄庸邪見布滿寰宇稱悟道者紛紛求其真參實究者蓋鮮也諸昆仲若要會世尊拈花底道理竪起拂子云向者裏會取若要會迦葉微笑底道理擲下拂子云向者裏會取然須從氷山雪洞裏穿下過來始堪共語不然則就窩子裏打將去盡是掠虗漢與自己本分中有何交涉即今乃結制之辰有吉安純初曾居士舟次一月而來為彼乃郎廣修供養復請博山上堂敷演此事不免翻世尊之陳案燃古佛之慧燈踵列祖之芳塵續金剛之慧命然雖如是諸人分上也須向無陰陽地上銜一莖草來始得卓拄杖下座上堂單明向上語絶周遮洞鑑幾微要在句外若在文言上理會正所謂埋沒先宗辜負自己德山大師云毫釐繫念三塗業因諸昆仲十二時中折旋俯仰是繫念耶非繫念耶是正因耶是業因耶又云瞥爾情生萬劫羇鎖開口動舌處是情生耶非情生耶是解脫耶是羇鎖耶汝等諸人各向衲衣下緇素看若以無念為無念無情為無情即泥塑木雕若以有念為有念有情為有情正是業識茫茫無本可據衲僧家須另行一路始得祖師云心隨萬境轉轉處實能幽隨流認得性無喜亦無憂于諸境緣未免隨流且道喚甚麼作性若認得性正好喫博山痛棒若認不得性正好喫博山痛棒何以故龍門無宿客雨打石人頭卓拄杖下座
