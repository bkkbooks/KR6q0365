body:
  text: 住博山法孫弘瀚彚編首座法孫弘裕同集啓復何菲莪大司寇插草諭誠大地無過嶺表芳塵聯接中天獨讓閩南標佛國名從來有種續祖燈𦦨光亘無窮恭惟閣下揭露衣珠重披慧鏡現宰官而為領袖作地主以衛金湯頴悟于雷不驚于虎誰過楊李之門文刻白字敢曰慈明之謁當道種青松弄雪嶺靈蛇聽偃溪浚水生擒活捉僧俗不分果熟香飄聖凡一揆某挂錫巖阿不循情于蠟屐載舟山水愧拭涕于泥封速度嶺以規僧林敢跨舷而登祖席輒辭高誼希鑑愚情復張中丞寶樹吐煙熏戒香于遍野慈門返照麗慧日于中天乘一極悲心慶多生願力恭惟閣下付囑靈山範圍塵世嗅木樨而無隱晦堂活句驚人悟物格以致知妙喜微言在耳古既如是今胡不然徹萬劫因緣成一時佛事攪長河酥酪還他淨梵天人變大地黃金須是達多長者某惟圖溫飽山門底事不知久脫世緣物外煙霞頗適頃承翰教進止倣徨愧不暇于羈延實有違于台命復黃孝廉福地珠林藉縉紳而興寶社泉南佛國仗緇素以扇慈風發蘭若真乘結菩提善願恭惟門下儒門砥柱法塹金湯揭壁上高僧點塵中俗眼一呼而應從來聲裏有人再犯不容那箇衣中無寶駕三車誘諸子頓轡白牛具四攝化同流高標赤幟象龍蹴踏凡聖通融某素耽丘壑不諳市硜硜惟拾枯柴熠熠難調野馬度嶺之期已定搖空之錫不回慈命斯違通身汗下復金繩界道蓮開八德之池寶網舒光樂響七重之樹儒釋慶多佛國人天交集珠林恭惟臺下半偈心空三生緣遇聞雷悟道何妨抱子懷孫指雪傳心不礙男婚女嫁即事離事居塵出塵喚來瓶裏之鵝放出雲中之鶴某慣熟藜羮時疑梵字聞囀鶯而慚語拜翰教以厚顏希恕專愚無煩齒頰復明鏡非臺在無心而可鑑菩提有種誠諦信以抽芽藉願力金繩動樞機屏翰恭惟臺下靈源皎潔道樹敷榮斂法界于毫端運絲綸于掌上深談不二須知金粟重來摶聚大千喜見曇花再現枝枝珊瑚帶月行行欄楯披雲履諸宿芳塵洞羣迷寶所某鹿苑委身濫蠟人戒悃禪門寄跡愧鼻祖燈傳急旋錫以驚遲敢攀緣而應命援毫悚栗安住不遑復陳大居士天王碩輔菩薩宰官印毗耶真乘妙契風規不二踵太丘德業爭高月旦無雙節旄望重江藩屏翰功高法苑稽祖燈半籍僧率多閩海鱗龍拈聖箭一枝公實作鼓山城塹接起晏祖道脈皆可悟不跨石門之禪挽回雪嶠靈風喜復覩當年喝水之勝踏神駒捋猛虎豈圖熱閙門庭擊法鼓竪慈幢所貴翻騰龍象貧衲未瞻光霽先仰星雲物之格矣想子韶頌月夜蛙聲吾無隱乎喜山谷聞木樨香氣深承折簡尚候摳衣傳法入閩南雖不效背觸竹篦問答賞音逢太傅還商量打翻茶銚機緣把臂雖遲馳神不遠復黃惺源諸居士二羡黃梅負舂妙悟心非臺樹笑金粟戴髮超然品逾風塵示有家而修梵不壞俗以談真莫問陸和泥皆可産青蓮瓣無分鍮與石總是點黃金資瑩戒珠于五濁是水可清趨善道于八關有情皆佛妙在回頭得岸不妨就路還鄉携竿木遊逢場作戲插莖草建剎吹火因風甘贄設供勾南泉打破粥鍋龐公喫交惹靈照從傍倒地團圞頭說不生話須是作家糞掃堆拾無價珠還他好漢所望衆居士信手揭開衣裏寶擡頭識取屋中人不惟石鼓金湯且解晏祖聖箭碧水倒流一喝當年信釆青雲得路羣公此處通霄靈心粲筆底之花秀色攬峯尖之紫驚人活句從聖箭穿下過來竦耳法音在氷消語中流出昔之典型未遠于今豪傑無難力貴擔當道親履踐況八閩擅雄才之地品爭誇虎史麟經即諸祖續照世之燈代不乏玄詮僧寶緣遇投乎針芥法興賴于金湯伏願衣珠晃耀眉底法眼頓開寶鏡高懸照內真光不昧倘不負名山約徑跨野鶴凌空尚冀瞻異日光暫對飛鴻辭命溪山有異雲月是同肅此八行謝虗左席復魏國徐六嶽居士附請啓伏以一乘大法單提震旦總持千里舊畿願聽白椎振響敢申尺素遙布腹心緬惟無異大師五印乘天一花表異婆心濟世現比丘菩薩身佛手療人作廣大教化主人人待如怙恃在在倚為津梁法席聳西江宗旨振即心即佛鴻名鏘東土歸依滿世出世間弘基愧墮塵氛蘄聆謦咳顧封疆之修阻致悃素之陶頂禮有緣瞻依敢後頃因宰官居士之拭目振錫竊役管城毛頴以稽首揚言祈一舸以南來正法眼藏應須有付搖雙旌而西望金毛聲吼端匪異人弘基臨啓曷勝顒遡仲春朔日弘基再稽首伏以天王碩輔勛猷望重八夷菩薩陪臣屏翰功高五寺運悲華而播揚大教瞻毫相而悃協素心祇樹非遙金湯有賴恭惟六翁大居士閣下肘後懸符示居塵而不染衣中揭寶信即俗以原真秀結慈林光彌覺海優曇有種佛照無私趂盲龜鞭跛鱉為求法海神龍圖快放俊鷹豈彈林間野遍界吐紫磨金色滿城嗅青蓮瓣香不讓金粟玄模喜見明公偉績耀心光於五蘊在欲行禪振祖道於四衢何生不佛花雨再沾鍾阜浮杯必躍江濵蹤跡可尋法緣在邇肅此裁謝不盡瞻依復南都見任衆居士附請啓伏以萬滙歸源玉瀝作全潮之用五都列市金衡為衆肆之宗故歸頂者法必尊其王而垂手者地亦占其勝遙香悚注空錫歡瞻恭惟無異大師雲開曩劫露沃今天續曹洞之燈慈羅舉而普馴鳥性嗣壽昌之鉢慧鏡懸而頓蓬心賓中主主中賓衲僧眼幾回遭換牛非牛馬非馬古佛口到此難開煙逈楚峯麒麟息處已居花界霜澄饒水師子遊時即現金燈幡飄慕化之田雨下聞聲之種翹依寶蓋乃在金陵道鼓久震於重雷幸高皇之弘護義缸常明于薄夜頌初祖之遙臨但皮髓難分誰下吹毛之劍即象牛交集那調載帝之輪二千里思佛日之再中百萬人望優曇之一現某等紅緣方劇黑障未消奉三尺而拜手君恩拈一拂以盟心佛囑用是具陳花水整飾蒲藤遠迎微妙之臺先淨莊嚴之界千雲禮座吳峯堪抵雙林一士當機淮水俱成五味某等曷勝翹首以迓謹啓時仲春朔日護法弟子任僎朱葵袁楷王永吉程䇿嚴爾圭龐承寵曹應秋曾化龍陳爰謀王維新周光夏吳國模林欲梧周孕衷等再稽首伏以慈洽靈山大臣獨善於囑纍派分鷲嶺名儒多載於傳燈點開水面印文喚醒域中長者弘張勝軌高建妙幢恭惟列位大居士閣下心蘊經綸直詣天王華屋望巍柱石毋忘大事因緣匪藉神鋒雲呈五色不撾毒鼓天雨四花指頭觸而處處逢渠化城過而行行寶所萬境燁熙朝之景遐方之僧舍流輝羣生沐造就之恩古剎之香雲結綵梵音未衍祖道斯弘倘杖錫之從緣約瓶花為代語溪山有異雲月是同肅此八行謝虗左席復南都衆鄉紳居士附請啓伏以雜花分雨羅海渧以弘詮靈葉彌天妙曦暉而遍德鯨鐘鼉鼓須大震於霄衢寶筏金繩定高馳於日輦毋念覺途之不廣并先覺之聖生悲竊傷護法之無人并問法之人易阻江之左湘之右衆同妙淨之船此非親彼非疏緣現廣長之舌故翹誠傾注者居滿字之半覿面親承者弘果地之因衆愫䖍宣積丹歸命恭惟博山大師髓流曹洞針施頂門耨池八味而注多方戒月三空而澄此土亘古來拈花指柏都付木叉之童尋常見陷虎牽猱穿翻泥鬬之鼻揮鋒如月靈錫可飛垂手若雲慈航不繫性相妙嚴華藏海因緣具集王舍城正須幻示準繩聊一掀翻骨董蓋金陵首善高帝盛明佛法以作金湯而玉筍隗康僧先感舍利以隆緣起南國之風期未謝纍朝之芘藾斯弘蒼蚪赤虺所共居亟須慧炬璞金鍮石而同集應借洪罏大乘法中樹最勝一幢誰許他分宗判教菩薩地上現普隨三昧正在此通國大都某等既把臂以同林因矢心而為法可知讀殘萬卷不免猶作鈍中人又道不挂一絲如何尚稱階下漢幸今長者居士共悲日夜是盲人又兼宰官大臣自憫風波與㝯客一番汗出盡日心馳付囑慚負老瞿曇慈悲全賴善知識解空起有曾聞寶地迦陵應供轉輪仰祝珠林香象猛動衆忱之注豈非因緣堅挑素志之盟實勞饑渴即願燈王移座不煩香國借厨但現圓身煙帶六朝非浪宕總堪善世雨花千載說繽紛雖大地蒼蒼難酬六月松風之價而諸天涌涌欲發萬井火蓮之香崇鑒深祈遠瞻如結某等可任馳遡顒仰之至護法弟子顧起鳳徐揚先俞彥丁明登吳家周汪偉蔡屏周陳元慶李琜菩薩戒弟子余大成等再稽首伏以都城浩浩時被花雨毫光巨剎巍巍賸有獅猊曲斬新條發新令佛法仗有力大人藉斯日現斯祥唱和在因緣時節恭惟列位大居士閣下廊廟鼎鉉就世法而興出世寰宇山斗居塵界而樂超塵文白字可觀當道青松堪種真儀有像呼來壁上高僧活句驚人喚出瓶中鵝子緝為純嘏助此清芬湛若氷鑑無心隨方隅而映色暖過陽春有腳即溝壑以沾濡不世希逢大因盛舉某懶同瓚老祇知採汲不虗跡類融師那辨巖花之墜懷鄉雲占瑞兆君恩水土難酬運慧日靜邊陲佛教金湯有賴布慈雲灑甘露羣公悲願交敷懸赤幟豎妙幢萬劫津梁普度具啓馳謝曷任瞻光序重刻五燈會元序釋迦不出世祖師不西來佛法遍大地談玄口不開當此時也語言文字蹤跡不來棒喝機緣鋒芒不露逮夫拈花示衆牽起陳爛葛藤立雪安心突出現前公案遂使宗風廣衍慧日高懸燃長夜之燈羣昏頓曉拈一莖之草法界齊觀駕車須是打牛磨磚豈能作鏡如靈丹一粒點鐵成金至理一言轉凡成聖六代破水中之影觸目皆真五宗競空裏之花通身是膽橫趨而出笑木𣔻以何堪撩起便行悟佛法無多子覩水影不從他覓處處逢渠斷腳脛痛見已非頭頭是道若論佛法一切現成諦審玄猷千燈互照龍蛇分於棒下凡聖藉以喝通機發于未兆之先用施乎形聲之外乃至一言褒貶一棒縱奪以非為是口似甜而意甚苦之以是為非心實允而辭無洽矣雖久參耆宿不敢以正眼覷況識情解路能通之乎所以道狂機劣解不可以大法示不可以宗乘聞譬夫美食置諸穢器祖不云乎醍醐上味為世所珍遇斯等人翻成毒藥惟大心衆生始能擔荷入斯乘者不可不自慎也會五燈為一書者宋靈隱大川禪師未蒙入藏雖一二處刊行安能廣布自性禪人頓發大心謀於觀察曹君為之首倡募諸同信工過半矣余初上鼓山聞其事歡喜樂成復徵余為序因援毫以書其大槩云爾重刻禪警語序少林大師云外息諸緣內心無喘心如墻壁乃可入道只此心如墻壁四箇字是宗門中第一關鍵今時禪者作何公幹始與渠合若以心意識思惟卜度欲與少林宗旨相應大似捫空捶響豈但徒然心力縱億萬劫求其音聞了不可得殊不知從上諸祖向不思議中流出一言半句如塗毒鼓如伽陀藥亦能殺人亦能活人豈可以棒喝言句妄加穿鑿一一學相似模樣謂之悟門耶問彼真參實究做工夫暗然無知如欲行百里未曾動著一步良可憫矣是故禪警語不得不出其中一言一字悉余親履實踐非敢出胸臆之見此書刊行十有餘載學者多有不獲見之嘆莆田黃居士發心重刊欲廣其傳斯亦大菩薩之所用心也嗚呼朝聞夕死豈無深功立地成佛是何行度隔江招手值曇花結勝之時撩倒便行正玉線穿針之際若無從前操履安能遇此奇搆學者只須做到徹頭處然後積功纍行果入不思議法門說箇成佛猶賸語耳況其他乎萬佛名經壇儀序衆生淨覺諸佛慧門由熏變而成凡隨淨緣而見佛既隨緣染緣實無生聖凡迷悟悉強名也圓覺經云知幻即離不作方便離幻即覺亦無漸次如此領略不假漸修非作故無本性無故良以衆生情生智隔想變體殊趨暗背明捨安投險縱無明之嗔火燎功德之稠林沉業識之愛源漲真常之覺海戒乘路塞人我山高衆妄起而邪見生諸器成而金體昧隨情逐境破四棄之清規動念乖真結八重之障罪根本繫乎七衆無論是俗是僧結業失於一時豈分在此在彼受六交之苦報雖千萬劫必償造十習之惡因縱億萬生不返是以羣靈競出大聖垂休駕苦海之慈航開覺城之鎖鑰說難思之懺法彰諸佛之洪名設壇結界獻供懸幡燒種種香散種種華興大悲念發菩提心禮佛一拜借壯士臂以折慢幢念佛一聲擲如意珠以澄濁水空諸我相徹彼真源如滌淨器以見純金似揭晴空而清智眼貴在力行毋容忽念瑞凝相現罪滅福生若能諦信不疑定許超凡入聖斯經自某朝翻譯載於藏典人所罕聞茲因某禪人化某居士運大乘心廣諸佛行嚴涅槃山衆生苦消黑業于當念財法二施投智慧於悲田賢愚一致或云我本宗門禪客毋容瑣瑣事諸壇儀當知彼即地獄罪人莫呵饒舌願賜流通維摩經折衷疏序藥山儼師本教乘中之義虎也初參石頭和尚云三乘十二分教某甲粗知聞南方直指人心見性成佛實未明了宗與教果何如哉教也者即文字之宗也宗也者離文字之教也即其旨者一言一字皆為最上乘之機離其言者一草一葉皆入不思議之境離之與即雖一而較其迷之與悟實霄壤之遠也某髫年時深於參究未涉教乘將謂葛藤絆倒獨不入斯徑及乎向壽昌險穽中跳過回觀一大藏教皆吾家之恆産至閲維摩詰不思議之經者如看家券如遊歷寶藏雖觸處皆珍亦不傷鋒犯手始信老瞿曇及三千七百祖師婆心斷斷不我欺也此經自秦譯以來始出肇師注而多引什師之語其文簡其旨深文簡也含章而不發旨深也美利而不施使探玄之士猶若望瓊樓而不得其門者未免有懷深之嘆也近時無盡法師疏之印天台四教六即四悉三觀等語其文浩繁義旨重疊如文句玄義精貫誠雖矣吾兄古德法師新出斯解義乃折中銜實佩華探奇抉異而實有深旨如炎蒸絺綌凍冷貂裘寒暑適時清爽人意大有補於教乘使後之學者就事事無礙之門入不思議之境無邊剎海悉我室中燈王之座毋勞遠借香積之飯豈假化人耶若乃索須彌于芥子之孔網魚龍於毫髮之端者龐居士有言山海坦然平敲氷來煮茶此話大行豫亦不諱請留待別時是為序地理統一全書序夫真源未闢至賾渾然朕兆才分爻象定位金藏雲鋪成世界聚沫聳須彌之高毗嵐風撼動虗空輪際蒸滄海之潤風金摩而火光上起水土適而草木抽肥蓋以能造因心華藏于茲幻立所緣成境法界從此區分七金山內阿耨池四水漫流四大部洲諸國土羣峯仰止是故須彌有逆吞滄海之勢滄海有旋溉須彌之雄子母互生恩情離合星宿海矗崑崙之嶂人人懷赤水之珠黃河源插摩漢之峯各各具擎天之柱一本三𠏉龍行結南北中枝五嶽百川輿圖分京畿郡縣自非天眼孰辨真蹤的具仙才方探正穴九九八十一變如水脈巨細緩急之流六六三十六奇盡洞壑襟帶逶迤之狀郭景純錦囊創見漢青烏祕說肇陳接木倒杖葬必乘生氣之機透地穿山數巧合分金之妙典型代有識者攸憑惜乎僞書出而星卦惑人邪說行而災祥倒置後學失稽庸流沿習惟國朝劉青田以堪輿寶鏡力闢邪宗使僞撰時師稍知返正可謂明眼之真傳來學之赤幟者也潭陽余文台居士髫耽山水冠獵玄經歷代名篇悉能究其源而知其委八賢祕訣莫不得其兔而忘其蹄故集此新帙彚作全書如丸大千界為菴羅果指掌可觀似捧摩尼寶出娑竭宮五方頓現樹偉績泄天機造化以之參贊闡微言崇正論古今益以洞明斯實仁人孝子之所用心亦乃報本造福之所急務妥先靈血骨安暖救翻棺水蟻無侵可謂濟世之真詮救貧之至寶藏諸名山以垂不朽云重刻醍醐集序夫善知識者如優曇鉢花時一現耳豈但難見亦復難遇所以釋迦不現長年促為短壽惟十二分教開衆生眼目色香美味䑛之則滿口生津大小偏圓荷之則通身汗出如靈丹一粒點鐵成金至理一言轉凡成聖可謂救貧之至寶奪命之靈符也斗峯寺古音琴禪師者棄世緣如脫敝屣參知識如侍所親歷盡支那不憚百城重繭揭開寶藏直追古佛家風大法既明襟懷豁爾開言吐語不涉思惟短偈長篇隨聲吐露攪長河為一味揭重霧于千山自覺覺他無門門啓深契釋迦拈花之妙無慙迦葉忍俊之時致使一人傳虗萬人傳實集之曰醍醐開之如鎖鑰履之過氷刃服之若丹砂結世諦良緣洞衆生機感惜乎字傳焉馬文雜自它如不刪定于斯時安可繩墨於後世是以懷中禪人發心就豫取正并乞序篇端因略書大槩以示諸同志焉
