body:
  text: 住博山法孫弘瀚彚編首座法孫弘裕同集書二與何芝岳相國人生緣遇不易得歸向三寶倍復為難惟居士深入佛乘靈苗智種天性帶來而究竟一念子肯心自許其肯心二字誠進道之基本也昔人云我得百丈一句語做宰相此話一行使天下人皆知有佛法利益甚大非世間功德可比希居士爕理之日毋忘此一句話頭十二時中幸以大法為念直欲進陪上古洞鑒今時日應萬機不壞不雜觸境遇緣若臨大敵欲勝重門欲開猛浪中欲登彼岸大旱時欲得甘霖思到思不及處忽然摸著鼻頭原是舊時面孔端不借別人纖毫力若以世智辯聰揣度道理定信不及唯有力大人一担擔荷更不搖頭轉腦也此事誠難決不可將經書上印證不可遏捺妄念不可使自心空寂凡諸動心皆成藥忌諒居士已深鑑此意不待貧衲贅語耳與蔣一个文學泥途雪境勞往返三百里而作衛護法喜之親過于骨肉第此心難發果能發起即菩薩行利他行非恒常人也然利人者必當自利藉塵勞業識中提起一句話頭以期悟徹居士當決定發此心若不發此心是謂之脩福非脫生死此心一發塵勞業累自不能繫決不可避喧向寂以塵勞為障道此是小機非有力大人昔趙清獻公青衿時便參究至做官始悟道張無盡就仕路參訪做運使親見兜率此二公大可為人眼目居士又不可不學以貧衲意謂單提一句話頭只管盡情讀書話頭在念根塵不偶境緣不入書亦當有深進自然華文麗藻不與世間讀書為比若曰參究妨讀書讀書妨參究此非上根利智幸留神勿忽復侍御華嚴疏云一夕之夢翱翔百年居士肯信百年之夢在一夕否若能知此則延促同時遐邇一致無邊剎海全在一塵竪窮橫遍則無間然如此則與居士一會則一切時一切處悉會又豈但語言相親根塵相偶然後為會晤哉于此倘未能瞥地可將一口氣不來畢竟向甚麼處去單提此一句話頭行裏坐裏著衣喫飯裏不可須臾間斷忽日撞破疑團以破此百年夢境則世間之寵辱自不關心世間之樂事自不能為礙也貧衲遊浮渡時得聞居士上荊楚不知急水灘頭曾吸盡否百草頭邊曾會意否若吸得盡會得意不可以龐家兒女為軌則不妨乘小艇跨鄱陽而上博山與道人相見烹活水聽松音又是一番清境也他日宰執權衡為護法金湯不待貧衲多囑耳與何惺谷居士居士生平操履余甚愛之但知見太博恐悟門妨于進益世間因緣等事似不必太勞攘只須按下雲頭睜開隻眼提金剛之利劍懸肘後之靈符發諸人未發之心到祖佛不到之地不然恐躭著解路未免有算沙數寶之譏紅紫亂朱之誚居士具大力量但為人太勁挺初心者難得親近大凡與縉紳及始發心者相見時以法啟廸之以慈撫之以悲救之以方便導引始得機感交孚乃法門要徑耳與徐止觀居士承諭末法下衰魔風熾盛宗門冷落主法無人余甞于此撫几長嘆可謂襟期不隔千里同風但不識于此事中曾瞥地否若此瞥地不妨向祖師門下拋磚引玉撮土成金垂手將來與物作則盡大地是魔直從魔隊裏穿下過盡大地是佛直從佛頂𩕳上行然後向佛魔不到處解三玄戈冑碎五位鎗旗黑漆桶裏鑑貌辯色無影樹下嘯月吟風脚跟下動步覿體與博山相見倘未得如是禪警語不可不細嚼一遍提一箇無義味話頭做一場沒巴鼻勾當一朝迸出頭來渾身當宇宙求其一眾生相了不可得何物在迷何人在悟居士與博山長太息悉賸語也貧衲掃一坐具地與居士作不動軒不識居士以為何如也上樊山王殿下天然貴胤乘願力來遊此堪忍世界導引群生然行海重重須懷兼利交互融徹與法相應又至理深玄非參莫透靈心絕待貴發親知知與行符名之曰智紹隆佛種其利博哉殿下是過量人已入密印三昧不待貧衲贅語耳小徒歸承瑤章寵賜知殿下有夙世之緣倘春水浪高不妨乘舟舞棹向博山浴龍池逢場作戲貧衲命侍者別甑炊香水鳥樹林當為殿下談實相也與陳熈塘方伯疑情不起是生死心不切似與前諭中不相符合果生死心切是誰二字不明安得不疑疑情頓發心意識尚不起況解路乎雖兼淨土決不可生自足想安隱想斯二種是究心人大病居士不可不知識得是病終不蹈此二途祖不云乎不斬黧奴誓不休彼既丈夫我胡不爾是誰二字是斷心意識底利斧截解路底垣墻出生死底要津也參此二字法門如韓信背水陣不顧危亡始得相應耳只此一生判百劫千生不了底公案有智者當以日代歲身可寒肚可饑不可使話頭有間斷只須迸破疑團心意識及解路氷消瓦解始得大安樂是大得便宜人百千萬倍不足為比也何如復余集生居士附請書大法之東流江左也自康僧會始於是趾其後者代有隆替而佛會之廣薦禪宗之編集於以不負付囑國王之慈旨則自我明皇帝二祖始而一時從龍之臣如沈翰林黃侍郎一流人皆毅然以弘護為己任此建業故事之可尋者是故毒鼓不震於帝都多遺遠死法輪不轉自王臣半屬小機和尚一國之師人天之眼而三十年來若將有避焉以偏處於江之右抑亦興言及此乎日者弟子裕不甘作門外漢自遠趨風一往入室分鵞王之賸乳竊獅子之片毛掉鞅而歸便自稱尊無佛處痾漉漉如裨販然冀以化此一方之五印而都人士之羣為雄者自是而效拙秀才之所為於慧業中知有丈夫事也而王孫公族之號最貴踞者自是而效邵陵之所為知有七處九會四諦五時事也而進賢輩之日支月支不萬羊不屬猒者自是而效顏清臣裴公美之所為稍稍不諱浮屠法知有四依十地及流水寶勝事也夫弟子裕而分賸乳竊片毛也者以試之同類之攝入上求下化斯既然矣況在和尚真獅子真鵞王來此驢羣鴨類之中諸所攝入又何似夫弟子裕而不忍同類之愈躁愈沉尚不靳小慈思一引手況在和尚普觀大地有一眾生不佛若己推而納之泥犁此之為興慈運悲又何似而時至化起機熟緣生意者今茲適遇其期乎此自和尚意中事又何假弟子裕喋喋為哉和尚其惠然肯來矣鄉先進自儀臺僕大夫以下若而人宦陪京者六曹以下若而人世守則元勳以下若而人實有問心謹用臚列名狀瓣香遙禮拜使而行自是翹勤西望日日以幾如歷饑渴和尚其來矣弟子裕一番拮据頗費手口總之從佛法起見何敢告勩萬期憫我專愚且無使我不誠於初發意之俗漢而因以阻若輩後來之轉機則幸甚幸甚菩薩戒弟子道裕再稽首旻昭陳居士為弟子裕無師社中善友之一今為南中四眾捧刺䟦涉不辭勞勩此亦其猛利之一端矣所期和尚莫輕放過先與三十痛棒遣歸以為和尚前茅可也裕又白又自參和尚後覺向來胸臆間雜毒被少分醍醐洗發頓盡歸來筆研付之祖龍書籍付之㹠犢丈室而外一物不將獨是坐斷十方密移一步粗知奉教而行而長安甚閙我國晏然且喜歸源有路中間自信得力處是去冬解組而歸於凍舟中結八十日不語之期所謂佛也沒柰何良然良然若問某甲見箇甚麼纔開口便自肉麻了也初春接慈札極承護念不翅方外毛裏擬致報書請益迫於王程遽趣舍人裝北上職此阻濶時厪失乳之思今茲啟請肇自夙懷寔從僉議因念九到洞山三上投子舍身求法應非居士所饒為而西遊三十國遠屆五天為法求人則有顯師之風在況復懶道人宴坐石室四祖自來牛頭不往秣陵往事大底如斯惟和尚念之邇者鍾阜間大有道人氣亟擊勿失可也不者一枝橫出別調風吹徒使曹洞印文久成刓敝而假年五十法嗣未弘甚無謂也弟子裕方以詩偈為戒聊取裴休語為和尚誦之曰一千龍象隨高步萬里香花結勝因擬欲事師為弟子不知將法付何人弟子道裕再白震旦法席之盛無越於帝都雖代有隆替悉係因緣非智力所能強也惟我明聖祖神宗受靈山付囑建立三寶弘通大乘是以天雨寶華墖呈奇瑞宰官開士傾心法塹實千載一遇應斯嘉運也二百年餘芳規未替戴德愈新林下山僧朝暮祝誦未能報其萬一豈敢效嬾瓚輩不思弘法深益且念正法將沉魔風熾盛稱悟稱證者已遍域中付拂付券者幾盡大地痛思古格為法重人寧以身陷泥犁不將佛法作人情是何心腸今時急於法嗣忘其遠憂是何意調獨掌不浪鳴隻輪無單運擬欲遁逃深山不忍見此茶毒而居士復以慈心三昧見召將令不慧復為馮婦乎宗通說通內護外護居士似無愧公美印高敝刓心孤嗣乏某實忝晞運耳旻昭橫逼老人出山殊乏丈夫氣象剛刀雖快不斬無罪三十棒遠寄白門擒賊必先渠魁未知集生果能赤體承當與否百年曠茲盛舉何異慣劊快覩肥牲兩載疲於津梁猶如羸夫睨彼巨鼎且浮山雙徑先聲已到諸執事人攀轅恐後今年決不出山語已在前意欲踐後倘違初心以赴徵命難辭眾口進退維谷居士其代我商之一芥翳天毫端含剎邊隅都會孰劣孰優今古異局彼此殊勢易地未必相為睽合同異未可一轍而論若必按圖索馬恐劒去久矣高明如居士諒必不爾或是為法心深意圓而語滯耶諸大檀護未及徧復幸宣鄙懷統希炤亮不盡與余集生冏卿舊冬與居士熟疇昔之緣雖爛翻舌根痛加激勵實無他念只教透徹向上一路方稱貧衲本懷別後甚為悵然及度嶺閩地善信歸心如雲諸祖芳塵清芬如烈似不減吾鄉也頃聞恩擢法門幸甚正好藉此時節廣益佛乘大凡諸修行人多被二風所觸逆境中能發人道意如見危思安順境中多打失正念為情想所溺諒居士具大智慧畢竟二途不涉然不可不知禪警語不可不熟讀功深力到忽朝摸著鼻孔祇在面上始信吾言不謬矣應事接物之時來則赴去不留以寬恕二字作座右銘亦可為助道光明幢子幸居士留神焉與陳若來使君二瓶錫過貴郡方登岸即蒙台駕枉顧談及宗乘中事大發肯心歡忭無量別後六日登鼓山讀旌孝善果二錄足見居士一片慈孝婆心超出常情萬萬也然人生如芭蕉無堅實相又如作客寄住旅亭雖有旨酒嘉餚安隱快樂自非久長惟智者必尋歸家計耳視此四大色身如幻如化一氣不來作何究竟此是吾人一件最要緊事於此不忙溫飽之餘悉為別人忙即溫飽亦是分外事況其他乎希居士慧發當機毋容暫息將一口氣不來畢竟向甚麼處去一句子孜孜切切只教破者一著始是大安樂處切不可從人言句上討分曉不可將經書上印證不可默照澄思以為得意不可因因循循虗度日子二六時中祇是一口氣不來畢竟向甚麼處去忽朝迸破疑團如駕輕車而遊熟路不亦樂乎放生業悉能助發機緣若得其所廣其悲願是貧衲至望聞貴恙心甚懸懸恨不能縮地一晤想居士世間境緣不能動念一出世時悉是順境惟此現前身心珍愛護惜從護惜中水火不能交濟便成病苦欲治斯病者先當看破此身悉是假緣無實主宰如夢如幻病自可救良以從業有故業從妄起妄從心生心即無生病將安寄十二時中當此諦觀則病不待藥而自愈也善養者不知有身不見有世界對境逢緣如木石相似但看父母未生前那箇是我本來面目將此一句話頭切切看去毋容起第二念是名善調治矣居士具大智慧似不待贅語忝在方外之交不得不盡情說破也與徐澹初孝廉董巖話別倐忽一紀頃與門下晤對緣不易耳參究一事幸深留意不可忽不可忽想吾人生此閻浮如漚如沫聚散不常一氣不來身非己有就此不實境界中當尋箇大安樂處一口氣不來畢竟向甚麼處去此去處不明則生死暗然不可不著忙耳如參究一事切不可先下註解不可思惟卜度若註解卜度是謂之藥忌于參究分中了無交涉只將一句話頭著衣喫飯處動轉施為處畢竟向甚麼處去一朝衣線下迸開自然七通八達三千七百祖師言句皆一場笑具耳與陳四游中丞貧衲行業無補主持宗門無甚長處惟一肯心自許謬為先師印可自謂藏身幽壑以保餘年不意往來禪者以情量推之遂使水漲船高名過于實愧也何如貴境鼓山聖道場處如以玄沙黃蘗長慶雪峯每欲登攀無由克就何幸檀越乘願力來城塹法門興揚三寶況以楨榦宏猷廟堂遠略為出世間畫一籌策頺風復振于今日氣象更新于此時其功德熾然非毫楮能罄然依正互融真俗雙顯外營佛剎內護心城頓使無價寶珠輝天鑑地不知居士肯瞥然否古德云我有明珠一顆久被塵勞關鎻今朝塵盡光生照見山河萬朵由此觀之世界不在身外道場毋論他方鼓山博山似不勞動步也承召敢不趨命第寒山色色有羈殊不如願諒摳衣有時但不敢以年月期限為約耳與葉童真居士會徐澹老知居士在恙中千里之緣一水之隔悵恨無已丙辰別後不識於生死分中曾留意否古德云病後始知身是苦徤時多為別人忙此語為頂門針破世念利刀智者寧不覺乎真欲究心不須理會古人別種公案恐生出意路更不穩便只就己躬下看一口氣不來畢竟向甚麼處去此去處不明則生死暗然更不瞻前顧後只恁麼逼拶將去如勇士臨大敵直解重圍居士肯諦信此語病不問藥壽不問命使得此地水火風轉定不被五行之所拘束耳與泉州諸禪人泉南佛地列位上人生于此出家于此皆夙世善根遭此緣遇當發猛利心徹己躬下事接續祖師慧命此博山之至望承道愛論山野無有不適者奈鼓山之羈博山之逼如著絮從荊棘中行東扯西牽不遑安住做箇沒傝忙漢子大可發一笑耳浴佛後拄杖頭已北向速速回山擲去瓢囊喝散大眾灑灑落落然後向佛國中與列位上人簡枯柴烹活水唱箇古今不二底還鄉曲子
