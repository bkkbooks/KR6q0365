body:
  text: 住博山法孫弘瀚彚編首座法孫弘裕同集宗說等錫下示弘傳禪人夫為學者發大信心成大力勢於大乘圓頓法門成辦大事如覓諸味先飲醍醐復得餘食知苦澀故不然於衆味中而生足想聞醍醐味不生好樂之心也大涅槃經云我今當令一切衆生悉皆安住祕密藏中入於涅槃何等名為祕密之藏具三德故如𠁼字三點若並則不成𠁼縱亦不成乃至解脫之法亦非涅槃如來之身亦非涅槃摩訶般若亦非涅槃我今安住如是三法為諸衆生名入涅槃以此則知如來涅槃即衆生心是佛說我者即是覺義以自心覺故常樂淨義悉備自心故為衆生安住非為佛安住也如觀一微無體真如性遍觀者即般若無體即解脫性遍即法身一塵中即具三德即入涅槃非縱非橫圓融無礙以此則知一事一行一一皆入法界具無邊德是無盡宗趣性起法門無礙圓通實不思議清凉大師云凡聖交徹即凡心而見佛心理事雙修依本智而求佛智或執理而迷事或執事而迷理而不知約圓明之智成此事緣又不知起行布之緣求此理佛當知即事之理念念果成即理之事心心行起不明斯旨俱墮偏枯約理始曰圓修融事方成圓行如亡情則染分自淨真體自明無事則淨分自清妙用斯起如剎那際亡情則剎那際染分淨則三祇染分俱淨也豈剎那際忽染忽淨忽修忽不修耶非比禪門失意之徒縱情恣意以染作淨認妄為真以不修為不修也故曰道人者不可須臾失照若須臾動念即受羣魔真尚不為況諸穢行者乎若不達此意不諳圓修以不諳圓修不陷於修證則計無修無證俱落斷常永沉邪見故云修與不修自知時節矣又當知曠劫圓於剎邢際剎那際證即曠劫證剎那修即曠劫修一斷一切斷一證一切證一修一切修故云彈指圓成八萬門剎那滅却阿鼻業非與執三祇而輕一念執一念而廢三祇者同日而語也當知吾祖師門下一語中須見血如看一口氣不來畢竟向甚麼處去果知去處則三祗果滿萬德因圓穿過荊𣗥林打破琉璃碗說因說果說修說證說成佛不成佛三十棒趂出三門外何以故功德天黑暗女有智主人二俱不受欲究圓頓教須發大信心譬如飲醍醐更不思餘食無上大涅槃一切衆生入如來有密語決定無密藏三德一心具縱橫悉不成解脫即法身法身即般若圓融互無礙即入涅槃城如觀一微空三德悉具足一事與一行不離法界性悉具無邊德亦名無盡藏凡聖交互通事事融無礙亡情染分淨一念即三祗修與不修行俱是兩頭語惟吾祖師門一語須見血何妨荊棘林不貴琉璃碗二途俱不涉弘揚深妙法頓入不思議傳燈永不絶待了本因緣再為仁者說示夢西禪人夫為學者看如來一大藏教為了生死大事故譬如入海取寶先求如意之珠如上山採藥首得阿伽陀能療衆疾如來一大藏教唯說一心若得一心一切佛法無不具足馬大師云佛語心為宗無門為法門知無門為門者運大悲心說法無盡楞伽經云世間離生滅猶如虗空華智不得有無而興大悲心又云一切法如幻遠離於心識智不得有無而興大悲心據此二偈五法三自牲皆空八識二無我都遣何以故謂生滅之法如空華故謂心識之緣如幻化故圭峯亦云識如幻夢但是一心知如夢者夢不實故知如幻者幻性離故知如花者揑目成故亦不可詰夢之有無幻之真假華之生緣何以故若將妄窮妄無有了期故我世尊於楞伽會上以一非字法門酬一百八問於此修學頓悟自心何待劬勞肯綮修證譬如泥團微塵非異非不異亦如金莊嚴具非異非不異知是泥團即了微塵性故知是真金即了莊嚴性故真心識藏亦復如是何以故一切妄想性自離故經云若見離自性浮雲火輪揵闥婆城無生幻焰水月及夢內外心現妄想無始虗僞不離自心妄想因緣滅盡離妄想說所說觀所觀受用建立身之藏識於識境界攝受及攝受者不相應無所有境界離生住滅自心起隨入分別大慧彼菩薩不久當得生死涅槃平等大悲巧方便無開發方便果知七種喻中見離自性生死涅槃豈但平等等如空華云何不成無上寶覺如知自覺聖智知一切虗妄法者即得如幻三昧以一切法無我故若知緣生無性破常見故無性緣生破斷見故即此二句超出外道一切見故良以末法邪魔熾盛正法澆漓用識心妄擬禪宗縱無明咸稱悟道如吹水尋火掘地覓天坑陷無知墮無間獄當知宗門妙悟悉合聖經不落言詮離諸名相不了斯旨謂宗是別傳非關於教殊不知拈花微笑是四十九年吐露不出底一大事因緣也一大藏教是宗門中一條徑路貴在直到故不打之繞耳如看一口氣不來畢竟向甚麼處去一朝打破疑團治世語言資生業等皆順正法況如來親行親到親證法門也如來一藏教為了於生死譬如入海者先求如意珠藥得阿伽陀能療衆生病若了唯心法具足亦如是心宗無盡藏更不向他求世間生滅法猶如空中華如幻亦如夢智不得有無如人夢村落亦不識方隅夢醒醒然故不作東西想何於夢境中分別夢中事一非字法門百八問俱息如疑團微塵非異非不異又如金莊嚴瓶盤叉釧等但了金性故一切悉假名大悲巧方便如七種喻說得自覺聖智入如幻三昧緣生無自性超諸外道見宗是教之極滿口吐不出一條最徑路更不打之繞一口氣不來畢竟甚處去迸破疑團者世間法常住無有世間法無出世寂滅待了本因緣再為仁者說示有文禪人夫為學者知諸佛立教有無量法門惟參禪及修淨土是兩條徑路亦不可兼之良以行人力量微薄若兼之則心意雜亂當求一門深入譬如射的不施餘藝也若修淨土先當發菩提心然菩提心以大悲為種子故云我今發心不為自求惟依最上乘願與法界衆生同得阿耨多羅三藐三菩提又如上品上生章中一者至誠心起信論曰直心謂直質無諂此心乃萬行之本二者深心謂樹心種德深固難拔三者回向發願起信論曰大乘心謂兼載天下不遺一人此之三心乃修行初心之要行經云不發菩提心修行一切善法悉是魔所攝持然菩提心豈但一發要念念發數數發一切時念佛回向即當發此心也彌陀經云聞說阿彌陀佛執持名號即得往生極樂國土當知此娑婆世界人心濁惡身口意業念念發生如單持一句阿彌陀佛萬德洪名似明珠投於濁水濁水不得不清念佛投於亂心亂心不得不佛所以雲棲師翁謂換骨靈丹者不亦宜乎若修此念佛法門亦不必重於理觀如修理觀心稍動念則觀不成祇將一句彌陀流水念去念教不念自念究竟到一心不亂則理淨土得矣正當發願往生十萬億剎不在一心之外又云其佛光明無量照十方國無所障礙當知生此一土即生無量土念此一佛即念無量佛何以故理無分劑故若達此義即會圓修一心念佛初中後善念念增長念空真念則生佛道交純是一心則佛生俱泯知一心具足萬德是名初善具行萬善是名中善即圓萬果是名後善以此則知彌陀國土去此不遠彈指即生何妨願往也豈但不遠即衆生心中念念有佛出世念念有佛涅槃出世涅槃悉是假名知是假名即當體離念若離念者即見常住法身則土佛斯顯矣涅槃經云若有衆生謂佛常住不變不異者當知是家則為有佛何以故佛者覺義覺知此理性清淨故一切衆惡無能壞者故名極樂體無生滅故云無量壽此土此佛深生信向速願往生克期而入不可緩也若云淨土之旨已蒙開發參禪妙訣其意云何曰先不云乎但求一門深入孰與較其優劣也若論禪之一字三世諸佛滿口道不出況毫楮能罄之待汝向淨土中打箇筋斗來即問汝一口氣不來畢竟向甚麼處去才生擬議則古佛過去久矣麻三斤乾屎橛商量不著便且留待別時另為道破未為晚也無量妙法門禪淨最徑路求一門深入而得速成就先發菩提心潤大悲種子自他俱兼利端不為己求不發此大心是魔攝持故專持彌陀佛萬德之洪名譬如投明珠能清於濁水又如換骨丹轉凡而入聖果一心不亂是名理淨土圓融互無礙光明照十方一土一切土一佛一切佛初中并後善念念圓增長彈指即往生當體離諸念即見常住佛是名生佛家性本清淨故衆惡無能壞至體離生滅是名無量壽永離惡道名往生極樂國更問祖師禪滿口道不出有禪有淨土猶如帶角虎文字及語言莫能宣少分才云向上路便爾唇齒結待了本因緣再為仁者說示無遷禪人性海本無際淨穢交互通但隨業用見各得自受用彌陀因地中廣發大願力現清淨土相化彼念佛人若人專意念如子憶其母想念心不移分得心境淨或觀妙色像種種莊嚴具憶觀悉成就而得生安養或於一剎那即得念不退念空得見佛彈指即往生稱此一佛名三根皆普利譬如摩尼珠能雨一切寶一佛名如是成就一切慧心淨即土淨佛生了然故一佛一切佛一切土一土心外本無土剎剎唯心現若了唯心土生彼即生此無生無不生無不生生生無不生不生無生生不生若了無生者緣起互無礙生則決定生去則實不去淨土妙蓮花皆從自心有淨心即是佛不可得思議一稱南無佛皆共成佛道附或問示壁如禪人或問華嚴是毗盧根本佛門理事行相輪圓具足顯佛果位中智悲德相具足無量乘故無量乘者無不收盡不知禪宗稱頓悟者何教所攝豈非清凉判頓教攝歟抑亦未及圓教者歟曰華嚴具無量乘者以佛果德相普示衆生用成因位使大心衆生繇此頓入如水一滴即同大海頓發圓機即衆生心中具足如來智慧德相此是教家極則非比禪宗悟門也如教家所能攝者吾佛四十九年所說妙法判教者無不攝盡何故復於靈山會上拈花示衆百萬人天悉皆罔措人天會中豈無圓頓之機又何待迦葉一人破顏微笑者歟故世尊印定以教外別傳之旨付囑摩訶迦葉以此則知五教所不能攝唯禪門能攝五教如淨因禪師一喝中能分五教豈但一喝即一語一偈一動一靜皆純圓之旨非悟入者可能倣佛萬一也或禪宗稱頓者是頓悟之頓非判教之頓也良以教者貴在衆生以期悟入如獲悟者豈教之能攝也當知宗門中別有長處古德云此事不與教乘合惟到者乃能知之非諍言也或問華嚴乃性起法門衆生悟入者於一塵中徹見無邊法界知心體合達本忘情徹諸佛之本源洞衆生之本際故華嚴論云其為本者不可以功成其為源者不可以行得如生在王家天然之貴豈禪宗稱頓悟曰教外別傳者過此而別有長處耶不涉此大教而別有長處耶曰是何言歟經中分明向汝道如來顯此果位德相使大心衆生以期悟入其悟入二字與言說之相何啻霄壤之遠也如言說之相即是而不期妙悟者經不云乎如貧數他寶自無半錢分縱知如來無邊法寶之藏還如窮子猶在門外止宿草菴非己有分也只饒頓入圓明入不思議法界未稱悟門須知法身向上更有事在所以云向上一路千聖不傳如疏山仁禪師問溈山云法身之理理絶玄微不奪是非之境猶是法身邊事如何是法身向上事溈竪起拂子師曰此猶是法身邊事溈曰如何是法身向上事師奪拂子摺折擲向地上便歸衆溈曰龍蛇易辨衲子難瞞此猶是未悟底時節便有如是作略非跳出教家窠臼何能得此利便耶後問明招樹倒藤枯句歸何處招曰却使溈山笑轉新師於言下大悟曰原來溈山笑裏有刀當知宗門中句不落言詮只此一句子一大藏教注不破不與教乘合者愈明所以稱別傳長處者不亦宜乎或問禪宗中以悟入二字超出教乘法華經中開示悟入佛之知見已具悟入何待宗門以悟入為標的耶曰法華經中世尊入無量義定放白毫相光繇是天雨四花已印證說法華竟其會中大衆不解不知豈但悟入之者如豫淨土緣起中謂法華是開示中一大事因緣拈花微笑是悟入中一大事因緣也故世尊從三昧安詳而起及乎三請復云吾今為汝分別說法始說一大事因緣開示悟入佛之知見文云是法非思量分別之所能解良以教乘非思量分別則無可言說是以釋迦掩室於摩竭淨名杜口於毗耶智不能知識不能識非大悟門無繇契會故吾宗門中妙悟不在言詮其悟之一字如龍得水似虎靠山又如海船稍遇順風則倐忽千里非比教家終日說悟入而不求妙悟者哉果能思經中深義以思入於無思而悟入者此人三乘圓極教網所不能羈復從自心中能演出一大藏教如天台智者圭峯大師即是宗門非教家人也於法華中豁然大悟向圓覺經一言之下心地開通妙悟者在法華圓覺非在三大部及大小疏鈔者也吾宗門中人豈但圓覺法華即犬吠雞鳴鳥啼花笑觸處逢緣皆能悟入如臨濟大師問黃蘗佛法的的大意三次俱不領會復於大愚灘頭看破黃蘗用處便云原來黃蘗佛法無多子者便是宗門中長處非教乘所能載也或問如師所云知無明無體便云本無又指非作故無本性無故復引知幻即離等語便不假修證如楞嚴謂理則頓悟乘悟併銷事非頓除因次第盡何以云一入理者便不用修耶曰若如此說豈但楞嚴圓覺即云以幻修幻汝豈不聞中峯大師曰文殊普賢二章宛有衲僧氣象如楞嚴經七處徵心心不可得乃至地水火風空見識七大圓融之旨根根塵塵皆發明妙明真體有志丈夫向者裏全身擔荷又何待劬勞肯綮修證故吾祖師云修與不修是兩頭語又云修證即不無污染即不得即此不污染是諸佛之所護念不比教家楷定法則真發明大理悟之一字亦須吐却況其修之與證還留得纖毫蹤跡也無此與大理已明者說若不能離見超情盡是墮坑落塹故云大理已明如喪考妣中峯大師頌云大地山河平似掌一條官路直如弦時人不會融通意鐵壁銀山在面前只此一箇悟字如鐵壁銀山若說修與不修大似無繫縛中自尋箇繫縛所以宗門中長處豈與教家而較其優劣若真是悟徹底人不妨裝香掃地成就種種行門善念尚不起況諸惡念者乎或問離心意識參絶凡聖路學心意識作麼生離識之一字亦不惡如教中說小乘滅識取證深密經第八種子識為如來藏若說業種恆真生怖難信皆為凡愚而不開演如楞伽經說第八業識即如來藏維摩亦云塵勞之儔為如來種又云未具佛性亦不滅受而取證也受既不滅想識亦然如楞嚴識性周遍華嚴以大悲行從無作根本智起不屬五位之內行相因果專以佛果示悟衆生明佛果無二愚也何心意識而可離乎雖設行相法門佛不說之總令當位菩薩自說佛但放光表之然安立佛果行位為悟大根衆生故將佛果直授為因因即以果為因果即以因為果故不離本處而充法界一一身相及身毛孔國剎重重菩薩佛身互相攝入雜類衆生身土相入悉皆無礙以此則知佛果決無二愚可斷大根衆生以果為因無愚可斷愈明況滅識耶宗門中人參究向上一路更超出此根本法門一步何云離心意識耶曰宗門中說離心意識理極深玄非滅識也謂單提句話頭大理不明如臨大敵心意識要起起不得以此曰離非斷離之離如圓覺云知幻即離亦非有可離之離也只此一句話頭能超教中無數方便如天台一心三觀性惡即真全性起修乃至一色一香無非中道若非妙悟盡屬識情如黃葉止啼終無得理縱觀理成就未免楷定六即是非只如智者大師頓發圓機止獲五品況諸未悟者乎故吾宗門長處才初發意便不落階級只此一法門最捷最徑便不與教中比論況絶後再蘇而發明大理更跳出理之窠臼者故云如好堅樹一出土而逈壓羣陰如頻伽鳥雖在㲉中音聲已逾衆鳥矣所以宗門說法者一語一言雷轟電掣三乘膽顫十地魂驚是真語者實語者如洞山大師偈云如荎草味如金剛杵正中妙挾敲唱雙舉又云通宗通塗挾帶挾路錯然則吉不可犯忤天真而妙不屬迷悟可謂悟之一字亦沾染不得況三乘教理肯留些子朕迹故宗門入處掀翻世界掉轉乾坤最極深玄所以云一大藏注不破法眼大師云理極亡情謂如何有喻齊到頭霜夜月任運落前溪當知初心即能超過一切法門諸悟入者長處豈毫楮能罄之者哉佛指生因心是諸佛果德復示佛果德是衆生因心因果交互通佛生了然故法界性緣起頓入不思議不以此為因安得常住果縱修於多劫不名生佛家故說妙蓮花開示佛知見執果德行相不能曉了此凡聖懸隔故自生優劣想唯吾祖師禪以此期悟入教乘不能攝能攝於教乘超出法界量逈離言說想三千七百祖展轉相授受傳燈永不滅行於異類中頭角灼然露咳嗽與掉臂應機無等倫是宗門長處智者求妙悟慎勿懷遲疑示蔣月船居士若人欲出於生死淨土法門為第一彼佛厥號阿彌陀廣發四十八大願若能稱其名號者決定往生安樂國彼土莊嚴最清淨水鳥樹林皆念佛七寶池開四色花八功德水隨意樂七重寶閣逈諸天寶楯寶網光交映行樹咸敷衆寶花天諸音樂無間然得生彼土何因緣自心具足佛種子彼佛願力能加持使我行人易成就彼佛如母憶念子子若逃逝母何為子若憶母便相見即得往生安樂土示等健行者若人誦般若智慧如金剛最勝最堅利能斷扳緣苦光𦦨爍世間破諸無明暗廣度羣生類實無滅度者六塵本清淨不以塵生心根蘊亦復然亦不依識住應知住無所智慧了然故聞經不驚怖四相皆遠離初中并後善漸入漸增長不即亦不離不常亦不斷三心不可得萬行悉圓滿世界非世界衆生非衆生莊嚴非莊嚴果知非非者成就種種名不住相布施如日光普照不久獲佛智成就大悲心示訥然上座性天清徹塵雲而逐于陰晴慧月孤明識雨而遷于朗昧所以情生智隔想變體殊示寂毗耶沉痾馬祖夫病者萬異略而有三何謂三有不病而病病中病病中不病不病者謂世欲籠苦樂憂煎侵優淨體者是也病中病者謂汝現所染更懼生死者是也病中不病者謂徹理知命出生死者是也昔有僧問古德云和尚今日病還有不病者麼曰有僧云不病者還來看和尚否曰老僧看他有分者便是病中不病底樣也又云病後始知身是苦健時多為別人忙老僧自有安閒法八苦交煎總不妨汝當觀察病是假緣從業有故業從妄起妄從心生心既無生病將安寄眱示袁夫人嗟此閻浮極惡世界無一可樂縱有樂者皆無常苦空畢竟無我有智之者豈肯坐視百年不求出離乎當知諸佛有入道康衢八萬四千法門唯末後拈花示衆乃指出教外別傳之旨是徑中之徑故唐宋以來三千七百祖師非此門而無出路良以此門貴發真信信自己淨白心與諸佛同體圓同太虗無缺無餘無男無女無勝劣想發起猛利頓明此心不從外得於十二時中將一句沒意味公案蘊在八識田中為入道種子如看萬法歸一畢竟一歸何處行裏坐裏著衣喫飯裏念念提撕如坐在銀山鐵壁之中祇求出離不隨第二念故不起思惟故不生度量故不將經書引證不求人說破但恁麼參去只教一念純真祇欲迸破時節到來磕著撞著千了百當日用中當以此自勉偈曰一念純真處大方獨蹈時機微宜密運古道貴親知白雪盛銀碗清風品玉箎通身都是眼旋見始為奇示不畏禪人閻浮惡世大可畏人五陰覆心食噉慧命有識者皆憚之子獨號不畏可乎但能以金剛杵碎煩惱窟以智慧火燒無明薪單提一句本參話頭拶破疑團通身是眼橫行三界無敢當其鋒者始不負此號也不然動步則荊棘滿地塵埃亘天謂無有所畏是自欺耳又不可不驚也偈曰不從諸聖求真諦畏向凡情雜道心直使兩頭都坐斷袈裟角上水泥深渾無一物可當情寶屑金沙礙眼睛鐵壁銀山親迸出來時古路坦然平示何惺谷居士古德云門裏出身昜身裏出門難以此觀之直下無身那容住足向空植種終沒收成只須坐斷兩頭向威音那畔翻身十字街頭進取一步方可喫博山痛棒若論宗門大意總不出古人行徑但向本參話頭上著切不可以卜度猶豫之心自障道眼如一生不了悟縱百劫千生祇向外打之繞遊遍閻浮世界腳跟下厚得幾重皮亦濟得甚麼邊事若待修了無明去沙澄水直饒到澄潭月影夜靜鐘聲未免猶是生死岸頭事耳偈曰大丈夫須自了學道不學文做癡莫做巧讀盡百王書未免受拷㧯無義味話頭宗門第一要竪起白汗流藏身孤月皎鐵壁與銀山只教都靠倒會者則逐浪隨流不會則白頻芳草清高不上古人墳昂藏何似而好示惟嶽禪人祖師云毫𨤲繫念三途業因瞥爾情生萬劫羈鎖既不許別生異念則單提一句話頭頓發疑情疑情果發得起則千萬人中閙市叢裏孤歷歷峭巍巍祇此話頭上疑情不解始是工夫得力忽朝撞破疑團摸著鼻孔始可與博山話會偈曰話頭一句如弦直譬如調象須全力倒跨橫趨任所之不與禪門存軌則堂堂大路坦然行大海淵溟徹底清拗折驪龍頭上角珠光閃爍不關情示量如禪人如來一大藏教是箇切腳且道切箇甚麼字以字不成八字不是既然切不出當看一口氣不來畢竟向甚處處去將此一句子如持金剛王寶劍誰敢當其鋒者又如臨大敵毋容眨眼只欲決勝始能破生死之牢關斷根塵之識浪也不然豈但一生空過即百劫千生未有了底日子有志之人豈甘心自棄六祖祇是箇挑柴漢放下柴擔便乃知歸彼既丈夫我胡不爾但在自之肯心非干人利鈍也當知肯之一字如換骨靈丹其猛利究心者可不勉乎偈曰話頭一句如弦直脫死超生過反仄不於此際見根源只待當來問彌勒去處不知肯自休水冷霜枯迸出頭贏得腰纏十萬貫欣然騎鶴上楊州宗說等錫下
