body:
  text: 住博山法孫弘瀚彚編首座法孫弘裕同集拈古上舉世尊一日陞座文殊白椎云諦觀法王法法王法如是世尊下座拈云世尊拉抹金針文殊橫抽玉線彌縫海嶽要是其人且道未陞座前法王法在甚麼處舉梁武帝問達磨大師如何是聖諦第一義磨云廓然無聖帝云對朕者誰磨云不識拈云楖𣗖棒乾人骨髓泥彈子換人眼睛當機不遜還容得第一義麼雖然即此不識二字也是六月裏嚴霜舉東印土國王請二十七祖般若多羅齋王問云何不看經祖云貧道入息不居陰界出息不涉眾緣常轉如是經百千萬億卷拈云險處錐穩處劄國主探端灑不濕釘不入尊者機辯如是經還轉也未待你脚跟下線斷始知信受奉行舉世尊於眾行手指地云此處宜建梵剎時賢于長者將一莖草插於地上云建梵剎已竟世尊微笑拈云插草建精藍長者全身領荷針芥相投唧𠺕固然唧𠺕要且未能免傍觀者哂舉僧問青原如何是佛法大意原云廬陵米作麼生價拈云高低米價環翠色於奇峯吞吐廬陵鍊蟾華於玉樹須知大用無方有感斯應若論青原底佛法三生六十劫未夢見在舉僧問馬祖離四句絕百非請師直指西來意祖云我今日勞倦不能為汝說問取智藏去僧問藏藏云何不問和尚僧云和尚教來問藏云我今日頭痛不能為汝說問取海兄去僧問海海云我到者裏却不會僧舉似馬祖祖云藏頭白海頭黑拈云藏頭白海頭黑馬祖辯別大有來由離四句絕百非西來大意直令侍者一時按著毋謂博山皮裏陽秋舉藥山久不陞座院主白云大眾久思示誨請和尚為眾說法山令打鐘眾方集山陞座良久便下座歸方丈主隨後問云和尚適來許為眾說法云何不垂一言山云經有經師論有論師爭恠得老僧拈云接物情捐澹泊為累與奪相感毋恠其然又豈知希聽亂蛩音素質煩飾彩被院主拶著直得百雜碎舉百丈上堂常有一老人聽法大眾散去一日不去丈問立者何人老云某甲於過去迦葉佛時曾住此山有學人問大脩行人還落因果也無對他道不落因果墮野狐身五百生今請和尚代一轉語丈云不昧因果老人言下大悟拈云不落因果墮野狐須彌山恁麼高不昧因果脫野狐大洋海恁麼濶試問墮脫底畢竟是箇甚麼舉南泉一日兩堂爭猫泉提起猫云道得即不斬眾無對泉斬猫為兩段南泉舉問趙州州脫草鞋戴出泉云子在救得猫兒拈云生擒活捉王老全機起死回生趙州手段救得救不得總不干他事且道節文在甚麼處舉臺山路上有一婆子凡有僧問臺山路向甚麼處去婆云驀直去僧纔行婆云好箇阿師又恁麼去僧舉似趙州州云待與勘過州云臺山路向甚麼處去婆云驀直去州便行婆云好箇阿師又恁麼去州回上堂云我與汝勘破婆子了也拈云飛騰不度趙州關也呼喚不回臺山路也者婆子荊棘滿地塵埃亘天不遇魔王安能捉敗且道勘破後是甚麼時節依舊孟春猶寒舉雲門大師云光不透脫有兩般病一切處不明面前有物是一透得一切法空隱隱地似有箇物相似亦是光不透脫又法身亦有兩般病得到法身為法執不忘己見猶存墮在法身邊是一直饒透得放過即不可仔細簡點將來有甚氣息亦是病拈云精造之跡研極之疵非慧目莫能鑑若夫知心體合截流注之病根達本忘情鏡無己之景象除非向威音那畔翻身十字街前打睡底漢方可診候不然莫將日瘧誤作傷寒舉地藏問脩山主甚處來脩云南方來藏云南方近日佛法如何脩云商量浩浩地藏云爭如我者裏種田博飯喫脩云爭柰三界何藏云你喚甚麼做三界拈云者僧羈縻三界帶累他南州禪客俗氣不除如今還有與地藏相見者麼更須拋却犁耙鋤頭始得舉臨濟將示滅囑三聖云吾遷化後不得滅却吾正法眼藏聖云爭敢滅却和尚正法眼藏濟云忽有人問汝作麼生對聖便喝濟云誰知吾正法眼藏向者瞎驢邊滅却拈云驅耕奪食須是滹沱補網張風還他三聖然要傳持正法眼藏且緩緩舉廓侍者問德山從上諸聖向甚麼處去山云作麼作麼廓云勑點飛龍馬跛鱉出頭來山便休去來日山浴出廓過茶山撫廓背一下廓云者老漢今日方始瞥地山又休去拈云德山一條棒尋常血滴滴地到者裏因甚不用暗裏抽橫骨明中坐舌頭舉溈山問仰山甚處來仰云田中來山云田中多少人仰插下鍬叉手而立山云南山大有人刈茅仰拈鍬便行拈云父慈子孝夫唱婦隨要是家裏人始好說家裏話不然則索鹽奉馬矣二大士暗機圓合即不無南山刈茅者未許話會在舉麻谷持錫到章敬遶床三匝振錫一下卓然而立敬云是是雪竇著語云錯谷又到南泉遶床三匝振錫一下卓然而立泉云不是不是雪竇著語云錯谷云章敬道是和尚為甚道不是泉云章敬是是汝不是此是風力所轉終成敗壞拈云章敬道是雪竇道錯南泉道不是有甚麼語話分惟麻谷錫杖頭較些子舉法眼問脩山主毫釐有差天地懸隔汝作麼生會脩云毫釐有差天地懸隔眼云恁麼又爭得脩云某甲只如此和尚如何眼云毫釐有差天地懸隔脩便禮拜拈云法眼勾人在不疑之地且道有多少法術王言如絲其出如綸舉僧問趙州狗子還有佛性也無州云有僧云既有為甚撞入者皮袋州云為他知而故犯又僧問趙州狗子還有佛性也無州云無僧云一切眾生皆有佛性狗子因甚却無州云為伊有業識在拈云道有道無靈鋒橫握盡大地人向趙州手裏乞命有分惟不跨石橋者不在其限為甚麼剛刀雖快不斬無罪之人舉僧問雲門不起一念還有過也無門云須彌山拈云不起念橫拈三尺劒須彌山墜下一莖毛博山二十年不著便從者裏識得雲門舉地藏問法眼上座何往眼云迤邐行脚藏云行脚事作麼生眼云不知藏云不知最親切眼乃豁然大悟拈云益公道箇不知果然親切後乃豁然大悟真箇氣噎殺人舉雲巖掃地次道吾云太區區生巖云須知有不區區者吾云恁麼則有第二月巖提起掃帚云者箇第幾月吾便休去玄沙云正是第二月雲門云奴見婢殷勤拈云糞草堆頭辯實掃帚柄裏橫身管他第二月第幾月用得著便用玄沙雲門語裏有刺是賞伊罰伊莫嫌霜露冷添得好清香舉巖頭到德山跨門便問是凡是聖山便喝頭禮拜洞山聞云若不是奯公大難承當頭云洞山老漢不識好惡我當時一手擡一手搦拈云問不在意裏答預於機先余所謂進得德山門破得巖頭句灼然兩彩一賽洞山雖是善因而招惡果又安知巖頭子為父隱直在其中耶鼓吹將來三人綑作一束始得舉魯祖凡見僧來便面壁南泉聞云我尋常向他道空劫已前承當佛未出世時會取尚不得一箇半箇他恁麼驢年去拈云魯祖見僧面壁舌上有龍泉要且不曾傷鋒犯手王老師恁麼道誠為善說法要咦舉雪峯示眾云南山有條鱉鼻蛇汝等諸人切須好看長慶云今日堂中大有人喪身失命僧舉似玄沙沙云須是稜兄始得然雖如是我即不與麼僧云和尚作麼生沙云用南山作麼雲門以拄杖攛向雪峯面前作怕勢拈云南山鱉鼻毒氣薰人當時若遇歸宗免使雲門怕怖然雖如是還識今日遣呼者麼舉鹽官一日喚侍者與我過犀牛扇子來者云扇子破也官云扇子既破還我犀牛兒來者無對資福畵一圓相於中書一牛字拈云鹽官一條犀牛侍者欄圈甚密雖得資福牽出繩索總在別人手裏舉仰山指雪獅子云還有過此色者麼雲門云當時好便與推倒雪竇云雲門只解推倒不解扶起拈云五色令人眼盲五音令人耳聾既與眼對便成滲漏仰山指獅子示人賣弄太甚只饒推倒扶起總在獅子上作活計不受聲色者知是阿誰舉法眼一手指簾二僧同去捲簾眼云一得一失拈云明鏡當臺明珠在握照心徹膽無有遺餘法眼用在機先者二僧一任指呼且道孰得孰失當衡者鑑取舉僧問護國鶴立枯松時如何國云地下底一場懡㦬僧云滴水滴凍時如何國云日出時一場懡㦬僧云會昌沙汰護法善神向甚麼處去國云三門頭兩箇一場懡㦬拈云護國三懡㦬囫圇無縫罅便是具鐵眼銅睛底漢子也分剖不下惟同道者方知且道誰是同道者直饒你知得道得總是一場懡㦬舉風穴郢州衙內上堂云祖師心印狀似鐵牛之機去即印住住即印破只如不去不住印即是不印即是盧陂長老出問某有鐵牛之機請師不搭印穴云慣釣鯨鯢沉巨浸却嗟蛙步𩥇泥沙陂佇思穴喝云長老何不進語陂擬議穴打一拂云還記得話頭麼陂擬開口穴又打牧主云佛法與王法一般穴云見箇甚麼主云當斷不斷反招其亂穴下座拈云風穴泥印子在手印住也得印破也得盧陂不搭印正是鐵牛機可惜乾𪹼𪹼地若帶些水頭管取他泥印子爛去舉僧問大隋劫火洞然大千俱壞未審者箇壞不壞隋云壞僧云恁麼則隨他去隋云隨他去僧問龍濟劫火洞然大千俱壞未審者箇壞不壞濟云不壞僧云為甚不壞濟云為同大千拈云大隋龍濟生死同條接物導機隨家豐儉一句則穿花折柳野渡氷消一句則帶霧披雲寒灰發𦦨畢竟者箇壞不壞參舉雲門垂語云古佛與露柱相交是第幾機自代云南山起雲北山下雨拈云占佛在眾生肚裏結冬眾生在古佛肚裏度夏眾生不識古佛古佛不識眾生且道南山起雲北山下雨是甚麼節文拈拄杖云向下文長舉仰山問僧甚處人僧云幽州人山云汝還思彼中麼僧云常思山云能思是心所思是境彼中山河大地樓臺殿閣人畜等物反思思底心還有幾多般麼僧云某甲到者裏總不見有山云信位即是人位未是僧云莫別有指示否山云別有別無即不中據汝見處只得一玄得坐披衣向後自看拈云信位即是韶石灘前舟橫野岸人位未是汾陽浪裏棹入蘆花坐斷兩頭掣開金鎻得坐披衣向後自看看箇甚麼白日青天切忌說夢舉三聖問雪峯透網金鱗未審以何為食峯云待汝出網來即向汝道聖云一千五百人善知識話頭也不識峯云老僧住持事繁拈云捶打不開屏折不下各各具有隱身之術大似埋兵索戰也然雖如是透網金鱗畢竟以何為食問取高郵定和尚舉雪竇拈風穴語云若立一塵家國興盛不立一塵家國喪亡遂拈拄杖云還有同生同死底衲僧麼師拈拄杖云寒時寒殺熱時熱殺風穴刳心剖膽無有遺餘雪竇更覓同生同死底噫是何言歟舉洛浦參夾山山云雞棲鳳巢非其同類出去浦云自遠趨風乞師一接山云目前無闍黎此間無老僧浦便喝山云住住且莫草草匇匇須知雲月是同溪山各異截斷天下人舌頭即不無爭教無舌人解語浦無對山便打浦於此服膺拈云覺戶不掩而對月還迷寶殿無人而澄潭散影洛浦還知痛癢也未不下霹𮦷手難逢吸浪魚舉馬祖不安院主問和尚近日尊候如何祖云日面佛月面佛拈云院主殷勤致問馬師板齒生毛要識者老漢情謂麼養子方知父慈舉溈山問仰山忽有人問一切眾生但有業識茫茫無本可據子作麼生驗仰云若有僧來即召云某甲僧回首乃云是甚麼待伊擬議向他道非惟業識茫茫亦乃無本可據山云善哉善哉拈云溈仰父子勘人誠為獨醒祇是博山要問伊業識茫茫與諸佛不動智相去幾何學臨濟示眾云有一無位真人常在面前出入初心未證據者看看僧問如何是無位真人濟下禪床擒住僧擬議濟托開云無位真人是甚乾屎橛拈云臨濟氣薄雲霄固是卓犖丈夫若向面前指示無位真人余恐眾口鑠金也舉僧問趙州學人乍入叢林乞師指示州云喫粥了也未僧云喫粥了州云洗鉢盂去僧大悟拈云趙州審的中拔出者僧拔出中審的可謂快便難逢若說箇悟字則坑陷殺人舉雲門問乾峯請師答話峯云到老僧也未門云恁麼則某甲在遲也峯云恁麼那恁麼那門云將謂候白更有候黑拈云非常之問非常之答迅雷不及掩耳良駟不及追風宛轉偏圓各負鈎深索隱底手段然簡點將來好與痛棒何也為他無事生事放過即不可舉洛浦臨終示眾云今日一事問你諸人者箇若是即頭上安頭若道不是斬頭求活首座云青山常舉足白日不挑燈浦云是什麼時節作者箇說話彥從云去此二途請師不問浦云未在更道從云某甲道不盡浦云我不管你道盡道不盡從云某甲無侍者祗對和尚浦休去至晚喚彥上座今日祗對大有來由合體得先師道目前無法意在目前他不是目前法非耳目所到且道那句是賓那句是主若揀得出分付鉢袋子從云不會浦喝云苦哉苦哉從云和尚尊意如何浦云慈舟不棹清波上劒峽徒勞放木鵞拈云將遷化之際託契券於兒孫其妙思天造情懷自別首座彥公大有出身之路柰娛老者難以言句取則若迹解求之未免按圖索馬也舉僧問鹽官國師如何是本身盧舍那師云與我過淨缾來僧將淨缾到師云却安舊處著僧復問如何是本身盧舍那師云古佛過去久矣拈云國師片片血心不知圖箇甚麼良久云打草要使蛇驚舉羅山問巖頭起滅不停時如何頭咄云是誰起滅拈云巖頭雖則善赴來機未免遭人簡點且道過在甚麼處獨守寒巖異草青坐却白雲宗不妙舉僧問興陽剖和尚娑竭出海乾坤震覿面相呈事若何陽云金翅鳥王當宇宙箇中誰是出頭人僧云忽遇出頭時又作麼生陽云似鶻提鳩君不覺髑髏前驗始知真僧云恁麼則叉手當胸退身三步陽云須彌座下烏龜子莫待重教點額回拈云興陽明中坐舌頭者僧暗裏抽橫骨眾中還有識得者麼打麵還他州土麥唱歌須是帝鄉人舉圓覺經云居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辯真實拈云四箇不字是殺人刀是活人劍點鐵成金天旋地轉萬松門下卓卓全該若是絕學沙門更須從頭刪過吽舉德山上堂云及盡去也直得三世諸佛口挂壁上猶有一人呵呵大笑若識此人參學事畢拈云孤危不立更用相親法外無身猶欠哮孔鼻孔與眉毛從來不相識相識去舌頭元在口裏舉僧問趙州如何是祖師西來意州云庭前栢樹子拈云龐婆百草頭趙州栢樹子二人向無煙火處鬬弄天工冷眼看來猶是剪彩耳直饒西來大意露布庭柯更須吞却門前下馬臺始得舉維摩詰問文殊師利何等是菩薩入不二法門殊云如我意者於一切法無言無說無示無識離諸問答是為入不二法門於是文殊問維摩我等各自說已仁者當說何等是菩薩入不二法門維摩默然拈云明脩棧道暗度陳倉若語默商量何異鉢盂安足二大士雖則傳脂付粉水洩不通以不二法門較之尚晚在
