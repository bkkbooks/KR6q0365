body:
  text: 住博山法孫弘瀚彚編首座法孫弘裕同集開示偈六劉和鶴居士赴試春官以草履送之兼示四偈曾聞赤腳下桐城居士今朝恁麼行草履緊包雙指露管教平地聽雷聲桂花香處露真機正是心空及第時燕北風高如有雁倩閒早寄博山詩草鞋踏破長安道直入金臺最上層壁上有僧高著眼好將佛法繼傳燈腳跟點地瑞蓮開萬仞峯頭得意回有問草鞋何處覓報言曾到博山來示周肯成居士苦海中流弄釣竿從渠漩澓不相參西江涓滴如吞盡沙界都盧一坐龕示胡法野居士抖擻身無些子法野情偏結世緣多當初大道如親薦笑殺臺山指路婆示平宰居士平心待物恆常事高宰乾坤越樣新突出衣珠如瓦礫不妨隨處是通津示余育蟾太守鶴長𠒎短自天然何似君家白晝眠盡世諸人尋不著星辰印破月中天送彭質先學博二首一法空時萬法空萬緣空處體皆同堂堂日用無他事指點全彰顧盻中帶雨山頭縱步時心空及第報君知現前佛法誰擔荷琪樹瓊花映緑醾示寫照寶林居士握管精神分外奇此情惟有自心知宛然寫出娘生面千載人思上古時示黃子義居士請經回為求半偈捨全身居士今朝恁麼行踢破指頭誰證據萬餘紙上話無生示素真居士請經回剜肉燃燈為法來腳跟踏破幾蒼苔牢把柁時急水去鞋山頂山頂上瑞蓮開生成一片鐵心腸猛浪狂風頗廝當今日回觀山頂月逍遙誰謂腳跟忙剖塵直欲見全經舟楫何辭泛遠溟怪石狂風穿下過此回始道佛家寧水陸兼行意頗安石頭城外走長干無邊塔影光明種今日方知會遇難示越山禪人不從途路分階級只欲須彌頂上行倘與迦文親覿面問渠何處是緣生建安江岸示青林諸弟子三首相逢倐爾半年餘丱角丫環妙挾初寶篆久沉宮漏冷願携香水灌毗盧逆水重重疊疊灘相逢千里別離難回途石馬如廝撲邃壑幽林指顧間來時清冷去炎蒸惹得山嫌腥臭名今日江濵何所適剩餘一葉扁舟輕示衆禪人二首一莖草上現瓊樓吸盡支那四百州贏得清風收白汗何須特施使人愁天高地厚問端由棒喝交馳卒未休換骨洗腸猶不是誰知屋裏販楊州示楊蘭似居士投子山頭不記年趙州翻弄老婆禪夜行不許須親到公案而今始得圓示伏虎寺龍泉禪人二首一蛇一虎每隨身劈面當機不順人放不下時擔取去袈裟贏得嶺頭雲金錫當年格鬬時畜生靈性更粗知而今識得鵝湖事千載風規步不移示剡水船居馬跡塵蹤豈不能喜從水面伴禪僧繩牀安向驪龍角細柳長隄紹祖燈示自空禪人捨却菴居雲水遊腰包瓢笠喜干休雖然指出當陽道岐路須防滑石頭示蔣一個居士薦母二首叱去泥牛木馬橫拈玉線金針刺出真空錦繡何須向外追尋從來不是衆生何用更求活佛放光動地者誰喚作天真一物示連茂宇居士四首人生一百歲造化若浮雲衣裏珠無價分明指似君世界何期久塵緣仔細看升沉無了日輪替骨毛寒欲寡神怡靜無嗔氣自清修行知此意何必問長生要緊惟慈恕慈心即佛心了知慈是佛不向外邊尋示道開禪人相聚喫茶去斯人超一等不須徹夜行露濕衣裳冷示放生者二首想彼飛潛意貪生與我同仍無冤對業何事陷羅籠水上回頭日空中鼓翅時豈圖榮貴作悲運報君知示黃海岸司理四首民財己財民肉己肉不飲不葷是中丞祿行無緣慈運同體悲蓄之伐之必也其誰齊之以刑待之以禮善惡賢愚如出諸己應緣海岸樹大法幢通身毛孔吐旃檀香四咨咨爾庫頭正信因果一米不私毋存彼我七果地獄兩餅餓鬼毫𨤲侵欺過蠱毒水一絹一錢猪頭驢腳知罪福相守如來約賣寶壽薑燃石窗燈千年辛辣萬古光明咨爾化主衆生福田法輪未轉飲食須先粒米寸紗智者可嚇甎錢瓦錢古今稱訝持臨濟鉢勾大慧簿相隨來也笑倒圓悟古鏡未磨汝當下語黃鶴樓前翱翔絶侶咨爾監院持顯持微勤儉辛苦捨汝而誰以禮交賓以和慰衆先人後己法門梁棟指甲許鹽龜毛許利倐忽有差陷身于地古楊岐叟終慈明代清光匪磨傳燈永載咨爾典座變生為熟惟法相應米中有粥張石鞏弓牧懶安牛一回入草牽轉鼻頭遵如來言信獅子吼偏衆一湯煬銅灌口乃聖乃賢多務斯役踢倒淨瓶橫趨而出淨土偈有序曩雲棲師翁將一句彌陀簧鼓天下人競謂古彌陀再世余弱冠心切歸依及行腳被惡風吹入閩中蹈宗乘閫域念佛法門束之高閣矣己亥鵝湖圓戒歸與緇素談及祖師巴鼻因無可與語復憶吾師翁慈惠恩大難酬嗣後亦時將彌陀六字結西方十萬緣間有議之曰師宗門下客何以搬此閒家具余曰噫是何言歟蓮花淨域諸祖咸趨余何敢諱緣引毫書一百八偈以醒緇素若喚作禪喚作淨土一任諸人強生節目自不干老僧事時天啓辛酉夏浴佛後五日識淨心即是西方土行遍西方步不移無影樹頭非色相瞥然起念便支離淨心即是西方土念佛聲消我是誰徹底掀翻誰字窟三家村裏活阿彌淨心即是西方土何必瞿曇萬卷書霹𮦷一聲聾兩耳全身拶入趙州無淨心即是西方土裂破閻浮歸去來使得時辰顛倒走金沙水面妙蓮開淨心即是西方土倒嶽傾湫我是誰少室山前親撞入紅罏猛𦦨雪花飛淨心即是西方土帶纍同緣禍及身五蘊六根成粉末伶仃好笑又驚人淨心即是西方土親到方能辨祖宗吸盡澄江高著眼鏡清水底日頭紅淨心即是西方土點鐵成金喻不齊細抹將來渾小事莫教辜負老僧兮淨心即是西方土拄杖橫挑布袋行貴買得來仍賤賣慈門無價不須爭淨心即是西方土倒跨崑崙入海門行到水窮山盡處灼然別是一乾坤淨心即是西方土千聖同登沒底船石壁丹崖都撞過而今始覺腳皮穿淨心即是西方土掃地焚香事事宜兩口不開生白醭此情惟有木人知淨心即是西方土澄不清兮攪不渾更問樂何處是好將此語教兒孫淨心即是西方土海底紅塵湧瑞花萬億劫來成底事今朝特地獻袈裟淨心即是西方土楚水秦山路坦平禪客莫生高下想腳跟點地最分明淨心即是西方土赤腳波斯入大唐突出衣中無價寶者回不做探花郎淨心即是西方土錦繡乾坤淨業成一句彌陀才吐出昂藏皮袋廓然清淨心即是西方土一句彌陀一佛成大地咸成銀世界更於何處覩明星淨心即是西方土燒盡閻浮栗棘蓬貼肉汗衫都卸却堂堂獨露主人公淨心即是西方土肉髻明珠不用親萬八程途彈指到莫教辜負好時辰淨心即是西方土炯炯毫光劫外春作佛尚嫌忙世界那得閒情趂鹿羣淨心即是西方土蘊界元空極樂萬境無人誰會得一輪明月照澄江淨心即是西方土妙理玄談總不論寶鴨香消簾倒卷却於無佛處稱尊淨心即是西方土碧眼胡僧笑點頭順色摩尼如瓦礫誰云寶閣及瓊樓淨心即是西方土月老氷枯興正驕一帶晴空無限樂分明底事不相饒淨心即是西方土一念無生喚不回好把兩頭都坐斷春風吹起劫前灰淨心即是西方土口說無憑步最親爛壞木魚輕擊著幾多花雨亂繽紛淨心即是西方土待客迎賓似不曾光剃頭兮淨洗砵渾然天地一閒僧淨心即是西方土直裰原來重七斤只教㲯𣯶成片去不須禮拜復殷勤淨心即是西方土三昧塵勞總不知野菜和羮消日子無生一念越僧祇淨心即是西方土鼾睡須知被底穿一覺天明無別事三餐茶飯又依然淨心即是西方土打破畫瓶歸去來無影樹逢臘月火春風偏向百花開淨心即是西方土極樂都無衆苦侵一句彌陀光爍爍花開見佛不須尋淨心即是西方土六月嚴霜遍地鋪突曉途中人不諱氷懷炯炯道情孤淨心即是西方土突出娘生雙眼睛四聖六凡都坐斷胸襟鐵鑄沒人情淨心即是西方土行樹常開白玉花長者倚門終日望竛竮何事不歸家淨心即是西方土荷葉無風浪打翻透網金鱗諳水勢而今觸處是癡頑淨心即是西方土雨灑雲蒸分外奇一具骨頭鳴歷歷振聲也要大家知淨心即是西方土德水常清七寶池佛法要從何處入微風才動念聲時淨心即是西方土水月松風徹底清覿面不知真趣向臨終何用佛來迎淨心即是西方土奕葉相承鏡裏花非樹非臺如會得本源無地長靈芽淨心即是西方土樹倒藤枯句裏親大笑一場人不委相隨來也是關津淨心即是西方土水鳥時常演妙音黃面瞿曇慈太煞都緣一片老婆心淨心即是西方土石上靈蹤萬古存拄杖頭邊親摸著了然無事大沙門淨心即是西方土廓徹無依絶異同鼓掌狂歌經幾劫眉毛血濺梵天紅淨心即是西方土踏斷橋梁見古村瞥爾常光穿腦過優游三界獨稱尊淨心即是西方土淨土不聞寒暑侵幾陳香風來水面無邊化鳥盡歸林淨心即是西方土一句彌陀當路頭家破人亡何處去慈門無餌不須鈎淨心即是西方土狼籍囫圇總不成肯信彌陀居濁界空中惟聽散花聲淨心即是西方土官不容針車馬通古木鴉聲才歇得一輪明月出煙籠淨心即是西方土朗月當空照膽寒百歲老人分夜火剩搖木鐸笑更殘淨心即是西方土木馬嘶風過漢秦踏破髑髏誰是主多年故舊一時新淨心即是西方土包納虗空干不干獨有貍奴精古怪破顏微笑兩三翻淨心即是西方土揑死猢猻迸出頭萬億劫中彈指到彌陀無量有來由淨心即是西方土古㵎寒泉吞吐難徹見趙州真面目橫行直撞不相干淨心即是西方土瓶裏鵝兒喚出來自己主人長夜夢一聲佛號不須猜淨心即是西方土孝滿曹山好酒顛吸盡樂消息子笑看烈火綻青蓮淨心即是西方土無相光中有相身心境牽纏成鬼戲誰為我也孰為人淨心即是西方土向上傳燈語亦非幻化圖中開隻眼何須更欲問玄微淨心即是西方土開口何曾道得來獨許通玄峯絶頂萬年石上長青苔淨心即是西方土下載清風付與誰白汗流通濃滴滴壘堆贏得一身肥淨心即是西方土露柱燈籠笑未休喫盡世間酸苦味蒲團剩有暗香浮淨心即是西方土琴瑟無絃太古音韻出海潮無限意徽猷永絶去來今淨心即是西方土狹路逢人話短長兩耳聾時聽愈好鄉音誰與辨宮商淨心即是西方土彩筆將來𦘕不成深夜石牀無伴侶鼾然一覺已天明淨心即是西方土獨宿孤峯境更賒萬仞巖前親瞥地袈裟角上帶些些淨心即是西方土教外須知別路行若是祖師門下客破顏端不論無生淨心即是西方土優鉢無根滿樹花不許老胡閒太慣龜毛景色亂如麻淨心即是西方土古曲無音和者稀昔日溈山親囑付大書五字載毛皮淨心即是西方土擁毳酬機花藥籃更問此間多少衆前三三與後三三淨心即是西方土瓶瀉何曾夢見來缺齒老翁惟面壁一花五葉至今開淨心即是西方土皮袋還知痛癢無掉轉乾坤何境界夜明簾外夜明珠淨心即是西方土仙果奇葩帶露看金色頭陀才覷見倚天長劍逼人寒淨心即是西方土翻著襴衫倒著若是韶陽親的子可擒可縱雪峯蛇淨心即是西方土入水烏龜陸地行換盡皮毛并骨髓而今特地可憐生淨心即是西方土撲碎挪丸總不妨本性彌陀無向背廣長舌上妙蓮香淨心即是西方土措大拳頭認得麼者裏不曾分勝負臨機何用動干戈淨心即是西方土峻急灘頭下腳難糙石深坑親歷過彌陀覿面莫顢頇淨心即是西方土奪食驅耕事太繁何似懶殘無用漢逢人含笑竪空拳淨心即是西方土三歲孩兒盡白頭讀罷世間經史後洞然無物飽淨心即是西方土臘盡多燒破紙錢拍掌又逢新日月萬花堆裏看龍眠淨心即是西方土相見揚眉落二三古道不存車馬迹舌頭無骨定司南淨心即是西方土帶髮留鬚表丈夫赤尾金鱗才躍出澄潭無水浪花粗淨心即是西方土魔界空時佛界空世界閒雲收拾盡一輪迸出海天紅淨心即是西方土穿市波斯