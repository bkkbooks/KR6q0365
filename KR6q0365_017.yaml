body:
  text: 住博山法孫弘瀚彚編首座法孫弘裕同集開示偈三示汪省菴居士假心地主汪居士今日相逢有甚奇解道聖凡同一體夙緣密行少人知疑情隱隱天機現華藏光明祇一線洞徹曹源滴水時夜叉心即菩薩面早知父母未生前不妨痛處更加鞭山頭雲霧都收盡濁水澄清月正圓月圓不許將心會寶塔無形入也未六窗虗靜絶纖塵兒女團圞非分外示黃心鏡居士從來大隱隱市居士今朝身便是塵勞堆裏發靈苗真俗何嘗有二致高原陸地不生蓮沙水淤泥花始鮮選官選佛憑君選佛法何妨兒女邊翻思昔日維摩士毗奈耶城弘大智推倒文殊不二門笑携竿木恣遊戲誰云恩愛障修行無生原不礙生生但知生理元無性何慮菩提道不成分明今日老龐家山海敲氷來煮茶撒手那邊千聖外須彌頂上浪生花世間恩愛妄疏親白日青天鬼繫人看破傀儡棚上索莫教辜負好時辰銀山鐵壁丈夫志明月清風道者心世界從他滄海變佛聲終不愧東林送盛翀吾居士曾自吳山越水來而今復過姑蘇臺故鄉景色堪徘徊幻化場中隻眼開木蘭亭下人如電縹眇霓裳今罕見海湧峯頭虎亦潛北畝南阡經幾變此身即是真法聚莫逐根塵生怖懼木人花鳥本無情宦途榮顯閒家具我將此語餞君行越水吳山一掌平更有太湖流不輟待將清湛濯塵纓示本宗禪人如何是本古路崚嶒踏得穩如何是宗澄江水底日頭紅麻三斤與乾屎橛蹭蹬如吞栗棘蓬識得此心無二法動容不待眉毛眨破爛袈裟撩亂遮崢嶸蹄角恣騰踏不學諸方五味禪清風過耳自悠然聖凡家業都拋却撒手徉徜笑掣顛旋身不踏無明草佛法塵緣都潦倒本源靈湛絶周遮海底珊瑚和日皎示林野禪人真修行辦己事願與釋迦為嫡子逈脫塵勞大丈夫好將名字標僧史住深山棲巖谷那管春花秋草緑一箇閒人天地間饑寒飽暖隨緣足鋤為枕草為氈睡眼摩挲白晝眠西來大意山頭有何必臨機更竪拳不勞心枉費力華藏莊嚴在咫尺大千沙界絶遮攔煩惱無明都解釋不動步是真修體露金風得自由看破世間顛倒事青林深處一聲鳩示白齊禪人為僧難為僧難喫盡人間苦與酸是非憎愛風穿耳度量還同海樣寬華藏界謾盤桓無邊剎海一毫端破緣生無實性了知生死不相干心外境亦何繁流水青山鎮日看三十年來知是錯分明月照髑髏寒覓不得始心安徹底無根見肺肝祖佛相傳祕密旨大似將空挪作丸直教生鐵流金汁湧沸都來掌上觀會得者些關棙子不妨隨處種旃檀示碧輝禪人為僧易為僧易要在男兒有大智雪山真寶囊衣中烈𦦨何須更回避任毀謗從罵詈恩愛冤家都遠離孤標獨立絶親疏濁惡世間恣玩戲逢人化敷妙義譬如大鵬輕展翅又如鉛汞與真金入火始能辨真僞不求師不斷臂不圖名兮不愛利了無一物挂心懷饑來喫飯困打睡胡張三黑李四從來不問渠名字空花落盡見青天敢道頓然超十地示順涯禪人入僧數非難易蹈矩循規理不違韜光混俗渾閒事動止無非振祖威棲巖壑住柴扉騰騰養得肚皮肥就中一種真三昧猛火叢中片雪飛知也未察幾微晴空白日雨霏霏光明八萬四千土土土皆作黃金輝袈裟紫衲衣緋驀地逢人拄杖揮三餐茶飯隨時度渴飲清泉饑食薇男兒到此恣豪放更當勇力破重圍都城祖意須親薦淨白途中芳草菲示古航關主君不見天目山頭石作船高峯大士居其巔三十餘年瓔珞飯至今人把清名傳吾徒靜室亦何有口不開兮足不走赤身惟剩兩條眉白手空拳誇抖擻又不見朗公禪鋤為枕子草為氈佛法世緣何所似磐石多恣白晝眠吾徒不聞鋤與草磐石藤蘿何處討開窗祇可見青天一道靈明光皓皓莫將此際當尋常光非照境境非光倐然廓徹通無礙便是心空及第郎示李希仁居士君不見此事不與教乘合敢將外典分優劣坐斷虗空逼塞時大千沙界無遺子是途中非考輟只須吐出廣長舌無情敷演妙伽陀塵說剎說衆生說山可傾海可竭日可冷兮月可熱獨有禪門不動尊笑看紅爐飛白雪𪹼得斷卒得折旋機轉位誇豪傑四方八面任縱橫何妨弄巧翻成拙鼓是非稱奇絶金毛跳入野狐穴捋虎搏龍興未闌泥人肋下三條鐵大因緣好時節為君細解同心結列聖叢中向上關熟讀斯文真口訣示禪人人生天壤間幻質若浮漚虗脆無真實苦向身外求譬如朝露花又如塗地油須臾便斂跡胡為不知休人身優曇開芥子針鋒投赤肉明珠窟青山碧玉樓披襟彌寶色動步遂清幽肯逐塵緣使竛竮空白頭示方赤城侍御紅光彌雉堞清瘦晏居中鬚髮皤然白衣冠興愈濃名言蘇困躓門第鼓祥風燕高眉宇圖書飽幼童寂住添靈翠浮山起彥嶐溪聲清過樂雲勢活如龍他日重遊處相將看嶺松示六義禪人誰云有六義寧知一字無寄身如浮雲經世一須臾男兒氣浩然眉宇動天樞灼然沒巴鼻逈與生死殊打開大散關壯哉始自娛莫學班白人喃喃讀梵書論義如流水究竟若茭蘆真是獅子兒生成鐵額顱又如猛丈夫抒海求明珠只教親瞥地裂破祖師圖示陳居士遍界不曾藏眼根豈能見除是悟心人當下討方便單提句話頭深追與力究才欲涉思惟圓明成過咎譬如破重關力與萬人敵通身都是膽輸贏在咫尺那復論危亡亦不分彼我抹轉上頭關無可無不可果是獅子兒不向那邊討力就解翻身根塵光皎皎清風拂夜月旭日盡朝露萬象咸點頭森羅盡回互喚作無事人喚作猛烈漢更擬問如何水浸石頭爛示李借假居士念佛與參禪法門最直路鎮海傾明珠樂宣淨土和盤盡托出覿面絶差互遠祖蓮花開趙州驢馬度抑揚激教源高下辨宗譜塵界毫端析法身全體露花開德水清酒醒衣珠悟謾言佛土佛須識主中主念佛與參禪祥雲和紫霧隨方布德澤切莫生猶豫付囑應弘通化儀非小補果得兼行之真如帶角虎示詹智安居士實相毋容寄足虗空豈是真心坐斷十方窠臼頂門痛下金針掉轉乾坤何境界拈來沙土盡黃金示古輝維那提起話頭倚天長劍斷生死流碎魔軍殿不斬黧奴豈肯放手直破重圍先須知有知有體玄如臨深淵約不退後推不向前勇不顧身命根始斷絶後再蘇救得一半一半倔強拗折拄杖絶思惟時來喫痛棒示殊常二禪人一歸何處是擎天柱抹轉額顱笑破了去別子江上浪花粗分明月照珊瑚樹只饒坐斷清虗解活也須回互雙雙行也雙雙行須知一住一不住示智和禪人遇午一餐遇晚一宿此是何緣無非順俗忽朝踢破指頭敢道玄沙受屈屈不屈聽叮囑藍田片玉本來輝脫㲉烏龜火裏浴示玄機禪人癡癡呆呆好去邏齊昨日南嶽今朝天台兩瓢熱水一束乾柴梅子熟也還我核來若將持呪為禪要天下禪人盡活埋示徐六嶽宮保元勛不忘靈山親付囑長安大道行人速一鞭木馬踏花飛九重宮殿爐煙馥閒拈拄杖撞虗空逼塞誰分心境同到得還家花未老白雲依舊故山中示方心寰徹侯不忘靈山親付囑大鵬久住金剛窟但問歸家歸未曾休將古德商遲速虗樓百尺倚晴空門閉梯捐路自通不動步時彈指入樓前木馬夜嘶風示詹見五勛卿不忘靈山親付囑紅塵豈障參禪骨雲衣不挂忽然蘇滿目桃花春簇簇春風吹樹看春來露柱生兒笑滿腮識得無生親的子任君掩耳過經臺示顧醒石鴻臚不忘靈山親付囑者箇都非心佛物驀爾通身熱汗流一味之間百味足百味誰嘗一味非旅中無繫自知歸解道澄江淨如練令人常憶謝玄暉示徐南高冏卿不忘靈山親付囑紅藕池邊波可掬通身獨露放光明萬里山河清淨目庭生瑞草未為奇瓮裏醃虀變紫芝碧眼胡師吞未盡酸甜祇貴大家知示何天玉冏卿不忘靈山親付囑識取未生前面目柳風梧月主人醒掃花閒殺樵青僕春到黃鶯語亦親半塘遙隔見通津還他寶釧金羇子任我穿衣喫飯人示俞容自勛卿不忘靈山親付囑學道先教無猒足假饒已悟更加鞭管取千魔俱殞沒護持須護自心玉氷雪中間別有香大著眼眶看仔細丈夫眉宇舊昂藏示徐孟麟侍御不忘靈山親付囑光明智火燒殘牘逢人何處著商量盡日芙蓉看未足芙蓉霜刃向雲磨魔佛由來奈爾何露布已聞鐃吹奏太平端許臥山阿示任文升侍御不忘靈山親付囑緣生世諦多林麓剖開慧眼顯全機肯向塵緣空碌碌突出衣中無價珍從來見處不依人大圓覺體光明藏淨白元無一點塵示吳黃嶽侍御不忘靈山親付囑清光靄靄彌山谷舉頭誰不見青天男兒肯向他尋逐待客迎賓事事長跬步何曾離本鄉了知動轉非他物優鉢羅花遍界香示朱羅青民部不忘靈山親付囑回頭紙穴癡蠅出疑情舉處要分明莫把心量重卜度大千經卷一塵微只貴當人剖出之曾向洛陽宮裏過春花春鳥總宜詩示蔡聖龍祠部不忘靈山親付囑慧燈好向風前續青天白露鷲峯明更從何處分真佛無分無別阿誰知當下知歸我是誰猛火煅成清淨土一聲孤雁夜聽遲示龐序皇司馬不忘靈山親付囑春氣非傳紅與緑一念攀緣眼底花片言玄妙膺中物空諸所有實諸無活殺從來是丈夫山色溪聲還跳出閙藍風雨對屠沽示曹安祖司馬不忘靈山親付囑浩然氣宇餐天祿堂堂妙用絶周遮百匝千重光晃昱底事分明說似君碧空花雨亂紛紜飯餘柳岸經行慣清風微動水成紋示吳泊如繕部不忘靈山親付囑海外波斯雙赤足夜來龍藏掌中生鎚碎休教添碌碌俊鶻摩天秋氣高虗空無物見纖毫驅耕奪食男兒事一任西風爽布袍示王季常繕部不忘靈山親付囑雪冷須彌偏突兀拈來青棗大如瓜見後桃花清似菊熱油鐺䑛大方饞莫使重留貼肉衫到得感恩知愧日許君親見老香嚴示白雉衡虞部不忘靈山親付囑社舞村歌堪薦入歌聲鼓節遣誰聞耳中供箇觀音佛虗空消殞一人邊草淨湖南萬里天一句相憑重道當石人雙耳聽聲前示周敏山水部不忘靈山親付囑珊瑚影映澄江緑清風明月兩相知蓮花水面如車軸石頭城外草芊芊踏月穿雲知幾年一自洞庭歌罷後至今花雨尚蹁蹮示金蘿石田曹不忘靈山親付囑禪牀直竪蒼山骨逈然一念射當人此是吾家真種族空花輪轉本來無迷悟俱非井覷驢討得钁頭些子味臥雲嘯月種松株示吳鬯膏田曹不忘靈山親付囑刻刻須教深入木和身迸透頂門開六六原來三十六鐵船無恙海潮通月落沙寒釣已窮若向此中親薦得竹簫吹過斷蘆中示丁蓮侶國博不忘靈山親付囑寶華淨界無延促眉眶之下鼻頭垂何人解把舟行陸方舟渡子不曾迷說著河源却未知雪滿短蓑寒夢破自驚身是釣魚師示林如冲奉常不忘靈山親付囑熟處當生生處熟却將生熟一鐺煎跛鱉盲龜稱萬福出門何地不青山傍晚征夫閒未閒開徹碓花供醉眼磨成磚鏡照衰顏示吳文孫中祕不忘靈山親付囑頭頭法法光明域虗堂無事一聲雷野狐跳入金毛窟金毛獅子解翻身者裏分明不昧因吐却狐涎入狐隊出山人是住山人示汪叔度進士不忘靈山親付囑康莊車馬偏難忽黃塵冉冉遍天涯憑君拭洗青山俗青山無況著秋煙鹿草龍芝種玉田獨有一年收未得祖珍拋散禁城邊示沈得一孝廉不忘靈山親付囑得意驊騮風趂足奔騰蹴踏見分明萬里空山尋古宿尋人花影落繽紛玉帶誰教報衲裙合有臨行饒舌處鍾山雲似博山雲示陳賁生孝廉不忘靈山親付囑白石蒼松堪擊筑擊出針鋒一線通千流萬派看漩澓山頭白浪海中塵囊裏無錢賸買春月滿珊瑚枝自露跏趺應笑劫前身示徐六虗孝廉不忘靈山親付囑宗門豈傍他人入英雄眼底笑男兒清風古路無迂曲參禪先令識心閒錦鯉成龍一躍間皮袋生光情愛盡淡將言句寫溪山示曹清之奉常不忘靈山親付囑參禪莫就禪中宿當日惟知劍柄長而今始覺毬門復枯樁未始是枯樁觸處風搖白玉幢萬里泥牛奔影去碧雲無賴滿春江示陳允嘉廣文不忘靈山親付囑斷崖峰頂黃茅屋十方坐斷見春風撥雲夜看千花谷跨著楊岐三腳驢不逢渠處也逢渠解開布袋憑人看妙用臨機果不殊示張時華參軍不忘靈山親付囑十年豫造征人服征人未免挂征鞍會免臨期多倉卒繡幢煙影碧油車放出南山鱉鼻蛇若道葛藤猶未斷一杯清供趙州茶示周元執參軍不忘靈山親付囑牧童明月騎歸犢未到人牛不見時休隨草色平川緑雨餘芳草是前村牧笛無端欲斷魂却向古鄰荒寺去大家扶起破沙盆示劉斗樞司馬不忘靈山親付囑縱橫出沒無拘束閒雲蹤跡渺天壤魔佛從來皆眷屬放生容易殺生難火宅之中呌野干露地白牛車上坐寶鈴珠網夜天寒示吳淳太光祿不忘靈山親付囑鉢盂中是千鍾粟橫吞一粒齒牙香却笑饑人果空腹一粒原來何處生大千心畝廓然平夜來有栽秧雨好向緑楊聽曉鶯示葉翼所典謁不忘靈山親付囑花蜂豈就空枝宿鑽向銀山鐵壁中他家好似無情物場開選佛看登壇莫道心空及第難踢殺猢猻縛殺鬼不知菩薩是何官示丘言思宮端不忘靈山親付囑彌陀一句無真俗數珠繩斷佛聲消卞和剖破荊山玉分明寶鏡映千燈擇葉尋枝我未曾識得燒菴真供養泥牛搖尾過窗櫺示李在璞孝廉不忘靈山親付囑修幢拗折瀟湘竹實相門開聲悄然短衣破笠黃金域江風淡蕩法身寒江雨凄清夜未殘休把䳌啼比鶯語萬花叢裏現優曇示葉白於中翰不忘靈山親付囑期君試聽無生曲無手人彈無耳聽聚合從前親骨肉團圞何處問他方一片空心選佛場打鼓却看誰作主釣魚原是謝三郎示余集生冏卿不忘靈山親付囑爾自彈絲我吹竹合成一調供衆生梵天花雨成禾穀攪不清兮燒不香捉賊須教有正贓溺器踢翻清夜曉傳燈名字間僧行示余周生都閫不忘靈山親付囑日午虗窗剔明燭厨前巧婦細思量自笑能炊無米粥諸天同器不同餐肘後金符近已刓馬足似雲弓似月將軍今夜下三韓示方士雄太學不忘靈山親付囑青山滿目原非物荊棘叢中穿過時何論橫趨與直入旋風八字打將來寶網金繩觸處開萬壑千巖春自暖兔光和露護珠胎示汪吉所居士不忘靈山親付囑加鞭倒跨泥牛犢牛背頻將鐵笛吹聲聲韻出無生曲無生曲子孰賡和石人解拍木人歌遊遍支那歸去晚衣冠之下古彌陀示陳旻昭文學不忘靈山親付囑瓊苗遠發瀏陽佛揚吾家醜逼吾忙管保千生受塗毒千生祇在一朝圓毒鼓聲騰萬馬先廓爾子韶明物格紫雲金殿暗香傳示余得之居士不忘靈山親付囑日用何妨耕與讀書中全露聖賢心大似良田獲嘉穀聖賢俱自道場來儒釋源流莫浪猜會得拈花微笑旨龜毛拂子舞三台示剡水禪人不忘靈山親付囑波澄三昧銀鷥浴自從不解倒跨牛石人淚墮相思曲相思難寫夢初分半是思君半恨君若使琵琶能訴出指端應現博山雲
