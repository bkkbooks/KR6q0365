body:
  text: 博山和尚傳弟子智達劉日杲撰博山和尚者舒城人也諱大艤字無異人咸稱為無異禪師云族姓沙其父太公取姚氏生和尚也輙不得食酒肉乳和尚否則不為食越七月而母死使它人婦有子者乳之易數人皆不肯食太公日糜榛栗食和尚和尚得不死葢神異焉少長能飲食更不飲酒及肉食也嘗與鄰兒嬉戲為一兒所撲仆折齒太公性故嚴毅和尚懼其詬鄰兒也遂噀血歸而詳告它故太公得不怒慈惠葢天性云年十六矢志出家之金陵瓦棺寺聽講法華慨然曰求之在我豈可循文逐句哉遂去之建武禮五臺通法師薙髮受業脩智者止觀之道甞露坐松下不知晨夜蚊蚋集軀如唼槁木內焉不知有血肉身心外焉不見有山河大地也如是五年寒暑罔輟已而詣超華山從洪法師受比丘律是時壽昌經大師方居峩峯揚曹洞之法和尚聞其名往謁焉見壽昌荷鋤戴笠狀類田父輙心疑之遂入閩光澤居白雲峯三年以所得著書呈壽昌壽昌以書報之謂其非第一義和尚始爽然自失也遂焚香禮拜毀其藁不復示人益潛心宗乘閱船子藏身語疑情頓發至忘寢食居歲餘忽見趙州囑僧語恍然有得走見壽昌時壽昌已從峩峯徙寶方矣語次頗離微不合遂居寶方力求道要幾至委頓面目黧黑膚僅支骨而精進不衰一日壽昌受玉山請欲與和尚偕行和尚不肯往曰暑甚安事僕僕也壽昌曰今日當有人為女說法令女疾悟遂行途次論君臣五位之旨和尚語刺刺不休壽昌皆然之既而謂和尚曰佛印螘尋腥蠅逐臭語為君位事臣位事和尚曰臣邊事壽昌呵之曰大有人笑女在至玉山和尚趺坐石上忽聞神像仆地中心豁然急作頌呈壽昌頌曰玉山誘一言心灰語路絕幾多玄解會如沸湯澆雪沒巴鼻金針好因緣時節梅蕋綻枯枝桃花開九月觸目如休辨別急水灘頭拋探篙溺殺無數英雄客壽昌曰子一到多門又到門和尚益自厲歸坐一小樓朝夕不寐復居歲餘一日如廁見人緣木遂悟至道疾走見壽昌和尚所居去寶方寺數十里須臾而至幾不知足之蹈之也入門壽昌方當戶而坐見和尚至狀異平日因迎問曰子近日如何和尚曰有條活路不許人知壽昌曰因甚不許人知和尚曰不知不知壽昌曰㜑子云何燒菴逐僧和尚曰黃金增色耳昌壽因舉龍吟虎嘯語命和尚頌和尚援筆疾書以呈頌曰殺活爭雄各有奇模糊肉眼曷能知吐光不遂時流意依舊春風逐馬蹄壽昌笑曰子今日始信吾不女欺也和尚曰向後還有事也無壽昌曰老僧祇知二時粥飯不復知有向後事又問壽昌曰女後得坐披衣幸無籌䇿足矣遂命秉拂贈之以偈偈曰本然清淨更如然契證多生值有緣觸目渾融皆至妙通身作用總虛玄五宗極則機齊貫三藏精微理共圓不礙古今凡聖事如來禪合祖師禪時和尚方二十七歲聞鵞湖心大師以雲棲宏大師神足授律鵞湖往受菩薩毗尼鵞湖興者十年弟子三百餘人初不置首座也和尚至即留為首座作偈贈之偈曰鵞湖十載虛元位一旦緣何立少年兩個眉毛八個繓須知佛祖不容前厥後三禮雲棲雲棲遇和尚殊優至因書演暢真乘數字贈之居鵞湖者六月即還入閩圓上座與從父廣文君崇慶因于鵞湖見和尚也輙心折之因謀所以致和尚者圓上座遂重繭入閩請和尚和尚乃與照監院正首座等八人至信州初遊西巖居四十餘日嘗無所得食則采野蔌為羮怡然甚樂既而居祖印院者七月乃遷博山博山故韶國師道場荒廢日久寺僧皆肉食者流廣文君倡諸縉紳偕寺僧請和尚和尚至則誅茅為屋僅足容𨞃而禪律並行蹶然興起鵞湖聞和尚居博山即以授戒儀軌𢌿之是時沈大參蒸趙司李士禎俱從事佛乘交重和尚也而和尚道日隆旋入邵武葺廣福寶安二蘭若受化者各數百人和尚乃使正首座居廣福而自歸博山闢草建剎漸成精藍居亡何壽昌以應董巖請不暇往遂以書趣和尚為升座說法和尚乃往大闡宗風辯才無礙趙文學光孚歎曰此真壽昌兒也繼登仰山再轉法輪還博山而弟子益進朔既燕都南盡交趾望風而至者歲以千計和尚垂四問以騐四方禪那多如枘鑿又誾首座至和尚見其機頴不凡遂令閉關時加警䇿居六年以偈呈和尚和尚曰是將師子吼者乃令出關以偈贈之偈曰始行大事六年雪頓入圓明一片冰今日幸親無縫塔掣開關鎻萬千層置為首座偈曰匡扶大法賴吾儕正眼從茲觸處開肯信座元一具地一花端有一如來嗣是登壇說法時參揚扢如見微笑之風和尚嘗教從父廣文君參船子藏身語忽病中有得拈唐人詩為頌和尚笑頷之頌曰雨前初見花間蕋雨後全無葉底花蜂蝶紛紛過墻去却疑春色在鄰家太末詹觀察在泮聞和尚名請和尚居惠安寺和尚曰予與劉君為布衣交奈何舍就公乎觀察知不可彊乃請圓上座居之和尚既出家與太公不相聞及和尚名大著太公始知和尚尚在因至博山相見悲喜交集曰詎意公至是者和尚因孝養備至且宛為勸諭太公得斷肉食歲餘而歸時郡侯故和尚弟子為具舟送之至累月而太公卒和尚因歸展墓道懷寧人人焚香導迎瞻禮恐後劉太史若宰時方為諸生偕其兄弟禮和尚為師求度和尚曰公神氣凝靜當得上第為法苑干城出家須異日爾因為授菩薩戒太史著十問論宗教異同之旨和尚憑几裁答慧辯雲興語具書中明年太史舉進士第一一如和尚語其它學士大夫文學布衣禮足求戒者動至數萬過桐城幢葢迎者倍懷寧道路駢闐至有不得見者吳庶子應賓夙參雲棲自負知識來參和尚請益和尚曰覩公所著頌深入禪理第解耳語于悟猶未也庶子曰云何和尚曰燒菴頌云爾頌曰寒巖枯木太僧生說道無情却有情煙滅灰飛成露地閒花野草任縱橫得無不肯是僧邪庶子曰然和尚曰吾故謂公乃解也庶子始心服願廁弟子列受菩薩毗尼焉鞭影頻加絕塵而犇矣是時縉紳先生雲集景附方太史拱乾數十輩皆皈蓮座深䬸法喜因請登浮山說法也至舒城謁太公墓吳庶子及其同輩具蔬果為太公設祭諸文學多從和尚至舒城者舒城人且競奔墓次瞻禮和尚墓前僅餘席地和尚得成禮而已一時蹂踐墓為不封和尚歸道桐城懷寧其導迎益倍昔時葢苾蒭白衣皈心受戒者無慮千萬人天啟丁卯冬余冏卿大成來博山參和尚冏卿固夙窺禪理輙維摩自居初見猶不肯下迨與語信宿冏卿如醉醍醐始求為弟子繾綣倍至及去和尚曰此真具隻眼人也先時閩中曹大參學佺數十人請和尚至鼓山和尚謝不行是歲固請乃𨓏過劒州道路爭為參禮不殊往舒城時去鼓山三十里許有洲常暵涸船為不通必海潮至船始得過和尚乃以冬月行又非潮期水遽漲溢和尚船既度仍涸如故既至揮麈據席音如潮吼來集者數千餘人歸而博山名益著于天下故壽昌弟子黃司李端伯久習禪要壽昌入滅即皈禮和尚也別數年走博山謁和尚與之語幾超乘焉余冏卿既歸知正法有在欲得和尚之金陵乃糾合徐魏公弘基及諸薦紳以書幣介陳文學丹衷來迎和尚道所經處導迎之儀益倍桐城至金陵居天界寺寺故廣袤數十里可容數百萬人是時冠履相趾寺為之小香積之費日至鉅萬人各一蔬一飯而已魏公初度日禮和尚登座說法是日金陵人皆見白玉光映天界寺處甚有見四天王現身雲端者姑蘇劉監軍錫玄素慕和尚聞和尚在金陵走謁焉詢以台教辯如懸河和尚為剖疑義更示以別傳之道監軍窅然自喪和尚歸送至蕪湖始還余冏卿留連江干不忍去和尚笑曰此別何足惜明年秋乃別公耳壽昌入滅者十年和尚往禮墖過董巖趙文學子來謁請和尚再至董巖和尚低徊良久曰曩非先和尚及乃公促余說法尚須十年一旦見迫遂至登座往來吳越江閩間三十年于茲矣出世太早謝世亦應爾吾其逝乎語訖長笑而別還山則與彭博士份楊太守聞中謀建浮屠為身後計結夏著宗教通說一卷盡抒玄蘊九月初書成遂示疾至十七日有星大如盤霣方丈鴟吻間中夜和尚召誾首座至榻前反覆宗乘奧義因相與大笑次首座問疾語已和尚示疾次首座問和尚四大安樂否和尚曰儘著些受用問和尚病誰是不病底曰熱大作麼又問末後一段光明如何垂示曰問者事作麼進問和尚去來自在云何和尚索筆大書曰歷歷分明擲筆趺坐而逝世壽五十有六法臘四十有一嵩上座集其語為賸錄若干卷行于世大弟子智誾飫餐法乳堪稱入室成正德業夙著鈞足為後來模範大忠道柔海納道舟等皆洪冶之利器法廐之良駒道恒道嵩弘恩辭榮入道精修禪寂幾幾乎截流之香象焉同居者七百餘人葢人盡旃檀云贊曰余小子日杲得從諸從兄椷栻樾槻及友人鄭大球大瑗徐植之潘巘楊鳳翥鵬舉之屬師事和尚也見其貌甚偉異如世所圖慈氏少林像豈其後身與明興二百餘年宗乘寥寥得和尚而丕振猗與盛哉禪律不相謀宗教不相為也而和尚法嗣壽昌律傳鵞湖殆兼之矣宜其徧坐名剎為世仰止聲且與大鑒爭烈也博山和尚傳中興信州博山能仁禪寺無異大師墖銘并序大法垂東而般若祖翁有卜世之讖少之嫩桂林曰二株去之千有餘祀而我博山無異大師以壽昌钁頭禪入于洞山寶鏡三昧漆園有言萬世而下知其解者旦暮遇之也嗣黃檗者不妨親見馬祖稟龍樹者復能光啟台宗誰謂壽昌口生定非船子法化耶少林記莂非其地之謂其人之謂也師龍舒沙氏子法諱大艤一諱元來學者稱無異和尚生而白衣重包𦾥血酒漿不入于口夙熏慈忍兒時匿墮齒于厥翁隣子無恐而蚤為閔氏孤子舍圉若僧舍悠若十六遊金陵聞法華于雪浪座下喟然嘆曰是法非思量分別之所能解聲分別心何有教外別傳天牖之矣遂禮五臺靜菴通和尚為出家兒求智者旋陀羅尼落處觀心露坐身土湛如不知其顙之為𠾱膚者酒也如是五年永嘉空相應法暖相現前而師根力自勸使為壽昌老人作德雲妙高想初至峨峰覩簑笠翁爾入閩止光澤之白雲峯著心經指南洋洋乎幾于兩涯不辨得峨峰報書直待飲光破顏別出相見始信為過量人炷香遙禮矢志宗乘而船子沒蹤跡話從印宗法友舌端為師門鼓吹猶未有以難也馳贈伽陀有低頭始見月孤明之句而師更念船子在藥山之門何以二十年始得瞥地疑情頓發七聖皆迷兀兀騰騰五十旬有半而於趙州有佛無佛機緣如釋重負謁壽昌于寶方多乎呈簡曾不得其一頷居再閱月形色枯瘁望之似木雞矣從赴玉山揚扢洞宗時得印可昌問佛印偈云蟻子解尋腥處走青蠅偏向臭邊飛君耶臣耶師云臣邊事昌呵之曰大有人咲汝在師云前何以是今何以非昌云一非一切非矣既達辟人端居食頃聞護法神倒地不覺心開呈偈云玉山誘一言心灰語路絕幾多玄解會如沸湯澆雪沒巴鼻金鍼好因緣時節梅蘃綻枯枝桃花開九月觸目如休辨別急水灘頭拋探篙溺殺無限英雄客昌曰一到多門又到門葢解心絕矣而命根未斷別居宗乘堂又五十旬有半覩登樹人而悟乃徹源底也趣謁寶方入門便拜昌問近日如何師曰有個活路不許人知昌云因甚不許人知師曰不知不知昌舉燒庵趂僧話問婆子作麼生手眼師曰黃金增色爾又舉僧問玄則禪師龍吟霧起虎嘯風生公案命頌之師援筆立就曰殺活爭雄各有奇模糊肉眼曷能知吐光不遂時流意依舊春風逐馬啼昌笑云子今日始知吾不汝欺也師問向後還有事也無昌云老僧只知穿衣喫飯師曰豈無方便昌云子後得坐披衣幸無籌䇿足矣因命秉拂贈以偈言本然清淨亘如然契證多生值有緣觸目混融皆至妙通身作用總虗玄五宗極則機齊貫三藏精微理共圓不礙古今凡聖事如來禪合祖師禪更囑之曰當以無心相續正用盡法行持詶無報之慈恩利有緣之正信而師自是佩離文字印入正徧知海香幢剎土湧沒毫端多聞總持得大無畏正偏妙挾圓頓雙銷不得知五位之為十玄六相之非三墮矣宋薦福本禪師甞說法于信州博山之能仁寺人亡政熄剎有典刑萬曆壬寅師年二十有八受豐邑劉孝廉崇慶鄭節推維城楊別駕時芳上足萬融圓輩請偕八弟子成正等玠等融等處焉雖草昧乎禪律威儀居然三代禮樂壽昌度于己事而辦自建陽董巖遣書者三屬以代座師不得已勉為一眾舉似家珍而博山宗風遂擅天下閩越吳楚間惟一月真無與等者以故六和麋至四事雲興久之金碧熒煌園林葱菁而踞燈王師子稱八百人善知識矣或謂波羅提木叉不為宗通者說而師自打落鼻孔身心羯磨次第具足性遮皆淨持犯兼忘甞之卒然窺以閴爾鬼神不得見其隙矣故師於超華極菴洪公鵞湖養菴心公皆用和尚禮而鵞湖虗座元者十載亟以屬焉師是以三覲雲棲祖翁得其殊目特書演暢真乘之牓而師念戒為師故徙五臺之派繫籍雲棲其後又以得法因緣兼為壽昌衍嗣故出師門者源一而委二鋒頴則開之眼藏惇龐而茂以香光禪土交參銷歸不二而一片熱腸視寐者力負夜趨愀然沸然不啻赤子之將入井悲心普運愛見都忘第二峯頭對緣施攝苟不至一闡提則昧谷之於高山蒙茸之於寬博信進念熏得未曾有一也至於就父朝君如奉節度符印乃至無有一剎那際瞥起傷他余小子瀹亦竊於日用中少分覰著壽昌謂殺佛活祖人尚不敢縱心生滅師可謂拳拳服膺薙染以來正勤匪懈白衣丈室坑塹自遮郡邑宰官來而不往沈觀察蒸季任之義殷勤三請始克遘遇禮於招提而蕭使君思似趙節推士禎謝邑令薦輩嚴座白椎先生之門無執政矣南湧北沒則閩之鼓山諸剎鞭影頻垂博山雨笠煙包強半海濵鄒魯宇內名流載自綸扉圭弁洎乎墨綬銅符西面而咨北面而禮多至不可殫述述其先後左右師于一大事者余小子瀹得師親繫衣珠從雲棲優婆塞稱博山菩薩弟子曹山孝滿將不在茲葢師充充於色身之父而皇皇於慧身之母寶方一悟自以子職無愆更二十餘年從故鄉人得生父耗亟致之伊蒲之餐以脩法喜而孕珠九品之臺所需雖鉢鐼之自出必請於眾明年天啟丁卯尋訃而至取道桐鄉慈社法檀厥名錫類盍簪盈缶實蕃有徒小子妄引其端攀附有心步趨無足而浮山密邇桑梓賴師右掌遙擎永言孝思緣熏增上寂光與力庶幾究竟莊嚴崇禎己巳金陵之遊則余開府大成聞所聞而來見所見而慕惠徼二祖徧啟羣蒙天界法幢所謂無大無小從公于邁狂奔䁥就號為四輩弟子者指以億萬計而師圓音曲唱乘言會宗不落思惟法爾回互真不啻覩影闍黎從涅槃起一時干鳴瓜印之徒往往竊臨濟後架禪作日下孤燈伎倆劍揮巢破露布全彰而歸正一編足使法門五衰頓還魯陽三舍功成名遂意在斯乎師慈容淨滿道骨堅凝眉采燁然春秋在顙法筵清眾不肅而嚴刈麥負薪無不人人委蛇詳敘若有深湛之思者師云吾功令雲栖而未之逮耳初發悟時常坐一小樓日惟一餐手不釋卷脇不置席者累月偶嬰憊疾巍坐終宵瞷其室者排闥而投五體葢那伽之定戒與之俱無作悉檀不住於相酬機應供可日食三兩金而師滴水同餐寸絲不掛追憶昔者自閩嶠出向鐵山折脚鐺邊飽四旬瓔珞粥香厨狼籍了不作濃淡觀而檀波之別注于師者宿于蘧廬如時而布皆僧物也壽昌並畊三剎雲棲移粟諸方師其二之中乎請轉法輪藉手為壽則氷之投石矣雲棲之役普陀是瞻𩗗風蕩舟眾乃大恐遊目於斯儼若空生晏坐曰正恁麼時送却皮袋子便休而天界拈椎博山返錫小子聞其度越者兩事不動智無緣慈皆非有心人境界用師家法語忌十成此以知師之能為主中主也為法求人婆心徹困有請益者示以一息不來句歸何處猛令提撕不徹不止而師高懸祖印把斷要津相似悟頭推入活埋坑裏痛與鉗鎚登其門者龍象如雲未卜他時阿誰道個何必以故三十年間不少當機罕聞付法甞與余開府激揚此事大有徑庭苟非向上一路乘悟併鎖寧與不可傳者俱往以需後覺或見而知之或聞而知之及其知之一也終不以如來慧命博禪雛手中瓣香佛事矣辯驗龍蛇三垂影草一曰古㵎寒泉水作何色二曰不萌之草為甚麼能藏香象三曰徹底無依向甚處安身立命洞上之玄全提徧吼薦之言下何處不是博山歸自金陵輙營窣堵苾蒭分乞亦未之前聞也經始子來忽命簡錄方丈察及秋毫若遠行之戒處守居未幾而大悲之疾示矣慰諭經旬遂有遺教衲僧衣線下事嘔心衝口刺刺不休首座智誾問和尚安樂否師曰儘著些子受用問還有不病者無師曰熱大作麼問來去自繇請道一句師為書歷歷分明四字漏當子夜坐脫翛然崇禎庚午季秋之十有八日也却顧來時萬曆乙亥仲冬之廿有九日僧臘四十有一復更四稔而世壽之甲始周踰年辛未孟冬廿有一日奉全身墖於寺西棲鳳嶺之陽師所筮也天之將喪民之無援法梁崩摧慧日滅沒緇白遐邇愴地籲天而最初代座董巖迫於三命早榮之木未獲後凋師甞為建陽檀越趙居士晏如言之矣方網出入一身多身真性廓然不借而借仰山老子已於千載之上邈得師真所留言說法身別為九種回源之錄肇起博山通說之錫實開雙樹闡信地則毗耶下座作拈古而天童喪機禪警語為發最上乘者痛處加錐滑時與杖可當換骨神丹淨土偈橫陳清泰四華再發頭陀一粲永明料揀光影重重而宗教答響所謂三根普被四教均談不壞今時全超古路竺乾四十九年震旦千七百則只者些子師可謂得法自在三昧矣智誾是師尊重弟子齒光心印具體而微諸監院次及于事夾輔門庭咸正無缺博山營勳區宇成照為魁別治邵武二藍曰廣福曰寶安則成正為師分身揚化台州道嵩洞明因果勇棄葢纏苦到禮首楞嚴王得肉眼淨欲明祖意但辦肯心與誾公鞭弭周旋故是博山二玅還觀高足其數甚多了因時至必有與師代興而叶久昌之讖者居士之及門者劉孝廉最為莫逆初繫念準提陀羅尼機緣僅熟被師以船子公案鈍寘八年忽發輕安借昔人韻語頌之雨前初見花間蘂雨後全無葉底花蜂蝶紛紛過墻去却疑春色在鄰家師擊節稱善臨終感大士現身詰所希望對以成佛度生而沒今也披誓願鎧究涅槃心雄峙金湯必余開府大成徐魏公弘基之為巨擘劉監軍錫玄以中興台教為己任勞師就機落草引入曹源彭廣文份楊史君聞中般若根銛參求志篤尤師所屬目也至如廣瀹無論天下事即書于錫類篇者於冶為鍮於稼為莠醍醐在握竟作餓夫恩大難詶付在祇劫誾公率先耆舊勒狀徵辭拙指妙音誰當側耳博山拄杖躍出墖廟東頭過百由旬打教髓出有分在銘曰儒聖之統歷年五百聞而知之與見無別迦文眼藏一祖無宗覿面傳心曰在爾躬將心與傳了不可得不可得中剎𨚗塵劫塵劫剎那非去來今等無間緣異世同神諸識猶爾況真如性古鏡新磨明明祖印所以洞宗集于壽昌大好山下五位全彰即彰即藏無跡亦跡黑白交參綿綿密密峩峯非住寶方不來樹頭雲破池面天開不許人知聊通一線壽昌所聞博山所見殺活縱橫鳥道不行全身歸父退位朝君從平等慈流差別智海墨書空解脫文字和寡彌頭惜得眉毛盡法行持令嚴寂寥到處垂綸逢場栽竹長者馳求醫王付囑星隕告符仰此頺山日面月面前三後三不涉虗玄重談至妙起坐啜茗莞爾而笑師所住處即名少林桂子飄香其聚如雲迷中倍人咄哉廣瀹湛然十虗徒勞執捉師無身度何墖何銘威音那畔石女彈琴崇禎四年歲次辛未十月賜進士出身奉直大夫左春坊左諭德兼翰林院侍讀覃恩進階奉政大夫菩薩十戒弟子皖舒廣瀹吳應賓謹撰募刻祖翁異和尚廣錄序洞水溯曹溪源深流遠龍峯連鳳嶺山好風高障迴末法狂瀾直指祖師玄奧驚人活句韵出清霄炤世明燈光騰碧漢此祖翁揭開寶鏡掉盡老婆舌頭者也不謂丙丁奪𦦨致螢耀以彌空溪壑亂流赴海門而失所磵本師每將舊譜示我弟兄欲展弘慈阻於阿堵或以初機葢障遂使方冊缺文瀚用是不揣因緣惟觀時節冀先聲之不墜令後學之有從遠乞諸檀徧聯法屬捐貲彚梓非但慧炬重明附藏流通且令昏迷頓起益世多矣厥功偉歟住博山法孫弘瀚稽首百拜謹題
