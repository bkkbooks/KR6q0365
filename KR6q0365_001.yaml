body:
  text: 住博山法孫弘瀚彚編首座法孫弘裕同集住信州博山能仁禪寺語錄師住博山有年禪衲輳集未甞開法因壽昌五致書相趣出世乃陞座拈香云此一瓣香金藏雲而嚴枝榦香水海以潤根株龍樓迎瑞而紫氣飛騰寶殿籠煙而祥雲遍布爇向爐中端為祝延今上皇帝聖壽萬安皇后齊年太子千秋福基同華藏以莊嚴壽筭共毗盧而等量更祈檀那衍慶海眾安和此一瓣香淨明日月曠蕩乾坤空覺性而無佛無生熏萬彚而有因有果爇向爐中專伸供養壽昌堂上本師無明大和尚用詶法乳之恩斂衣就座白椎竟師乃云佛不求佛心不傳心如水與水似金博金會得也目前包裹山濶猿長嘯會不得也目前包褁林疎鳥不驚會不會總目前包褁空宣無相偈即此包裹也須包褁水操沒弦琴諸昆仲於此徹去以須彌山作四大海白浪滔天以四大海作須彌山紅塵滿地烹虗空之髓而滋味恒新挑水底之燈而光明亘大者裏無加芒索箇中何用金針所以道指南一路智者知疎向上一機石人撫掌開彌勒之樓閣而行願重重蹋毗盧之頂門而毫光爍爍到此則步步通玄智不能知識不能識諸昆仲此是故鄉景象若肯就路還家便得轉身歸父還肯麼自是不歸歸便得五湖煙景有誰爭上堂揣虗空骨吞栗棘蓬剖開塵界玅運寰中白雲七片八片籬菊一叢兩叢分明漏洩西來意幾多眼耳尚盲聾諸昆仲仔細窮更有泥牛吼月木馬嘶風分明向伊說破赤肉團上有一焦尾大蟲咦莫把黃金當作銅上堂即心即佛馬大師板齒生毛非心非佛馬大師眼光落地不是心不是佛不是物王老師相隨來也博山總不恁麼白蘋及翠羽野老笑相親博山總作恁麼寰中天子勅塞外將軍令還知博山意麼若知博山意便會祖師意若知祖師意便會諸佛意若知諸佛意便會自己意諸昆仲不可虗延歲月蹭蹬過時猛著精神發明斯道始不被天下老和尚舌頭礙也當知天下老和尚共一雙眼睛看人共一箇口皮吐氣諸昆仲還會麼雲來碧岫山裝面月到澄潭水畵眉上堂傾湫倒嶽大地全收簸土揚灰纖毫不立全收則該羅廣博須知白晝雛鳴不立則澹泊虗明誰解紅塵犬吠是佛亦打是魔亦打管甚船來陸來饑也一餐飽也一餐且喜柴乾水便沒蹤跡莫藏身一雙赤手逢人且乞一文藏身處沒蹤跡兩朵攢眉遇佛堪消三拜吾在藥山二十餘年方明此事親言出親口莫使外人聞諸人藏身處博山總知博山藏身處諸人不知諸昆仲今日在此法筵不免覿面相呈若到諸方逢人不得錯舉珍重上堂冬不寒臈後看老儂不愛雪稚子哭衣單惟有東村一箇沒傝漢髼頭垢面赤手空拳寒不怕寒熱不怕熱最冷唱箇雪詞兒最饑做箇糶米漢無一文錢要與天下人鬬富無一分色要與大地人爭妍有時在十字街頭倒騎鐵馬有時在西洋大海逆上須彌有時在烈火𦦨中嚼氷嚙雪有時在紅塵堆裏掐草挑燈有時指東話西有時呼南為北將三乘法塹以作門墻指十地菩薩而為眷屬諸昆仲斯人還合伴不合伴復笑云已被博山收下了也上堂鵞湖云瞠却眼兮剔起眉反覆看渠渠是誰洞山云渠今正是我我今不是渠石霜云渠無國土何處逢渠或有云渠無生死或有云渠儂得自繇或有云渠不作箇解會諸昆仲渠者何物為與眼對不與眼對若與眼對則成二物不與眼對因甚反覆看渠若直下看破便會得渠正是我我不是渠若會得我不是渠便能獨蹈大方孤峯自立正不立玄偏不附物便會得渠無國土何處逢渠既無國土無量劫來求生相了不可得求死相了不可得便會得渠無生死果無生死千自繇百自在便會得渠儂得自繇若到恁麼田地言語道斷心行處滅便會得渠不作箇解會博山此語如浪擊銀山花開碧岫石女揚眉玄猿捕影三歲孩兒頭似雪磵底游魚忙不徹展似眉毛作麼生分明底事叮嚀說諸昆仲且道叮嚀事作麼生雙手拍開銀世界縱橫誰辯往來源上堂至理不渝至功不宰至道不形至了不辦於此四句相應便做箇灑落衲僧眼不染玄黃脚不沾泥水意不緣諸法舌不親玄旨到此則圓機普應玄度該通淨體無依靈明絕待所以玄沙大師云羅籠不肯住呼喚不回頭古聖不安排至今無處所諸昆仲今時禪者不信自心是佛向外求佛不信自心具足諸法向外求法既昧自心縱有弘為皆生死之業耳又當知求佛求法即有所依既有所依於自心不得自在譬如窮子竛竮辛苦乞食自濟昧却衣裏無價寶珠豈智者乎夾山大師偈云勞持生死法惟向佛邊求目前迷正理撥火覓浮漚無事久立珍重誕日上堂本無今有笑看鏡裏狂花本有今無攪動巖前湛水一片白雲瀰漫幾多花鳥迷蹤拶碎虗空罏鞴烹煎佛祖高揮寶劒草鞋救取猫兒還他一箇皮囊贏得五湖明月所以大覺世尊捨王宮入雪山覩明星開道眼於三七日中思惟是事然後開權顯實說三乘法及至末後拈花示眾便云有教外別傳簡點將來如夢境相似博山生居黎庶無王宮可捨遊化東土無雪山可入大地黑暗無明星可覩奴郎不辯無道眼可開然則貴賤雖殊要且頭腦相似自幼便可憐生二十以前成家樂業二十以後花擘家財三十以前向北單越解三玄戈冑三十以後在南贍部洲碎五位鎗旗四十以前你要去我有鈎兒鈎你博山却不鈎你任你千里萬里四十以後你要住我有錐兒錐你博山却不錐你任你在蟭螟眼裏今日正當四十歲鈎錐一齊息博山不在者裏博山有一塊古地基自天台韶國師開創以來千有餘載雲峯信道者克紹相繼亦數十餘年今日在此說法是本有今無耶諸人面前不得說夢是本無今有耶諸人面前不得說夢看破夢境時如何諸人面前不得說夢何以故箇中求其生無生不可得滅無滅不可得有本有不可得無本無不可得又將何而為壽也以諸佛身眾生身為壽聖凡不可增減以過去劫未來劫為壽日月不可遷移以玅高峯娑竭海為壽燥濕不可損壞以盡虗空遍法界為壽天地不可覆藏然雖如是今日因甚麼喚作四十歲良久云棲鳳巖前雲霧捲伏牛山下古今傳除夕上堂諸昆仲年月告盡旬候云週衲衣下一段大事還會也未若論參禪須要立得心真便頭正尾正其間亦不顛倒更要識得病根始得其禪有多種病不可不知若不識得病根縱能精進皆魔業耳何為病根試聽博山從頭告報免使傷鋒犯手第一不得計時筭日第二不得敲氷洗浴第三不得圍爐向火第四不得暗裏偷光第五不得開眼作夢第六不得觸樹迷封第七不得逆風把舵第八不得易短為長第九不得傷風露骨第十不得釘樁搖艣第十一不得步步登高第十二不得從空放下若不蹈此十二種病便能作箇淨白衲僧可以撮土為金呼牛作馬釋迦老子尚不奈你何況其他乎然雖如是更有一事問諸昆仲假如正月初一日發心看看挨到臘月三十日又作麼生折合良久云談玄說玅恒沙數那箇男兒摸壁行上堂神藏禪師云知而無知不是無知而說無知良遂禪師云良遂知處諸人不知諸人知處良遂總知荷澤禪師云知之一字眾玅之門高峯禪師云知之一字眾禍之門諸大老敲唱傍提各具一隻眼博山今日不惜唇吻從頭註解祗要告報諸人知而無知頭腦相似不是無知而說無知火燒眉毛救取一半良遂知處諸人不知大似壓良為賤諸人知處良遂總知多知老翁莫與相見知之一字眾玅之門把手牽不入知之一字眾禍之門脚頭脚底知字亦不惡諸昆仲博山恁麼註解還會博山意麼然雖如是博山決不恁麼道無知而知為之知知知之為知不知為不知諸昆仲還有不向知上作活計另有超羣萃者麼當知水琴松韻堪傳赤子之心赤尾金鱗不墮漁人之手且道與古人同耶異耶復云東西南北十萬八千臘八日上堂維那白槌云法筵龍象眾當觀第一義師云第一義作麼生觀著則眼瞎嗅著則腦裂舉步絕行蹤動念非生滅眼色耳音聲心忘思路絕古今諸聖賢同途而異轍中峯水底琴馬師天上月投子手中油趙州庭前栢博山無可示梅花枝上洩吐翠與含芳凝寒傲霜雪清香滿十方觸著通身血捶手哭蒼天浮杯老結舌諸昆仲當時釋迦文佛於臘月八日抖碎虗空七花八裂盡大地無一人會得所以寶坊云不是凌行婆怎解同心結徐惟明居士請上堂大道絕方隅靈明豈待尋從來只恁麼作麼有疎親灰頭土面何曾葢覆將來利齒獰牙畢竟聲和響順所以瑞巖每於石上喚作主人公復應云惺惺著他朝後日莫受人瞞瑞巖大似勾賊破家要且傍觀者醜博山今日不免和盤托出倒廩傾倉說似大眾去也復以手指云門外白雲千萬朵籬邊紅杏兩三枝上堂在迷迷悟在悟悟迷從來迷悟似迷今日悟迷非悟迷悟兩頭拽斷聖凡更復何言剔起眉毛惜取眼中瞳子綻開衣線露出鐵石心肝燈籠與露柱相交佛殿共三門鬬額赤手團成泥彈子紅罏煉就鐵饅頭一任東擲西拋畢竟埋光鏟彩縱教野狐精巖中脫㲉轉轉不錯笑殺赤鬚老胡要知水牯牛山下投胎卓卓全該須是溈山大士諸昆仲溈山大士作水牯牛博山頭角生已久矣還有人證盟也未良久云達磨大士來也放過一著元旦上堂春風纔動春花開春雨相催春水來惟有通玄峯頂石依前白蘚與青苔大眾如何是新年頭佛法復云東西林下鳥添得好音聲解制上堂誰云結制仍解制縱有成規俱不是當空拋下雲門柴雪浪銀花匝地開簡得多年破木杓子飛過新羅國你既無心我也休後代兒孫笑酒樓香巖粥飯長行者擊竹有聲聾兩耳翻思昔日老靈雲一見桃花瞎眼睛誰是迷兮誰是悟春風觸著瑚樹誰是悟兮誰是迷具足從前自家底心不心兮物不物連書幾箇向空咄諸昆仲因甚麼書幾箇向空咄復合掌云我不敢輕於汝等汝等皆當作佛壽日上堂三世諸佛與博山同生無影樹頭懸日月十二類生與博山同壽不萌枝上辯春秋世界乾城陽𦦨佛生夢幻漚華乾城陽𦦨而世界色色皆空夢幻漚華而聖凡心心寂爾色色皆空突出娘生面目心心寂爾縱橫衲子胸襟有問春秋多少祇云花謝花開更詢劫運短長誰道空成空壞于斯領略則古今非代而延促同時一念萬年而萬年一念豈思議筭數年月日時而論耶縱能觀滄溟之水幾度清淺猶是客作漢耳只饒寶掌住世一千七十二歲亦何駛哉諸昆仲且道博山即今春秋多少若會得好從者裏說來其或未然直須逆數到四十年前博山與大眾別峯相見上堂諸昆仲凡心入覺須善用心不善用心魔得其便所以一箇計字出九十六種外道一箇著字出五十蘊魔及魔王眷屬等具在教乘不可不知經云譬如有孔隙處風則能入搖動於物而不自在菩薩亦爾若心有間隙心即搖動而不自在乃至成就皆魔業耳何謂魔也歡喜是魔也煩惱是魔也昏沉是魔也掉舉是魔也懼動是魔也厭靜是魔也喜談論是魔也愛遊行是魔也乃至斥像毀經破律犯戒拈頌機緣擅開異解詩賦詞章文藝雜學併貪求說法悉是魔也所以博山教諸昆仲提一則無意味公案蘊在八識田中當下不知有血肉身心前境不知有山河大地非內非外滾作一箇疑團行不知行坐不知坐如一人與萬人敵又如心心常似過橋時直須發明此事到磕著撞著打破疑團通身是眼縱遇釋迦大師摩頂授記佛亦不做何況魔軍而能入耶諸昆仲如斯會去誰不丈夫雖然如是事怕有心人直須當下一念無生超彼三乘權學等見若將心令無心却成有直須覓心了不可得即證超魔法門上堂水流濕火緣燥是水有魚是林有鳥喫飯咬著舌頭解道青天不用掃諸昆仲須自了同箇夜兮同箇曉試將此語播諸方謾道荒田不揀草更看雲門拄杖子化為龍吞却山河大地了諸昆仲且道博山即今在甚麼處良久云深固幽遠無人能到下座開光解制上堂九十日期今已解百千三昧許誰知畵龍未必乘雲去可惜人間十二時十二時辰彈指過眨起眉毛還是錯衲衣撩起伴雲眠盤陀石上松花墮聞見清兮清亦非法身無病不求醫頂門突出摩醯眼夜半烏雞帶雪飛帶雪飛兮貴回互金鳳不棲無影樹縱橫十字數將來佛祖位中留不住留不住兮劈面來兔角龜毛眼裏栽今朝拄杖橫挑出那箇男兒肯活埋諸昆仲今乃解制之辰遇無量壽如來為汝諸人普作佛事放大光明照十方國土無所障礙更以無礙神力將極樂娑婆融成一界若說是淨土却是娑婆若說是娑婆即是淨土且道無量壽如來畢竟居何國土今日博山親指出分明一點座中圓上堂諸禪德見聞覺知即是佛法佛法即是見聞覺知根本無明即是諸佛不動智諸佛不動智即是根本無明婬怒癡即是戒定慧戒定慧即是婬怒癡若向者裏破始知達磨大師航海而來祇是指示人現成具足底道理且如何是現成具足底道理木人起舞非奇特石女梳頭越樣新峯頂上堂舉十善道竟復舉圓通機大師居山二十年見伐木倒豁然大悟後九江太守請主圓通席遂杖草履登臺說偈云圓通不開生藥舖單單賣箇死貓頭不知那箇無思筭喫著通身冷汗流師云慚愧古人居山二十年祇悟得箇死貓頭若是博山則不然博山欲開生藥舖隨緣賣箇活貓頭不知那箇有思筭喫著通身鮮血流諸昆仲且道與古人是同是別良久云若將情識解埋沒祖師心上堂釋迦如來降誕西域開場四十九載談經三百餘會末後拈花示眾復云有教外別傳貽累古今諸哲祇與世人說些世法何謂世法明心見性是世法戒定慧品是世法三身四智是世法五眼六通是世法三乘十地是世法十八不共是世法三十七品是世法六度萬行是世法乃至成佛極果是世法博山則不然今與大眾說些佛法何謂佛法山河大地是佛法日月森羅是佛法鵲噪鴉鳴是佛法乃至與諸昆仲要笑謳歌是佛法大眾會麼若會得是法住法位世間相常住其或未然化城美境從君欲惜蔽衣珠對月追下座祖印院上堂人天易集淨土罕逢今日迎來宛然佛國大眾佛國則已至還聞彌陀說法麼良久云須知佛遍三千界淨土渾敷八字間鄉親到上堂瑤天慧月耀古輝今性地覺花香郊馥閫汝等久離鄉井一向竛竮此日同筵幸逢故戚諸昆仲逢親戚遇故友則且置敢問還得家中音信也無若有可呈似博山與汝親手開拆其或未然分付白雲常守戶側聽賓鴻送信來端午上堂時逢昊仲節屆端陽城戶泛雄黃之酒江鄉聞欵乃之歌人道是塵境紛紜博山說法輪大轉艾葉征旗掃九十六種外道菖蒲利劒碎五十蘊魔軍古人於此却說聞聲悟道見色明心博山冷眼觀來猶成鈍置諸昆仲終日鐘鼓鏗鏘此便是聲作麼生是道見今榴紅柳綠此便是色喚那箇作心於此明得正好買草鞋行脚於此未明也須恐懼汝看塵境游戲之中舟漂綠水錦奪磯亭如穿玉錦之梭似佈勾芒之令穿波舞掉划彩逞能到恁麼時豈容擬議若有毫釐遲怠則喪身失命了也何況衲僧門下胡風一扇陸地行舟駕鐵艇於太虗翻玉波於峯頂搏猛虎喉中之解驪龍頷下之珠直須不顧危亡到手始得正恁麼時還有拋舟罷柁與博山同遊戲者麼若有可請出來與吾相見若無山僧自逞神通去也拈坐具作搖艣勢云會麼道院迎仙客書堂隱相儒衲僧門下異珍重赤鬚鬍元旦上堂拈香祝聖竟次拈香云此一瓣香虗空包不住大地載不起爇向諸人面前諸人要且不識釋迦大師得之便云普見一切眾生具有如來智慧德相祇因妄想執著而不能證得迦葉得之破顏微笑便云覓我者是汝我阿難得之結集聞持副二傳化商那和修得之便云身十七性非十七乃至達磨得之與二十七祖辯珠云此是世寶未足為上於諸寶中法寶為上此是世光未足為上於諸光中智光為上此是世明未足為上於諸明中心明為上二祖得之便云覓心了不可得三祖得之便云信心不二不二信心言語道斷非去來今四祖得之便云大緣與性合當生生不生五祖得之便云姓即有不是常姓六祖得之便云本來無一物何處惹塵埃馬祖得之便云一口吸盡西江水一脚蹋殺天下人乃至天童得之便云散乾葢而非心持坤輿而有力今日博山在此座上揚眉鼓舌拈來撒出祇要諸人識去諸人還識得也未若識得便證香光莊嚴若未識人天眾前便好識去豈不見大緣與性合當生生不生上堂洞山大師云地獄中苦未為苦向衣線下不明大事是為最苦此大事既在衣線下因甚不明祇因無始以來心境交加幻出一切色相塞諸人眼根幻出一切好惡音聲塞諸人耳根幻出一切香臭塞諸人鼻根幻出一切甜酸苦淡塞諸人舌根幻出一切細滑麤澀等相塞諸人身根幻出一切緣慮等心塞諸人意根諸昆仲要得一生取辦須將從前所學所習底世法中伶俐心機巧心佛法中語言相文字相知解相盡情放下做一箇淨白底衲僧然雖如是也要知衲僧溪深杓柄長始得若會得酌水獻花隨宜得用其或未然喫飯也須防沙喫水也須防噎上堂僧問金鐘纔扣雲堂已露真風法鼓重鳴海眾更申敗缺正當恁麼時和尚如何結案即卓拄杖云山水之間得渠儂力進云某甲從此信入去也師云信後如何進云向後與和尚更道師云分作兩橛作麼又僧問昔九座大師云我今日向孤峯絕頂駕一隻鐵船截斷天下人要津祇如和尚今日又作麼生師云銕船即且置闍黎要津呈似老僧看進云爭奈學人不會何師云不會倩人裁進云恁麼則剛道是龍猶不信等閒奪得始驚人師云閒言語乃云諸昆仲佛法不是容易博山三十年來實際理地洞然無礙事法中較量與理矛盾者尚多即今與諸昆仲陞堂入室結箇粥飯因緣於此座上問來答去如鳥云空如鼠云唧雖有其聲究竟將來都無實義豈但無益恐成賺誤若是祖師門下客要知祖師行徑方有說話分單明自己底不知有古佛家風此人有眼無身若明得古佛家風不知自己用處此人有身無眼直饒坐斷兩頭不通凡聖轉身氣急猶在半途更須知有全提時節始得大丈夫兒步入重玄睜開隻眼解作家活用不乖方斂沙界于毫端纖塵匪礙耀珠光于域內洞鑒無遺如日月光遠近斯照拈拄杖云還有恁麼衲僧麼僧問透網金鱗因甚猶還滯水師云度盡無餘影還他越涅槃進云恁麼則縱橫滄海濶騰躍萬波隨師云作麼生說箇騰躍底道理進云分明頭角久春江雨露微師云念文章可惜許師復拈拄杖云還有問話者麼眾無對自云今日老僧失利上堂天晴日頭出雨灑偕前濕分明舉似人只恐信不及諸昆仲開眼見明閉眼見暗一等是見因甚被明暗遷移若要頓明此事除是不造生死業始得如何是生死業厭煩惱趨菩提是生死業求大涅槃是生死業分科列目敷文演義是生死業捨垢取淨是生死業窮玄究妙是生死業有得有證是生死業不脫對治門是生死業乃至陞堂入室問來答去盡是生死業若要脫此生死業直須兀兀騰騰恁麼過時夏則排窻冬則附爐饑則喫飯寒則添衣若以世法商量便成滲漏更將佛法理會正是眼中著屑誕日上堂僧問莊子八千椿正眼觀來猶存數量大通塵點劫衲僧門下尚在半途壽等虗空泯絕途量一句請和尚指示師云玄沙元是謝家郎進云和尚與玄沙同生去也師云年年桃李樹處處白紅花進云者箇且置祇如當時韓文公問大顛和尚尊壽多少顛提數珠云晝夜一百八今日座中諸大檀越或問和尚法臘多少和尚如何應對師云漩澓黃河水一年幾度清進云如是則和尚與大顛人有今昔壽無兩般去也師云乾三長坤六短進云氷桃雪藕非為敬直奮空拳上法王時如何師云坤在上乾在下僧禮拜云謝和尚答話師乃云天地旋山河走石女生兒世間希有白向本爺娘乾坤兩眉皺今日無端舉似人灼然笑破虗空口諸昆仲若道博山有生是不諳佛法若道博山無生是不諳世法生與無生拈放一邊且道四大色身從甚麼處得來良久云乾闥婆神無限樂宮商不與世和同首座問云石女生兒得幾箇師云五男二女進云和尚生身父母在什麼處師喝一喝下座
