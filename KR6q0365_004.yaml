body:
  text: 住博山法孫弘瀚彚編首座法孫弘裕同集住建州董巖禪寺語録上堂拈香祝聖竟乃云諸昆仲若論佛法列位未出禪堂門博山未出方丈門早已漏逗了也又何待打鼓升堂拈槌竪拂揚眉鼓舌然後為佛法哉然雖如是不免向第二門頭為大衆宣說若欲決擇此事須具大信根信根若具便起大疑心疑心若起便得大悟門所以云大疑大悟小疑小悟不疑不悟夫信者何須信有教外別傳之旨拈一則無意味公案蘊在八識田中如斃囊盛寶相似將自己參悟一念如金剛王寶劍直須仗此劒剖此囊取寶到手始得正剖與未剖之際不可起第二念有毫釐分別處即是第二念也有毫釐被世境牽引處即是第二念也亦不得置在無事甲中若置在無事甲中即是第二念也離此種種諸念正是做工夫得力處且道如何是無義味公案如僧問古德如何是禪德云猢猻上樹尾連顛又僧問古德如何是禪德云猛火著油煎又僧問古德如何是禪德云杖籬山下竹筋鞭又僧問古德如何是禪德云䃙磚此四轉語如天普蓋似地普擎隨拈一則參究若真發明一一皆吾家故物耳且道發明後又作麼生行履復笑云海為龍世界空是鶴家鄉上堂昔黃龍大師有三關語六七百年未曾有人拈著博山告報與諸禪德已過關者不須評論未過關者博山今日從頭下注腳去也我手何似佛手喚黃龍是箇衆生得麼我腳何似驢腳稱黃龍是世尊得麼人人有箇生緣獨有黃龍博山沒有何以故曾經大海休誇水除了須彌不是山上堂諸昆仲博山未參禪時便知即心即佛及乎正參禪時却知非心非佛得見寶方後依然即心即佛自出寶方門又是非心非佛博山與古人同途不同轍古人更有不是心不是佛不是物博山却即是心即是佛即是物此於教中喚作雙照雙遮在吾衲僧門下喚作鬼神茶飯且道衲僧有甚長處竿頭絲線從君弄不犯清波意自殊上堂佛法知時節秋風特地來秋空秋色滿秋葉砌秋階當此時也銀蟾吐彩丹桂飄香鴈傳北苑之書人問歸家之路所以云欲知佛法當觀時節因緣時節若至其理自彰諸禪德還有知此時節者麼若未知便好知去當知知之一字衆妙之門莫待臘月三十日手忙腳亂便悔云蹉過好時節了也若知得又何勞博山在此座上叨叨呾呾作麼豈不見南臺和尚云善哉三下板知識盡來參衆既知時節吾今不再三然雖如是南臺和尚腳跟猶未點地在衆中還有簡點得出者麼若簡點得出便進前掀翻繩牀喝散大衆博山也怪伊不得上堂若論佛法一切處現成法眼繇斯領悟地藏以此傳心看他師資授受之際有甚麼奇特所以云釋迦未出世達磨不西來佛法遍大地相逢口不開諸大德欲明佛法須向釋迦未生時會取欲明教外別傳正法眼藏須向世尊未拈花迦葉未微笑時會取欲明安心之理須向達磨未開口二祖未斷臂時會取於斯時節會得猶較些子若待世尊生下時一手指天一手指地周行七步目顧四方自云天上天下惟吾獨尊便已納敗闕了也所以雲門大師云我當時若見一棒打死與狗子喫却貴圖天下大平可謂將此深心奉塵剎是則名為報佛恩諸昆仲其中還有知恩報恩者麼若有可請出來與吾相見其或未然可趂此手強腳健快須努力決明此事始不被天下老和尚舌頭瞞也良久云會麼相逢不飲空歸去洞口桃花也笑人上堂諸昆仲欲參博山禪於未開口時會得猶是落二落三了也稍覺遲疑便合喫痛棒又何待開口以來縱能會得堪作甚麼豈不見從門入者不是家珍又安可為當家種草也臨濟大師云向第一句薦得堪與佛祖為師向第二句薦得堪與人天為師向第三句薦得自救不了博山則不然向第一句薦得便合喫痛棒向第二句薦得添枷著杻向第三句薦得斬頭求活何以故箇中半句也容不得誰與你論第二第三鼓粥飯氣去也諸昆仲欲明者箇說話把萬緣放下單單只究此事如一人被萬人趕來一趕趕到萬丈坑邊若不跳下便碎尸萬斷當此之時懸崖撒手拌身一跳直教到底使虗空粉碎大地平沉待氣息蘇醒起來便走上岸此岸即是大路搖頭擺手到家始得諸昆仲莫說此事是難便生退屈若生退屈百劫千生無繇解脫須發勇猛信根當知乃佛乃祖皆如斯成就彼既丈夫我胡不爾古所謂松花若也沾春力根在深巖也著開上堂至體無生何拘緣境理無修證行絶階差所以云有相修行多劫終成敗壞無心體極一念頓契佛家且如博山在此座上列位承聽我法是有心耶是無心耶若說無心聽法者誰若說有心將何頓契佛家非但不契佛家猶恐墮有相修行而多劫終成敗壞矣諸昆仲若究本體無生便合本妙教中云諸法不自生亦不從他生不共不無因是故說無生此四句偈徹底為人是教中極則若是衲僧分上一點也用不著何以故在此淨白地上誰管你自生耶誰管你他生耶誰管你共生耶誰管你無因生耶若向衲衣下會去說自生亦得說他生亦得說共生亦得說無因生亦得何以故在此人分上天不能拘地不能束陰陽不能管五行不能局不作衆生不成佛道且道畢竟向甚麼處去良久云佛祖位中留不住鑊湯爐炭孰輪回上堂面西行向東北斗正離宮道去何曾去騎牛臥牧童慈明老人舌根拖地列位知得也未當知此偈非妙悟而莫能知悟非情盡而莫能曉情非工夫而莫能忘若於此偈徹去三千七百祖師說話皆一場笑具說甚麼君臣五位接引初機說甚麼照用三玄誘諭後學所以云靈苗瑞草野父愁耘玉鎖金匙智人不顧若具超方眼目即是灑落衲僧便好打禾山鼓唱德山歌擎祕魔叉舞道吾笏向十字街頭搖鈴振鐸於孤峯頂上嘯月吟風其間還有與博山同遊戲者麼衆無對復笑云有意氣時添意氣不風流處也風流上堂道非難亦非易要在當人無師慧一拳打破太虗空一腳踢翻滄海水翻身直向新羅國須彌倒挂毫毛角皓月團團出海門清風匝地難描摸難描摸知不知今古攸分類不齊丱角總言心量大年來方覺語聲低語聲低辨端的對面白雲千萬里分明覿面更無真暗似日兮明似漆諸昆仲須委悉更有容易禪重與通消息良久云初三十一中九下七中秋上堂松風送韻桂轂傳秋凉徹煩熱胸襟香遍閻浮世界諸昆仲還知麼還見麼若知掀翻大海揚却須彌若見除去𪹼耳迅雷滅却搖空閃電直得海嶽齊平石人起舞呵呵大笑云秋風凉秋夜長未歸客思故鄉且道那箇是未歸客何人思故鄉復笑云三業未能成佛智十分秋色逼人寒上堂一即一切一切即一明似黑月暗如皎日於此四句之上會得便見燦大師七縱八橫釋迦尊九紫十赤其或未然更有容易禪與君須剖析豈不見水面挂燈毬東壁打西壁生鐵鑄蒺藜拶出黃金汁阿呵呵甚奇特明眼衲僧須辨別參𮘗華嚴經上堂靈心皎潔徹古該今至理彌綸和真混俗根境不實元是華嚴微妙法門大小相融一多自在高低一顧萬象齊彰擬議之間相隔霄壤更乃依文解義却如掘地覓天閉目藏睛大似敲氷取火非為無獲祇益自勞何須抹轉上頭關直下已是毗盧藏髑髏常干世界鼻孔摩觸家風如此信得則頭頭彌勒閣處處毗藍園既無淨穢之名寧有佛生之異其或未然推倒須彌山即向汝道上堂二月半春風撼面時光換百花郊外鬬芳妍好鳥枝頭爭噪亂惟有禪家渾不改塵毛括盡大千界淨土分明在目前直下是名觀自在誰更云玉閣瓊樓誰更云幢幡寶蓋咦夢幻空花何勞賭賽最喜杉山王老師人人只喫一莖菜歲旦上堂和氣生枯卉寒雲散野郊木人占吉兆夜半露龜爻大衆此是博山寺五百年前無隱經禪師歲旦上堂語山僧今日亦有四句燭影搖紅處香煙飛白時現成的佛法也要大家知如此會得便見一年十二月月月如然一日十二時時時相似如黃金之黃白玉之白曠大劫來未常變易大衆且道那裏是現成的佛法衆無對師良久云東君昨夜傳消息報道新年喜太平上堂萬里不挂片雲虗空突出眼睛放開七片八片收來一丁兩丁只饒通身是眼算來祇得八成大衆還有十成的衲僧麼咦且莫道著便下座上堂無邊剎海自他不隔於毫端十世古今始終不離於當念南陽忠國師在天津橋上看弄猢猻汝等諸人還見也未三十年後莫道博山不說好邵武新創寶安寺上堂指出古佛基插草而成寶社劈破青山色布金已建精藍長者信手拈來世尊破顏微笑二大老向沒煙火處鬬弄天工於熱閙場中顢頇道者博山遠承慈蔭不免花擘家財直教虗空逼塞巖前無湛水之波大地平沉法界絶藏身之跡向沒蹤跡處建大法幢擊大法鼓震大法雷演大法義說一切智智清淨無二無二分無別無斷故諸昆仲即今碧峯吳居士少峯何居士建茲寶安禪寺與長者同耶異耶伶俐衲僧向者裏著眼始得良久云雲在嶺頭閒不徹水流㵎下大忙生董巖講維摩經請上堂居塵出塵即事離事不轉位以就功即塵勞而出世釋迦老人土面灰頭向者裏聊通一線指貪嗔癡愛是箇大解脫法門陰處界等喚作放光三昧然此則不出三界而證大涅槃不剃髭鬚而弘第一義箇中有箇英標衲子用超方手段衝開碧落截斷紅塵奪肉髻明珠解肘後靈符笑雲居何必碎趙州有無將業識茫茫便作諸佛不動智將諸佛不動智便作業識茫茫諸昆仲且道向甚麼處摸索渠儂可謂沸湯急水下足誠難紫霧黃雲開眼迷道所以寶方云絲竹傳心終成礙膺博山到者裏滿口道不出還有向未開口前領略者麼若有可請出來與博山相見脫或遲疑少頃勞心空上人代坐此座向維摩經中旁通箇消息珍重上堂五五童子從妙喜國來腳跟下多泥水三萬菩薩往毗耶城去牙痕裏盡雌黃不因示老毗耶劒戟鎗林難下口諸昆仲當知至體無法可繫強名曰淨求其淨相不可得但有其名名亦不可立或云無垢稱木人看陽𦦨翻波石女聽乾城逸響不留朕兆法界齊觀鼓吹將來一場露布縱是通身無口未免大笑毗盧諸昆仲當知法假人弘文刊白字題因人立當道種青松猛虎喉中活兒救得是好鱉鼻蛇邊爛拄杖拗折為奇且道博山意在甚麼處吽吽以思惟心測度如來圓覺境界如將螢火燒須彌山終不能得然則博山今日高登華座大展法筵敢問說何法耶解脫法耶不思議法耶不二門法耶現神力法耶咄是何言歟良久云維摩大士來也稽首大士雖則塵面蓬心要且起居多福經題上堂如是之法我從佛聞如是之法佛從我生拶出虗空之髓倒拈䕞蕩之針觸著三世諸佛鼻孔只得吞聲忍氣一任諸上座抱大不平諸昆仲當知身外無土誰是佛國土外無身誰非佛國湖南老人一麟角解道聖人無己靡所不己又云會萬物而為己其惟聖人乎然此則佛即國國即佛佛外無國求其國不可得松陰凝翠壁國外無佛求其佛不可得香霧靄青蘿博山總不恁麼是佛好與一摑直教虗空粉碎大地平沉是國好與一摑直教大地平沉虗空粉碎諸昆仲直饒煉作一團未是衲僧向上事何以故功德天黑暗女有智主人二俱不受佛國品上堂法身無去來之跡應萬有故不來而來至體絶上下之分總羣機故不合而合寶蓋覆三千之界微塵等剎海之方山河大地川流泉源日月星辰天龍宮殿乃至十方諸佛說法悉現於寶蓋之中寶蓋覆世界百千萬億世界入於寶蓋而世界不小寶蓋不大世界覆寶蓋百千萬億寶蓋入於世界而寶蓋不小世界不大於此五百寶蓋而結成一蓋莫是如來神力耶大定莊嚴耶淨心變現耶乃至無我無造無受者之所成耶若如此會則未夢見寶蓋在古德云大千世界是沙門一隻眼喚寶蓋在諸上座眼裏得麼大千世界是沙門一點靈光喚寶蓋在諸上座靈光裏得麼大千世界在沙門一點靈光裏喚靈光蓋覆寶蓋得麼若如此會去非但凡夫小乘所不共乃至與諸大菩薩所不共文殊普賢亦不共釋迦老子亦不共維摩大士亦不共何以故報化非真故華嚴經云若有見大覺解脫離諸漏不著一切世此非證道眼且道五百童子是證道眼耶非證道眼耶若是證道眼五百童子眼在甚麼處若非證道眼五百童子眼亦在甚麼處諸昆仲作麼生是證道眼門前修竹來儀鳳㵎底清泉隱臥龍獻寶蓋品上堂若欲說佛法無法可說法若以法說法恐辱於大法然雖如是博山亦無開口處列位請博山登此座何為也不免俯順機宜向第二門頭聊開一線將淨土二字從頭注解一遍去也心淨土淨大千世界摩尼鏡打破鏡來時與諸上座相見土淨心淨運為不出那伽定七顛八倒時與諸上座相見衆生行業不同途猛火𦦨中那容蚊蚋美惡從彼類所現瓊花鏡裏影象昭然欲求淨土衆生心行中求從來不曾點污豈但淨土佛亦不為安用求乎譬如造立宮室若於虗空終不能成西天不逢唐土不會若以空地隨意無礙根塵界中具此一坐具地在梵天鶖子而所見不同易分雪裏粉諸佛衆生而本源一爾難辨墨中煤於是如來以足指按地曠大劫來未常變遷不勞神用即時三千大千世界若百千珍寶莊嚴喚作瓦礫沙石坑坎堆埠得麼譬如寶莊嚴佛無量功德寶莊嚴土等無有異自在天宮向甚麼處去也螺髻梵王亦須具慚愧始得諸昆仲清淨寶莊嚴土悉皆圓現諸上座還要見也無若要見便向者裏見去若不見自是諸上座不見怎怪得博山良久云舌頭無骨眼無筋對面白雲千萬里淨土品上堂善權有則謂之方物應斯順謂之便大海全歸一滴太虗祇是一線擲出駭雞之犀入彼淫坊酒肆放出屠龍之手何妨俗舍魔宮現長者居士之身雲藏無縫襖作帝釋天人之主花綻不萌枝諸昆仲維摩大士以大悲入生死海不捨衆生故以大智入生死海不迷衆生故逮乎開物導迷應時通善如一面寶鏡相似汝將一莖草來鏡中便現一莖草鏡安得成草也汝將一錠金來鏡中便現一錠金鏡安得成金也汝將瓶盤叉釧來鏡中便現瓶盤叉釧鏡安得成瓶盤叉釧也諸昆仲當知終日度生不見生之可度金剛三昧經云不生於化其化大焉南嶽大師云十方諸佛被我一口吞盡亦此意也又如烈火𦦨中是草是金是瓶盤叉釧盡入於烈火𦦨中煉成一箇不留影跡還知維摩大士落處麼四海浪平看華麟而吞吐九霄雲淨憑靈鳳以翱翔諸昆仲且道吾祖師門下與維摩大士還有優劣也無呌侍者維摩大士在甚麼處喚來與博山揩背方便品上堂諸仁者是身無常無強無力無堅速朽之法不可信也若如此看徹四百四病沒處安著四百四病既沒處安金剛不壞之身當念具足無量功德之聚覿體全影四無量心六波羅密無不備舉古所謂若要直捷會一切總不是若要直捷會一切總皆是諸仁者還要直捷會麼金剛不壞之身即汝等精液膿血是也無量功德之聚即汝等四大五陰是也四無量心即汝等集起緣慮是也六波羅密即汝等根塵界處是也如此若不會執身取靜非宴坐也我垢不除非說法也慈心不普非行乞也不達平等非法食也不觀根器非適機也不了真空非論義也相無相見非天眼也不達實相非奉律也不履無為非出家也不識佛身非巾侍也諸昆仲十大弟子各負己之功幹大似棄滄海而逐波向日中而逃影豈智者乎然雖如是總被維摩大士將泥彈子換却十大弟子眼睛去也十大弟子還知痛癢麼譬夫堯眉八彩舜目重瞳從古洎今縱有巧手丹青畢竟描寫渠眉目不出諸昆仲要見堯舜眉目麼直須向堯舜未生以前開眼始得弟子品上堂妙道虗玄方之以實真空廓爾體之以靈徹妙德以無方齊古今於一念彌勒說不退轉之行撮摩空花釋迦記未來世之尊延綿夢境四事推尋求其生不可得一心彌亘括其記安寄乎既解空裏弄花不妨夢中說夢古所謂安置水月道場成就空花萬行降伏鏡裏魔軍成就夢中佛事非此之謂歟夫菩提者不可以身得六月火燒無影樹不可以心得三冬人嚼孟津氷不可以身得身是菩提故不可以心得心是菩提故萬紫千紅就裏無邊春色身心及菩提是三無差別桂林月渚箇中誰辨秋光於實際理地求其身不可得求其心不可得求其菩提亦不可得到此則步步登玄智不能知識不能識所以肇公云聰者無以容其聽智者無以運其知辨者無以措其辭像者無以狀其儀及乎開物成務應化無謀古今天地古今人物日月星辰森羅萬象人叢鳥跡城市鄉坊車馬駢闐晝明夜暗莫不悉承菩提恩力當知舉足下足無非淨名道場左之右之盡是光嚴住處三萬菩薩各運無功之行二千魔女堪傳無盡之燈上至於難勝如來下至於最下乞者果能分別不生是無等等故般若云一切智智清淨無二無二分無別無斷故諸昆仲要會維摩意麼都是菩提無有不是之者要會博山意麼都不是菩提無有是之者箇中有伶俐衲子將是非二字拈向一邊從者裏會去彌勒品
