body:
  text: 住博山法孫弘瀚彚編首座法孫弘裕同集開示偈二示吳觀我宮諭一口氣不來畢竟甚處去血肉身心非常住勘破緣生緣不生根塵即是大寶聚閙市叢中景物披何須山塢與江湄負薪樵子機頭婦渴飲饑餐步不移百草頭邊親祖意毋拘路滑恣遊戲謾將佛法當真參沾著些兒成垢膩本來無古亦無今肉髻明珠豈外尋黃鶴樓前伸轉語方知居士問頭深示何芝嶽尚書一口氣不來畢竟甚處去靈山古佛親分付回頭石馬出紗籠肯就家庭守珍御淨几明窗自在時花香雲照碧羅衣夜深月下翻清影無蒂珊瑚露幾枝折杖行兮途路杳旋身愈覺乾坤小不須別樣問通津萬事無如出處好眼動眉舒曰妙存鴉鳴知是幾黃昏依正報中親瞥地逈然無佛處稱尊示方廣野居士一口氣不來畢竟甚處去急著娘生雙眼洞然無物飽畐塞虗空何處住既無住處肯干休鐵壁銀山迸出頭謾道腰纏十萬貫端然屋裏販楊州世緣那更分清濁赤肉團中光閃爍撿箇柴頭品字煨風流何啻三禪樂撫掌捫空意灑然浮山湖畔草芊芊倒騎驢子都遊遍破霧披雲不記年示吳九濤居士一口氣不來畢竟甚處去百年光景從頭數忙忙三萬六千朝莫待臨時申苦楚長安大道痛加鞭行不前兮亦奮然直待九重宮殿裏金爐應有暗香傳翻雲覆雨曹山墮活潑機輪無不可才欲將心度量來溫州橘皮不是火世間無水謾云波吸盡西江奈爾何酬渠祖意山頭有紫霧紅霞映碧蘿示吳石生居士一口氣不來畢竟甚處去四方八面大火聚動即燒兮靜亦然出離肯別生疑慮不生疑慮直趨前覓火還須先見煙臭爛不堪皮袋子灼然雲外是同年同條生不同條死瞥地嗔兮瞥地喜顛倒場中識得渠原來少箇當門齒同門出入自優游傑出叢林是趙州略彴橋邊度驢馬不風流處也風流示趙元振居士一口氣不來畢竟甚處去雲從龍兮風從虎旋風八字打將來大地山河如目覩香樹雲幢處處周蓮花朵朵湛清流善財不用南詢遍彈指豁開彌勒樓彌勒樓臺燦珠玉寶几明窗清可掬鶴唳鶯啼盧舍那時人何必棲幽谷解開布袋放癡憨包納虗空甘不甘轉位就功親去就舌頭無骨定司南示盛子惠居士一口氣不來畢竟甚處去一千七百閒言語交馳棒喝祖師禪蝶夢南華方栩栩鳴椎歸位話幽微四句離兮絶百非却笑仰山清夢裏無錢博得口頭肥好就風雲看變動真機不與時人共本無一物獻尊堂堆堆何啻千斤重掉轉乾坤別樣新從來依法不依人參禪道者渾無事靜聽枝頭鳥語頻示范以都居士一口氣不來畢竟甚處去明眼衲僧難共語管甚閒忙靜閙時四威儀內頻頻舉話頭綿密絶周遮寶印親懸驗正邪清淨界中才動念無端病眼見空花一念不生俱解脫芥孔針鋒誇廣博攪亂乾坤不識人旋風八字無棲泊只須掉轉拄杖頭絶無煙火不干休通身汗下通身冷笑展家風得自由示吳蓮舟居士一口氣不來畢竟甚處去幻化皮囊誰是汝險惡場中走一回靜陸平原應自許一步高來一步低高低盡處見端倪法身炯潔何相似白雪清風類不齊話頭一句如饑渴山自崩兮海自竭迸破疑團廓然時却笑香塗與刀割少林無故把心安不識心兮毛骨寒突出娘生真面目了知生死不相干示盛蓮生孝廉一口氣不來畢竟甚處去過水拏舟方自渡到岸逢人話短長即忙覓取來時路異種靈苗說似君從來絲髮不干人解開布袋頻頻看賸有山頭一帶雲盞子落地成七片聊與時人通一線無礙光明徹幻軀根塵界是摩尼殿雲頭按下太生生妙用臨機不順情斫却中心一樹子四方八面任縱橫示胡氷稜縣尹一口氣不來畢竟甚處去白日青天誰不覩還鄉盡道是兒孫就裏無容誇佛祖箇中原不立階梯土面灰頭孰與齊欲問故鄉睛雨候須知腳下有黃泥驅耕奪食男兒漢步不移兮登彼岸何必區區藉世燈額上明珠光燦爛夜無惡夢日無驚大地山河一掌平好把虗空百雜碎不期華藏宛然成示潘次魯貢元一口氣不來畢竟甚處去五蘊山頭張露布百萬軍中取勝時覿面那容更回互重圍力破不為難轉位旋機直下看才起一絲分別想腳跟早隔萬重山智人當下知端的至理無分今與昔百劫千生撞出頭掃地焚香全利益逢人笑展佛家風血染山河朵朵紅參遍閻浮諸善友文殊祇在福城東示宋大山孝廉一口氣不來畢竟甚處去晴是日兮陰是雨翻來覆去見根源裂破胸襟誇步武毋拘坐臥及經行展似眉毛作麼生雨後花香人發笑霜前果熟鳥相爭道人懶與分時節囫圇不用頻饒舌鐵馬嘶殘劫外風大圓覺裏無豪傑你既無心我也休兩忘何必強追求趙州可煞添鹽醋傾出當年投子油示方肅之館元一口氣不來畢竟甚處去毋問三千七百祖公案交橫眉目間無心理會閒家具法身清淨廁坑籌沒來由處有來由一朝拶出通身汗始覺從前滿面羞著衣喫飯隨時好何自稽遲不自了抹轉娘生惡面皮觸著通身都是寶開不成單合不雙後園驢子繫枯樁翻他井真三昧隨處逢人樹法幢示劉雁先居士一口氣不來畢竟甚處去即此不明是家務譬如大路到長安前行更不生疑慮直入重門興未休夜明簾外更清幽庭前瑞草和根拔淨白無依始徹頭徹頭格外知端的男兒肯向他尋覓謾言子過新羅捉活原來在咫尺拄杖頭邊眼頓開橫拈倒卓不須栽家庭懶論耕耘事賸有江風帶雨來示胡鼎甫居士一口氣不來畢竟甚處去萬仞懸巖誰作主筋斗翻空經幾回敗葉堆頭親眉宇當知父母未生前氣不來兮理亦然勘破箇中些子事層巖石虎抱兒眠哮吼一聲山嶽動金鱗肯別醃虀甕倐爾風雲際會時騰躍威稜看大用萬象森羅聽指呼緣生幻法總然徒靈山別有拈花意笑殺當年碧眼胡示張欽之居士一口氣不來畢竟甚處去生死輪回無伴侶五蘊根塵盡屬魔降魔須獲金剛杵金剛本體露堂堂賊魔難與共商量自古護生須是殺殺盡安居達本鄉諸祖相傳正法眼獅兒不是猢猻産殘篇斷索盡家珍烈漢從來無料揀萬象森羅指顧間高揮大抹得安閒逢人不泄真消息笑把芙蓉鎮日看示倪瓊圃侍講一口氣不來畢竟甚處去大千斂在毫端聚堂堂古路絶周遮誰敢當陽曰住處集雲峯下四藤條坐斷春風不放高百草頭邊親薦得萬花叢裏任逍遙空非大兮塵非小品彚無如出處好十字街頭等箇人饑餐渴飲隨溫飽撥盡寒爐火一星逈無情識不通靈腳跟踏著來時路始信澄潭徹底清示孫明都進士一口氣不來畢竟甚處去智人勿以明相覩豁開霄漢露羣峯得意飄然如鳳翥翱翔萬里見方圓清光不與市同𢌅藥山老宿曾親說水在瓶兮月在天大用堂堂絶分齊動止還同春富麗大方獨蹈境唯心誰向虗空誇巨細拈花端不涉離微勘破靈山老古錐無縫塔邊多水草龍眠深處鹿兒肥示林卞石居士一口氣不來畢竟甚處去劈頭認取最初步縱橫萬里不離天莫待臨時泣岐路欲知淮甸與江干連絡駢闐車馬殘散盡浮雲開眼看洞庭無蓋法身寒凍殺法身成底事隔岸無分他與自塵塵剎剎絶纖蹤誰道淫房并酒肆峭壁層巖不可攀還期陸地見波瀾風聲鳥語宣真諦都在龍眠煙水間示楊蘭似居士一口氣不來畢竟甚處去自古慈門無阻拒寶所非遙趨進時縱橫原不循規矩明中有暗暗中明明暗相參罷問程拗折驪龍頭上角珊瑚枝畔水痕腥抖擻通身虗揑怪眼耳鼻舌分疆界撲碎挪圓總不妨自買應須還自賣運水搬柴識得渠從來就裏絶親疏深山佛法依何住鳥宿雲藏月上初示胡永胤居士一口氣不來畢竟甚處去話頭好教頻頻舉隨緣透徹未生前㵎水松風解法語橫趨倒跨不為難剎海須彌指顧間靈芝瑞草和雲秀綺幹仙葩帶露寒閒拈竹杖敲空響肯向人前呈伎倆二時粥飯自家常寶網明珠俱不尚我曾行遍不欺人腳底風雲說似君果得箇中消息淨根塵界裏活如神示謝中隱居士一口氣不來畢竟甚處去倒卓眉毛別有路㘞地一聲猛省來人在煙雲最深處心如古井不生波笑殺臺山指路婆竪起拳頭明歷歷放開布袋奈渠何覿面縱橫無忌諱當機那論剎那際十方三世絶周遮畐塞誰分心境異塵勞堆裏妙蓮香東土西天謾舉揚更有一言吐不出無人處所為商量示夏廣生元甫生生三居士一口氣不來畢竟甚處去放得開時揑得聚腳下泥深水亦深水泥深處無憑據只須竪起鐵脊梁撞破藩籬達本鄉識得未生前面目通身白汗絶商量流通白汗清風古敢道山河無寸土縱橫不墮悄然機烈漢從來跨步武金牛飯飽趙州茶春到園林樹樹花更問西來端的旨白雲流水淡生涯示余任甫居士一口氣不來畢竟甚處去沙裏淘金休莽鹵五蘊山頭認得真從來不出渠門戶譬如捉賊須見贓獲得贓時謾度量分析現前贓與賊空門端的好兒郎幻化塵勞續慧命須知業纍性清淨十方坐斷不通風地轉天旋稱大定爐爇清香試返魂香煙盤結嶺頭雲倒騎石虎歸家晚拍掌徉徜笑語新示玄照鎧禪人一口氣不來畢竟甚處去踏著頭頭皆寶所灼然明月照金沙無量光明誰不覩只須開眼見光明䇿杖尋溪愛路平撞著長鬚黑面老方知烈漢不通情翻身踏上毗盧頂直捷無依還自省不問程途深夜歸須知露濕衣裳冷當門缺齒不關風肯向人前論異同才起一絲分別想山重重又水重重示一如洞禪人一口氣不來畢竟甚處去推不前兮留不住眉下娘生眼忽開肉團元是明珠庫明珠庫內寶成堆地動天翻響若雷不是吾家親眷屬方才趨入又驚回那箇人無皮下血自心冷暖向誰說何勞特地立階梯一念無生頓超越祖師崖岸滑如苔片語投機稱本懷謾道分身無量億一塵端有一如來示淨休珍禪人一口氣不來畢竟甚處去提起如穿荊棘絮扯不開時進步難解脫還須善調御萬花叢裏不粘身眼底無筋一世貧逼到岸邊行不去端然過水見長人鐵非硬兮綿非軟入門先自防家犬揑轉繩頭契祖機萬八程途不記遠社飲村歌春日和翠微深處白雲多若將語默通消息輸却當年凌行婆示岑伯奯禪人一口氣不來畢竟甚處去直入橫趨帶角虎瑞草靈芝香暗傳層巖峭壁清風古受用家私色色然真情端不向人言忽朝㘞地一聲子始信宗門有別傳男兒不借他人力肯逐因循消白日閒雲流水𮞏相交古路一條如筆直識得娘生枯粹姿瑩光皎潔若琉璃何用多生熏善業風流應出當家兒示夢雲禪人一口氣不來畢竟甚處去直入無容生怕怖若是吾家種草兒英靈自有娘生袴娘生袴子不尋常貼肉連皮謾忖量從他孔竅分疏密別有針鋒一線長會得將身藏北斗萬派千流皆授首才生擬議隔天涯野干難同獅子吼緑楊深處一聲鳩喚醒渠儂得自由山中水草隨緣足笑放溈山水牯牛示慈菴禪人一口氣不來畢竟甚處去淨白地上休染汙直跨橫趨達本鄉莫來攔我毬門路耍笑謳歌識得渠從來萬法本如如宗乘無限風流事獨羡楊岐三腳驢真珠撒向紫羅帳陳爛葛藤俱不尚別有通天路一條活句清機如歷掌沾著通身似蜜甜利生端不涉慈嚴三家村裏商量遍菱角如錐尖更尖示發光禪人一口氣不來畢竟甚處去萬里程從初步起撥雲見日未為難妙用堂堂須返己返己毋勞著眼看霜清露冷髑髏寒忽然擊竹聲消盡賸有千竿與萬竿示念如禪人一口氣不來畢竟甚處去重玄奧義從斯起閻浮走遍萬千遭歷劫何曾離自己識得自己是何顏毳衲橫披露半斑峭壁懸巖穿下過方知峯頂有層巒示太初法師華嚴山中太初老雙眸倒視乾坤小條眉舒放不尋常丈六金身一莖草一莖草上有瓊樓體露金風得自由解脫還期真實相鉢囊不挂一絲頭與我同鄉復同縣非故非親非覿面離俗還如相約來機緣頓異諸人見諸人不識兩行藏多笑鄰家稚子狂三昧百千誰指注權時贏得額頭光淨修三業浮囊渡戒德清明人仰慕愧我塵緣擺不開何日龍眠重會晤不須問路不分岐壽量恆沙報爾知倒跨泥牛吹鐵笛白毫光射幾須彌示毒鼓上座識得吾家真寶藏兢兢肯把繩頭放了生脫死大因緣要在當人能擇上身心世界等空花露地白牛長者車通衢八面清風起無底籃兒盛活蛇逢緣不把真機泄硬似胡綿軟似鐵拄杖縱橫得自由分明兩口一無舌須信懸巖絶後蘇突然狀出山海圖掉轉乾坤何境界三更初夜曜金烏示子朴上座識得吾家真寶藏巖頭萬仞須親上拌得娘生一箇身好與諸人作榜樣登山涉水是尋常攫浪拏雲當自強透過老僧無味句幾多玄妙盡糟糠不滯法身貴轉位從他花雨呈祥瑞萬象都來一口吞等閒擲出燎天燧一陳胡風劈面來優鉢羅花舌上栽腳跟步步須親到謾言南嶽與天台示我空上座不住山阿住市喜與檀那結善緣菴前車馬自駢闐月救生靈幾萬千多生值遇余居士濟生菴子從斯起壯麗弘開不二門躍淵縱翮無窮已不惜娘生一箇身何妨州縣往來頻毫𨤲升合非私畜鐵額銅頭見主人如斯不愧為僧相三德六和真可尚始終無改舊行藏好去叢林作榜樣更須徹究未生前不明之處痛加鞭掀翻碟子如天大破從來不值錢送無擇禪座上羅浮山緬想當年景泰師芟茅搆室海之湄羅浮絶頂恣遨遊鐵橋峯畔連瑤池石門方廣容几席三更日上海水赤旋覆乾坤辨故新吞吐風雲度朝夕上人今往亦何求縱步勤登二石樓倒視滄溟如涓滴一千瀑布稱雄流明月壇邊戒賸有殺佛焚經誇抖擻錫杖源清浴活龍玉鵝峯峻逢華首七十二洞奏天樂百千草木成瓊閣夜深險極轉身難踢破指頭親見腳我亦將來步此山入林端不問人間折桂茹芝閒歲月時臨清碧照衰顏示靜休禪人葬母恩愛相牽劫數長只須瞥地見親娘若將骨肉分真假管取多生手腳忙者一回莫錯過敲響髑髏誰是我今日親逢知識緣快須努力痛加鞭愛水情山消不盡輪回知是幾千年道人心不失照額上珠光明皎皎還將折杖攪長河觸著泥沙都是寶塵緣何處是吾心赤肉掀翻莫外尋示恆一禪人曠劫不變謂之恆散步披襟入棘林蠲諸名數謂之一萬仞峯頭獨足立動足揚眉落二三無身領荷非端的只須古路不逢僧地轉天旋似不曾草鞋裹向袈裟角水底時挑白日燈檻外閒人分曙色虗空畐塞如漆黑豁開兩眼若銅鈴何待當來問彌勒此是恆常不變心從來不向外邊尋春風吹入巖阿裏靜聽枝頭報好音示棲壑靜主之浙棲禪嶺表稱耆舊鎮海明珠誰不有栲栳相傳古及今誰是拏雲浪手肉髻深藏知幾秋光明普照四神洲旋聞返見辨端的喫飯穿衣得自由果若沾嘗些子味蹭蹬如癡亦如醉逢人懶話目前機正好隨羣與逐隊何緣跋涉博山來浙水潮聲莫浪猜腳跟踏著家鄉路白汗通身帶活埋示擴安禪人洞徹無依謂之擴廓充銷盡塵緣障心空境寂謂之安唯境唯心難比況只須竪起鐵脊梁撞破虗空是本鄉雲門胡餅金牛飯喫過始知滋味長千重百匝無遮互赤肉團邊彰露布趙州略彴古今同截斷不容驢馬度圓融混合顯全機土面灰頭絶悟迷有問衲僧成底事清風明月滿前溪此是禪人真受用聖凡鼻孔從來共大抹高揮五兩輕端居拱默千斤重佛法塵勞一擔擔無煙火炙骨毛寒一朝連擔都拋却撮土成金總不難
